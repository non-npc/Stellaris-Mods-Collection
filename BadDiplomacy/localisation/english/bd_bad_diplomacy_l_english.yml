 BD_MILITARIST_043_INSULT_PROPOSE:0 "Your generals keep asking the front line to hold while they find it."
 BD_MILITARIST_044_INSULT_PROPOSE:0 "Your martial culture peaked when someone invented a louder boot."
 BD_MILITARIST_045_INSULT_PROPOSE:0 "Your navy enters battle like an argument looking for witnesses."
 BD_MILITARIST_046_INSULT_PROPOSE:0 "Your troops practice intimidation by standing near functioning armies."
 BD_MILITARIST_047_INSULT_PROPOSE:0 "Your officer corps is proof that uniforms can carry a conversation alone."
 BD_MILITARIST_048_INSULT_PROPOSE:0 "Your tactical genius has been postponed due to missing forms."
 BD_MILITARIST_049_INSULT_PROPOSE:0 "Your military budget bought thunder and forgot lightning."
 BD_MILITARIST_050_INSULT_PROPOSE:0 "Your empire calls itself a sword, but it handles like a spoon."
 BD_PACIFIST_001_INSULT_PROPOSE:0 "We would defeat you, but letting you continue is more humane punishment."
 BD_PACIFIST_002_INSULT_PROPOSE:0 "Your aggression is so unimpressive that our peacekeepers feel overdressed."
 BD_PACIFIST_003_INSULT_PROPOSE:0 "We practice nonviolence; fortunately, you practice noncompetence."
 BD_PACIFIST_004_INSULT_PROPOSE:0 "Your threats have all the menace of a polite door chime."
 BD_PACIFIST_005_INSULT_PROPOSE:0 "We refuse to fight you because our museums already have enough farce."
 BD_PACIFIST_006_INSULT_PROPOSE:0 "Your saber-rattling sounds like cutlery in a laundry machine."
 BD_PACIFIST_007_INSULT_PROPOSE:0 "Please continue posturing; it has reduced regional tensions by making everyone laugh."
 BD_PACIFIST_008_INSULT_PROPOSE:0 "Your empire proves that belligerence can be carbonated and still flat."
 BD_PACIFIST_009_INSULT_PROPOSE:0 "We seek harmony, though your existence tests the acoustics."
 BD_PACIFIST_010_INSULT_PROPOSE:0 "Our pacifism survives contact with you because danger has not been established."
 BD_PACIFIST_011_INSULT_PROPOSE:0 "Your war rhetoric is the diplomatic equivalent of a toddler wearing armor."
