 BD_MILITARIST_035_INSULT_PROPOSE:0 "Your admirals named a maneuver after themselves because nobody else survived to object."
 BD_MILITARIST_036_INSULT_PROPOSE:0 "Your armies could occupy a planet only if the planet consented out of pity."
 BD_MILITARIST_037_INSULT_PROPOSE:0 "Your weapons tests have primarily advanced the field of insurance."
 BD_MILITARIST_038_INSULT_PROPOSE:0 "Your warriors confuse bravery with poor route planning."
 BD_MILITARIST_039_INSULT_PROPOSE:0 "Your strategy board is just a table where confidence goes to die."
 BD_MILITARIST_040_INSULT_PROPOSE:0 "Your dreadnought fantasy is adorable at civilian scale."
 BD_MILITARIST_041_INSULT_PROPOSE:0 "Your battle standards should include washing instructions for all the retreat stains."
