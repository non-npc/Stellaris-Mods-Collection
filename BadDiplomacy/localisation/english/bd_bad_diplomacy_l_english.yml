l_english:
 BD_GENERIC_001_INSULT_PROPOSE:0 "Your government has the structural integrity of a parade float in a meteor storm."
 BD_GENERIC_002_INSULT_PROPOSE:0 "We reviewed your constitution and found three recipes, two apologies, and no plan."
 BD_GENERIC_003_INSULT_PROPOSE:0 "Your cabinet meetings sound like a room full of airlocks being opened by accident."
 BD_GENERIC_004_INSULT_PROPOSE:0 "The galaxy has many failed states; yours is one of the few that keeps adding patch notes."
 BD_GENERIC_005_INSULT_PROPOSE:0 "Your ministries appear to be arranged by whoever lost a bet."
 BD_GENERIC_006_INSULT_PROPOSE:0 "A pre-sapient council could govern better, provided someone hid the shiny rocks."
 BD_GENERIC_007_INSULT_PROPOSE:0 "Your empire is what happens when a suggestion box gains emergency powers."
 BD_GENERIC_008_INSULT_PROPOSE:0 "Your bureaucracy moves so slowly that relic worlds have begun filing complaints."
 BD_GENERIC_009_INSULT_PROPOSE:0 "We sent a diplomat to understand your laws. They returned with a board game and a headache."
 BD_GENERIC_010_INSULT_PROPOSE:0 "Your capital's official motto should be: 'Mistakes were made, and promoted.'"
 BD_GENERIC_011_INSULT_PROPOSE:0 "Your ruling class has the confidence of a fallen empire and the competence of a vending machine."
 BD_GENERIC_012_INSULT_PROPOSE:0 "Your succession laws appear to choose leaders by throwing keys into a ventilation shaft."
 BD_GENERIC_013_INSULT_PROPOSE:0 "Every time your senate votes, probability itself requests a recess."
 BD_GENERIC_014_INSULT_PROPOSE:0 "Your administration has turned incompetence into a renewable resource."
 BD_GENERIC_015_INSULT_PROPOSE:0 "We mistook your policy platform for disaster forecasts, and frankly it read better that way."
 BD_GENERIC_016_INSULT_PROPOSE:0 "Your civil service is the only known organism that digests paperwork and produces confusion."
 BD_GENERIC_017_INSULT_PROPOSE:0 "Your leadership council could not coordinate a door opening during a hull breach."
 BD_GENERIC_018_INSULT_PROPOSE:0 "The last time your government had a good idea, archivists marked it as suspiciously foreign."
 BD_GENERIC_019_INSULT_PROPOSE:0 "Your public offices are staffed like someone randomized the species traits screen."
 BD_GENERIC_020_INSULT_PROPOSE:0 "We would accuse your officials of corruption, but that implies a level of organization."
 BD_GENERIC_021_INSULT_PROPOSE:0 "Your empire's five-year plan appears to be surviving the next five minutes."
 BD_GENERIC_022_INSULT_PROPOSE:0 "The only stable branch of your government is the one everyone forgot to fund."
 BD_GENERIC_023_INSULT_PROPOSE:0 "Your emergency powers are mostly used to create new emergencies."
 BD_GENERIC_024_INSULT_PROPOSE:0 "We examined your chain of command and found a knot."
 BD_GENERIC_025_INSULT_PROPOSE:0 "Your national anthem should be a loading screen that never finishes."
 BD_GENERIC_026_INSULT_PROPOSE:0 "We intercepted one of your research papers; it was later reclassified as a distress signal."
 BD_GENERIC_027_INSULT_PROPOSE:0 "Your laboratories have discovered several new ways to set water on fire."
 BD_GENERIC_028_INSULT_PROPOSE:0 "Your latest breakthrough was immediately peer-reviewed by a janitor and rejected by the mop."
 BD_GENERIC_029_INSULT_PROPOSE:0 "Three of your scientists spent six years studying a rock. The rock was eventually promoted."
 BD_GENERIC_030_INSULT_PROPOSE:0 "Your research grants have produced smoke, shouting, and one unusually judgmental amoeba."
 BD_GENERIC_031_INSULT_PROPOSE:0 "We admire your commitment to science fiction, especially when you call it physics."
 BD_GENERIC_032_INSULT_PROPOSE:0 "Your observatories keep discovering stars that were already on the map."
 BD_GENERIC_033_INSULT_PROPOSE:0 "Your chief scientist accidentally submitted lunch as a theory of everything."
 BD_GENERIC_034_INSULT_PROPOSE:0 "The laws of nature do not fear you; they pity your measuring equipment."
 BD_GENERIC_035_INSULT_PROPOSE:0 "Your engineering corps built a bridge between two theories and both sides collapsed."
 BD_GENERIC_036_INSULT_PROPOSE:0 "Your archaeological division once dated a ruin by asking it politely."
 BD_GENERIC_037_INSULT_PROPOSE:0 "Your medical research has concluded that bad decisions may be contagious in your empire."
 BD_GENERIC_038_INSULT_PROPOSE:0 "Every experiment you conduct begins with hope and ends with evacuation routes."
 BD_GENERIC_039_INSULT_PROPOSE:0 "Your science ships explore like tourists who forgot why they left home."
 BD_GENERIC_040_INSULT_PROPOSE:0 "Our children use your technology tree as a cautionary maze."
 BD_GENERIC_041_INSULT_PROPOSE:0 "Your researchers tried to split the atom and somehow annoyed the atom's neighbors."
 BD_GENERIC_042_INSULT_PROPOSE:0 "We found your lab notes under 'unexplained folklore.'"
 BD_GENERIC_043_INSULT_PROPOSE:0 "Your physics department has a special drawer labeled 'things we should not have touched.'"
 BD_GENERIC_044_INSULT_PROPOSE:0 "Your biology institute created a cure that apologizes before it fails."
 BD_GENERIC_045_INSULT_PROPOSE:0 "Your invention patents are mostly warnings with signatures."
 BD_GENERIC_046_INSULT_PROPOSE:0 "The galactic scientific community has agreed to observe your progress from a safe distance."
 BD_GENERIC_047_INSULT_PROPOSE:0 "Your computers calculate pi by guessing until morale improves."
 BD_GENERIC_048_INSULT_PROPOSE:0 "One of your prototypes achieved sentience and immediately requested asylum."
 BD_GENERIC_049_INSULT_PROPOSE:0 "Your best telescope is pointed inward, which explains your foreign policy."
 BD_GENERIC_050_INSULT_PROPOSE:0 "Your research director wears goggles so nobody sees the fear."
 BD_GENERIC_051_INSULT_PROPOSE:0 "Your fleet formation resembles spilled cutlery drifting through a nebula."
 BD_GENERIC_052_INSULT_PROPOSE:0 "One of your battleships accidentally declared independence during a turn."
 BD_GENERIC_053_INSULT_PROPOSE:0 "Your admirals have achieved the impossible: making retreat look aggressive."
 BD_GENERIC_054_INSULT_PROPOSE:0 "We observed your naval exercises; even the asteroids were unconcerned."
 BD_GENERIC_055_INSULT_PROPOSE:0 "Your invasion plans read like a list of suggestions written during turbulence."
 BD_GENERIC_056_INSULT_PROPOSE:0 "A mining drone mistook your flagship for scrap and was almost correct."
 BD_GENERIC_057_INSULT_PROPOSE:0 "Your corvettes travel in packs because none of them knows the way home."
 BD_GENERIC_058_INSULT_PROPOSE:0 "Your navy once lost a battle against incorrect coordinates."
 BD_GENERIC_059_INSULT_PROPOSE:0 "We saw your fleet arrive late to its own ambush."
 BD_GENERIC_060_INSULT_PROPOSE:0 "Your targeting computers have begun praying, and they do not believe in gods."
 BD_GENERIC_061_INSULT_PROPOSE:0 "Your soldiers march with the grim determination of people following bad directions."
 BD_GENERIC_062_INSULT_PROPOSE:0 "Your war room has excellent chairs and no useful maps."
 BD_GENERIC_063_INSULT_PROPOSE:0 "Your starbases look intimidating until one notices the caution tape."
 BD_GENERIC_064_INSULT_PROPOSE:0 "We trained cadets using footage of your maneuvers. They laughed, then failed the ethics module."
 BD_GENERIC_065_INSULT_PROPOSE:0 "Your battle doctrine is apparently 'everyone go somewhere and look busy.'"
 BD_GENERIC_066_INSULT_PROPOSE:0 "The only thing disciplined about your military is its habit of disappointing you."
 BD_GENERIC_067_INSULT_PROPOSE:0 "Your flagship's most advanced weapon is the captain's optimistic tone."
 BD_GENERIC_068_INSULT_PROPOSE:0 "Your generals treat logistics like a rumor spread by cowards."
 BD_GENERIC_069_INSULT_PROPOSE:0 "Your navy has more slogans than victories."
 BD_GENERIC_070_INSULT_PROPOSE:0 "Your shipyards produce vessels with the energy of furniture assembled in a blackout."
 BD_GENERIC_071_INSULT_PROPOSE:0 "Your fleet's emergency drills caused three real emergencies."
 BD_GENERIC_072_INSULT_PROPOSE:0 "We have seen tiyanki maintain tighter formations while sneezing."
 BD_GENERIC_073_INSULT_PROPOSE:0 "Your orbital bombardment plans include a section titled 'hope this helps.'"
 BD_GENERIC_074_INSULT_PROPOSE:0 "Your defense platforms are brave, stationary, and deeply decorative."
 BD_GENERIC_075_INSULT_PROPOSE:0 "Your admirals navigate by vibes and publicly available panic."
 BD_GENERIC_076_INSULT_PROPOSE:0 "Your economy is a fascinating experiment in turning minerals into regret."
 BD_GENERIC_077_INSULT_PROPOSE:0 "Your treasury makes bankruptcy look like an organized hobby."
 BD_GENERIC_078_INSULT_PROPOSE:0 "We reviewed your trade routes and found three detours, a sandwich, and no profit."
 BD_GENERIC_079_INSULT_PROPOSE:0 "Your market analysts predicted growth because the graph was drawn uphill."
 BD_GENERIC_080_INSULT_PROPOSE:0 "Your energy credits have started leaving your empire without authorization."
 BD_GENERIC_081_INSULT_PROPOSE:0 "Your budget has more holes than a pirate base after inspection day."
 BD_GENERIC_082_INSULT_PROPOSE:0 "Your accountants use ceremonial robes because arithmetic has become a ritual."
 BD_GENERIC_083_INSULT_PROPOSE:0 "The galactic market considers your currency a collectible prank."
 BD_GENERIC_084_INSULT_PROPOSE:0 "Your alloy production is so fragile that workers whisper near the furnaces."
 BD_GENERIC_085_INSULT_PROPOSE:0 "You have achieved negative prosperity with impressive consistency."
 BD_GENERIC_086_INSULT_PROPOSE:0 "Your economic forecasts are filed under speculative horror."
 BD_GENERIC_087_INSULT_PROPOSE:0 "Your merchants could lose money selling umbrellas in acid rain."
 BD_GENERIC_088_INSULT_PROPOSE:0 "Your deficit has entered diplomacy on your behalf."
 BD_GENERIC_089_INSULT_PROPOSE:0 "We almost invested in your empire, then the spreadsheet began smoking."
 BD_GENERIC_090_INSULT_PROPOSE:0 "Your taxation system appears to harvest optimism and convert it into complaints."
 BD_GENERIC_091_INSULT_PROPOSE:0 "Your trade value is measured in sympathetic noises."
 BD_GENERIC_092_INSULT_PROPOSE:0 "Your consumer goods shortage has become a cultural tradition."
 BD_GENERIC_093_INSULT_PROPOSE:0 "Your finance ministry uses a dartboard, and the dartboard has resigned."
 BD_GENERIC_094_INSULT_PROPOSE:0 "Your prosperity office is located between the pawn shop and the emergency exit."
 BD_GENERIC_095_INSULT_PROPOSE:0 "Your supply chain is less a chain and more a bowl of noodles during an earthquake."
 BD_GENERIC_096_INSULT_PROPOSE:0 "Your merchants negotiated with themselves and still overpaid."
 BD_GENERIC_097_INSULT_PROPOSE:0 "Your fiscal policy is the reason calculators have warranty disclaimers."
 BD_GENERIC_098_INSULT_PROPOSE:0 "Your banks have started charging admission to watch the collapse."
 BD_GENERIC_099_INSULT_PROPOSE:0 "Even smugglers refuse to launder your balance sheet."
 BD_GENERIC_100_INSULT_PROPOSE:0 "Your economy is not in recession; it is exploring vertical space."
 BD_GENERIC_101_INSULT_PROPOSE:0 "Your envoys enter a room like someone accidentally opened spam mail."
 BD_GENERIC_102_INSULT_PROPOSE:0 "Negotiating with you is like translating smoke from a broken toaster."
 BD_GENERIC_103_INSULT_PROPOSE:0 "Your diplomatic corps could start a border incident at a birthday party."
 BD_GENERIC_104_INSULT_PROPOSE:0 "We received your peace proposal and framed it in our comedy wing."
 BD_GENERIC_105_INSULT_PROPOSE:0 "Your embassy has the warmth of a tax audit in an airlock."
 BD_GENERIC_106_INSULT_PROPOSE:0 "Every treaty you sign looks surprised to be involved."
 BD_GENERIC_107_INSULT_PROPOSE:0 "Your ambassadors speak many languages and insult all of them."
 BD_GENERIC_108_INSULT_PROPOSE:0 "The Galactic Community loses patience when your name appears on the schedule."
 BD_GENERIC_109_INSULT_PROPOSE:0 "Your foreign policy is just a shrug wearing formal clothes."
 BD_GENERIC_110_INSULT_PROPOSE:0 "We considered opening relations, but our doors have standards."
 BD_GENERIC_111_INSULT_PROPOSE:0 "Your diplomats treat subtlety like a hostile empire."
 BD_GENERIC_112_INSULT_PROPOSE:0 "The last message from your embassy was so confusing that our translator requested hazard pay."
 BD_GENERIC_113_INSULT_PROPOSE:0 "Your idea of compromise is failing in two directions at once."
 BD_GENERIC_114_INSULT_PROPOSE:0 "Your official statements have the nutritional value of static."
 BD_GENERIC_115_INSULT_PROPOSE:0 "We invited your envoy to a summit; the chairs asked to be excused."
 BD_GENERIC_116_INSULT_PROPOSE:0 "Your trade agreement arrived with bite marks."
 BD_GENERIC_117_INSULT_PROPOSE:0 "Your border policy has the coherence of a space amoeba with a calendar."
 BD_GENERIC_118_INSULT_PROPOSE:0 "We admire your dedication to making first contact feel like a complaint."
 BD_GENERIC_119_INSULT_PROPOSE:0 "Your non-aggression pact proposal somehow felt threatening to punctuation."
 BD_GENERIC_120_INSULT_PROPOSE:0 "Your embassy staff uses emergency exits as meeting rooms."
 BD_GENERIC_121_INSULT_PROPOSE:0 "Your diplomacy is what happens when a megaphone argues with a foghorn."
 BD_GENERIC_122_INSULT_PROPOSE:0 "We would open channels, but yours appear to be clogged with excuses."
 BD_GENERIC_123_INSULT_PROPOSE:0 "Your statecraft is a ceremonial dance around the obvious."
 BD_GENERIC_124_INSULT_PROPOSE:0 "Your insults are weaker than your apologies, which is not praise."
 BD_GENERIC_125_INSULT_PROPOSE:0 "The senate chamber dims the lights when your delegation approaches."
 BD_GENERIC_126_INSULT_PROPOSE:0 "Your founding mother was so enormous that early astronomers mistook her for a binary system."
 BD_GENERIC_127_INSULT_PROPOSE:0 "Your ancestral matriarch required her own hyperlane network."
 BD_GENERIC_128_INSULT_PROPOSE:0 "When your progenitor entered orbit, the tides filed a formal complaint."
 BD_GENERIC_129_INSULT_PROPOSE:0 "Historians still debate whether your homeworld formed around her or simply under her."
 BD_GENERIC_130_INSULT_PROPOSE:0 "Your species evolved because predators could not get around your founding mother."
 BD_GENERIC_131_INSULT_PROPOSE:0 "Your progenitor's shadow caused three ice ages and a poetry movement."
 BD_GENERIC_132_INSULT_PROPOSE:0 "Your ancestral matriarch was once classified as a habitable world until she stood up."
 BD_GENERIC_133_INSULT_PROPOSE:0 "Your founding mother needed a ringworld not for housing, but for a belt."
 BD_GENERIC_134_INSULT_PROPOSE:0 "Your progenitor's breakfast required a logistics network and two vassal states."
 BD_GENERIC_135_INSULT_PROPOSE:0 "When your ancestral matriarch sat down, tectonic plates negotiated terms."
 BD_GENERIC_136_INSULT_PROPOSE:0 "Your founding mother was so large that border friction began inside your capital."
 BD_GENERIC_137_INSULT_PROPOSE:0 "Your progenitor did not have a family tree; she had a continental shelf."
 BD_GENERIC_138_INSULT_PROPOSE:0 "Your ancestral matriarch's portrait needs a galaxy map for proper scaling."
 BD_GENERIC_139_INSULT_PROPOSE:0 "When your founding mother sneezed, three nebulae changed lanes."
 BD_GENERIC_140_INSULT_PROPOSE:0 "Your progenitor's orbit was stable until someone called it walking."
 BD_GENERIC_141_INSULT_PROPOSE:0 "Your ancestral matriarch did not cross the road; the road applied for migration access."
 BD_GENERIC_142_INSULT_PROPOSE:0 "Your founding mother was so massive that survey ships kept trying to scan her for deposits."
 BD_GENERIC_143_INSULT_PROPOSE:0 "Your progenitor once leaned on a moon and invented ring debris."
 BD_GENERIC_144_INSULT_PROPOSE:0 "Your ancestral matriarch's chair has a naval capacity requirement."
 BD_GENERIC_145_INSULT_PROPOSE:0 "When your founding mother waved, sensors reported a gravitational anomaly."
 BD_GENERIC_146_INSULT_PROPOSE:0 "Your progenitor's wardrobe is catalogued by the Ministry of Megastructures."
 BD_GENERIC_147_INSULT_PROPOSE:0 "Your ancestral matriarch needed migration controls just to visit the kitchen."
 BD_GENERIC_148_INSULT_PROPOSE:0 "Your founding mother was so large that her diary had strategic resources."
 BD_GENERIC_149_INSULT_PROPOSE:0 "When your progenitor laughed, nearby starbases checked their shields."
 BD_GENERIC_150_INSULT_PROPOSE:0 "Your ancestral matriarch was not born under a star; the star was born beside her."
 BD_GENERIC_151_INSULT_PROPOSE:0 "The Galactic Community has proposed a resolution requiring your delegation to use smaller words and fewer ideas."
 BD_GENERIC_152_INSULT_PROPOSE:0 "Your latest senate speech caused three empires to discover the mute button."
 BD_GENERIC_153_INSULT_PROPOSE:0 "A custodian candidate used your policies as proof that someone must supervise the galaxy."
 BD_GENERIC_154_INSULT_PROPOSE:0 "Your representative once filibustered against a bill they sponsored."
 BD_GENERIC_155_INSULT_PROPOSE:0 "The senate clerk keeps your proposals in a folder labeled 'weather damage.'"
 BD_GENERIC_156_INSULT_PROPOSE:0 "Your diplomatic weight is mostly caused by paperwork density."
 BD_GENERIC_157_INSULT_PROPOSE:0 "The community did not reject your resolution; it placed it gently outside."
 BD_GENERIC_158_INSULT_PROPOSE:0 "Your delegation brings snacks because argument has failed you."
 BD_GENERIC_159_INSULT_PROPOSE:0 "Even the emergency session asked whether your emergency could wait."
 BD_GENERIC_160_INSULT_PROPOSE:0 "Your voting record resembles a seismograph during a panic attack."
 BD_GENERIC_161_INSULT_PROPOSE:0 "The senate chamber has introduced a cooldown period after your speeches."
 BD_GENERIC_162_INSULT_PROPOSE:0 "Your amendments are so bad that hostile empires vote against them out of self-respect."
 BD_GENERIC_163_INSULT_PROPOSE:0 "Your proposal to standardize wisdom was defeated by your own introduction."
 BD_GENERIC_164_INSULT_PROPOSE:0 "The galactic agenda moved faster once your delegation got lost."
 BD_GENERIC_165_INSULT_PROPOSE:0 "Your envoy confused diplomatic immunity with immunity to embarrassment."
 BD_GENERIC_166_INSULT_PROPOSE:0 "The community's official transcript replaced your remarks with '[audible suffering].'"
 BD_GENERIC_167_INSULT_PROPOSE:0 "Your sanctions package sanctioned itself before reaching the floor."
 BD_GENERIC_168_INSULT_PROPOSE:0 "Your empire proves diplomatic weight and good judgment are unrelated technologies."
 BD_GENERIC_169_INSULT_PROPOSE:0 "The senate cafeteria has stronger coalitions than your foreign office."
 BD_GENERIC_170_INSULT_PROPOSE:0 "Your delegation once abstained from attendance."
 BD_GENERIC_171_INSULT_PROPOSE:0 "The Galactic Council reviewed your application and recommended fiction publishing."
 BD_GENERIC_172_INSULT_PROPOSE:0 "Your representative treats parliamentary procedure like an optional boss fight."
 BD_GENERIC_173_INSULT_PROPOSE:0 "Your speeches make even fanatic purifiers appreciate silence."
 BD_GENERIC_174_INSULT_PROPOSE:0 "The senate's translation system now has a setting called 'whatever that was.'"
 BD_GENERIC_175_INSULT_PROPOSE:0 "Your empire is the reason the community considered requiring a tutorial."
 BD_GENERIC_176_INSULT_PROPOSE:0 "A dimensional horror emerged from a rift, reviewed your policies, and quietly left."
 BD_GENERIC_177_INSULT_PROPOSE:0 "The Prethoryn have requested that we stop comparing them to your administration."
 BD_GENERIC_178_INSULT_PROPOSE:0 "Your empire has been voted 'Most Likely To Accidentally Summon A Crisis.'"
 BD_GENERIC_179_INSULT_PROPOSE:0 "The End of the Cycle expressed concern about your long-term planning."
 BD_GENERIC_180_INSULT_PROPOSE:0 "We found your strategic archives and assumed they were a cautionary tale."
 BD_GENERIC_181_INSULT_PROPOSE:0 "An archaeological expedition uncovered evidence of your future mistakes."
 BD_GENERIC_182_INSULT_PROPOSE:0 "Your civilization is what happens when a loading screen tip gains sovereignty."
 BD_GENERIC_183_INSULT_PROPOSE:0 "A fallen empire woke up, saw your border gore, and went back to sleep."
 BD_GENERIC_184_INSULT_PROPOSE:0 "The Shroud whispered your name, then asked us to forget it happened."
 BD_GENERIC_185_INSULT_PROPOSE:0 "A black hole apologized after being compared to your leadership."
 BD_GENERIC_186_INSULT_PROPOSE:0 "Your empire's greatest relic is the first mistake you never corrected."
 BD_GENERIC_187_INSULT_PROPOSE:0 "The crisis fleet slowed down near your space to enjoy the irony."
 BD_GENERIC_188_INSULT_PROPOSE:0 "A curator enclave tried to explain your strategy and lost funding mid-sentence."
 BD_GENERIC_189_INSULT_PROPOSE:0 "The Infinity Machine calculated your odds and invented a sad new number."
 BD_GENERIC_190_INSULT_PROPOSE:0 "A leviathan observed your navy and decided extinction could wait."
 BD_GENERIC_191_INSULT_PROPOSE:0 "The enigmatic fortress is easier to understand than your zoning laws."
 BD_GENERIC_192_INSULT_PROPOSE:0 "A precursor civilization left a message for you: 'Please do not continue our work.'"
 BD_GENERIC_193_INSULT_PROPOSE:0 "Your borders look like a cartographer sneezed during a seizure."
 BD_GENERIC_194_INSULT_PROPOSE:0 "The Worm offered you love, then read your policy screen and blocked your frequency."
 BD_GENERIC_195_INSULT_PROPOSE:0 "A contingency unit scanned your empire and flagged it as already compromised."
 BD_GENERIC_196_INSULT_PROPOSE:0 "The Great Khan studied your defenses and laughed so hard the horde lost cohesion."
 BD_GENERIC_197_INSULT_PROPOSE:0 "Your capital world has the diplomatic aura of a wet sock in a council chamber."
 BD_GENERIC_198_INSULT_PROPOSE:0 "A sentient storm altered course to avoid becoming associated with you."
 BD_GENERIC_199_INSULT_PROPOSE:0 "Your empire is not a rival; it is a recurring galactic notification."
 BD_GENERIC_200_INSULT_PROPOSE:0 "We would call you a footnote, but footnotes usually clarify something."
 BD_MILITARIST_001_INSULT_PROPOSE:0 "Your warriors polish their medals before earning them."
 BD_MILITARIST_002_INSULT_PROPOSE:0 "Your grand strategy appears to be shouting until the map changes."
 BD_MILITARIST_003_INSULT_PROPOSE:0 "Your generals have mistaken casualties for punctuation."
 BD_MILITARIST_004_INSULT_PROPOSE:0 "Your fleet doctrine is all hammer and no nail."
 BD_MILITARIST_005_INSULT_PROPOSE:0 "You call it courage; our analysts call it walking toward obvious lasers."
 BD_MILITARIST_006_INSULT_PROPOSE:0 "Your barracks produce confidence faster than competence."
 BD_MILITARIST_007_INSULT_PROPOSE:0 "Your admirals study warfare by staring intensely at explosions."
 BD_MILITARIST_008_INSULT_PROPOSE:0 "Your warships have more decorative spikes than confirmed victories."
 BD_MILITARIST_009_INSULT_PROPOSE:0 "Your parade formations are excellent, which is fortunate because they are your main military success."
 BD_MILITARIST_010_INSULT_PROPOSE:0 "You build fortresses like monuments to future surrender."
 BD_MILITARIST_011_INSULT_PROPOSE:0 "Your soldiers charge so eagerly that maps have filed restraining orders."
 BD_MILITARIST_012_INSULT_PROPOSE:0 "Your officer academy teaches tactics as interpretive dance."
 BD_MILITARIST_013_INSULT_PROPOSE:0 "Your invasion force arrived with banners, speeches, and no batteries."
 BD_MILITARIST_014_INSULT_PROPOSE:0 "Every weapon in your arsenal seems designed by someone compensating for geography."
 BD_MILITARIST_015_INSULT_PROPOSE:0 "Your navy's battle cry has defeated more morale than enemies."
 BD_MILITARIST_016_INSULT_PROPOSE:0 "You threaten total war with the energy of a child holding a saucepan."
 BD_MILITARIST_017_INSULT_PROPOSE:0 "Your admirals treat flanking like a forbidden philosophy."
 BD_MILITARIST_018_INSULT_PROPOSE:0 "Your command staff considers reconnaissance a form of pessimism."
 BD_MILITARIST_019_INSULT_PROPOSE:0 "Your war plans could be defeated by a locked supply closet."
 BD_MILITARIST_020_INSULT_PROPOSE:0 "Your military honors are mostly participation trophies with sharper edges."
 BD_MILITARIST_021_INSULT_PROPOSE:0 "Your fleets would be terrifying if volume were damage."
 BD_MILITARIST_022_INSULT_PROPOSE:0 "Your generals think attrition is a motivational speaker."
 BD_MILITARIST_023_INSULT_PROPOSE:0 "Your strategic reserve is apparently another speech."
 BD_MILITARIST_024_INSULT_PROPOSE:0 "Your army manual begins with 'try yelling.'"
 BD_MILITARIST_025_INSULT_PROPOSE:0 "Your soldiers display remarkable discipline when running in the wrong direction."
 BD_MILITARIST_026_INSULT_PROPOSE:0 "Your armories are full of weapons looking for qualified adults."
 BD_MILITARIST_027_INSULT_PROPOSE:0 "Your orbital drills frightened civilians, wildlife, and several of your own officers."
 BD_MILITARIST_028_INSULT_PROPOSE:0 "Your battle simulations keep surrendering to the tutorial."
 BD_MILITARIST_029_INSULT_PROPOSE:0 "Your war council has the subtlety of a meteor with a drum kit."
