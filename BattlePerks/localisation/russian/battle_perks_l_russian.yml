l_russian:
 mod_battle_perks:0 "Боевые перки"

 ap_bp_fortress_doctrine:0 "Доктрина крепости"
 ap_bp_fortress_doctrine_desc:0 "Наши границы станут стальными стенами, наши станции — бастионами, а наши колонии — укреплёнными опорными пунктами против врага."

 ap_bp_total_war_economy:0 "Экономика тотальной войны"
 ap_bp_total_war_economy_desc:0 "Гражданская экономика реорганизована вокруг постоянной военной готовности, ускоряя производство кораблей и выпуск сплавов ценой социальных издержек."

 ap_bp_fleet_supremacy_protocols:0 "Протоколы флотского превосходства"
 ap_bp_fleet_supremacy_protocols_desc:0 "Централизованное флотское командование позволяет нашим флотам действовать в масштабе и с точностью, недоступными для менее могущественных держав."

 ap_bp_planetary_shield_mandate:0 "Мандат планетарных щитов"
 ap_bp_planetary_shield_mandate_desc:0 "Каждая колония обязана поддерживать аварийные щитовые системы, усиленные гарнизоны и инфраструктуру планетарной обороны."
 ap_bp_planetary_shield_mandate_unlock:0 "Открывает планетарное решение §YАктивировать мандат щитов§!."

 ap_bp_siege_masters:0 "Мастера осады"
 ap_bp_siege_masters_desc:0 "Наши армии и флоты обучены прорывать укреплённые системы, ломать моральный дух и прекращать планетарное сопротивление с безжалостной эффективностью.\n\n§EОткрывает армию:§! §YАрмия прорыва осады§!"
 ap_bp_siege_masters_unlock:0 "Открывает набор §YАрмий прорыва осады§! на ваших колониях."

 ap_bp_adaptive_battle_networks:0 "Адаптивные боевые сети"
 ap_bp_adaptive_battle_networks_desc:0 "Боевые данные синхронизируются по всему флоту, позволяя системам наведения и тактическим компьютерам адаптироваться в реальном времени.\n\n§EОткрывает:§! §YАдаптивные боевые компьютеры§!\n§EОткрывает указ:§! §YСинхронизация боевой сети§!"


 ap_bp_adaptive_battle_networks_unlock:0 "Открывает §YАдаптивные боевые компьютеры§! для проектов кораблей и указ §YСинхронизация боевой сети§!."
 ap_bp_crisis_response_mandate_unlock:0 "Открывает указ §YЭкстренная мобилизация§!."

 ap_bp_eternal_watch:0 "Вечная стража"
 ap_bp_eternal_watch_desc:0 "Наша империя поддерживает постоянные военные системы наблюдения, пограничные датчики и системы слежения, чтобы выявлять угрозы до их удара."

 ap_bp_warborn_society:0 "Общество рождённое войной"
 ap_bp_warborn_society_desc:0 "Военная служба определяет гражданскую жизнь. Каждый гражданин понимает, что выживание обеспечивается дисциплиной, жертвами и силой."

 ap_bp_crisis_response_mandate:0 "Мандат реагирования на кризис"
 ap_bp_crisis_response_mandate_desc:0 "Наши флоты готовы к экзистенциальным угрозам, быстро мобилизуясь против кризисных фракций, мародёров, захватчиков и галактических хищников.\n\n§EОткрывает указ:§! §YЭкстренная мобилизация§!"

 ap_bp_bastion_worlds:0 "Миры-бастионы"
 ap_bp_bastion_worlds_desc:0 "Ключевые колонии могут быть превращены в миры-крепости, способные удерживать целые секторы против вторжения.\n\n§EОткрывает постройку:§! §YКомандный нексус крепости§!\n§EОткрывает решение:§! §YНазначить мир-бастион§!"
 ap_bp_bastion_worlds_unlock:0 "Открывает постройку §YКомандный нексус крепости§! и планетарное решение §YНазначить мир-бастион§!."

 bp_siege_breaker_army:0 "Армия прорыва осады"
 bp_siege_breaker_army_desc:0 "Элитные штурмовые формирования, специализирующиеся на прорыве укреплённых миров, уничтожении обороны и подавлении сопротивления."

 COMBAT_COMPUTER_BP_ADAPTIVE_LINE:0 "Адаптивный боевой компьютер (Линия)"
 COMBAT_COMPUTER_BP_ADAPTIVE_LINE_DESC:0 "Синхронизированная аналитика поля боя улучшает линейные построения, точность, слежение и логику отхода."

 COMBAT_COMPUTER_BP_ADAPTIVE_ARTILLERY:0 "Адаптивный боевой компьютер (Артиллерия)"
 COMBAT_COMPUTER_BP_ADAPTIVE_ARTILLERY_DESC:0 "Тактические данные в реальном времени улучшают дальнюю стрельбу, координацию флота и аварийный отход."

 COMBAT_COMPUTER_BP_ADAPTIVE_PICKET:0 "Адаптивный боевой компьютер (Пикет)"
 COMBAT_COMPUTER_BP_ADAPTIVE_PICKET_DESC:0 "Адаптивные сети слежения усиливают пикетирование, точность, преследование и тактический отход."

 building_bp_fortress_command_nexus:0 "Командный нексус крепости"
 building_bp_fortress_command_nexus_desc:0 "Планетарный военный командный комплекс, координирующий оборону, экстренное реагирование, орбитальную интеграцию и секторную логистику."

 decision_bp_activate_shield_mandate:0 "Активировать мандат щитов"
 decision_bp_activate_shield_mandate_desc:0 "Развернуть аварийные планетарные щиты, усилить оборонительные сети и укрепить эту колонию против вторжения."

 decision_bp_designate_bastion_world:0 "Назначить мир-бастион"
 decision_bp_designate_bastion_world_desc:0 "Превратить эту колонию в постоянный мир-бастион, сосредоточенный на обороне сектора и военной готовности."

 bp_emergency_mobilization:0 "Экстренная мобилизация"
 bp_emergency_mobilization_desc:0 "Временно расширить флотскую мобилизацию и боевую готовность вооружений в ответ на серьёзные угрозы."

 bp_battle_network_sync:0 "Синхронизация боевой сети"
 bp_battle_network_sync_desc:0 "Синхронизировать тактические системы флота для улучшения точности наведения и слежения."

 bp_shield_mandate_active:0 "Мандат щитов активен"
 bp_shield_mandate_active_desc:0 "Эта колония защищена аварийными щитовыми системами и усиленной оборонительной инфраструктурой."

 bp_bastion_world:0 "Мир-бастион"
 bp_bastion_world_desc:0 "Эта колония назначена укреплённым военным бастионом."


 edict_bp_emergency_mobilization:0 "Экстренная мобилизация"
 edict_bp_emergency_mobilization_desc:0 "Временно расширить флотскую мобилизацию и боевую готовность вооружений в ответ на серьёзные угрозы."
 edict_bp_battle_network_sync:0 "Синхронизация боевой сети"
 edict_bp_battle_network_sync_desc:0 "Синхронизировать тактические системы флота для улучшения точности наведения и слежения."
 edict_edict_bp_emergency_mobilization:0 "Экстренная мобилизация"
 edict_edict_bp_emergency_mobilization_desc:0 "Временно расширить флотскую мобилизацию и боевую готовность вооружений в ответ на серьёзные угрозы."
 edict_edict_bp_battle_network_sync:0 "Синхронизация боевой сети"
 edict_edict_bp_battle_network_sync_desc:0 "Синхронизировать тактические системы флота для улучшения точности наведения и слежения."
