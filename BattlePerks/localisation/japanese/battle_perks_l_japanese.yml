 edict_edict_bp_emergency_mobilization:0 "緊急動員"
 edict_edict_bp_emergency_mobilization_desc:0 "重大な脅威に応じて、一時的に海軍動員と兵器の戦闘準備を拡大する。"
 edict_edict_bp_battle_network_sync:0 "戦闘ネットワーク同期"
 edict_edict_bp_battle_network_sync_desc:0 "艦隊の戦術システムを同期し、照準精度と追跡能力を向上させる。"
