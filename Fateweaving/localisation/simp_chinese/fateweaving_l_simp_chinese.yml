 fw_fate_ruined_machines_tooltip:0 "§H$fw_fate_ruined_machines$§!\n\n命运破坏了工业与工程洞见。\n\n持续：5年\n效果：岗位工程学研究-10%，稳定度-5"
 fw_fate_hunger_shadow_tooltip:0 "§H$fw_fate_hunger_shadow$§!\n\n命运投下匮乏与歉收的阴影。\n\n持续：5年\n效果：岗位食物产出-10%，稳定度-5"
 fw_fate_madness_weather_tooltip:0 "§H$fw_fate_madness_weather$§!\n\n命运以反常的环境与日渐瓦解的士气扰乱了日常生活。\n\n持续：5年\n效果：舒适度-10%，稳定度-5"
