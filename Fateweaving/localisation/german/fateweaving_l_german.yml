l_german:

 tech_fateweaving:0 "Schicksalsweberei"
 tech_fateweaving_desc:0 "Indem wir die Architektur der Wahrscheinlichkeit selbst erforschen, kann unsere Zivilisation lernen, Welten für unmögliche Ausgänge zu markieren. Das Schicksal lässt sich nicht beherrschen, aber es lässt sich einladen."
 tech_fateweaving_effect:0 "§HSchaltet Funktion frei:§! Schicksal auf jeder Kolonie heraufbeschwören. Markierte Welten erhalten innerhalb von 30 bis 90 Tagen einen zufälligen Segen oder eine Katastrophe."

 fw_invoke_fate_button:0 "Invoke Fate"
 fw_deciding_fate_button:0 "Deciding Fate..."
 fw_fate_decided_button:0 "Fate Decided"

 fw_invoke_fate_button_tooltip:0 "Beschwört auf dieser Welt das Schicksal herauf und lässt das Verhängnis einen Segen oder einen Fluch wählen."
 fw_fate_decided_button_tooltip:0 "Das Schicksal dieser Welt ist bereits entschieden. Der Ausgang bleibt wirksam, bis er abläuft."

 fw.10.name:0 "Schicksalsweberei"
 fw.10.desc:0 "§Y[event_target:fw_target_colony.GetName]§! wurde für die Schicksalsweberei ausgewählt. Sollen wir ihr Schicksal in Bewegung setzen?"
 fw.10.a:0 "Invoke Fate"
 fw.10.b:0 "Abbrechen"

 fw.101.name:0 "$fw_fate_bountiful_harvest$"
 fw.101.desc:0 "Das Schicksal hat §Y[event_target:fw_target_colony.GetName]§! mit Überfluss und erneuertem bürgerlichem Vertrauen gesegnet."

 fw.102.name:0 "$fw_fate_golden_alignment$"
 fw.102.desc:0 "Das Schicksal hat §Y[event_target:fw_target_colony.GetName]§! auf Harmonie, Ordnung und außergewöhnliche Stabilität ausgerichtet."

 fw.103.name:0 "$fw_fate_growth_surge$"
 fw.103.desc:0 "Das Schicksal hat Erneuerung, Migration, Optimismus und demografischen Schwung für §Y[event_target:fw_target_colony.GetName]§! gewählt."

 fw.104.name:0 "$fw_fate_serene_destiny$"
 fw.104.desc:0 "Das Schicksal hat die Not auf §Y[event_target:fw_target_colony.GetName]§! gemildert und eine Zeit ruhigen Wohlstands gebracht."

 fw.105.name:0 "$fw_fate_scholars_dream$"
 fw.105.desc:0 "Das Schicksal hat Neugier und wissenschaftlichen Schwung auf §Y[event_target:fw_target_colony.GetName]§! geweckt."

 fw.201.name:0 "$fw_fate_shattered_luck$"
 fw.201.desc:0 "Das Schicksal hat sich gegen §Y[event_target:fw_target_colony.GetName]§! gewandt und Glück und Zuversicht zerstreut."

 fw.202.name:0 "$fw_fate_ruined_machines$"
 fw.202.desc:0 "Das Schicksal hat Industrie und ingenieurtechnisches Verständnis auf §Y[event_target:fw_target_colony.GetName]§! sabotiert."

 fw.203.name:0 "$fw_fate_hunger_shadow$"
 fw.203.desc:0 "Das Schicksal hat §Y[event_target:fw_target_colony.GetName]§! mit einer Schattenwand aus Knappheit und misslingenden Ernten überzogen."

 fw.204.name:0 "$fw_fate_madness_weather$"
 fw.204.desc:0 "Das Schicksal hat das tägliche Leben auf §Y[event_target:fw_target_colony.GetName]§! mit unberechenbaren Bedingungen und bröckelnder Moral ins Wanken gebracht."

 fw.205.name:0 "$fw_fate_cursed_silence$"
 fw.205.desc:0 "Das Schicksal hat Einheit und kollektiven Willen auf §Y[event_target:fw_target_colony.GetName]§! erstickt."

 fw_fate_pending_tooltip:0 "Schicksal wird entschieden...\n\nDie Zukunft dieser Welt wird durch unsichtbare Fäden gezogen. Der endgültige Ausgang hat sich noch nicht manifestiert."

 fw_fate_bountiful_harvest_tooltip:0 "§H$fw_fate_bountiful_harvest$§!\n\nDas Schicksal hat diese Welt mit Überfluss und erneuertem bürgerlichem Vertrauen gesegnet.\n\nDauer: 5 Jahre\nEffekte: +10 % Nahrung aus Jobs, +5 Stabilität"
 fw_fate_golden_alignment_tooltip:0 "§H$fw_fate_golden_alignment$§!\n\nDas Schicksal hat diese Welt auf Harmonie und außergewöhnliche Stabilität ausgerichtet.\n\nDauer: 5 Jahre\nEffekte: +10 Stabilität"
