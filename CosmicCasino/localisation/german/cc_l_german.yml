 cc_bad_luck:0 "Pech"
 cc_bad_luck_desc:0 "Eine katastrophale Wette hat das öffentliche Vertrauen erschüttert."

 cc.1.name:0 "Große Eröffnung!"
 cc.1.desc:0 "Der Moment ist gekommen. Nach Monaten des Baus, des Spektakels und sorgfältig kalkulierter Vorfreude öffnet das §YKosmische Casino§! auf [This.GetName] seine Tore für die Galaxie.\n\nNeontürme leuchten über der Kolonie. Holografische Brunnen ergießen Licht über die Promenade. Menschenmengen strömen durch den Eingang, Dealer nehmen ihre Plätze ein, Spielautomaten erwachen zum Leben, und die ersten Wetten werden platziert, bevor das Band überhaupt den Boden berührt.\n\nIm gesamten Imperium spricht man von kaum etwas anderem. Glücksjäger, Touristen und High Roller strömen bereits nach [This.GetName], begierig, ihr Glück unter den glitzernden Kuppeln des Hauses zu versuchen.\n\nUm sich ihnen anzuschließen, öffnet das §YEntscheidungs§!-Menü dieser Kolonie und wählt §YCasino betreten§!."
 cc.1.a:0 "Lasst die Spiele beginnen!"

 cc.10.name:0 "Hauptsaal"
 cc.10.desc:0 "Der Casino-Boden leuchtet mit Neontischen, summenden Spielautomaten und Menschenmengen, die unmögliches Glück jagen. Heute sind drei Wetten verfügbar."
 cc.11.name:0 "High-Roller-Lounge"
 cc.11.desc:0 "Hinter samtweichen Sicherheitsfeldern setzen elitäre Gäste Legierungen, Einigkeit und Luxusgüter mit rücksichtslosem Selbstvertrauen ein."
 cc.12.name:0 "Lotterie-Saal"
 cc.12.desc:0 "Der Lotterie-Saal ist voll mit Bürgern, Spekulanten und Glücksjägern. Jedes Los könnte das Schicksal des Imperiums verändern."
 cc.outcome.name:0 "Casino-Wette abgeschlossen"
 cc.outcome.desc:0 "Die Casino-Transaktion wurde abgeschlossen. Das Endergebnis ist unten aufgeführt."

