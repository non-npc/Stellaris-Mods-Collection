 cc.outcome_loss_small.name:0 "Das Haus kassiert"
 cc.outcome_loss_small.desc:0 "Die Casino-Transaktion ist abgeschlossen.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RErgebnis:§! Keine Auszahlung.\n§RNettoverlust:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nViel Glück beim nächsten Mal!"
 cc.outcome_loss_big.name:0 "Ein verheerender Verlust"
 cc.outcome_loss_big.desc:0 "Die Casino-Transaktion endete mit einem schmerzhaften Verlust.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RErgebnis:§! Keine Auszahlung.\n§RNettoverlust:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nSelbst die kühnsten Wetten gehen manchmal daneben. Viel Glück beim nächsten Mal!"
 cc.outcome_win_small.name:0 "Ein bescheidener Gewinn"
 cc.outcome_win_small.desc:0 "Die Casino-Transaktion ist abgeschlossen.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GAuszahlung:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNettogewinn:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nEine respektable Leistung. Die Tische warten, wann immer Sie sich wieder glücklich fühlen."
 cc.outcome_win_big.name:0 "Ein großer Gewinn"
 cc.outcome_win_big.desc:0 "Die Casino-Transaktion endete mit einem beeindruckenden Sieg.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GAuszahlung:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNettogewinn:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nDie Pit-Bosse räumen bereits Platz für Ihren nächsten Besuch."
 cc.outcome_win_big_bonus.desc:0 "Die Casino-Transaktion endete mit einem beeindruckenden Sieg.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GAuszahlung:§! [Owner.cc_casino_payout] Energie, [Owner.cc_casino_bonus_alloys] Legierungen und [Owner.cc_casino_bonus_unity] Einigkeit\n§GNettogewinn:§! [Owner.cc_casino_net] Energie plus [Owner.cc_casino_bonus_alloys] Legierungen und [Owner.cc_casino_bonus_unity] Einigkeit\n\nDie Kunde von dieser Beute verbreitet sich bereits über den Casino-Boden."
 cc.outcome_jackpot.name:0 "Jackpot!"
 cc.outcome_jackpot.desc:0 "Das Casino bricht in Jubel aus, als das Imperium einen spektakulären Jackpot knackt.\n\n§YSpiel:§! [Owner.GetCcCasinoWagerName]\n§YEinsatz:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GAuszahlung:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNettogewinn:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nDas Glück begünstigt die Mutigen! Genießen Sie die Feier, solange sie dauert."
