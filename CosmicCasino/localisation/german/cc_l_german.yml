 cc_casino_transaction_pending:0 "Casino-Transaktion ausstehend"
 cc_casino_transaction_pending_desc:0 "Auf dieser Kolonie wird derzeit eine Casino-Transaktion bearbeitet. Das Casino kann erst wieder betreten werden, wenn die Wette abgeschlossen ist."
 cc_lucky_streak:0 "Glückssträhne"
