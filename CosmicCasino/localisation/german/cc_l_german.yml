 cc.confirm_low_slots.desc:0 "Reihen hell erleuchteter Automaten warten auf den nächsten Hebelzug. Der Standardeinsatz beträgt §Y500 Energie§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_roulette.desc:0 "Das Rad dreht sich unter einem Kranz holografischer Zahlen. Der Standardeinsatz beträgt §Y1000 Energie§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_mineral_dice.desc:0 "Schwere Kristallwürfel rollen über einen verstärkten Tisch. Der Standardeinsatz beträgt §Y750 Mineralien§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_alloy_wager.desc:0 "High Roller schieben Stapel wertvoller Legierungen in die Tischmitte. Der Standardeinsatz beträgt §Y250 Legierungen§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_unity_table.desc:0 "Symbole gemeinsamer Bestimmung schimmern über diesem zeremoniellen Spieltisch. Der Standardeinsatz beträgt §Y1000 Einigkeit§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_consumer_luxury.desc:0 "Seltene Luxuswaren türmen sich vor einer erwartungsvollen Menge. Der Standardeinsatz beträgt §Y500 Konsumgüter§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_lottery.desc:0 "Ein großes Lotterieterminal wartet darauf, ein Los mit den gewählten Zahlen des Reiches auszugeben. Der Standardeinsatz beträgt §Y2000 Energie§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_food_futures.desc:0 "Spekulanten handeln landwirtschaftliche Vermögen gegen die Ernten von morgen. Der Standardeinsatz beträgt §Y1000 Nahrung§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
 cc.confirm_cosmic_jackpot.desc:0 "Die gefährlichste Maschine des Casinos verspricht unmöglichen Reichtum zu einem ebenso spektakulären Preis. Der Standardeinsatz beträgt §Y10000 Energie§!, oder den verbleibenden Vorrat, falls weniger vorhanden ist."
