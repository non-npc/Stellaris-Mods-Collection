l_japanese:
 cc_mod_name:0 "コスミック・カジノ"
 tradition_cc_gaming:0 "コスミック・ゲーミング"
 tradition_cc_gaming_desc:0 "我が帝国は偶然のスリル、利益の数学、そして銀河規模の娯楽の壮観を受け入れる。"
 tr_cc_gaming_adopt:0 "コスミック・ゲーミングの伝統"
 tr_cc_gaming_adopt_desc:0 "交易価値 +5%。"
 tr_cc_lucky_break:0 "ラッキーブレイク"
 tr_cc_lucky_break_desc:0 "アメニティ +5%。サイコロを振る覚悟のある帝国に幸運は味方する。"
 tr_cc_house_advantage:0 "ハウスアドバンテージ"
 tr_cc_house_advantage_desc:0 "職業からのエネルギー・クレジット +5%。やがてハウスは必ず勝つ。"
 tr_cc_entertainment_networks:0 "エンターテインメント・ネットワーク"
 tr_cc_entertainment_networks_desc:0 "アメニティ +10%、ポップ幸福度 +3%。"
 tr_cc_high_rollers:0 "ハイローラー"
 tr_cc_high_rollers_desc:0 "交易価値 +5%、統合 +5%。富裕層は、大多数の市民には想像もできない規模で賭ける。"
 tr_cc_galactic_tourism:0 "銀河観光"
 tr_cc_galactic_tourism_desc:0 "移民誘引力 +10%、交易価値 +5%。"
 tr_cc_fortune_seekers:0 "幸運の探求者"
 tr_cc_fortune_seekers_desc:0 "統合 +5%、職業からのエネルギー・クレジット +5%。"
 tr_cc_casino_finish:0 "コスミック・ゲーミングの伝統完了"
 tr_cc_casino_finish_desc:0 "交易価値 +10%、§Yコスミック・カジノ§! 建造物を解放。"
 tr_cc_casino_finish_effects:0 "§Yコスミック・カジノ§! 建造物を解放。"

 building_cc_cosmic_casino:0 "コスミック・カジノ"
 cc_requires_no_existing_cosmic_casino:0 "帝国には §Yコスミック・カジノ§! を1つだけ建設できる。"
 building_cc_cosmic_casino_desc:0 "賭博、高級観光、高額賭け、そして緻密に計算された利益率を担う巨大な娯楽複合施設。帝国全体で運営できるコスミック・カジノは1つだけ。"
 cc_casino_dealer:0 "カジノ・ディーラー"
 cc_casino_dealer_plural:0 "カジノ・ディーラー"
 cc_casino_dealer_desc:0 "ゲームテーブルを運営し、賭けシステムを管理し、カジノフロアを回す専門家。"
 job_cc_casino_dealer:0 "カジノ・ディーラー"
 job_cc_casino_dealer_plural:0 "カジノ・ディーラー"
 job_cc_casino_dealer_desc:0 "ゲームテーブルを運営し、賭けシステムを管理し、カジノフロアを回す専門家。"
 mod_job_cc_casino_dealer_add:0 "カジノ・ディーラーの職業"
 cc_casino_manager:0 "カジノ・マネージャー"
 cc_casino_manager_plural:0 "カジノ・マネージャー"
 cc_casino_manager_desc:0 "ハウスが優位を保つよう管理する管理者。"
 job_cc_casino_manager:0 "カジノ・マネージャー"
 job_cc_casino_manager_plural:0 "カジノ・マネージャー"
 job_cc_casino_manager_desc:0 "ハウスが優位を保つよう管理する管理者。"
 mod_job_cc_casino_manager_add:0 "カジノ・マネージャーの職業"

 decision_cc_enter_casino:0 "カジノに入る"
 decision_cc_enter_casino_desc:0 "コスミック・カジノを訪れ、入れ替わる賭けの選択肢から選ぶ。賭けを置くと、取引の解決まで30日かかる。"
 decision_cc_enter_casino_effects:0 "ランダムなカジノイベントメニューを開く。"

 cc_casino_transaction_pending:0 "カジノ取引処理中"
 cc_casino_transaction_pending_desc:0 "この植民地でカジノ取引が処理中である。賭けが解決するまで再入場できない。"
 cc_lucky_streak:0 "幸運の連続"
 cc_lucky_streak_desc:0 "帝国は利益をもたらす幸運の波に乗っている。"
 cc_house_favorite:0 "ハウスのお気に入り"
 cc_house_favorite_desc:0 "カジノの常連は、ハウスが帝国に微笑みかけたと確信している。"
 cc_bad_luck:0 "不運"
 cc_bad_luck_desc:0 "悲惨な賭けが市民の信頼を揺るがした。"

 cc.1.name:0 "グランドオープン！"
 cc.1.desc:0 "いよいよその時が来た。数ヶ月の建設、演出、そして緻密に計算された期待の末、[This.GetName] の §Yコスミック・カジノ§! が銀河に門を開く。\n\nネオンタワーが植民地上空で輝く。ホログラフィックの噴水がプロムナードに光を注ぐ。群衆が入口へと殺到し、ディーラーが席につき、スロットが轟きを上げ、リボンが床に触れる前に最初の賭けが置かれる。\n\n帝国中の市民は、ほぼこれ以外の話題を語らない。幸運の探求者、観光客、ハイローラーがすでに [This.GetName] へと集まり、きらめくドームの下で運試しを待ち焦がしている。\n\n参加するには、この植民地の §Y決定§! メニューを開き、§Yカジノに入る§! を選択せよ。"
 cc.1.a:0 "ゲーム開始だ！"

 cc.10.name:0 "メインフロア"
 cc.10.desc:0 "カジノフロアはネオンのテーブル、唸るスロット、そして不可能な幸運を追う群衆で輝いている。本日は3つの賭けが利用可能だ。"
 cc.11.name:0 "ハイローラー・ラウンジ"
 cc.11.desc:0 "ベルベットのセキュリティフィールドの向こうで、エリート客が合金、統合、贅沢品を無謀なほどの自信で賭ける。"
 cc.12.name:0 "宝くじホール"
 cc.12.desc:0 "宝くじホールは市民、投機家、幸運の探求者で満ちている。一枚一枚の券が帝国の運命を変えるかもしれない。"
 cc.outcome.name:0 "カジノの賭けが解決"
 cc.outcome.desc:0 "カジノ取引の処理が完了した。最終結果は以下のとおり。"

 cc.play_low_slots:0 "低額スロットをプレイ §R（最大500エネルギー）§!"
 cc.play_roulette:0 "ルーレットをプレイ §R（最大1000エネルギー）§!"
 cc.play_mineral_dice:0 "鉱物ダイスを振る §R（最大750鉱物）§!"
 cc.play_alloy_wager:0 "合金で賭ける §R（最大250合金）§!"
 cc.play_unity_table:0 "統合テーブルで賭ける §R（最大1000統合）§!"
 cc.play_consumer_luxury:0 "消費財で賭ける §R（最大500消費財）§!"
 cc.play_lottery:0 "グランド宝くじ券を購入 §R（最大2000エネルギー）§!"
 cc.play_food_futures:0 "食料先物に賭ける §R（最大1000食料）§!"
 cc.play_cosmic_jackpot:0 "コスミック・ジャックポットを狙う §R（最大10000エネルギー）§!"
 cc.wager_uses_available:0 "支払い可能なら標準額を賭け、そうでなければその資源の全在庫を賭ける。必要資源がない選択肢は利用できない。"
 cc.place_wager:0 "賭けを行う"
 cc.back_to_floor:0 "カジノフロアへ戻る"
 cc.leave:0 "カジノを出る"
 cc.confirm_low_slots.desc:0 "まばゆく輝くスロットマシンが、レバーを引かれる時を待っている。標準掛け金は§Yエネルギー500§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_roulette.desc:0 "ホログラムの数字がきらめく中、ルーレット盤が回転する。標準掛け金は§Yエネルギー1000§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_mineral_dice.desc:0 "重い結晶のダイスが強化テーブルの上を転がる。標準掛け金は§Y鉱物750§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_alloy_wager.desc:0 "大口客たちが貴重な合金の山をテーブル中央へ押し出す。標準掛け金は§Y合金250§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_unity_table.desc:0 "共同の目的を象徴する紋章が儀式的な賭博台に輝く。標準掛け金は§Y統合力1000§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_consumer_luxury.desc:0 "希少な高級品が期待に満ちた観衆の前に積み上げられている。標準掛け金は§Y消費財500§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_lottery.desc:0 "帝国が選んだ番号の券を発行する巨大な宝くじ端末が待っている。標準掛け金は§Yエネルギー2000§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_food_futures.desc:0 "投機家たちは明日の収穫を相手に農業資産を賭ける。標準掛け金は§Y食料1000§!で、不足している場合は残りの全備蓄を使用する。"
 cc.confirm_cosmic_jackpot.desc:0 "カジノで最も危険な機械が、途方もない代価と引き換えに莫大な富を約束する。標準掛け金は§Yエネルギー10000§!で、不足している場合は残りの全備蓄を使用する。"
 cc.ok:0 "結果を受け取る"

 cc.low_slots_result:0 "低額スロットが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.roulette_result:0 "ルーレットが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.mineral_dice_result:0 "鉱物ダイスが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.alloy_wager_result:0 "合金の賭けが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.unity_table_result:0 "統合テーブルが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.consumer_luxury_result:0 "消費財の賭けが解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.lottery_result:0 "グランド宝くじが解決。可能な結果：損失、賞金、大賞、ジャックポット。"
 cc.food_futures_result:0 "食料先物が解決。可能な結果：損失、小勝ち、大勝ち、ジャックポット。"
 cc.cosmic_jackpot_result:0 "コスミック・ジャックポットが解決。可能な結果：大損失、大勝ち、ジャックポット、伝説のジャックポット。"

 cc.outcome_loss_small.name:0 "ハウスが回収"
 cc.outcome_loss_small.desc:0 "カジノ取引が完了した。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§R結果：§! 配当なし。\n§R純損失：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\n次は幸運がありますように！"
 cc.outcome_loss_big.name:0 "壊滅的な損失"
 cc.outcome_loss_big.desc:0 "カジノ取引は痛ましい損失で終わった。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§R結果：§! 配当なし。\n§R純損失：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\n最も大胆な賭けでも外れることはある。次は幸運がありますように！"
 cc.outcome_win_small.name:0 "控えめな勝利"
 cc.outcome_win_small.desc:0 "カジノ取引が完了した。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G純利益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n立派な結果だ。また運が向いたとき、テーブルは待っている。"
 cc.outcome_win_big.name:0 "大勝利"
 cc.outcome_win_big.desc:0 "カジノ取引は見事な勝利で終わった。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G純利益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nピットボスはすでに次の来訪のための席を空け始めている。"
 cc.outcome_win_big_bonus.desc:0 "カジノ取引は見事な勝利で終わった。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] エネルギー、[Owner.cc_casino_bonus_alloys] 合金、[Owner.cc_casino_bonus_unity] 統合\n§G純利益：§! [Owner.cc_casino_net] エネルギーに加え [Owner.cc_casino_bonus_alloys] 合金と [Owner.cc_casino_bonus_unity] 統合\n\nこの大当たりの噂はすでにカジノフロアに広がっている。"
 cc.outcome_jackpot.name:0 "ジャックポット！"
 cc.outcome_jackpot.desc:0 "帝国が壮観なジャックポットを当て、カジノは歓喜に沸いた。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G純利益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n幸運は勇者に味方する！祝宴を存分に楽しめ。"
 cc.outcome_jackpot_unity_bonus.desc:0 "帝国が壮観なジャックポットを当て、カジノは歓喜に沸いた。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource] と [Owner.cc_casino_bonus_unity] 統合\n§G純利益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource] に加え [Owner.cc_casino_bonus_unity] 統合\n\n幸運は勇者に味方する！祝宴を存分に楽しめ。"
 cc.outcome_jackpot_multi.desc:0 "帝国が壮観なジャックポットを当て、カジノは歓喜に沸いた。\n\n§Yゲーム：§! [Owner.GetCcCasinoWagerName]\n§Y賭け金：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G配当：§! [Owner.cc_casino_payout] エネルギー、[Owner.cc_casino_bonus_alloys] 合金、[Owner.cc_casino_bonus_unity] 統合\n§G純利益：§! [Owner.cc_casino_net] エネルギーに加え [Owner.cc_casino_bonus_alloys] 合金と [Owner.cc_casino_bonus_unity] 統合\n\nこの一振りについての伝説は、何年も語り継がれるだろう。"

