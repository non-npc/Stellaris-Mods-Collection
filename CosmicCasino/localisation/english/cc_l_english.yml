 cc_mod_name:0 "Cosmic Casino"
 tradition_cc_gaming:0 "Cosmic Gaming"
 tradition_cc_gaming_desc:0 "Our empire embraces the thrill of chance, the mathematics of profit, and the spectacle of galactic entertainment."
 tr_cc_gaming_adopt:0 "Cosmic Gaming Traditions"
 tr_cc_gaming_adopt_desc:0 "+5% Trade Value."
 tr_cc_lucky_break:0 "Lucky Break"
 tr_cc_lucky_break_desc:0 "+5% Amenities. Fortune favors the empire willing to roll the dice."
 tr_cc_house_advantage:0 "House Advantage"
 tr_cc_house_advantage_desc:0 "+5% Energy Credits from Jobs. In time, the house always wins."
 tr_cc_entertainment_networks:0 "Entertainment Networks"
 tr_cc_entertainment_networks_desc:0 "+10% Amenities and +3% Pop Happiness."
 tr_cc_high_rollers:0 "High Rollers"
 tr_cc_high_rollers_desc:0 "+5% Trade Value and +5% Unity. The wealthy elite gamble on a scale most citizens can barely imagine."
 tr_cc_galactic_tourism:0 "Galactic Tourism"
