 tr_cc_fortune_seekers:0 "Fortune Seekers"
 tr_cc_fortune_seekers_desc:0 "+5% Unity and +5% Energy Credits from Jobs."
 tr_cc_casino_finish:0 "Cosmic Gaming Traditions Finished"
 tr_cc_casino_finish_desc:0 "+10% Trade Value and unlocks the §YCosmic Casino§! building."
 tr_cc_casino_finish_effects:0 "Unlocks the §YCosmic Casino§! building."

 building_cc_cosmic_casino:0 "Cosmic Casino"
 cc_requires_no_existing_cosmic_casino:0 "Only one §YCosmic Casino§! may be built in the empire."
 building_cc_cosmic_casino_desc:0 "A massive entertainment complex dedicated to games of chance, luxury tourism, high-stakes wagers, and perfectly calculated profit margins. Only one Cosmic Casino may operate across the empire."
 cc_casino_dealer:0 "Casino Dealer"
 cc_casino_dealer_plural:0 "Casino Dealers"
 cc_casino_dealer_desc:0 "Specialists who operate gaming tables, manage betting systems, and keep the casino floor moving."
 job_cc_casino_dealer:0 "Casino Dealer"
 job_cc_casino_dealer_plural:0 "Casino Dealers"
 job_cc_casino_dealer_desc:0 "Specialists who operate gaming tables, manage betting systems, and keep the casino floor moving."
 mod_job_cc_casino_dealer_add:0 "Casino Dealer Jobs"
 cc_casino_manager:0 "Casino Manager"
 cc_casino_manager_plural:0 "Casino Managers"
 cc_casino_manager_desc:0 "Administrators who ensure the house maintains its advantage."
 job_cc_casino_manager:0 "Casino Manager"
 job_cc_casino_manager_plural:0 "Casino Managers"
 job_cc_casino_manager_desc:0 "Administrators who ensure the house maintains its advantage."
