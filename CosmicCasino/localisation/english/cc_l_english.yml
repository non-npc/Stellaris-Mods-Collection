 decision_cc_enter_casino:0 "Enter Casino"
 decision_cc_enter_casino_desc:0 "Visit the Cosmic Casino and choose from a rotating selection of wagers. Once a wager is placed, the transaction takes 30 days to resolve."
 decision_cc_enter_casino_effects:0 "Opens a randomized casino event menu."

 cc_casino_transaction_pending:0 "Casino Transaction Pending"
 cc_casino_transaction_pending_desc:0 "A casino transaction is currently being processed on this colony. The casino cannot be entered again until the wager resolves."
 cc_lucky_streak:0 "Lucky Streak"
 cc_lucky_streak_desc:0 "The empire is riding a wave of profitable luck."
 cc_house_favorite:0 "House Favorite"
 cc_house_favorite_desc:0 "Casino patrons are convinced the house has smiled upon the empire."
 cc_bad_luck:0 "Bad Luck"
 cc_bad_luck_desc:0 "A disastrous wager has shaken public confidence."

 cc.1.name:0 "Grand Opening!"
 cc.1.desc:0 "The moment has arrived. After months of construction, spectacle, and carefully calculated anticipation, the §YCosmic Casino§! on [This.GetName] throws open its doors to the galaxy.\n\nNeon towers blaze above the colony. Holographic fountains spill light across the promenade. Crowds surge through the entrance as dealers take their places, slot banks roar to life, and the first wagers are placed before the ribbon has even hit the floor.\n\nAcross the empire, citizens speak of little else. Fortune seekers, tourists, and high rollers alike are already converging on [This.GetName], eager to test their luck beneath the glittering domes of the house.\n\nTo join them, open this colony's §YDecisions§! menu and select §YEnter Casino§!."
 cc.1.a:0 "Let the games begin!"

 cc.10.name:0 "Main Floor"
 cc.10.desc:0 "The casino floor glows with neon tables, humming slot banks, and crowds chasing impossible luck. Three wagers are available today."
 cc.11.name:0 "High Roller Lounge"
 cc.11.desc:0 "Behind velvet security fields, elite patrons gamble alloys, unity, and luxuries with reckless confidence."
 cc.12.name:0 "Lottery Hall"
 cc.12.desc:0 "The lottery hall is packed with citizens, speculators, and fortune seekers. Every ticket could change the empire's fate."
 cc.outcome.name:0 "Casino Wager Resolved"
 cc.outcome.desc:0 "The casino transaction has finished processing. The final result is recorded below."

 cc.play_low_slots:0 "Play Low Stakes Slots §R(up to 500 Energy)§!"
 cc.play_roulette:0 "Play Roulette §R(up to 1000 Energy)§!"
 cc.play_mineral_dice:0 "Roll Mineral Dice §R(up to 750 Minerals)§!"
 cc.play_alloy_wager:0 "Place Alloy Wager §R(up to 250 Alloys)§!"
 cc.play_unity_table:0 "Bet at the Unity Table §R(up to 1000 Unity)§!"
 cc.play_consumer_luxury:0 "Luxury Goods Bet §R(up to 500 Consumer Goods)§!"
 cc.play_lottery:0 "Buy Grand Lottery Ticket §R(up to 2000 Energy)§!"
 cc.play_food_futures:0 "Bet on Food Futures §R(up to 1000 Food)§!"
 cc.play_cosmic_jackpot:0 "Chase the Cosmic Jackpot §R(up to 10000 Energy)§!"
 cc.wager_uses_available:0 "Bets the standard amount if affordable, otherwise wagers your entire stockpile of that resource. Options with none of the required resource are unavailable."
 cc.place_wager:0 "Place the Wager"
 cc.back_to_floor:0 "Back to the Casino Floor"
 cc.leave:0 "Leave the Casino"
 cc.confirm_low_slots.desc:0 "Banks of brightly lit machines wait for a pull of the lever. The standard wager is §Y500 Energy§!, or your remaining stockpile if you have less."
 cc.confirm_roulette.desc:0 "The wheel spins beneath a halo of holographic numbers. The standard wager is §Y1000 Energy§!, or your remaining stockpile if you have less."
 cc.confirm_mineral_dice.desc:0 "Heavy crystalline dice tumble across a reinforced table. The standard wager is §Y750 Minerals§!, or your remaining stockpile if you have less."
 cc.confirm_alloy_wager.desc:0 "High rollers push stacks of precious alloys toward the center of the table. The standard wager is §Y250 Alloys§!, or your remaining stockpile if you have less."
 cc.confirm_unity_table.desc:0 "Symbols of shared purpose shimmer across this ceremonial gaming table. The standard wager is §Y1000 Unity§!, or your remaining stockpile if you have less."
 cc.confirm_consumer_luxury.desc:0 "Rare luxuries and fashionable goods are piled high before an expectant crowd. The standard wager is §Y500 Consumer Goods§!, or your remaining stockpile if you have less."
 cc.confirm_lottery.desc:0 "A grand lottery terminal waits to issue a ticket bearing the empire's chosen numbers. The standard wager is §Y2000 Energy§!, or your remaining stockpile if you have less."
 cc.confirm_food_futures.desc:0 "Speculators trade agricultural fortunes against tomorrow's harvests. The standard wager is §Y1000 Food§!, or your remaining stockpile if you have less."
 cc.confirm_cosmic_jackpot.desc:0 "The casino's most dangerous machine promises impossible wealth at an equally spectacular price. The standard wager is §Y10000 Energy§!, or your remaining stockpile if you have less."
 cc.ok:0 "Collect the Result"

 cc.low_slots_result:0 "Low Stakes Slots resolved. Possible result: loss, small win, big win, or jackpot."
 cc.roulette_result:0 "Roulette resolved. Possible result: loss, small win, big win, or jackpot."
 cc.mineral_dice_result:0 "Mineral Dice resolved. Possible result: loss, small win, big win, or jackpot."
 cc.alloy_wager_result:0 "Alloy Wager resolved. Possible result: loss, small win, big win, or jackpot."
 cc.unity_table_result:0 "Unity Table resolved. Possible result: loss, small win, big win, or jackpot."
 cc.consumer_luxury_result:0 "Luxury Goods Bet resolved. Possible result: loss, small win, big win, or jackpot."
 cc.lottery_result:0 "Grand Lottery resolved. Possible result: loss, prize, major prize, or jackpot."
 cc.food_futures_result:0 "Food Futures resolved. Possible result: loss, small win, big win, or jackpot."
 cc.cosmic_jackpot_result:0 "Cosmic Jackpot resolved. Possible result: heavy loss, major win, jackpot, or legendary jackpot."

 cc.outcome_loss_small.name:0 "The House Collects"
 cc.outcome_loss_small.desc:0 "The casino transaction has concluded.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RResult:§! No payout.\n§RNet loss:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nBetter luck next time!"
 cc.outcome_loss_big.name:0 "A Crushing Loss"
 cc.outcome_loss_big.desc:0 "The casino transaction has concluded with a painful loss.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RResult:§! No payout.\n§RNet loss:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nEven the boldest wagers miss sometimes. Better luck next time!"
 cc.outcome_win_small.name:0 "A Modest Win"
 cc.outcome_win_small.desc:0 "The casino transaction has concluded.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNet gain:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nA respectable showing. The tables will be waiting whenever you feel lucky again."
 cc.outcome_win_big.name:0 "A Major Win"
 cc.outcome_win_big.desc:0 "The casino transaction has concluded with an impressive victory.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNet gain:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nThe pit bosses are already clearing space for your next visit."
 cc.outcome_win_big_bonus.desc:0 "The casino transaction has concluded with an impressive victory.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] Energy, [Owner.cc_casino_bonus_alloys] Alloys, and [Owner.cc_casino_bonus_unity] Unity\n§GNet gain:§! [Owner.cc_casino_net] Energy plus [Owner.cc_casino_bonus_alloys] Alloys and [Owner.cc_casino_bonus_unity] Unity\n\nWord of this haul is already spreading across the casino floor."
 cc.outcome_jackpot.name:0 "Jackpot!"
 cc.outcome_jackpot.desc:0 "The casino erupts in celebration as the empire hits a spectacular jackpot.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GNet gain:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nFortune favors the bold! Enjoy the celebration while it lasts."
 cc.outcome_jackpot_unity_bonus.desc:0 "The casino erupts in celebration as the empire hits a spectacular jackpot.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource] and [Owner.cc_casino_bonus_unity] Unity\n§GNet gain:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource] plus [Owner.cc_casino_bonus_unity] Unity\n\nFortune favors the bold! Enjoy the celebration while it lasts."
 cc.outcome_jackpot_multi.desc:0 "The casino erupts in celebration as the empire hits a spectacular jackpot.\n\n§YGame:§! [Owner.GetCcCasinoWagerName]\n§YWager:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPayout:§! [Owner.cc_casino_payout] Energy, [Owner.cc_casino_bonus_alloys] Alloys, and [Owner.cc_casino_bonus_unity] Unity\n§GNet gain:§! [Owner.cc_casino_net] Energy plus [Owner.cc_casino_bonus_alloys] Alloys and [Owner.cc_casino_bonus_unity] Unity\n\nLegends will be told about this roll for years to come."

