l_russian:
 cc_mod_name:0 "Космическое Казино"
 tradition_cc_gaming:0 "Космические Игры"
 tradition_cc_gaming_desc:0 "Наша империя принимает азарт, математику прибыли и зрелище галактических развлечений."
 tr_cc_gaming_adopt:0 "Традиции «Космические Игры»"
 tr_cc_gaming_adopt_desc:0 "+5% торговой стоимости."
 tr_cc_lucky_break:0 "Удачный ход"
 tr_cc_lucky_break_desc:0 "+5% удобств. Фортуна благоволит империи, готовой бросить кости."
 tr_cc_house_advantage:0 "Преимущество казино"
 tr_cc_house_advantage_desc:0 "+5% энергетических кредитов с должностей. Со временем казино всегда выигрывает."
 tr_cc_entertainment_networks:0 "Развлекательные сети"
 tr_cc_entertainment_networks_desc:0 "+10% удобств и +3% счастья населения."
 tr_cc_high_rollers:0 "Крупные игроки"
 tr_cc_high_rollers_desc:0 "+5% торговой стоимости и +5% единства. Богатая элита играет в масштабах, которые большинству граждан трудно даже представить."
 tr_cc_galactic_tourism:0 "Галактический туризм"
 tr_cc_galactic_tourism_desc:0 "+10% привлекательности для иммигрантов и +5% торговой стоимости."
 tr_cc_fortune_seekers:0 "Искатели удачи"
 tr_cc_fortune_seekers_desc:0 "+5% единства и +5% энергетических кредитов с должностей."
 tr_cc_casino_finish:0 "Традиции «Космические Игры» завершены"
 tr_cc_casino_finish_desc:0 "+10% торговой стоимости и открывает здание §YКосмическое Казино§!."
 tr_cc_casino_finish_effects:0 "Открывает здание §YКосмическое Казино§!."

 building_cc_cosmic_casino:0 "Космическое Казино"
 cc_requires_no_existing_cosmic_casino:0 "В империи можно построить только одно §YКосмическое Казино§!."
 building_cc_cosmic_casino_desc:0 "Огромный развлекательный комплекс, посвящённый азартным играм, роскошному туризму, крупным ставкам и безупречно рассчитанной прибыли. По всей империи может работать только одно Космическое Казино."
 cc_casino_dealer:0 "Дилер казино"
 cc_casino_dealer_plural:0 "Дилеры казино"
 cc_casino_dealer_desc:0 "Специалисты, которые ведут игровые столы, управляют системами ставок и поддерживают работу игрового зала."
 job_cc_casino_dealer:0 "Дилер казино"
 job_cc_casino_dealer_plural:0 "Дилеры казино"
 job_cc_casino_dealer_desc:0 "Специалисты, которые ведут игровые столы, управляют системами ставок и поддерживают работу игрового зала."
 mod_job_cc_casino_dealer_add:0 "Должности дилера казино"
 cc_casino_manager:0 "Менеджер казино"
 cc_casino_manager_plural:0 "Менеджеры казино"
 cc_casino_manager_desc:0 "Администраторы, которые следят за тем, чтобы казино сохраняло своё преимущество."
 job_cc_casino_manager:0 "Менеджер казино"
 job_cc_casino_manager_plural:0 "Менеджеры казино"
 job_cc_casino_manager_desc:0 "Администраторы, которые следят за тем, чтобы казино сохраняло своё преимущество."
 mod_job_cc_casino_manager_add:0 "Должности менеджера казино"

 decision_cc_enter_casino:0 "Войти в казино"
 decision_cc_enter_casino_desc:0 "Посетите Космическое Казино и выберите одну из сменных ставок. После размещения ставки транзакция обрабатывается в течение 30 дней."
 decision_cc_enter_casino_effects:0 "Открывает случайное меню событий казино."

 cc_casino_transaction_pending:0 "Ожидается транзакция казино"
 cc_casino_transaction_pending_desc:0 "На этой колонии сейчас обрабатывается транзакция казино. Повторный вход в казино невозможен, пока ставка не будет разрешена."
 cc_lucky_streak:0 "Полоса удачи"
 cc_lucky_streak_desc:0 "Империя наслаждается волной прибыльного везения."
 cc_house_favorite:0 "Любимчик казино"
 cc_house_favorite_desc:0 "Посетители казино убеждены, что казино благоволит империи."
 cc_bad_luck:0 "Неудача"
 cc_bad_luck_desc:0 "Катастрофическая ставка подорвала общественное доверие."

 cc.1.name:0 "Торжественное открытие!"
 cc.1.desc:0 "Момент настал. После месяцев строительства, зрелищ и тщательно рассчитанного ожидания §YКосмическое Казино§! на [This.GetName] распахивает двери перед галактикой.\n\nНеоновые башни пылают над колонией. Голографические фонтаны льют свет на променад. Толпы устремляются к входу, дилеры занимают места, ряды слотов оживают, и первые ставки делаются ещё до того, как лента коснётся пола.\n\nПо всей империи граждане говорят почти только об этом. Искатели удачи, туристы и крупные игроки уже стекаются на [This.GetName], стремясь испытать своё везение под сверкающими куполами казино.\n\nЧтобы присоединиться к ним, откройте меню §YРешений§! этой колонии и выберите §YВойти в казино§!."
 cc.1.a:0 "Пусть игры начнутся!"

 cc.10.name:0 "Основной зал"
 cc.10.desc:0 "Игровой зал сияет неоновыми столами, гудящими слотами и толпами, гонящимися за невозможной удачей. Сегодня доступны три ставки."
 cc.11.name:0 "Зал для крупных игроков"
 cc.11.desc:0 "За бархатными силовыми полями элитные посетители безрассудно играют сплавами, единством и предметами роскоши."
 cc.12.name:0 "Лотерейный зал"
 cc.12.desc:0 "Лотерейный зал переполнен гражданами, спекулянтами и искателями удачи. Каждый билет может изменить судьбу империи."
 cc.outcome.name:0 "Ставка в казино разрешена"
 cc.outcome.desc:0 "Транзакция казино завершена. Итоговый результат указан ниже."

 cc.play_low_slots:0 "Играть в слоты с низкими ставками §R(до 500 энергии)§!"
 cc.play_roulette:0 "Играть в рулетку §R(до 1000 энергии)§!"
 cc.play_mineral_dice:0 "Бросить минеральные кости §R(до 750 минералов)§!"
 cc.play_alloy_wager:0 "Сделать ставку сплавами §R(до 250 сплавов)§!"
 cc.play_unity_table:0 "Ставка за столом единства §R(до 1000 единства)§!"
 cc.play_consumer_luxury:0 "Ставка на предметы роскоши §R(до 500 потребительских товаров)§!"
 cc.play_lottery:0 "Купить билет Великой лотереи §R(до 2000 энергии)§!"
 cc.play_food_futures:0 "Ставка на фьючерсы на пищу §R(до 1000 пищи)§!"
 cc.play_cosmic_jackpot:0 "Охотиться за Космическим джекпотом §R(до 10000 энергии)§!"
 cc.wager_uses_available:0 "Ставит стандартную сумму, если хватает средств, иначе — весь ваш запас этого ресурса. Варианты без нужного ресурса недоступны."
 cc.place_wager:0 "Сделать ставку"
 cc.back_to_floor:0 "Вернуться в зал казино"
 cc.leave:0 "Покинуть казино"
 cc.confirm_low_slots.desc:0 "Ряды ярких автоматов ждут, когда кто-нибудь потянет рычаг. Стандартная ставка — §Y500 энергии§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_roulette.desc:0 "Колесо вращается под сиянием голографических чисел. Стандартная ставка — §Y1000 энергии§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_mineral_dice.desc:0 "Тяжёлые кристаллические кости катятся по укреплённому столу. Стандартная ставка — §Y750 минералов§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_alloy_wager.desc:0 "Крупные игроки сдвигают стопки драгоценных сплавов к центру стола. Стандартная ставка — §Y250 сплавов§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_unity_table.desc:0 "Символы общей цели мерцают над церемониальным игровым столом. Стандартная ставка — §Y1000 единства§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_consumer_luxury.desc:0 "Редкие предметы роскоши сложены перед нетерпеливой публикой. Стандартная ставка — §Y500 товаров массового спроса§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_lottery.desc:0 "Большой лотерейный терминал готов выдать билет с выбранными империей числами. Стандартная ставка — §Y2000 энергии§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_food_futures.desc:0 "Спекулянты ставят сельскохозяйственные состояния на завтрашний урожай. Стандартная ставка — §Y1000 пищи§!, либо весь оставшийся запас, если его меньше."
 cc.confirm_cosmic_jackpot.desc:0 "Самый опасный автомат казино обещает немыслимое богатство за столь же невероятную цену. Стандартная ставка — §Y10000 энергии§!, либо весь оставшийся запас, если его меньше."
 cc.ok:0 "Забрать результат"

 cc.low_slots_result:0 "Слоты с низкими ставками разрешены. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.roulette_result:0 "Рулетка разрешена. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.mineral_dice_result:0 "Минеральные кости разрешены. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.alloy_wager_result:0 "Ставка сплавами разрешена. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.unity_table_result:0 "Стол единства разрешён. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.consumer_luxury_result:0 "Ставка на предметы роскоши разрешена. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.lottery_result:0 "Великая лотерея разрешена. Возможный результат: проигрыш, приз, крупный приз или джекпот."
 cc.food_futures_result:0 "Фьючерсы на пищу разрешены. Возможный результат: проигрыш, небольшой выигрыш, крупный выигрыш или джекпот."
 cc.cosmic_jackpot_result:0 "Космический джекпот разрешён. Возможный результат: тяжёлый проигрыш, крупный выигрыш, джекпот или легендарный джекпот."

 cc.outcome_loss_small.name:0 "Казино забирает ставку"
 cc.outcome_loss_small.desc:0 "Транзакция казино завершена.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RРезультат:§! Без выплаты.\n§RЧистый убыток:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nУдачи в следующий раз!"
 cc.outcome_loss_big.name:0 "Сокрушительный проигрыш"
 cc.outcome_loss_big.desc:0 "Транзакция казино завершилась болезненным проигрышем.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RРезультат:§! Без выплаты.\n§RЧистый убыток:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nДаже самые смелые ставки иногда не сходятся. Удачи в следующий раз!"
 cc.outcome_win_small.name:0 "Скромный выигрыш"
 cc.outcome_win_small.desc:0 "Транзакция казино завершена.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GЧистая прибыль:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nДостойный результат. Столы будут ждать, когда вы снова почувствуете удачу."
 cc.outcome_win_big.name:0 "Крупный выигрыш"
 cc.outcome_win_big.desc:0 "Транзакция казино завершилась впечатляющей победой.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GЧистая прибыль:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nУправляющие зала уже освобождают место для вашего следующего визита."
 cc.outcome_win_big_bonus.desc:0 "Транзакция казино завершилась впечатляющей победой.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] энергии, [Owner.cc_casino_bonus_alloys] сплавов и [Owner.cc_casino_bonus_unity] единства\n§GЧистая прибыль:§! [Owner.cc_casino_net] энергии плюс [Owner.cc_casino_bonus_alloys] сплавов и [Owner.cc_casino_bonus_unity] единства\n\nВесть об этой добыче уже распространяется по игровому залу."
 cc.outcome_jackpot.name:0 "Джекпот!"
 cc.outcome_jackpot.desc:0 "Казино взрывается празднованием: империя сорвала грандиозный джекпот.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GЧистая прибыль:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nФортуна благоволит смелым! Наслаждайтесь праздником, пока он длится."
 cc.outcome_jackpot_unity_bonus.desc:0 "Казино взрывается празднованием: империя сорвала грандиозный джекпот.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource] и [Owner.cc_casino_bonus_unity] единства\n§GЧистая прибыль:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource] плюс [Owner.cc_casino_bonus_unity] единства\n\nФортуна благоволит смелым! Наслаждайтесь праздником, пока он длится."
 cc.outcome_jackpot_multi.desc:0 "Казино взрывается празднованием: империя сорвала грандиозный джекпот.\n\n§YИгра:§! [Owner.GetCcCasinoWagerName]\n§YСтавка:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GВыплата:§! [Owner.cc_casino_payout] энергии, [Owner.cc_casino_bonus_alloys] сплавов и [Owner.cc_casino_bonus_unity] единства\n§GЧистая прибыль:§! [Owner.cc_casino_net] энергии плюс [Owner.cc_casino_bonus_alloys] сплавов и [Owner.cc_casino_bonus_unity] единства\n\nЛегенды об этом броске будут рассказывать ещё много лет."

