 cc.play_lottery:0 "购买大乐透彩票 §R（最多2000能量币）§!"
 cc.play_food_futures:0 "下注食物期货 §R（最多1000食物）§!"
 cc.play_cosmic_jackpot:0 "追逐宇宙头奖 §R（最多10000能量币）§!"
 cc.wager_uses_available:0 "若负担得起则按标准金额下注，否则押上该资源的全部库存。没有所需资源的选项不可用。"
 cc.place_wager:0 "确认下注"
 cc.back_to_floor:0 "返回赌场大厅"
 cc.leave:0 "离开赌场"
 cc.confirm_low_slots.desc:0 "一排排灯火辉煌的老虎机等待着下一次拉杆。标准赌注为§Y500能量币§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_roulette.desc:0 "轮盘在全息数字的光环下旋转。标准赌注为§Y1000能量币§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_mineral_dice.desc:0 "沉重的水晶骰子在加固赌桌上翻滚。标准赌注为§Y750矿物§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_alloy_wager.desc:0 "豪客们将一叠叠珍贵合金推向赌桌中央。标准赌注为§Y250合金§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_unity_table.desc:0 "象征共同目标的图案在仪式赌桌上闪耀。标准赌注为§Y1000凝聚力§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_consumer_luxury.desc:0 "稀有奢侈品堆放在满怀期待的人群面前。标准赌注为§Y500消费品§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_lottery.desc:0 "大型彩票终端正等待打印带有帝国所选号码的彩票。标准赌注为§Y2000能量币§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_food_futures.desc:0 "投机者以农业财富押注明日的收成。标准赌注为§Y1000食物§!；若库存不足，则押上剩余的全部库存。"
 cc.confirm_cosmic_jackpot.desc:0 "赌场中最危险的机器以同样惊人的代价许诺不可思议的财富。标准赌注为§Y10000能量币§!；若库存不足，则押上剩余的全部库存。"
 cc.ok:0 "领取结果"

