 cc.outcome_loss_small.name:0 "庄家收走赌注"
 cc.outcome_loss_small.desc:0 "赌场交易已结束。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§R结果：§! 无派彩。\n§R净亏损：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\n下次好运！"
 cc.outcome_loss_big.name:0 "惨重亏损"
 cc.outcome_loss_big.desc:0 "赌场交易以痛苦的亏损告终。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§R结果：§! 无派彩。\n§R净亏损：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\n即便最大胆的赌注也有失手之时。下次好运！"
 cc.outcome_win_small.name:0 "小赢一笔"
 cc.outcome_win_small.desc:0 "赌场交易已结束。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G净收益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n成绩不错。当你再次感到幸运时，赌桌随时恭候。"
 cc.outcome_win_big.name:0 "大获全胜"
 cc.outcome_win_big.desc:0 "赌场交易以令人瞩目的胜利告终。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G净收益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n赌厅主管已在为你的下次光临腾出位置。"
 cc.outcome_win_big_bonus.desc:0 "赌场交易以令人瞩目的胜利告终。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] 能量币、[Owner.cc_casino_bonus_alloys] 合金与 [Owner.cc_casino_bonus_unity] 凝合力\n§G净收益：§! [Owner.cc_casino_net] 能量币，外加 [Owner.cc_casino_bonus_alloys] 合金与 [Owner.cc_casino_bonus_unity] 凝合力\n\n这笔横财的消息已在赌场楼层传开。"
 cc.outcome_jackpot.name:0 "头奖！"
 cc.outcome_jackpot.desc:0 "帝国命中惊天头奖，赌场一片欢腾。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§G净收益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n命运眷顾勇者！尽情享受这场庆典吧。"
 cc.outcome_jackpot_unity_bonus.desc:0 "帝国命中惊天头奖，赌场一片欢腾。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource] 与 [Owner.cc_casino_bonus_unity] 凝合力\n§G净收益：§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]，外加 [Owner.cc_casino_bonus_unity] 凝合力\n\n命运眷顾勇者！尽情享受这场庆典吧。"
 cc.outcome_jackpot_multi.desc:0 "帝国命中惊天头奖，赌场一片欢腾。\n\n§Y游戏：§! [Owner.GetCcCasinoWagerName]\n§Y赌注：§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§G派彩：§! [Owner.cc_casino_payout] 能量币、[Owner.cc_casino_bonus_alloys] 合金与 [Owner.cc_casino_bonus_unity] 凝合力\n§G净收益：§! [Owner.cc_casino_net] 能量币，外加 [Owner.cc_casino_bonus_alloys] 合金与 [Owner.cc_casino_bonus_unity] 凝合力\n\n关于这一掷的传奇，将在未来多年被人传颂。"

