 decision_cc_enter_casino:0 "进入赌场"
 decision_cc_enter_casino_desc:0 "造访宇宙赌场，从轮换的赌注选项中选择一项。下注后，交易将在30天内结算。"
 decision_cc_enter_casino_effects:0 "打开随机赌场事件菜单。"

 cc_casino_transaction_pending:0 "赌场交易处理中"
 cc_casino_transaction_pending_desc:0 "该殖民地正在处理一笔赌场交易。在赌注结算前，无法再次进入赌场。"
 cc_lucky_streak:0 "好运连连"
 cc_lucky_streak_desc:0 "帝国正享受着一波盈利的好运气。"
 cc_house_favorite:0 "庄家宠儿"
 cc_house_favorite_desc:0 "赌场顾客深信庄家已对帝国青睐有加。"
 cc_bad_luck:0 "霉运当头"
 cc_bad_luck_desc:0 "一场灾难性的赌注动摇了公众信心。"

 cc.1.name:0 "盛大开业！"
 cc.1.desc:0 "时刻终于到来。历经数月的建设、造势与精心计算的期待，[This.GetName] 上的 §Y宇宙赌场§! 向银河敞开了大门。\n\n霓虹塔楼在殖民地上空闪耀。全息喷泉将光芒洒满步行街。人群涌入入口，荷官各就各位，老虎机轰鸣启动，剪彩丝带尚未落地，第一笔赌注已经落下。\n\n全帝国公民几乎只谈论这一件事。逐梦者、游客与豪赌客正涌向 [This.GetName]，渴望在赌场璀璨的穹顶下试一把运气。\n\n若要加入他们，请打开该殖民地的 §Y决议§! 菜单，选择 §Y进入赌场§!。"
 cc.1.a:0 "游戏开始！"

 cc.10.name:0 "主楼层"
 cc.10.desc:0 "赌场楼层霓虹赌桌林立，老虎机嗡嗡作响，人群追逐着不可能的运气。今日提供三项赌注。"
 cc.11.name:0 "豪赌客贵宾厅"
 cc.11.desc:0 "天鹅绒力场之后，精英顾客以合金、凝合力与奢侈品豪赌，自信得近乎鲁莽。"
 cc.12.name:0 "彩票大厅"
 cc.12.desc:0 "彩票大厅挤满了公民、投机者与逐梦者。每一张彩票都可能改变帝国的命运。"
 cc.outcome.name:0 "赌场赌注已结算"
 cc.outcome.desc:0 "赌场交易已完成处理。最终结果如下。"

 cc.play_low_slots:0 "玩低额老虎机 §R（最多500能量币）§!"
