 building_cc_cosmic_casino:0 "宇宙赌场"
 cc_requires_no_existing_cosmic_casino:0 "帝国境内只能建造一座 §Y宇宙赌场§!。"
 building_cc_cosmic_casino_desc:0 "一座庞大的娱乐综合体，集博彩游戏、豪华旅游、高额赌注与精密计算的利润率于一体。全帝国只能运营一座宇宙赌场。"
