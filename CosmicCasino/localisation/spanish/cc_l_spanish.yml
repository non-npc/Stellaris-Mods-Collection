 cc.outcome_loss_small.name:0 "La Casa Cobra"
 cc.outcome_loss_small.desc:0 "La transacción del casino ha concluido.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RResultado:§! Sin pago.\n§RPérdida neta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\n¡Más suerte la próxima vez!"
 cc.outcome_loss_big.name:0 "Una Pérdida Devastadora"
 cc.outcome_loss_big.desc:0 "La transacción del casino concluyó con una dolorosa pérdida.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§RResultado:§! Sin pago.\n§RPérdida neta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n\nIncluso las apuestas más audaces fallan a veces. ¡Más suerte la próxima vez!"
 cc.outcome_win_small.name:0 "Una Ganancia Modesta"
 cc.outcome_win_small.desc:0 "La transacción del casino ha concluido.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GGanancia neta:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nUn resultado respetable. Las mesas estarán esperando cuando vuelvas a sentirte con suerte."
 cc.outcome_win_big.name:0 "Una Gran Ganancia"
 cc.outcome_win_big.desc:0 "La transacción del casino concluyó con una victoria impresionante.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GGanancia neta:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\nLos jefes de mesa ya están preparando espacio para tu próxima visita."
 cc.outcome_win_big_bonus.desc:0 "La transacción del casino concluyó con una victoria impresionante.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] de Energía, [Owner.cc_casino_bonus_alloys] de Aleaciones y [Owner.cc_casino_bonus_unity] de Unidad\n§GGanancia neta:§! [Owner.cc_casino_net] de Energía más [Owner.cc_casino_bonus_alloys] de Aleaciones y [Owner.cc_casino_bonus_unity] de Unidad\n\nLa noticia de este botín ya se extiende por la sala del casino."
 cc.outcome_jackpot.name:0 "¡Bote!"
 cc.outcome_jackpot.desc:0 "El casino estalla en celebración cuando el imperio consigue un bote espectacular.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource]\n§GGanancia neta:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource]\n\n¡La fortuna favorece a los audaces! Disfruta la celebración mientras dure."
 cc.outcome_jackpot_unity_bonus.desc:0 "El casino estalla en celebración cuando el imperio consigue un bote espectacular.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] [Owner.GetCcCasinoWagerResource] y [Owner.cc_casino_bonus_unity] de Unidad\n§GGanancia neta:§! [Owner.cc_casino_net] [Owner.GetCcCasinoWagerResource] más [Owner.cc_casino_bonus_unity] de Unidad\n\n¡La fortuna favorece a los audaces! Disfruta la celebración mientras dure."
 cc.outcome_jackpot_multi.desc:0 "El casino estalla en celebración cuando el imperio consigue un bote espectacular.\n\n§YJuego:§! [Owner.GetCcCasinoWagerName]\n§YApuesta:§! [Owner.cc_casino_bet] [Owner.GetCcCasinoWagerResource]\n§GPago:§! [Owner.cc_casino_payout] de Energía, [Owner.cc_casino_bonus_alloys] de Aleaciones y [Owner.cc_casino_bonus_unity] de Unidad\n§GGanancia neta:§! [Owner.cc_casino_net] de Energía más [Owner.cc_casino_bonus_alloys] de Aleaciones y [Owner.cc_casino_bonus_unity] de Unidad\n\nSe contarán leyendas sobre esta tirada durante años."

