l_spanish:
 cc_mod_name:0 "Casino Cósmico"
 tradition_cc_gaming:0 "Juego Cósmico"
 tradition_cc_gaming_desc:0 "Nuestro imperio abraza la emoción del azar, las matemáticas del beneficio y el espectáculo del entretenimiento galáctico."
 tr_cc_gaming_adopt:0 "Tradiciones de Juego Cósmico"
 tr_cc_gaming_adopt_desc:0 "+5% de valor comercial."
 tr_cc_lucky_break:0 "Golpe de Suerte"
 tr_cc_lucky_break_desc:0 "+5% de comodidades. La fortuna favorece al imperio dispuesto a tirar los dados."
 tr_cc_house_advantage:0 "Ventaja de la Casa"
 tr_cc_house_advantage_desc:0 "+5% de créditos energéticos de los trabajos. Con el tiempo, la casa siempre gana."
 tr_cc_entertainment_networks:0 "Redes de Entretenimiento"
 tr_cc_entertainment_networks_desc:0 "+10% de comodidades y +3% de felicidad de la población."
 tr_cc_high_rollers:0 "Grandes Apostadores"
 tr_cc_high_rollers_desc:0 "+5% de valor comercial y +5% de unidad. La élite adinerada apuesta a una escala que la mayoría de los ciudadanos apenas puede imaginar."
 tr_cc_galactic_tourism:0 "Turismo Galáctico"
 tr_cc_galactic_tourism_desc:0 "+10% de atracción de inmigración y +5% de valor comercial."
 tr_cc_fortune_seekers:0 "Buscadores de Fortuna"
 tr_cc_fortune_seekers_desc:0 "+5% de unidad y +5% de créditos energéticos de los trabajos."
 tr_cc_casino_finish:0 "Tradiciones de Juego Cósmico completadas"
 tr_cc_casino_finish_desc:0 "+10% de valor comercial y desbloquea el edificio §YCasino Cósmico§!."
 tr_cc_casino_finish_effects:0 "Desbloquea el edificio §YCasino Cósmico§!."

 building_cc_cosmic_casino:0 "Casino Cósmico"
 cc_requires_no_existing_cosmic_casino:0 "Solo se puede construir un §YCasino Cósmico§! en el imperio."
 building_cc_cosmic_casino_desc:0 "Un enorme complejo de entretenimiento dedicado a los juegos de azar, el turismo de lujo, las apuestas de alto riesgo y los márgenes de beneficio perfectamente calculados. Solo puede operar un Casino Cósmico en todo el imperio."
 cc_casino_dealer:0 "Crupier del Casino"
 cc_casino_dealer_plural:0 "Crupiers del Casino"
 cc_casino_dealer_desc:0 "Especialistas que operan las mesas de juego, gestionan los sistemas de apuestas y mantienen en marcha la sala del casino."
 job_cc_casino_dealer:0 "Crupier del Casino"
 job_cc_casino_dealer_plural:0 "Crupiers del Casino"
 job_cc_casino_dealer_desc:0 "Especialistas que operan las mesas de juego, gestionan los sistemas de apuestas y mantienen en marcha la sala del casino."
 mod_job_cc_casino_dealer_add:0 "Trabajos de Crupier del Casino"
 cc_casino_manager:0 "Gerente del Casino"
 cc_casino_manager_plural:0 "Gerentes del Casino"
 cc_casino_manager_desc:0 "Administradores que se aseguran de que la casa mantenga su ventaja."
 job_cc_casino_manager:0 "Gerente del Casino"
 job_cc_casino_manager_plural:0 "Gerentes del Casino"
 job_cc_casino_manager_desc:0 "Administradores que se aseguran de que la casa mantenga su ventaja."
 mod_job_cc_casino_manager_add:0 "Trabajos de Gerente del Casino"

 decision_cc_enter_casino:0 "Entrar al Casino"
 decision_cc_enter_casino_desc:0 "Visita el Casino Cósmico y elige entre una selección rotativa de apuestas. Una vez realizada la apuesta, la transacción tarda 30 días en resolverse."
 decision_cc_enter_casino_effects:0 "Abre un menú de eventos del casino aleatorio."

 cc_casino_transaction_pending:0 "Transacción del Casino Pendiente"
 cc_casino_transaction_pending_desc:0 "En esta colonia se está procesando una transacción del casino. No se puede volver a entrar hasta que se resuelva la apuesta."
 cc_lucky_streak:0 "Racha de Suerte"
 cc_lucky_streak_desc:0 "El imperio disfruta de una ola de suerte rentable."
 cc_house_favorite:0 "Favorito de la Casa"
 cc_house_favorite_desc:0 "Los clientes del casino están convencidos de que la casa ha sonreído al imperio."
 cc_bad_luck:0 "Mala Suerte"
 cc_bad_luck_desc:0 "Una apuesta desastrosa ha sacudido la confianza pública."

 cc.1.name:0 "¡Gran Apertura!"
 cc.1.desc:0 "Ha llegado el momento. Tras meses de construcción, espectáculo y anticipación cuidadosamente calculada, el §YCasino Cósmico§! en [This.GetName] abre sus puertas a la galaxia.\n\nLas torres de neón brillan sobre la colonia. Las fuentes holográficas derraman luz por el paseo. Las multitudes se agolpan en la entrada mientras los crupiers toman sus puestos, las filas de tragamonedas cobran vida y se realizan las primeras apuestas antes de que la cinta siquiera toque el suelo.\n\nPor todo el imperio, los ciudadanos apenas hablan de otra cosa. Buscadores de fortuna, turistas y grandes apostadores ya convergen en [This.GetName], ansiosos por probar su suerte bajo las cúpulas relucientes de la casa.\n\nPara unirte a ellos, abre el menú de §YDecisiones§! de esta colonia y selecciona §YEntrar al Casino§!."
 cc.1.a:0 "¡Que comiencen los juegos!"

 cc.10.name:0 "Sala Principal"
 cc.10.desc:0 "La sala del casino brilla con mesas de neón, filas de tragamonedas zumbantes y multitudes persiguiendo una suerte imposible. Hoy hay tres apuestas disponibles."
 cc.11.name:0 "Salón de Grandes Apostadores"
 cc.11.desc:0 "Tras campos de seguridad de terciopelo, los clientes de élite apuestan aleaciones, unidad y lujos con una confianza temeraria."
 cc.12.name:0 "Sala de la Lotería"
 cc.12.desc:0 "La sala de la lotería está repleta de ciudadanos, especuladores y buscadores de fortuna. Cada boleto podría cambiar el destino del imperio."
 cc.outcome.name:0 "Apuesta del Casino Resuelta"
 cc.outcome.desc:0 "La transacción del casino ha finalizado. El resultado final se registra a continuación."

 cc.play_low_slots:0 "Jugar a Tragamonedas de Baja Apuesta §R(hasta 500 de Energía)§!"
 cc.play_roulette:0 "Jugar a la Ruleta §R(hasta 1000 de Energía)§!"
 cc.play_mineral_dice:0 "Tirar Dados de Minerales §R(hasta 750 de Minerales)§!"
 cc.play_alloy_wager:0 "Realizar Apuesta de Aleaciones §R(hasta 250 de Aleaciones)§!"
 cc.play_unity_table:0 "Apostar en la Mesa de Unidad §R(hasta 1000 de Unidad)§!"
 cc.play_consumer_luxury:0 "Apuesta de Bienes de Consumo §R(hasta 500 de Bienes de Consumo)§!"
 cc.play_lottery:0 "Comprar Boleto de la Gran Lotería §R(hasta 2000 de Energía)§!"
 cc.play_food_futures:0 "Apostar a Futuros de Alimentos §R(hasta 1000 de Alimentos)§!"
 cc.play_cosmic_jackpot:0 "Perseguir el Bote Cósmico §R(hasta 10000 de Energía)§!"
 cc.wager_uses_available:0 "Apuesta la cantidad estándar si puedes permitírtela; de lo contrario, apuesta todo tu stock de ese recurso. Las opciones sin el recurso requerido no están disponibles."
 cc.place_wager:0 "Realizar la apuesta"
 cc.back_to_floor:0 "Volver a la sala del casino"
 cc.leave:0 "Salir del Casino"
 cc.confirm_low_slots.desc:0 "Filas de máquinas luminosas esperan un tirón de la palanca. La apuesta estándar es de §Y500 de Energía§!, o tus reservas restantes si tienes menos."
 cc.confirm_roulette.desc:0 "La rueda gira bajo un halo de números holográficos. La apuesta estándar es de §Y1000 de Energía§!, o tus reservas restantes si tienes menos."
 cc.confirm_mineral_dice.desc:0 "Pesados dados cristalinos ruedan sobre una mesa reforzada. La apuesta estándar es de §Y750 Minerales§!, o tus reservas restantes si tienes menos."
 cc.confirm_alloy_wager.desc:0 "Los grandes apostadores empujan pilas de valiosas aleaciones al centro de la mesa. La apuesta estándar es de §Y250 Aleaciones§!, o tus reservas restantes si tienes menos."
 cc.confirm_unity_table.desc:0 "Símbolos de propósito compartido brillan sobre esta mesa ceremonial. La apuesta estándar es de §Y1000 de Unidad§!, o tus reservas restantes si tienes menos."
 cc.confirm_consumer_luxury.desc:0 "Lujos exóticos y bienes de moda se apilan ante una multitud expectante. La apuesta estándar es de §Y500 Bienes de Consumo§!, o tus reservas restantes si tienes menos."
 cc.confirm_lottery.desc:0 "Un gran terminal de lotería espera emitir un boleto con los números elegidos por el imperio. La apuesta estándar es de §Y2000 de Energía§!, o tus reservas restantes si tienes menos."
 cc.confirm_food_futures.desc:0 "Los especuladores arriesgan fortunas agrícolas contra las cosechas del mañana. La apuesta estándar es de §Y1000 de Alimentos§!, o tus reservas restantes si tienes menos."
 cc.confirm_cosmic_jackpot.desc:0 "La máquina más peligrosa del casino promete una riqueza imposible a un precio igualmente espectacular. La apuesta estándar es de §Y10000 de Energía§!, o tus reservas restantes si tienes menos."
