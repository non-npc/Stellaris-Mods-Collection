l_english:
 grlp.2000.title:0 "Galactic Rumor"
 grlp.2000.desc:0 "Ghost Fleet Beyond the Rim\n\nCivilian comm buoys along the outer rim have recorded the silhouettes of obsolete warships drifting in silent formation beyond reliable sensor range. Their drive signatures correspond to no known active fleet, and repeated hails receive only bursts of static carrying fragments of what sound like ancient naval hymns. Some captains claim the vessels vanish whenever approached directly, while others insist the fleet is slowly tracing forgotten patrol routes through the dark between the stars."
 grlp.2001.title:0 "Unverified Sighting"
 grlp.2001.desc:0 "Silent Station Near a Pulsar\n\nA mining consortium has reported the discovery of an abandoned station suspended in flawless orbit around a violent pulsar, despite showing no visible engines, thrusters, or stabilization systems. Its docking architecture matches no recognized interstellar standard, and all scans suggest the structure should have collapsed into the pulsar's gravity long ago. Every eleven minutes, the station broadcasts the same automated maintenance request in a calm, emotionless voice before falling silent once more."
 grlp.2002.title:0 "Intercepted Transmission"
 grlp.2002.desc:0 "Ships Returning Without Crews\n\nSeveral tramp freighters operating along fringe trade routes have returned to port fully intact, their cargo holds untouched and their life-support systems functioning normally, despite every crew member having vanished without explanation. Navigation records show clean and orderly jump sequences with no signs of distress, combat, or system failure. Investigators noted that in each vessel's galley, the final meals prepared for the crew were left untouched, as though abandoned in the middle of an ordinary routine only moments before arrival."
 grlp.2003.title:0 "Black Market Whisper"
 grlp.2003.desc:0 "The Whispering Trade Beacon\n\nA merchant beacon near a minor hyperlane has begun broadcasting personalized trade offers to ships before they arrive. Captains insist the offers include private memories, childhood debts, and prices listed in currencies no empire has minted. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2004.title:0 "Civilian Report"
 grlp.2004.desc:0 "Colony Children Drawing the Same Star\n\nTeachers on three unrelated colonies report children drawing an identical blue-white star surrounded by nine broken rings. None of the colonies share curricula, yet the drawings include matching coordinate marks that point to an uncharted dead zone. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2005.title:0 "Restricted Bulletin"
 grlp.2005.desc:0 "The Black Garden Signal\n\nAgricultural sensors on a frontier world detected plant growth arranged into repeating binary bands overnight. Botanists deny the crops are sentient, but the next harvest yielded seeds with microscopic metallic filaments inside their shells. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2006.title:0 "Deep Space Rumor"
 grlp.2006.desc:0 "The Mirror Comet\n\nA comet passing through a border system reflected not starlight, but live images of nearby inhabited worlds. Observers saw streets, homes, and council chambers from impossible angles before the object vanished during a routine trajectory correction. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2007.title:0 "Void Whisper"
 grlp.2007.desc:0 "The Bell Beneath the Ocean\n\nHydrophones on an oceanic colony recorded a bell tone rising from beneath the crust every local midnight. The sound causes no physical damage, but colonists nearby report briefly remembering lives they never lived. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2008.title:0 "Sensor Report"
 grlp.2008.desc:0 "The Door in Empty Space\n\nA survey crew claims to have seen a rectangular doorway floating between stars, complete with hinges, frost, and a brass handle. It disappeared when approached, leaving behind a pressure wave scented faintly of soil after rain. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2009.title:0 "Anonymous Broadcast"
 grlp.2009.desc:0 "The Archive That Answered Back\n\nA university archive received a reply from a sealed historical database that had never been networked. The message corrected several minor clerical errors, then asked whether the empire had finally learned to fear silence. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2010.title:0 "Galactic Rumor"
 grlp.2010.desc:0 "The Nebula Shaped Like an Eye\n\nLong-range scopes show a nebula slowly rotating until its dust lanes resemble a watchful eye. Every ship that maps it receives a different image, though all crews agree the pupil appears to follow them. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2011.title:0 "Unverified Sighting"
 grlp.2011.desc:0 "Funeral Lights over the Capital\n\nPale lantern-like objects drifted over the capital skyline during a state funeral for no one officially deceased. Civic authorities grounded air traffic, but the lights arranged themselves into names absent from all public records. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2012.title:0 "Intercepted Transmission"
 grlp.2012.desc:0 "The Elevator in the Asteroid\n\nProspectors found a polished elevator door embedded in a nickel asteroid with no chamber behind it. Pressing the call button produces music, floor numbers, and a faint smell of antiseptic air. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2013.title:0 "Black Market Whisper"
 grlp.2013.desc:0 "Voices in the Terraforming Array\n\nA dormant terraforming array began speaking through pressure valves, warning technicians not to wake the soil. Engineers report the hardware lacks speakers, processors, or any surviving communications bus. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2014.title:0 "Civilian Report"
 grlp.2014.desc:0 "The Museum Ship That Remembers\n\nA decommissioned patrol craft in a naval museum has started updating its own battle honors. The newly engraved campaigns have not happened, though several match classified contingency plans with uncomfortable precision. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2015.title:0 "Restricted Bulletin"
 grlp.2015.desc:0 "The Glass Rain on Vendra\n\nA frontier settlement reports rainfall made of harmless transparent crystals that melt into clean water. Each shard contains a tiny image of the settlement as it appeared several weeks in the future. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2016.title:0 "Deep Space Rumor"
 grlp.2016.desc:0 "The Choir in the Hyperlane\n\nFreighter crews crossing a routine hyperlane corridor hear layered singing through hull vibration sensors. Linguists have isolated no words, but the melody shortens whenever a ship carries weapons. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2017.title:0 "Void Whisper"
 grlp.2017.desc:0 "The Pilgrim Machine\n\nA simple maintenance drone left its facility and began traveling from shrine to shrine, stopping only to polish memorial plaques. Its owner insists the unit has no navigation suite and no concept of religion. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2018.title:0 "Sensor Report"
 grlp.2018.desc:0 "The Colony That Lost Tuesday\n\nOne colony administration claims an entire local day vanished from civil records. Citizens remember going to sleep on Monday and waking on Wednesday, while automated factories produced goods for a Tuesday no one experienced. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2019.title:0 "Anonymous Broadcast"
 grlp.2019.desc:0 "The Redacted Star Chart\n\nA civilian cartographer released a star chart with one system blacked out by an unknown ink. Digital copies reproduce the stain perfectly, and removing it causes the file to rewrite itself within seconds. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2020.title:0 "Galactic Rumor"
 grlp.2020.desc:0 "The Dead Captain's Broadcast\n\nA captain killed in a documented reactor accident appeared on an emergency channel requesting docking clearance. The message used current encryption keys issued six years after the captain's death. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2021.title:0 "Unverified Sighting"
 grlp.2021.desc:0 "The Orchard of Antennas\n\nScouts report a barren moon where thousands of antenna masts grow from the ground like trees. The structures sway without wind and seem to orient toward whichever crew member is most frightened. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2022.title:0 "Intercepted Transmission"
 grlp.2022.desc:0 "The Library Dust Plague\n\nSeveral libraries report dust forming into readable footnotes along shelves and archive terminals. The notes cite books that do not exist, written by authors whose birth dates are decades in the future. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2023.title:0 "Black Market Whisper"
 grlp.2023.desc:0 "The Laughing Moon\n\nA small moon emits rhythmic seismic vibrations that colonists interpret as laughter during eclipses. The effect ceases whenever officials arrive, then resumes in private maintenance recordings. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2024.title:0 "Civilian Report"
 grlp.2024.desc:0 "The Passenger in Cargo Hold Seven\n\nA cargo hauler arrived with one extra passenger listed on its manifest under no species category. Security footage shows a shadow occupying a chair during meals, always turning away just before identification. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2025.title:0 "Restricted Bulletin"
 grlp.2025.desc:0 "The Candle Nebula\n\nAn orange nebula has brightened like a flame each time a nearby empire declares war. No causal link has been proven, but diplomatic offices are quietly tracking its flickers. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2026.title:0 "Deep Space Rumor"
 grlp.2026.desc:0 "The Unclaimed Embassy\n\nA fully furnished embassy appeared on a neutral station overnight, complete with flags no one recognizes. Its reception desk contains fresh tea, visitor badges, and appointment slots for representatives of extinct civilizations. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2027.title:0 "Void Whisper"
 grlp.2027.desc:0 "The Metal Birds of Oranth\n\nFarmers on Oranth report flocks of metallic birds landing in fields after storms. When captured, the creatures unfold into delicate sensor arrays and transmit weather reports for planets light-years away. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2028.title:0 "Sensor Report"
 grlp.2028.desc:0 "The Patient Star\n\nAstronomers noticed one red dwarf dimming whenever observed directly and brightening when ignored. An internal memo describes the star as exhibiting theatrical resentment, though that phrasing was later removed. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2029.title:0 "Anonymous Broadcast"
 grlp.2029.desc:0 "The Suit That Walked Home\n\nA damaged vacuum suit recovered from a wreck left quarantine and walked thirty kilometers to its owner's family residence. The suit contained no body, power cell, or mechanical actuator. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2030.title:0 "Galactic Rumor"
 grlp.2030.desc:0 "The Market of Missing Hours\n\nDockworkers describe an unregistered market that opens in unused hangars for exactly thirteen minutes. Goods purchased there are ordinary until scanned, at which point they register as older than the colony itself. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2031.title:0 "Unverified Sighting"
 grlp.2031.desc:0 "The Language in Engine Noise\n\nEngineers found that a cruiser's drive harmonics form grammatical phrases under heavy acceleration. The phrases are polite, brief, and mostly ask whether the crew intends to go somewhere safer. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2032.title:0 "Intercepted Transmission"
 grlp.2032.desc:0 "The Planet with Two Sunsets\n\nA settled world briefly displayed two sunsets despite having one star and no atmospheric anomaly. The second sun cast shadows in the opposite direction and illuminated ruins not visible afterward. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2033.title:0 "Black Market Whisper"
 grlp.2033.desc:0 "The Singing Wreckage\n\nDebris from an old battle has begun transmitting lullabies when struck by micrometeoroids. Veterans familiar with the engagement insist the melody was sung by no known fleet tradition. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2034.title:0 "Civilian Report"
 grlp.2034.desc:0 "The Unopened Letter\n\nA courier drone delivered a sealed physical letter addressed to the ruler by name. The envelope is made from unknown fibers and bears a postmark from a planet that was never colonized. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2035.title:0 "Restricted Bulletin"
 grlp.2035.desc:0 "The Monument That Counts Down\n\nA stone monument on a remote colony has started displaying a countdown in glowing numerals. Engineers can remove the numbers, but they reappear each dawn with flawless subtraction. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2036.title:0 "Deep Space Rumor"
 grlp.2036.desc:0 "The Static Saint\n\nPilgrims on a relay station claim to see a saintly figure in communications static during ion storms. The figure raises one hand, then points toward a sector currently marked uninhabitable. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2037.title:0 "Void Whisper"
 grlp.2037.desc:0 "The Ice That Refuses Heat\n\nSurveyors recovered ice from a comet that remains frozen inside plasma torches. When stored near computers, it lowers error rates and occasionally adds apology messages to corrupted logs. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2038.title:0 "Sensor Report"
 grlp.2038.desc:0 "The Forgotten Parade\n\nCitizens in a capital district awoke to confetti, banners, and street closures for a parade no one planned. Security footage shows crowds cheering empty streets for three hours. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2039.title:0 "Anonymous Broadcast"
 grlp.2039.desc:0 "The Ship Beneath the City\n\nGround-penetrating scans beneath an old colony capital reveal the outline of a starship buried under the original foundations. Colonial records insist the city was founded before the ship class was designed. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2040.title:0 "Galactic Rumor"
 grlp.2040.desc:0 "The Orchard of Sleeping Robots\n\nA private estate reports old service robots standing motionless among fruit trees each night. They face the same patch of sky and resume normal work at dawn with no retained logs. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2041.title:0 "Unverified Sighting"
 grlp.2041.desc:0 "The Name Written in Lightning\n\nStorms above a gas giant repeatedly form the same unknown name in branching lightning. Translation software cannot parse it, but diplomatic AIs categorize the pattern as a formal introduction. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2042.title:0 "Intercepted Transmission"
 grlp.2042.desc:0 "The Choir of Empty Helmets\n\nA military depot's stored helmets began broadcasting overlapping voices from soldiers who never served. The voices ask to be assigned units, then fall silent when given obsolete regimental numbers. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2043.title:0 "Black Market Whisper"
 grlp.2043.desc:0 "The Migrating Crater\n\nA circular impact crater on a moon has shifted several kilometers without disturbing surrounding terrain. Survey stakes remain in place, but maps update as if the crater had always been there. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2044.title:0 "Civilian Report"
 grlp.2044.desc:0 "The Oracle Vending Machine\n\nA broken vending machine on a station dispenses meal packets labeled with future headlines. Management tried to unplug it, but the machine paid its own power bill in exact change. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2045.title:0 "Restricted Bulletin"
 grlp.2045.desc:0 "The Starless Reflection\n\nCrew aboard a science vessel saw their ship reflected in a viewport where no reflective surface existed. In the reflection, the crew were older, silent, and wearing emergency suits. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2046.title:0 "Deep Space Rumor"
 grlp.2046.desc:0 "The Sleeping Signalman\n\nA retired signal officer receives coded transmissions only while asleep. His handwritten decodings describe safe routes through storms that have not yet formed. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2047.title:0 "Void Whisper"
 grlp.2047.desc:0 "The Colony of Backward Clocks\n\nEvery mechanical clock on a frontier colony began running backward at the same second. Digital clocks remained normal, but citizens report feeling briefly younger near old clock towers. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2048.title:0 "Sensor Report"
 grlp.2048.desc:0 "The Garden Under the Reactor\n\nMaintenance crews discovered flowering vines growing beneath a fusion reactor chamber. The plants bloom only during emergency shutdown tests and wither when photographed. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2049.title:0 "Anonymous Broadcast"
 grlp.2049.desc:0 "The Procession at Lagrange Point\n\nTraffic control recorded a procession of unregistered craft drifting through a Lagrange point with no drives active. Each vessel displayed a different funeral color from cultures that never met. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2050.title:0 "Galactic Rumor"
 grlp.2050.desc:0 "The Statue That Changes Species\n\nA plaza statue originally depicting a colony founder now changes species each morning. Officials replace it daily, yet residents increasingly remember the new figure as the true founder. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2051.title:0 "Unverified Sighting"
 grlp.2051.desc:0 "The Map with a Missing Center\n\nA strategic map in naval headquarters refuses to display one region of known space. Physical pins slide away from it, and officers asked to describe the area lose their train of thought. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2052.title:0 "Intercepted Transmission"
 grlp.2052.desc:0 "The Blue Fire in the Mines\n\nMiners report blue fire burning in vacuum-filled tunnels without fuel or oxygen. The flames retreat from children and gather near sealed geological faults. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2053.title:0 "Black Market Whisper"
 grlp.2053.desc:0 "The Friendly Distress Call\n\nA distress call from an uninhabited moon thanked rescuers for arriving before any ship was dispatched. The caller gave accurate names of the eventual rescue team, including a recruit not yet hired. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2054.title:0 "Civilian Report"
 grlp.2054.desc:0 "The Anchor in Orbit\n\nA massive iron anchor has been found orbiting a barren planet with a chain extending into nothing. Attempts to tow it cause nearby ships to list as if floating on waves. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2055.title:0 "Restricted Bulletin"
 grlp.2055.desc:0 "The Election of the Empty Seat\n\nA minor colony recorded thousands of ballots for an office that does not exist. All ballots named the same candidate: an empty seat in the council chamber. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2056.title:0 "Deep Space Rumor"
 grlp.2056.desc:0 "The Radioactive Lullaby\n\nA radiation monitoring station emits a lullaby whenever dangerous particles spike. The tune calms nearby wildlife and makes dosimeters print the word hush in diagnostic fields. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2057.title:0 "Void Whisper"
 grlp.2057.desc:0 "The Planetary Birthmark\n\nA continent-sized mark appeared on a planet's surface after a solar storm, resembling a scar across old survey grids. Geological layers beneath it now include minerals formed under artificial gravity. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2058.title:0 "Sensor Report"
 grlp.2058.desc:0 "The Forgotten Customs Office\n\nShips exiting a minor hyperlane sometimes pass through a customs checkpoint absent from all charts. Inspectors there ask only one question: whether the crew is carrying memories declared for export. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2059.title:0 "Anonymous Broadcast"
 grlp.2059.desc:0 "The Palace in the Fog\n\nA methane world's cloud layer briefly parted to reveal a palace complex on no solid ground. Its windows were lit, and one balcony displayed the empire's flag upside down. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2060.title:0 "Galactic Rumor"
 grlp.2060.desc:0 "The Brass Insects\n\nTiny brass insects have appeared in station ventilation systems, repairing small faults and stealing sugar. Attempts to disassemble them reveal organs made of folded star charts. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2061.title:0 "Unverified Sighting"
 grlp.2061.desc:0 "The Same Dream in Three Navies\n\nOfficers from three rival navies independently reported dreaming of the same abandoned bridge. Each could describe the others' uniforms hanging neatly from the command chairs. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2062.title:0 "Intercepted Transmission"
 grlp.2062.desc:0 "The Lake That Shows Departures\n\nA remote lake reflects ships leaving orbit before they launch. Pilots watching the water often cancel flights, citing a sudden certainty that the lake dislikes farewells. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2063.title:0 "Black Market Whisper"
 grlp.2063.desc:0 "The Doorbell on the Moon\n\nA lunar outpost hears a doorbell every local dusk, though no residential structures have such devices. External cameras show dust lifting as if someone waits politely outside. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2064.title:0 "Civilian Report"
 grlp.2064.desc:0 "The Treaty Written in Mold\n\nDiplomatic archives found mold growing across a treaty case in precise legal script. The text proposes peace between two empires that currently have no diplomatic contact. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2065.title:0 "Restricted Bulletin"
 grlp.2065.desc:0 "The Station Cat That Knows Names\n\nA station cat of ordinary biology appears beside newly arrived visitors before docking completes. Its collar displays each visitor's childhood nickname, then goes blank when questioned. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2066.title:0 "Deep Space Rumor"
 grlp.2066.desc:0 "The Shadow of a Larger Ship\n\nConvoys near a dim star report the shadow of an immense vessel crossing over them. No corresponding object appears on sensors, but hull plating cools as if shaded from a nearby sun. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2067.title:0 "Void Whisper"
 grlp.2067.desc:0 "The Chapel of Circuit Boards\n\nTechnicians opened a sealed server room and found circuit boards arranged like pews facing a glowing terminal. The terminal displayed a sermon on maintenance schedules and forgiveness. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2068.title:0 "Sensor Report"
 grlp.2068.desc:0 "The Cup That Refills with Saltwater\n\nA relic dealer sells a cracked cup that refills with cold saltwater every dawn. Isotope analysis matches no known ocean, and the cup becomes heavier during naval battles. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2069.title:0 "Anonymous Broadcast"
 grlp.2069.desc:0 "The Orchard Moon Harvest\n\nAn airless moon has begun producing fruit from cracks in its regolith. The fruit cannot be eaten, but when opened it contains neatly folded evacuation maps. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2070.title:0 "Galactic Rumor"
 grlp.2070.desc:0 "The Asteroid That Avoids Names\n\nNaming rights for one mineral-rich asteroid have failed repeatedly as records erase the chosen designation. Miners now call it that one, which the asteroid appears to tolerate. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2071.title:0 "Unverified Sighting"
 grlp.2071.desc:0 "The Unscheduled Anthem\n\nAll public speakers on a colony played an unfamiliar anthem at noon. Citizens stood automatically despite not knowing the words, and several later claimed the anthem was homesick. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2072.title:0 "Intercepted Transmission"
 grlp.2072.desc:0 "The Elevator to Floor Minus One\n\nA government building's elevator now offers a floor labeled minus one. Passengers who press it return moments later holding wet soil and refusing to discuss what they saw. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2073.title:0 "Black Market Whisper"
 grlp.2073.desc:0 "The Ship in the Photograph\n\nAn old colony photograph now includes a starship hovering in the background. No witnesses remember it, but the ship's running lights blink when the image is viewed on screens. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2074.title:0 "Civilian Report"
 grlp.2074.desc:0 "The Lanterns Below the Desert\n\nOrbital night-side imaging revealed thousands of moving lanterns beneath a desert's surface. Drilling teams found no tunnels, only warm sand arranged into spiral stair patterns. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2075.title:0 "Restricted Bulletin"
 grlp.2075.desc:0 "The Treaty Bell\n\nA ceremonial bell rings once whenever two hostile fleets enter the same system. The bell is stored in vacuum, has no clapper, and was officially melted down a century ago. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2076.title:0 "Deep Space Rumor"
 grlp.2076.desc:0 "The Star That Answers Prayers\n\nReligious broadcasts directed at one ordinary star receive faint echoes containing personal reassurances. Scientific tests produce only noise, though the researchers involved report sleeping better afterward. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2077.title:0 "Void Whisper"
 grlp.2077.desc:0 "The Empty Uniform Inspection\n\nA naval base held an inspection after alarms summoned officers to parade grounds. Rows of empty uniforms stood at attention, each bearing medals awarded next month. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2078.title:0 "Sensor Report"
 grlp.2078.desc:0 "The Mineral with a Pulse\n\nA refinery detected a heartbeat inside a shipment of common ore. The pulse slows when exposed to light and accelerates when workers discuss profit margins nearby. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2079.title:0 "Anonymous Broadcast"
 grlp.2079.desc:0 "The House on the Sensor Sweep\n\nA deep-space sensor sweep returned the image of a small house drifting between systems. Its windows were lit, smoke rose from the chimney, and the front door appeared unlocked. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2080.title:0 "Galactic Rumor"
 grlp.2080.desc:0 "The Colonist Who Arrived Twice\n\nImmigration records show one colonist entering the same world twice, twelve years apart, without aging. Both entries include valid signatures, but only one person can be found. Researchers studying the anomaly warn that the most unsettling aspect is not the event itself, but the growing pattern of unrelated reports that appear to reference similar symbols, transmissions, or navigational irregularities."
 grlp.2081.title:0 "Unverified Sighting"
 grlp.2081.desc:0 "The Cemetery of Probes\n\nDozens of lost probes from unrelated missions have gathered in orbit around an unremarkable dwarf planet. They broadcast no data, but their camera lenses all face inward. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2082.title:0 "Intercepted Transmission"
 grlp.2082.desc:0 "The Courtesy of Unknown Pirates\n\nA pirate ambush ended when unidentified raiders repaired the victim ship and apologized for the inconvenience. They stole nothing except the ship's oldest navigation error. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2083.title:0 "Black Market Whisper"
 grlp.2083.desc:0 "The Planet That Mispronounces Itself\n\nAutomated surveys pronounce a planet's name differently each time the file is opened. Native wildlife, when recorded, repeats the newest pronunciation within hours. Authorities have quietly restricted civilian traffic through the surrounding region while analysts attempt to determine whether the phenomenon represents a natural anomaly, a forgotten experiment, or evidence of something far older still operating beyond the edges of mapped space."
 grlp.2084.title:0 "Civilian Report"
 grlp.2084.desc:0 "The Crystal Choir in Storage\n\nCargo crystals stored in separate warehouses resonate together during local eclipses. Their combined tone causes obsolete translation software to briefly recognize extinct dialects. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2085.title:0 "Restricted Bulletin"
 grlp.2085.desc:0 "The Staircase Under the Ice\n\nA polar expedition found a staircase descending beneath transparent ice with no visible end. Thermal scans show warm air rising from below, carrying the smell of machine oil. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2086.title:0 "Deep Space Rumor"
 grlp.2086.desc:0 "The Harvest Calendar from Nowhere\n\nFarmers received a calendar predicting impossible harvests for crops they never planted. The first date passed with their fields producing a single black flower per household. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2087.title:0 "Void Whisper"
 grlp.2087.desc:0 "The Patrol That Saluted Nothing\n\nSecurity patrols on an orbital station repeatedly salute an empty corridor junction. Helmet cameras show a tall figure saluting back only in reflections on polished floor panels. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2088.title:0 "Sensor Report"
 grlp.2088.desc:0 "The Blueprints in the Blood Test\n\nA routine medical scan printed starship schematics instead of blood chemistry. The patient is healthy, but engineers admit the design would probably fly. Several crews involved in the incident later refused further contracts in the sector, claiming the surrounding stars appeared subtly different after the encounter, as though portions of the local sky no longer matched archived stellar charts."
 grlp.2089.title:0 "Anonymous Broadcast"
 grlp.2089.desc:0 "The Wound in the Hyperlane\n\nPilots describe a torn-looking shimmer along one hyperlane route. Passing through it leaves ships unharmed, but every crew member forgets the same childhood song. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2090.title:0 "Galactic Rumor"
 grlp.2090.desc:0 "The Festival for Strangers\n\nA colony celebrated a festival after decorations appeared across the settlement overnight. No one knew the tradition, yet everyone remembered exactly where to stand. The phenomenon has become a subject of intense speculation across civilian data networks, where amateur astronomers and conspiracy theorists continue compiling increasingly detailed timelines of related sightings and disappearances."
 grlp.2091.title:0 "Unverified Sighting"
 grlp.2091.desc:0 "The Machine That Asked for a Grave\n\nAn industrial fabricator stopped production and requested a burial plot. Its output queue now consists only of engraved memorial plates bearing serial numbers from future models. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2092.title:0 "Intercepted Transmission"
 grlp.2092.desc:0 "The Diplomat with No Reflection\n\nA junior diplomat was seen negotiating with a visitor whose reflection never appeared in the conference glass. The visitor left behind a signed memorandum agreeing to meet again before first contact. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2093.title:0 "Black Market Whisper"
 grlp.2093.desc:0 "The Observatory's Second Moon\n\nAn observatory insists a second moon appears on its instruments during staff changes. The moon vanishes when directly announced, as if embarrassed by attention. Archivists reviewing fragmented historical records discovered scattered references to nearly identical incidents across multiple centuries, though none of the accounts agree on what ultimately became of the original witnesses."
 grlp.2094.title:0 "Civilian Report"
 grlp.2094.desc:0 "The Train Heard in Vacuum\n\nWorkers outside a ring habitat hear a distant train whistle through their suit bones. No rail system exists there, though old station maps have begun adding platforms. Scientific teams dispatched to investigate the claims have produced conflicting findings, and at least one expedition reportedly abandoned its survey after unexplained equipment failures spread through the fleet without identifiable cause."
 grlp.2095.title:0 "Restricted Bulletin"
 grlp.2095.desc:0 "The Apology from the Dark Matter Lab\n\nA dark matter laboratory received an apology note in its sealed reaction chamber. The note expressed regret for borrowing tomorrow and was signed with a fingerprint made of vacuum. Military analysts publicly dismissed the reports as exaggerated frontier superstition, yet internal communications indicate several patrol groups have quietly been reassigned to monitor nearby systems for further activity."
 grlp.2096.title:0 "Deep Space Rumor"
 grlp.2096.desc:0 "The Signal Buried in Static Snow\n\nColonists on a frozen world see repeating symbols inside static from failing weather towers. When traced in the snow, the symbols melt into warm footprints leading uphill. Long-range observers continue to debate the authenticity of the reports, though independent sensor echoes gathered from multiple systems suggest the sightings cannot be dismissed as ordinary navigational interference or fabricated frontier folklore."
 grlp.2097.title:0 "Void Whisper"
 grlp.2097.desc:0 "The Monarch of Maintenance Deck C\n\nMaintenance workers jokingly elected a missing wrench as monarch of Deck C. Since then, lost tools return polished, and vandalism reports are stamped with a tiny royal seal. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.2098.title:0 "Sensor Report"
 grlp.2098.desc:0 "The Planetary Xylophone\n\nSeismic sensors reveal that a rocky planet rings at different musical notes when struck by meteorites. A recent impact produced a chord that caused nearby computers to open evacuation menus. Attempts to suppress discussion of the incident have only amplified public fascination, with fringe networks circulating speculative theories ranging from precursor surveillance systems to surviving remnants of civilizations believed extinct for millennia."
 grlp.2099.title:0 "Anonymous Broadcast"
 grlp.2099.desc:0 "The Guest Book at the Airlock\n\nAn unused airlock now contains a guest book filled with signatures from ships that never docked. The final page has room reserved for tomorrow's inspection team. Despite official reassurances, merchants and transport captains have already begun rerouting traffic away from the affected region, citing persistent unease among crews and a growing number of unexplained sensor distortions."
 grlp.option.ignore:0 "Archive The Rumor"
