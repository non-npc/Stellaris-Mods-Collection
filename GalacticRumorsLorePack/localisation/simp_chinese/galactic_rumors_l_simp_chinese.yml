l_simp_chinese:
 grlp.2000.title:0 "银河传闻"
 grlp.2000.desc:0 "边境之外的幽灵舰队\n\n边境通讯站记录到一组来源不明的传感器回波。目前没有舰队愿意公开承认介入调查。"
 grlp.2001.title:0 "未经证实的目击"
 grlp.2001.desc:0 "脉冲星附近的沉默空间站\n\n民用船队记录到一个违反物理常识的轨道现象。后续观测没有得到结论，只留下越来越多难以解释的旁证。"
 grlp.2002.title:0 "截获讯号"
 grlp.2002.desc:0 "无人归来的舰船\n\n殖民地管理员记录到一次没有目击者的接触记录。相关资料已被转入保密档案，等待更多类似案例出现后再进行比对。"
 grlp.2003.title:0 "黑市低语"
 grlp.2003.desc:0 "低语的贸易信标\n\n深空探测器记录到一场只存在于仪器中的风暴。官方公告将其列为低优先级异常，但地方居民显然并不相信。"
 grlp.2004.title:0 "平民报告"
 grlp.2004.desc:0 "绘制同一恒星的殖民地儿童\n\n贸易联盟记录到一份与现实不符的航行日志。当地政府建议居民保持镇定，同时悄悄增派了安全人员。"
 grlp.2005.title:0 "银河传闻"
 grlp.2005.desc:0 "黑色花园讯号\n\n海军档案员记录到一种会自行修正的星图标记。民间频道把它称为征兆，而科学院坚持称其只是统计误差。"
