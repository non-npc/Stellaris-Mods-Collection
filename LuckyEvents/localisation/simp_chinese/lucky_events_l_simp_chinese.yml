l_simp_chinese:
 lucky_events.ok:0 "好极了。"
 lucky_events.2.name:0 "被遗忘的货运舱"
 lucky_events.2.desc:0 "一只沉默的民用货运舱从衰败轨道中被回收。它的登记信息早已过时，但密封货物仍然可用。\n\n§G奖励：§! §Y+202§! 能量币。"
 lucky_events.3.name:0 "误归档的国库债券"
 lucky_events.3.desc:0 "一次例行审计发现了一项从未赎回的休眠国库凭证。修正记录后，国库立刻获得了一笔盈余。\n\n§G奖励：§! §Y+203§! 能量币。"
 lucky_events.4.name:0 "勘探者的幸运矿脉"
 lucky_events.4.desc:0 "独立勘探者在一颗边缘卫星上打入一条高密度工业矿脉，并自愿将开采权出售给国家。\n\n§G奖励：§! §Y+204§! 能量币。"
 lucky_events.5.name:0 "废弃精炼核心"
 lucky_events.5.desc:0 "一段漂流的精炼模块被发现，其自动冶炼设备仍然完好。回收队在结构失效前提取了一批有用库存。\n\n§G奖励：§! §Y+205§! 能量币。"
 lucky_events.6.name:0 "公民捐赠热潮"
