 lucky_events.7.name:0 "沉默仓库"
 lucky_events.7.desc:0 "一座被遗忘的轨道仓库藏在层层过期航运代码之下。里面的物资不是被抛弃，而只是被放错了地方。\n\n§G奖励：§! §Y+207§! 能量币。"
 lucky_events.8.name:0 "有利的会计误差"
 lucky_events.8.desc:0 "最初看似预算错误的问题，最终被证明是一家已解散承包商应退还给国库的多付款项。\n\n§G奖励：§! §Y+208§! 能量币。"
 lucky_events.9.name:0 "稳定反应堆电池"
