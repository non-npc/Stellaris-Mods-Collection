l_english:
 lucky_events.ok:0 "Excellent."
 lucky_events.2.name:0 "Forgotten Freight"
 lucky_events.2.desc:0 "A silent civilian freight pod is recovered from a decaying orbit. Its registry is centuries out of date, but the sealed cargo remains usable.\n\n§GReward:§! §Y+202§! Energy Credits."
 lucky_events.3.name:0 "Misfiled Treasury Bond"
 lucky_events.3.desc:0 "A routine audit uncovers a dormant treasury instrument that was never redeemed. The correction produces an immediate surplus.\n\n§GReward:§! §Y+203§! Energy Credits."
 lucky_events.4.name:0 "Prospector's Lucky Strike"
 lucky_events.4.desc:0 "Independent prospectors on a marginal moon break into a dense seam of industrial material and voluntarily sell the claim to the state.\n\n§GReward:§! §Y+204§! Energy Credits."
 lucky_events.5.name:0 "Derelict Refinery Core"
 lucky_events.5.desc:0 "A drifting refinery module is found with its automated smelters still intact. Recovery crews extract a useful stockpile before the structure fails.\n\n§GReward:§! §Y+205§! Energy Credits."
 lucky_events.6.name:0 "Civic Donation Drive"
 lucky_events.6.desc:0 "A popular charitable campaign exceeds every forecast, and several wealthy patrons redirect part of the proceeds toward imperial development.\n\n§GReward:§! §Y+206§! Energy Credits."
 lucky_events.7.name:0 "Silent Warehouse"
 lucky_events.7.desc:0 "A forgotten orbital warehouse is discovered beneath layers of obsolete shipping codes. Its contents were misplaced, not abandoned.\n\n§GReward:§! §Y+207§! Energy Credits."
 lucky_events.8.name:0 "Beneficial Accounting Error"
 lucky_events.8.desc:0 "What first appears to be a budgetary mistake turns out to be an overpayment owed back to the treasury by a defunct contractor.\n\n§GReward:§! §Y+208§! Energy Credits."
 lucky_events.9.name:0 "Stabilized Reactor Cells"
 lucky_events.9.desc:0 "Engineers salvage intact reactor cells from a mothballed utility platform, producing a small but welcome energy reserve.\n\n§GReward:§! §Y+209§! Energy Credits."
 lucky_events.10.name:0 "Cargo From Nowhere"
 lucky_events.10.desc:0 "A damaged automated tug emerges from hyperspace with no crew and no destination record, but its containers are full and properly sealed.\n\n§GReward:§! §Y+210§! Energy Credits."
 lucky_events.11.name:0 "Recovered Market Escrow"
 lucky_events.11.desc:0 "Commercial arbitrators release a long-frozen escrow account after identifying the empire as the rightful successor claimant.\n\n§GReward:§! §Y+211§! Energy Credits."
 lucky_events.12.name:0 "Surveyor's Bonus Cache"
 lucky_events.12.desc:0 "A planetary survey team discovers buried supply cylinders left by an unknown expedition. The contents are old, but remarkably well preserved.\n\n§GReward:§! §Y+312§! Minerals."
 lucky_events.13.name:0 "Ore Beneath the Outpost"
 lucky_events.13.desc:0 "Maintenance work below a frontier installation reveals rich ore pockets directly beneath the foundation pylons.\n\n§GReward:§! §Y+313§! Minerals."
 lucky_events.14.name:0 "The Helpful Cave-In"
 lucky_events.14.desc:0 "A controlled demolition exposes an unexpected mineral vein, turning a routine safety operation into a profitable discovery.\n\n§GReward:§! §Y+314§! Minerals."
 lucky_events.15.name:0 "Rich Tailings"
 lucky_events.15.desc:0 "Reanalysis of old mining waste identifies valuable material that earlier extraction methods failed to capture.\n\n§GReward:§! §Y+315§! Minerals."
 lucky_events.16.name:0 "Dense Asteroid Fragment"
 lucky_events.16.desc:0 "A seemingly ordinary asteroid fragment proves unusually metal-rich after a patrol vessel scans it at close range.\n\n§GReward:§! §Y+316§! Minerals."
 lucky_events.17.name:0 "Subsurface Glitter"
 lucky_events.17.desc:0 "Colonial drill teams uncover a glittering crystalline seam during a water-access project.\n\n§GReward:§! §Y+317§! Minerals."
 lucky_events.18.name:0 "Forgotten Quarry Maps"
 lucky_events.18.desc:0 "A retired survey clerk donates old quarry maps that lead directly to a usable deposit.\n\n§GReward:§! §Y+318§! Minerals."
 lucky_events.19.name:0 "Windfall Extraction Permit"
 lucky_events.19.desc:0 "A local administration renegotiates a neglected extraction permit and secures a sudden shipment of refined minerals.\n\n§GReward:§! §Y+319§! Minerals."
 lucky_events.20.name:0 "Resonant Stone Pocket"
 lucky_events.20.desc:0 "Geologists identify a pocket of resonant stone useful in high-grade fabrication.\n\n§GReward:§! §Y+320§! Minerals."
 lucky_events.21.name:0 "Lucky Drill Angle"
 lucky_events.21.desc:0 "A minor adjustment to a drilling pattern intersects an unusually pure ore channel.\n\n§GReward:§! §Y+321§! Minerals."
 lucky_events.22.name:0 "Foundry Overrun"
 lucky_events.22.desc:0 "A military foundry reports that an efficiency recalibration produced more usable alloy than expected.\n\n§GReward:§! §Y+122§! Alloys."
 lucky_events.23.name:0 "Recovered Armor Plating"
 lucky_events.23.desc:0 "Shipbreakers strip pristine armor plates from an obsolete hulk scheduled for disposal.\n\n§GReward:§! §Y+123§! Alloys."
 lucky_events.24.name:0 "Quiet Military Depot"
 lucky_events.24.desc:0 "A sealed logistics depot is uncovered on a remote moon. The inventory is incomplete, but the alloy reserves are intact.\n\n§GReward:§! §Y+124§! Alloys."
 lucky_events.25.name:0 "Prototype Casting Success"
 lucky_events.25.desc:0 "A risky foundry experiment yields a batch of exceptionally clean alloy ingots instead of the expected waste.\n\n§GReward:§! §Y+125§! Alloys."
 lucky_events.26.name:0 "Patrol Salvage Rights"
 lucky_events.26.desc:0 "A patrol captain claims salvage rights over a disabled raider cache and transfers the material to central stores.\n\n§GReward:§! §Y+126§! Alloys."
 lucky_events.27.name:0 "Decommissioned Fleet Stores"
 lucky_events.27.desc:0 "A decommissioning review finds surplus hull material never entered into the main inventory.\n\n§GReward:§! §Y+127§! Alloys."
 lucky_events.28.name:0 "Lucky Hull Recovery"
 lucky_events.28.desc:0 "Emergency crews recover intact hull segments from a training accident without casualties.\n\n§GReward:§! §Y+128§! Alloys."
 lucky_events.29.name:0 "Forgotten Shipyard Pallets"
 lucky_events.29.desc:0 "Old construction pallets are located behind sealed bulkheads in a shipyard annex.\n\n§GReward:§! §Y+129§! Alloys."
 lucky_events.30.name:0 "Metallurgist's Prize"
 lucky_events.30.desc:0 "An industrial guild competition produces a usable alloy surplus as competitors donate their test batches.\n\n§GReward:§! §Y+130§! Alloys."
 lucky_events.31.name:0 "Smelter Calibration Miracle"
 lucky_events.31.desc:0 "A smelter malfunction unexpectedly improves yield for one production cycle before engineers correct it.\n\n§GReward:§! §Y+131§! Alloys."
 lucky_events.32.name:0 "Comfort Shipment"
 lucky_events.32.desc:0 "A civilian supplier accidentally overdelivers finished goods to a frontier colony and declines to reclaim them.\n\n§GReward:§! §Y+152§! Consumer Goods."
 lucky_events.33.name:0 "Artisan Surplus"
 lucky_events.33.desc:0 "An artisan cooperative produces more finished goods than contracted and offers the excess at a symbolic price.\n\n§GReward:§! §Y+153§! Consumer Goods."
 lucky_events.34.name:0 "Rediscovered Luxury Stock"
 lucky_events.34.desc:0 "Port inspectors locate a misplaced luxury goods stockpile in an abandoned customs wing.\n\n§GReward:§! §Y+154§! Consumer Goods."
 lucky_events.35.name:0 "Festival Manufactories"
 lucky_events.35.desc:0 "A cultural festival sparks a burst of local manufacturing and donation activity.\n\n§GReward:§! §Y+155§! Consumer Goods."
 lucky_events.36.name:0 "Unexpected Household Reserve"
 lucky_events.36.desc:0 "A demographic survey reveals large private stockpiles of consumer goods that citizens voluntarily exchange for public credit.\n\n§GReward:§! §Y+156§! Consumer Goods."
 lucky_events.37.name:0 "Civilian Workshop Boom"
 lucky_events.37.desc:0 "Small workshops across several colonies coordinate a patriotic production week.\n\n§GReward:§! §Y+157§! Consumer Goods."
 lucky_events.38.name:0 "Recovered Relief Supplies"
 lucky_events.38.desc:0 "An old disaster-relief cache is found intact and redistributed before any of it spoils.\n\n§GReward:§! §Y+158§! Consumer Goods."
 lucky_events.39.name:0 "Museum Exchange Windfall"
 lucky_events.39.desc:0 "A museum exchange program receives valuable crafted objects that can be converted into public reserves.\n\n§GReward:§! §Y+159§! Consumer Goods."
 lucky_events.40.name:0 "Trade League Courtesy"
 lucky_events.40.desc:0 "A friendly trade league sends a courtesy shipment after benefiting from imperial traffic protection.\n\n§GReward:§! §Y+160§! Consumer Goods."
 lucky_events.41.name:0 "Overfilled Colony Manifest"
 lucky_events.41.desc:0 "A colony transport arrives with more finished supplies than its manifest recorded.\n\n§GReward:§! §Y+161§! Consumer Goods."
 lucky_events.42.name:0 "Lecture That Changed Minds"
 lucky_events.42.desc:0 "A brilliant public lecture spreads through the datanet and triggers a wave of civic enthusiasm.\n\n§GReward:§! §Y+192§! Unity."
 lucky_events.43.name:0 "Spontaneous Day of Service"
 lucky_events.43.desc:0 "Citizens across several worlds organize a voluntary service day that strengthens social cohesion.\n\n§GReward:§! §Y+193§! Unity."
 lucky_events.44.name:0 "Founding Poem Rediscovered"
 lucky_events.44.desc:0 "Archivists recover a lost patriotic poem that becomes unexpectedly popular.\n\n§GReward:§! §Y+194§! Unity."
 lucky_events.45.name:0 "Harmonic Broadcast"
 lucky_events.45.desc:0 "A cultural broadcast resonates across species and strata, creating a brief but genuine sense of shared purpose.\n\n§GReward:§! §Y+195§! Unity."
 lucky_events.46.name:0 "Monument Cleaning Campaign"
 lucky_events.46.desc:0 "A simple effort to restore neglected monuments becomes a planetwide civic movement.\n\n§GReward:§! §Y+196§! Unity."
 lucky_events.47.name:0 "Beloved Explorer Returns"
 lucky_events.47.desc:0 "A long-missing explorer returns alive, carrying stories that inspire the public imagination.\n\n§GReward:§! §Y+197§! Unity."
 lucky_events.48.name:0 "Unity in the Queue"
 lucky_events.48.desc:0 "A bureaucratic delay becomes a viral symbol of patience and solidarity after citizens turn it into a celebration.\n\n§GReward:§! §Y+198§! Unity."
 lucky_events.49.name:0 "Archive of Small Victories"
 lucky_events.49.desc:0 "Local historians publish a collection of overlooked triumphs, strengthening confidence in the empire.\n\n§GReward:§! §Y+199§! Unity."
 lucky_events.50.name:0 "Choir of the Starport"
 lucky_events.50.desc:0 "Dock workers form an impromptu choir whose recordings spread through civilian channels.\n\n§GReward:§! §Y+200§! Unity."
 lucky_events.51.name:0 "The Good Omen"
 lucky_events.51.desc:0 "A rare astronomical alignment is interpreted as a favorable omen by enough citizens to lift morale.\n\n§GReward:§! §Y+201§! Unity."
 lucky_events.52.name:0 "Accidental Formula"
 lucky_events.52.desc:0 "A laboratory assistant notices an impossible value in a failed test, revealing a useful theoretical shortcut.\n\n§GReward:§! §Y+302§! Research."
 lucky_events.53.name:0 "Recovered Equation Slate"
 lucky_events.53.desc:0 "A survey crew finds a durable slate covered in mathematical notation that proves surprisingly relevant.\n\n§GReward:§! §Y+303§! Research."
 lucky_events.54.name:0 "Peer Review Triumph"
 lucky_events.54.desc:0 "A controversial paper survives intense scrutiny and unlocks several minor research paths.\n\n§GReward:§! §Y+304§! Research."
 lucky_events.55.name:0 "Sensor Ghost Explained"
 lucky_events.55.desc:0 "Scientists finally explain a persistent sensor ghost, gaining useful data in the process.\n\n§GReward:§! §Y+305§! Research."
 lucky_events.56.name:0 "University Night Shift"
 lucky_events.56.desc:0 "A night-shift research team solves a problem that had stalled an entire department.\n\n§GReward:§! §Y+306§! Research."
 lucky_events.57.name:0 "Unexpected Simulation Result"
 lucky_events.57.desc:0 "A simulation intended for training produces a legitimate insight into field behavior.\n\n§GReward:§! §Y+307§! Research."
 lucky_events.58.name:0 "Old Lab Notes"
 lucky_events.58.desc:0 "Digitized lab notes from a forgotten researcher contain a method still ahead of current practice.\n\n§GReward:§! §Y+308§! Research."
 lucky_events.59.name:0 "Calibrated by Accident"
 lucky_events.59.desc:0 "An accidental calibration error creates a cleaner dataset than the official procedure.\n\n§GReward:§! §Y+309§! Research."
 lucky_events.60.name:0 "Quantum Coincidence"
 lucky_events.60.desc:0 "Two unrelated experiments produce matching anomalies, allowing researchers to connect their findings.\n\n§GReward:§! §Y+310§! Research."
 lucky_events.61.name:0 "Graduate Cohort Breakthrough"
 lucky_events.61.desc:0 "A cohort of young researchers challenges an assumption and earns immediate recognition.\n\n§GReward:§! §Y+311§! Research."
 lucky_events.62.name:0 "Botanical Insight"
 lucky_events.62.desc:0 "Agricultural researchers studying resilient plants discover a transferable biological principle.\n\n§GReward:§! §Y+312§! Research."
 lucky_events.63.name:0 "Medical Archive Bonus"
 lucky_events.63.desc:0 "A hospital archive contains anonymized case data that improves several ongoing studies.\n\n§GReward:§! §Y+313§! Research."
 lucky_events.64.name:0 "Behavioral Survey Windfall"
 lucky_events.64.desc:0 "A routine civic survey gathers unusually clean social data for researchers.\n\n§GReward:§! §Y+314§! Research."
 lucky_events.65.name:0 "Xeno-Linguistic Shortcut"
 lucky_events.65.desc:0 "A linguist identifies a repeated alien root that clarifies thousands of archival fragments.\n\n§GReward:§! §Y+315§! Research."
 lucky_events.66.name:0 "Recovered Field Samples"
 lucky_events.66.desc:0 "An old expedition locker contains well-labeled biological samples still viable for analysis.\n\n§GReward:§! §Y+316§! Research."
 lucky_events.67.name:0 "Engineering Whiteboard"
 lucky_events.67.desc:0 "An engineer leaves behind an unfinished whiteboard sketch that solves a persistent structural problem.\n\n§GReward:§! §Y+317§! Research."
 lucky_events.68.name:0 "Maintenance Robot Improvisation"
 lucky_events.68.desc:0 "A maintenance robot improvises a repair pattern that engineers adapt into a formal technique.\n\n§GReward:§! §Y+318§! Research."
 lucky_events.69.name:0 "Bridge Stress Revelation"
 lucky_events.69.desc:0 "A harmless vibration in a colonial bridge reveals a better way to distribute load.\n\n§GReward:§! §Y+319§! Research."
 lucky_events.70.name:0 "Dockyard Apprentices"
 lucky_events.70.desc:0 "Apprentices at a dockyard design a simple tool that improves assembly diagnostics.\n\n§GReward:§! §Y+95§! Volatile Motes."
 lucky_events.71.name:0 "Thermal Loop Discovery"
 lucky_events.71.desc:0 "A cooling loop anomaly teaches engineers how to reclaim wasted heat more efficiently.\n\n§GReward:§! §Y+96§! Exotic Gases."
 lucky_events.72.name:0 "Clearance Sale of Secrets"
 lucky_events.72.desc:0 "A bankrupt private laboratory auctions harmless equipment, but the embedded logs contain valuable research data.\n\n§GReward:§! §Y+97§! Rare Crystals."
 lucky_events.73.name:0 "Lucky Comet Tail"
 lucky_events.73.desc:0 "A comet tail passes through a mining route, leaving trace exotic particles collected by traffic drones.\n\n§GReward:§! §Y+98§! Volatile Motes."
 lucky_events.74.name:0 "Crystal Garden"
 lucky_events.74.desc:0 "A cavern opened by seismic activity contains rare crystals growing in orderly lattices.\n\n§GReward:§! §Y+99§! Exotic Gases."
 lucky_events.75.name:0 "Mote-Rich Sparkfall"
 lucky_events.75.desc:0 "A controlled burn on a barren moon reveals volatile motes trapped in glassy surface deposits.\n\n§GReward:§! §Y+100§! Rare Crystals."
 lucky_events.76.name:0 "Gas Pocket Intact"
 lucky_events.76.desc:0 "Drillers seal an exotic gas pocket before it disperses, preserving much of the find.\n\n§GReward:§! §Y+101§! Volatile Motes."
 lucky_events.77.name:0 "Shimmering Silt"
 lucky_events.77.desc:0 "River silt on a colony world contains rare crystalline grains overlooked by initial scans.\n\n§GReward:§! §Y+102§! Exotic Gases."
 lucky_events.78.name:0 "Volatile Dust Storm"
 lucky_events.78.desc:0 "A dangerous dust storm leaves behind recoverable volatile residue once it settles.\n\n§GReward:§! §Y+103§! Rare Crystals."
 lucky_events.79.name:0 "Exotic Vent Bloom"
 lucky_events.79.desc:0 "A geothermal vent briefly blooms with harvestable exotic gases.\n\n§GReward:§! §Y+104§! Volatile Motes."
 lucky_events.80.name:0 "Refined Crystal Error"
 lucky_events.80.desc:0 "A refinery rejects a batch as contaminated, but later testing shows the contamination is valuable.\n\n§GReward:§! §Y+280§! Energy & Unity."
 lucky_events.81.name:0 "Motes in the Machinery"
 lucky_events.81.desc:0 "Old industrial filters are found packed with concentrated volatile motes.\n\n§GReward:§! §Y+281§! Energy & Unity."
 lucky_events.82.name:0 "Sealed Gas Canisters"
 lucky_events.82.desc:0 "A derelict station stores labeled gas canisters behind a still-functioning quarantine lock.\n\n§GReward:§! §Y+282§! Energy & Unity."
 lucky_events.83.name:0 "Navigator's Gift"
 lucky_events.83.desc:0 "A retired navigator provides route data that allows merchants to avoid costly detours.\n\n§GReward:§! §Y+283§! Energy & Unity."
 lucky_events.84.name:0 "Influential Mediation"
 lucky_events.84.desc:0 "A minor border dispute is resolved so gracefully that neighboring observers praise imperial diplomacy.\n\n§GReward:§! §Y+284§! Energy & Unity."
 lucky_events.85.name:0 "Heroic Clerk"
 lucky_events.85.desc:0 "A low-ranking clerk catches a treaty error before signing, preserving valuable political leverage.\n\n§GReward:§! §Y+285§! Energy & Unity."
 lucky_events.86.name:0 "Popular Mandate"
 lucky_events.86.desc:0 "An unexpected wave of public approval gives leadership greater room to maneuver.\n\n§GReward:§! §Y+286§! Energy & Unity."
 lucky_events.87.name:0 "Diplomatic Favor Returned"
 lucky_events.87.desc:0 "A forgotten courtesy extended years ago is repaid at exactly the right moment.\n\n§GReward:§! §Y+287§! Energy & Unity."
 lucky_events.88.name:0 "Trade Convoy Shortcut"
 lucky_events.88.desc:0 "Merchant captains identify a safe shortcut through a normally inefficient route.\n\n§GReward:§! §Y+288§! Energy & Unity."
 lucky_events.89.name:0 "Market Confidence Surge"
 lucky_events.89.desc:0 "Several sectors report renewed investor confidence after a string of successful public works.\n\n§GReward:§! §Y+289§! Energy & Unity."
 lucky_events.90.name:0 "Frontier Toll Dividend"
 lucky_events.90.desc:0 "A frontier toll station collects years of unpaid transit fees after updating its beacon codes.\n\n§GReward:§! §Y+390§! Minerals & Engineering Research."
 lucky_events.91.name:0 "Lucky Auction Lot"
 lucky_events.91.desc:0 "A government buyer wins a mixed auction lot containing far more value than advertised.\n\n§GReward:§! §Y+391§! Minerals & Engineering Research."
 lucky_events.92.name:0 "Customs Inspection Prize"
 lucky_events.92.desc:0 "A routine customs inspection uncovers undeclared but legally forfeited goods.\n\n§GReward:§! §Y+392§! Minerals & Engineering Research."
 lucky_events.93.name:0 "Archaeologist's Hidden Cache"
 lucky_events.93.desc:0 "An archaeologist notices tool marks behind a collapsed wall and uncovers a valuable material cache.\n\n§GReward:§! §Y+393§! Minerals & Engineering Research."
 lucky_events.94.name:0 "Sealed Precursor Locker"
 lucky_events.94.desc:0 "A precursor-era locker opens after researchers identify a simple mechanical pattern.\n\n§GReward:§! §Y+394§! Minerals & Engineering Research."
 lucky_events.95.name:0 "Ruin Beneath the Ruin"
 lucky_events.95.desc:0 "Excavators discover that a known ruin was built over an even older storage chamber.\n\n§GReward:§! §Y+395§! Minerals & Engineering Research."
 lucky_events.96.name:0 "Lucky Stratigraphy"
 lucky_events.96.desc:0 "A dig trench cuts through the exact layer needed to reveal preserved industrial goods.\n\n§GReward:§! §Y+396§! Minerals & Engineering Research."
 lucky_events.97.name:0 "Ceremonial Vault"
 lucky_events.97.desc:0 "A ceremonial vault contains offerings made from materials still useful to modern industry.\n\n§GReward:§! §Y+397§! Minerals & Engineering Research."
 lucky_events.98.name:0 "Ancient Work Crew Stash"
 lucky_events.98.desc:0 "Archaeologists find a humble work crew stash containing tools, ingots, and repair supplies.\n\n§GReward:§! §Y+398§! Minerals & Engineering Research."
 lucky_events.99.name:0 "Forgotten Survey Shrine"
 lucky_events.99.desc:0 "A shrine maintained by extinct surveyors contains carefully preserved star charts and samples.\n\n§GReward:§! §Y+399§! Minerals & Engineering Research."
 lucky_events.100.name:0 "Cache Under Glass"
 lucky_events.100.desc:0 "A volcanic glass sheet protects a buried cache from corrosion for thousands of years.\n\n§GReward:§! §Y+400§! Minerals & Engineering Research."
 lucky_events.101.name:0 "Echoing Tomb Storehouse"
 lucky_events.101.desc:0 "A tomb complex includes a practical storehouse hidden behind ritual architecture.\n\n§GReward:§! §Y+401§! Minerals & Engineering Research."
