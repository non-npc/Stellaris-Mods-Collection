 dsi.167.name:0 "Case File #3738"
 dsi.167.desc:0 "§HThe Noise Complaint§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Residential / Unverified\n\nThe noise complaint at Civil security precinct should have been a clerical nuisance. Instead, it carried ink that matched no printer cartridge and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Voss:§! I do not like phenomena that understand office hours.\n\n§YOfficer Renn:§! Buildings do not forget. Databases do."
