 dsi.131.desc:0 "§HThe Evacuation Notice§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Supernatural Claim / Unconfirmed\n\nThe evacuation notice at Planetary archive should have been a clerical nuisance. Instead, it carried a budget code closed before colonization and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Renn:§! A clean scene is not automatically suspicious.\n\n§YOfficer Voss:§! It left manners where evidence should be."
