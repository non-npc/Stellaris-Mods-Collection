 dsi.log_and_file:0 "Log and File the Report"
 dsi.100.name:0 "Department Formation"
 dsi.100.desc:0 "The request arrived in a gray folder with no forwarding office, no listed author, and a coffee ring several clerks insist was not there this morning.\n\nIt recommends a small investigative body for occurrences that are real enough to generate paperwork, strange enough to alarm local authorities, and politically inconvenient enough that nobody wants ownership.\n\nTwo names are attached.\n\n§HSenior Incident Officer Mara Voss§!: imaginative, difficult, and repeatedly correct in ways that make her colleagues uncomfortable.\n\n§HSenior Incident Officer Elias Renn§!: methodical, severe, and currently on record describing Officer Voss as an argument wearing a coat.\n\nTheir proposed office title is simple: §YThe Department of Strange Incidents§!."
 dsi.100.a:0 "Approve the department. Quietly."
 dsi.102.name:0 "Case File #0333"
 dsi.102.desc:0 "§HThe Repeating Elevator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Administrative / Spatial\n\nAt Urban arcology block, the station clock briefly made room for a repeating elevator that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Voss:§! We are looking at the shadow of an action, not the action.\n\n§YOfficer Renn:§! Then we document the shadow and wait."
 dsi.103.name:0 "Case File #1370"
 dsi.103.desc:0 "§HThe Additional Apartment§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Infrastructure / Anomalous\n\nInspectors at Municipal records office found an additional apartment with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a bed made with regulation corners. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! This feels like a confession written by a room.\n\n§YOfficer Renn:§! Buildings do not forget. Databases do."
 dsi.104.name:0 "Case File #1407"
 dsi.104.desc:0 "§HThe Empty Office§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Transit / Temporal\n\nThe empty office drew attention at Frontier transit hub because the work around it continued after the assigned staff went home. Investigators found a chair pushed in with excessive care. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent.\n\n§YOfficer Voss:§! It is too tidy. Strange things should not be this tidy."
 dsi.105.name:0 "Case File #1444"
 dsi.105.desc:0 "§HThe Night Clerk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Records / Identity\n\nThe night clerk drew attention at Orbital administration annex because the work around it continued after the assigned staff went home. Investigators found a chair pushed in with excessive care. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Renn:§! Inconvenience is our safest classification for now.\n\n§YOfficer Voss:§! It is quiet because it knows we are listening."
 dsi.106.name:0 "Case File #1481"
 dsi.106.desc:0 "§HThe Closed Platform§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Security / Access\n\nAt Colony maintenance bureau, the departure board briefly made room for a closed platform that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Voss:§! I know bait when it has a filing number.\n\n§YOfficer Renn:§! Please do not interrogate the architecture."
 dsi.107.name:0 "Case File #1518"
 dsi.107.desc:0 "§HThe Visitor Badge§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Residential / Unverified\n\nReview footage from Civil security precinct revealed a visitor badge that the original operator swears was absent. The figure is standing where the room has no floor space. Backup media now contain a pale gap in the same location, as if the archive remembered to leave room.\n\n§YOfficer Voss:§! Something here understands witnesses.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent."
 dsi.108.name:0 "Case File #1555"
 dsi.108.desc:0 "§HThe Door That Opened Inward§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Archive / Documentary\n\nInspectors at Habitation tower found a door that opened inward with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a warm cup on the counter. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does."
 dsi.109.name:0 "Case File #1592"
 dsi.109.desc:0 "§HThe Window on Floor Twelve§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Communications / Unexplained\n\nWindow on floor twelve drew attention at Research station logistics wing because the work around it continued after the assigned staff went home. Investigators found a terminal already logged into a retired account. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Your threshold for panic is not departmental policy."
 dsi.110.name:0 "Case File #1629"
 dsi.110.desc:0 "§HThe Maintenance Request§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Maintenance / Structural\n\nThe Maintenance Request reached DSI from Port authority terminal with a supervisor who remembers signing nothing and everything. Nothing was damaged, stolen, or openly threatened. That absence became the evidence: each ordinary explanation accounted for the event by deleting a different part of it.\n\n§YOfficer Renn:§! Details do not behave. Records persist.\n\n§YOfficer Voss:§! The witnesses keep describing the absence before the event."
 dsi.111.name:0 "Case File #1666"
 dsi.111.desc:0 "§HThe Commuter§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Civilian Report / Low Risk\n\nAt Planetary archive, the departure board briefly made room for a commuter that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! Your threshold for panic is not departmental policy."
 dsi.112.name:0 "Case File #1703"
 dsi.112.desc:0 "§HThe Quiet Ward§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Medical / Witness Reliability\n\nInspectors at Public housing agency found a quiet ward with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a bed made with regulation corners. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! Something here understands witnesses.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent."
 dsi.113.name:0 "Case File #1740"
 dsi.113.desc:0 "§HThe Duplicate Keycard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Logistics / Manifest\n\nSecurity at District infrastructure office flagged a duplicate keycard after it authenticated under a badge number reserved for training. The physical credential was later recovered from a locked evidence drawer, already tagged with DSI case tape. No officer admits placing it there, though the handwriting is familiar.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.114.name:0 "Case File #1777"
 dsi.114.desc:0 "§HThe Unlisted Corridor§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Scientific Review / Inconclusive\n\nThe report from Medical intake center centers on an unlisted corridor that appeared only when approached with a witness present. Survey equipment recorded directory arrows pointing to dissolved offices. When the team returned alone, the route was gone, though dust on the floor still showed where several people had turned back.\n\n§YOfficer Voss:§! I think the building is trying to forget out loud.\n\n§YOfficer Renn:§! A clean scene is not automatically suspicious."
 dsi.115.name:0 "Case File #1814"
 dsi.115.desc:0 "§HThe Late Train§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Public Safety / Contained\n\nAt Customs checkpoint, the departure board briefly made room for a late train that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Voss:§! Someone wanted this noticed, but not understood.\n\n§YOfficer Renn:§! Absence is difficult to cite in a formal report."
 dsi.116.name:0 "Case File #1851"
 dsi.116.desc:0 "§HThe Missing Tenant§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Supernatural Claim / Unconfirmed\n\nInspectors at Commercial concourse found a missing tenant with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a warm cup on the counter. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Please do not interrogate the architecture."
 dsi.117.name:0 "Case File #1888"
 dsi.117.desc:0 "§HThe After-Hours Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Administrative / Spatial\n\nCommunications at Terraforming oversight station logged an after-hours call that behaved like an internal notice but originated nowhere inside the network. Analysts isolated an automated apology in a living voice. The recording ends with a pause long enough for a reply, followed by a quiet thank you no operator remembers giving.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does.\n\n§YOfficer Voss:§! The details keep behaving after the people leave."
 dsi.118.name:0 "Case File #1925"
 dsi.118.desc:0 "§HThe Fourth Signature§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Infrastructure / Anomalous\n\nThe fourth signature at Subsurface service network should have been a clerical nuisance. Instead, it carried a budget code closed before colonization and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Renn:§! Office hours are when offices are occupied.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.119.name:0 "Case File #1962"
 dsi.119.desc:0 "§HThe Basement Stairwell§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Transit / Temporal\n\nThe report from Education district centers on a basement stairwell that appeared only when approached with a witness present. Survey equipment recorded air pressure readings from an impossible volume. When the team returned alone, the route was gone, though dust on the floor still showed where several people had turned back.\n\n§YOfficer Renn:§! Then we document the shadow and wait.\n\n§YOfficer Voss:§! The details keep behaving after the people leave."
 dsi.120.name:0 "Case File #1999"
 dsi.120.desc:0 "§HThe Archived Complaint§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Records / Identity\n\nThe archived complaint at Museum storage wing should have been a clerical nuisance. Instead, it carried a timestamp six minutes ahead of the local clock and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Renn:§! A clean scene is not automatically suspicious.\n\n§YOfficer Voss:§! The details keep behaving after the people leave."
 dsi.121.name:0 "Case File #2036"
 dsi.121.desc:0 "§HThe Survey Marker§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Security / Access\n\nArchivists at Survey vessel records room found a survey marker sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included a margin note in an obsolete hand. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Please do not interrogate the architecture."
 dsi.122.name:0 "Case File #2073"
 dsi.122.desc:0 "§HThe Name in the Ledger§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Residential / Unverified\n\nArchivists at Urban arcology block found a name in the ledger sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included pagination that made the surrounding archive longer. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Voss:§! Something here understands witnesses.\n\n§YOfficer Renn:§! Manners are not evidence, but I admit they are unusual."
 dsi.123.name:0 "Case File #2110"
 dsi.123.desc:0 "§HThe Patient Who Checked Out§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Archive / Documentary\n\nMedical staff at Municipal records office escalated a patient who checked out after routine records produced a discharge form signed before admission. Every witness recalls a cooperative subject and no one recalls a face. The interview transcript remains legible except for the name, which has been gently corrected to sorry.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does."
 dsi.124.name:0 "Case File #2147"
 dsi.124.desc:0 "§HThe Office Light§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Communications / Unexplained\n\nThe office light drew attention at Frontier transit hub because the work around it continued after the assigned staff went home. Investigators found fresh fingerprints on a dustless inbox. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does.\n\n§YOfficer Voss:§! The silence around it is doing work."
 dsi.125.name:0 "Case File #2184"
 dsi.125.desc:0 "§HThe Returned Package§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Maintenance / Structural\n\nLogistics at Orbital administration annex received a returned package with clean seals, complete tracking, and no dispatch origin. The container held padding cut to fit an object that was not inside. When staff tried to reject the delivery, the system marked it accepted yesterday and thanked them for their promptness.\n\n§YOfficer Renn:§! Then we document the shadow and wait.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.126.name:0 "Case File #2221"
 dsi.126.desc:0 "§HThe Witness on Camera§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Civilian Report / Low Risk\n\nReview footage from Colony maintenance bureau revealed a witness on camera, a figure the original operator swears was absent. The figure is standing where the room has no floor space. Backup media now contain a pale gap in the same location, as if the archive remembered to leave room.\n\n§YOfficer Voss:§! We are looking at the shadow of an action, not the action.\n\n§YOfficer Renn:§! Then we document the shadow and wait."
 dsi.127.name:0 "Case File #2258"
 dsi.127.desc:0 "§HThe Locked Conference Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Medical / Witness Reliability\n\nInspectors at Civil security precinct found a locked conference room with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was fresh laundry still moving in the air system. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Renn:§! Buildings do not forget. Databases do.\n\n§YOfficer Voss:§! It is quiet because it knows we are listening."
