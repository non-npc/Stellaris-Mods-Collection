 dsi.276.desc:0 "§HThe Service Window§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Civilian Report / Low Risk\n\nService window drew attention at Commercial concourse because the work around it continued after the assigned staff went home. Investigators found a terminal already logged into a retired account. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Voss:§! Someone wanted this noticed, but not understood.\n\n§YOfficer Renn:§! Listening is not yet a proven causal factor."
 dsi.277.name:0 "Case File #7808"
 dsi.277.desc:0 "§HThe Dry Fountain§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Medical / Witness Reliability\n\nEnvironmental monitors at Terraforming oversight station registered a dry fountain as a harmless anomaly until witnesses began reporting footfalls that stopped whenever counted aloud. The readings never crossed a safety threshold. They did, however, arrange themselves into a pattern maintenance staff refuse to hum twice.\n\n§YOfficer Renn:§! That phrase will not survive review.\n\n§YOfficer Voss:§! No one panicked, which is usually when I start."
 dsi.278.name:0 "Case File #7845"
 dsi.278.desc:0 "§HThe Overnight Audit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Logistics / Manifest\n\nThe overnight audit at Subsurface service network should have been a clerical nuisance. Instead, it carried a budget code closed before colonization and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Renn:§! Office hours are when offices are occupied.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.279.name:0 "Case File #7882"
 dsi.279.desc:0 "§HThe Mail Slot§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Scientific Review / Inconclusive\n\nCommunications at Education district logged a mail slot that behaved like an internal notice but originated nowhere inside the network. Analysts isolated a routing number with too many digits. The recording ends with a pause long enough for a reply, followed by a quiet thank you no operator remembers giving.\n\n§YOfficer Renn:§! Manners are not evidence, but I admit they are unusual.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.280.name:0 "Case File #7919"
 dsi.280.desc:0 "§HThe Supply Requisition§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Public Safety / Contained\n\nThe supply requisition at Museum storage wing should have been a clerical nuisance. Instead, it carried three approvals from one absent supervisor and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Voss:§! Someone wanted this noticed, but not understood.\n\n§YOfficer Renn:§! We will not classify neatness as hostile intent."
 dsi.281.name:0 "Case File #7956"
 dsi.281.desc:0 "§HThe Unauthorized Meeting§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Supernatural Claim / Unconfirmed\n\nUnauthorized meeting drew attention at Survey vessel records room because the work around it continued after the assigned staff went home. Investigators found coffee cooling beside a blank requisition. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Voss:§! This feels like a confession written by a room.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent."
 dsi.282.name:0 "Case File #7993"
 dsi.282.desc:0 "§HThe Quiet House§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Administrative / Spatial\n\nInspectors at Urban arcology block found a quiet house with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a warm cup on the counter. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! A filing number is not bait. Usually."
 dsi.283.name:0 "Case File #8030"
 dsi.283.desc:0 "§HThe Missing Page§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Infrastructure / Anomalous\n\nArchivists at Municipal records office found a missing page sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included a seal not used for forty years. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Renn:§! Adjustment implies intent. Use altered.\n\n§YOfficer Voss:§! A mistake repeats. This adjusted."
 dsi.284.name:0 "Case File #8067"
 dsi.284.desc:0 "§HThe Late Elevator Operator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Transit / Temporal\n\nAt Frontier transit hub, the maintenance lift briefly made room for a late elevator operator that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Renn:§! Office hours are when offices are occupied.\n\n§YOfficer Voss:§! No one panicked, which is usually when I start."
 dsi.285.name:0 "Case File #8104"
 dsi.285.desc:0 "§HThe Old Ticket Booth§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Records / Identity\n\nAt Orbital administration annex, the station clock briefly made room for an old ticket booth that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Voss:§! Something here understands witnesses.\n\n§YOfficer Renn:§! Adjustment implies intent. Use altered."
 dsi.286.name:0 "Case File #8141"
 dsi.286.desc:0 "§HThe Negative Space§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Security / Access\n\nThe report from Colony maintenance bureau centers on a negative space that appeared only when approached with a witness present. Survey equipment recorded air pressure readings from an impossible volume. When the team returned alone, the route was gone, though dust on the floor still showed where several people had turned back.\n\n§YOfficer Renn:§! Please do not interrogate the architecture.\n\n§YOfficer Voss:§! The witnesses keep describing the absence before the event."
 dsi.287.name:0 "Case File #8178"
 dsi.287.desc:0 "§HThe Witness Who Apologized§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Residential / Unverified\n\nReview footage from Civil security precinct revealed a witness who apologized, a figure the original operator swears was absent. The figure is wearing an access badge printed with tomorrow's date. Backup media now contain a pale gap in the same location, as if the archive remembered to leave room.\n\n§YOfficer Renn:§! That phrase will not survive review.\n\n§YOfficer Voss:§! It left manners where evidence should be."
 dsi.288.name:0 "Case File #8215"
 dsi.288.desc:0 "§HThe Room Behind the Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Archive / Documentary\n\nInspectors at Habitation tower found a room behind the room, complete with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was fresh laundry still moving in the air system. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Renn:§! Adjustment implies intent. Use altered.\n\n§YOfficer Voss:§! It is too tidy. Strange things should not be this tidy."
 dsi.289.name:0 "Case File #8252"
 dsi.289.desc:0 "§HThe Weathered Plaque§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Communications / Unexplained\n\nArchivists at Research station logistics wing found a weathered plaque sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included a margin note in an obsolete hand. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Please do not interrogate the architecture."
 dsi.290.name:0 "Case File #8289"
 dsi.290.desc:0 "§HThe Incomplete Census§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Maintenance / Structural\n\nArchivists at Port authority terminal found an incomplete census sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included cross-references to cases not yet opened. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Renn:§! Manners are not evidence, but I admit they are unusual.\n\n§YOfficer Voss:§! The details keep behaving after the people leave."
 dsi.291.name:0 "Case File #8326"
 dsi.291.desc:0 "§HThe Last Light On§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Civilian Report / Low Risk\n\nEnvironmental monitors at Planetary archive registered the last light left on as a harmless anomaly until witnesses began reporting sound without vibration. The readings never crossed a safety threshold. They did, however, arrange themselves into a pattern maintenance staff refuse to hum twice.\n\n§YOfficer Voss:§! I would be less worried if it had made a mess.\n\n§YOfficer Renn:§! Absence is difficult to cite in a formal report."
 dsi.292.name:0 "Case File #8363"
 dsi.292.desc:0 "§HThe Long-Distance Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Medical / Witness Reliability\n\nCommunications at Public housing agency logged a long-distance call that behaved like an internal notice but originated nowhere inside the network. Analysts isolated a routing number with too many digits. The recording ends with a pause long enough for a reply, followed by a quiet thank you no operator remembers giving.\n\n§YOfficer Renn:§! A filing number is not bait. Usually.\n\n§YOfficer Voss:§! Whatever this is, it has learned to pass as inconvenience."
 dsi.293.name:0 "Case File #8400"
 dsi.293.desc:0 "§HThe Office That Answered§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Logistics / Manifest\n\nOffice that answered drew attention at District infrastructure office because the work around it continued after the assigned staff went home. Investigators found a terminal already logged into a retired account. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Witness management is a known mundane behavior."
 dsi.294.name:0 "Case File #8437"
 dsi.294.desc:0 "§HThe Closed File§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Scientific Review / Inconclusive\n\nArchivists at Medical intake center found a closed file sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included cross-references to cases not yet opened. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Renn:§! Please do not interrogate the architecture.\n\n§YOfficer Voss:§! The witnesses keep describing the absence before the event."
 dsi.295.name:0 "Case File #8474"
 dsi.295.desc:0 "§HThe Key That Fit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Public Safety / Contained\n\nSecurity at Customs checkpoint flagged a key that fit the lock after it left no failed attempts before success. The physical credential was later recovered from a locked evidence drawer, already tagged with DSI case tape. No officer admits placing it there, though the handwriting is familiar.\n\n§YOfficer Voss:§! This feels like a confession written by a room.\n\n§YOfficer Renn:§! Details do not behave. Records persist."
 dsi.296.name:0 "Case File #8511"
 dsi.296.desc:0 "§HThe Timecard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Supernatural Claim / Unconfirmed\n\nThe timecard at Commercial concourse should have been a clerical nuisance. Instead, it carried three approvals from one absent supervisor and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! Office hours are when offices are occupied."
 dsi.297.name:0 "Case File #8548"
 dsi.297.desc:0 "§HThe Apartment With Music§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Administrative / Spatial\n\nInspectors at Terraforming oversight station found an apartment with music playing and every sign of recent use and no durable proof that anyone had been there. The strongest evidence was fresh laundry still moving in the air system. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Renn:§! Then we document the shadow and wait.\n\n§YOfficer Voss:§! A mistake repeats. This adjusted."
 dsi.298.name:0 "Case File #8585"
 dsi.298.desc:0 "§HThe Unknown Extension§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Infrastructure / Anomalous\n\nCommunications at Subsurface service network logged an unknown extension that behaved like an internal notice but originated nowhere inside the network. Analysts isolated a routing number with too many digits. The recording ends with a pause long enough for a reply, followed by a quiet thank you no operator remembers giving.\n\n§YOfficer Renn:§! Listening is not yet a proven causal factor.\n\n§YOfficer Voss:§! It is quiet because it knows we are listening."
 dsi.299.name:0 "Case File #8622"
 dsi.299.desc:0 "§HThe Silent Alarm§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Transit / Temporal\n\nCommunications at Education district logged a silent alarm that behaved like an internal notice but originated nowhere inside the network. Analysts isolated a caller who used yesterday's security phrase. The recording ends with a pause long enough for a reply, followed by a quiet thank you no operator remembers giving.\n\n§YOfficer Voss:§! Someone wanted this noticed, but not understood.\n\n§YOfficer Renn:§! We will not classify neatness as hostile intent."
 dsi.300.name:0 "Case File #8659"
 dsi.300.desc:0 "§HThe Third Reflection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Records / Identity\n\nReview footage from Museum storage wing revealed a third reflection that the original operator swears was absent. The figure is turning toward the viewer between frames. Backup media now contain a pale gap in the same location, as if the archive remembered to leave room.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Please do not interrogate the architecture."
 dsi.301.name:0 "Case File #8696"
 dsi.301.desc:0 "§HThe Inspection Stamp§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Security / Access\n\nThe inspection stamp at Survey vessel records room should have been a clerical nuisance. Instead, it carried a timestamp six minutes ahead of the local clock and passed every automated check. Attempts to void it generated replacement copies with cleaner metadata and increasingly stern reminders to complete the process.\n\n§YOfficer Renn:§! Details do not behave. Records persist.\n\n§YOfficer Voss:§! The witnesses keep describing the absence before the event."
