 dsi.142.desc:0 "§HThe Unclaimed Coat§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Medical / Witness Reliability\n\nThe Unclaimed Coat reached DSI from Urban arcology block with too much agreement between witnesses. Nothing was damaged, stolen, or openly threatened. That absence became the evidence: each ordinary explanation accounted for the event by deleting a different part of it.\n\n§YOfficer Voss:§! I would be less worried if it had made a mess.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent."
