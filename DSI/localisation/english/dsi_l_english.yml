 dsi.235.desc:0 "§HThe Office Renovation§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Public Safety / Contained\n\nOffice renovation drew attention at Customs checkpoint because the work around it continued after the assigned staff went home. Investigators found coffee cooling beside a blank requisition. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Voss:§! Something here understands witnesses.\n\n§YOfficer Renn:§! Then we document the shadow and wait."
