 dsi.237.name:0 "Case File #6328"
 dsi.237.desc:0 "§HThe Transit Map§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Administrative / Spatial\n\nAt Terraforming oversight station, the maintenance lift briefly made room for a transit map that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent.\n\n§YOfficer Voss:§! The ordinary explanation is sweating."
