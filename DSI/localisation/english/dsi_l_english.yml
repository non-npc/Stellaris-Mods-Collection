 dsi.153.name:0 "Case File #3220"
 dsi.153.desc:0 "§HThe Spare Office§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Archive / Documentary\n\nThe spare office drew attention at District infrastructure office because the work around it continued after the assigned staff went home. Investigators found a chair pushed in with excessive care. The next morning, all traces were gone except a completed task in the departmental queue, marked done by an employee number never issued.\n\n§YOfficer Renn:§! Listening is not yet a proven causal factor.\n\n§YOfficer Voss:§! It is quiet because it knows we are listening."
