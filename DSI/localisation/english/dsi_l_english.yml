 dsi.140.desc:0 "§HThe Wrong Reflection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Maintenance / Structural\n\nReview footage from Museum storage wing revealed a wrong reflection that the original operator swears was absent. The figure is turning toward the viewer between frames. Backup media now contain a pale gap in the same location, as if the archive remembered to leave room.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Office hours are when offices are occupied."
 dsi.141.name:0 "Case File #2776"
 dsi.141.desc:0 "§HThe Supply Closet§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Civilian Report / Low Risk\n\nLogistics at Survey vessel records room received a supply closet with clean seals, complete tracking, and no dispatch origin. The container held a receipt signed in the recipient's handwriting. When staff tried to reject the delivery, the system marked it accepted yesterday and thanked them for their promptness.\n\n§YOfficer Renn:§! Inconvenience is our safest classification for now.\n\n§YOfficer Voss:§! The witnesses keep describing the absence before the event."
