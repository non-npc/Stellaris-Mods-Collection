 dsi.193.name:0 "Case File #4700"
 dsi.193.desc:0 "§HThe Quiet Classroom§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Infrastructure / Anomalous\n\nInspectors at District infrastructure office found a quiet classroom with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was a warm cup on the counter. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Voss:§! The paperwork is not wrong. That is the problem.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does."
 dsi.194.name:0 "Case File #4737"
 dsi.194.desc:0 "§HThe Returned Survey Probe§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Transit / Temporal\n\nArchivists at Medical intake center found a returned survey probe sitting exactly where policy said it belonged, which made its nonexistence harder to explain. The entry included cross-references to cases not yet opened. Removing it only caused the catalog to rebuild around the gap by morning.\n\n§YOfficer Renn:§! Then we document the shadow and wait.\n\n§YOfficer Voss:§! The silence around it is doing work."
