 dsi.139.name:0 "Case File #2702"
 dsi.139.desc:0 "§HThe Service Elevator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Communications / Unexplained\n\nAt Education district, the route ledger briefly made room for a service elevator that no schedule admitted. Witnesses remember different destinations, but all remember the same soft chime before the entry vanished. Transit control can prove the system never accepted the route; the printed delay notice proves otherwise.\n\n§YOfficer Renn:§! Correct paperwork can still be fraudulent.\n\n§YOfficer Voss:§! It is too tidy. Strange things should not be this tidy."
