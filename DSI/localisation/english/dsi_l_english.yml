 dsi.128.desc:0 "§HThe Address That Moved§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Logistics / Manifest\n\nThe Address That Moved reached DSI from Habitation tower with too much agreement between witnesses. Nothing was damaged, stolen, or openly threatened. That absence became the evidence: each ordinary explanation accounted for the event by deleting a different part of it.\n\n§YOfficer Voss:§! I know bait when it has a filing number.\n\n§YOfficer Renn:§! Witness management is a known mundane behavior."
