 dsi.143.desc:0 "§HThe Parking Level§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Logistics / Manifest\n\nThe Parking Level reached DSI from Municipal records office with equipment that failed only while watched. Nothing was damaged, stolen, or openly threatened. That absence became the evidence: each ordinary explanation accounted for the event by deleting a different part of it.\n\n§YOfficer Renn:§! Adjustment implies intent. Use altered.\n\n§YOfficer Voss:§! It is too tidy. Strange things should not be this tidy."
