 dsi.145.desc:0 "§HThe Room With Two Numbers§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Public Safety / Contained\n\nInspectors at Orbital administration annex found a room with two numbers with every sign of recent use and no durable proof that anyone had been there. The strongest evidence was fresh laundry still moving in the air system. By the second visit, the doorway had become a section of ordinary wall and the access log politely denied ever opening.\n\n§YOfficer Renn:§! Silence does not do work. Staff avoiding paperwork does.\n\n§YOfficer Voss:§! A mistake repeats. This adjusted."
