 dsi.168.desc:0 "§HThe Patient Bracelet§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Archive / Documentary\n\nMedical staff at Habitation tower escalated a patient bracelet after routine records produced a discharge form signed before admission. Every witness recalls a cooperative subject and no one recalls a face. The interview transcript remains legible except for the name, which has been gently corrected to sorry.\n\n§YOfficer Voss:§! There is a person-shaped hole in this report.\n\n§YOfficer Renn:§! Witness management is a known mundane behavior."
