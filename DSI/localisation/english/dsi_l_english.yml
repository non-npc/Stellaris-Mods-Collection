 dsi.log_and_file:0 "Log and File the Report"
 dsi.100.name:0 "Department Formation"
 dsi.100.desc:0 "The request arrived in a gray folder with no forwarding office, no listed author, and a coffee ring several clerks insist was not there this morning.\n\nIt recommends a small investigative body for occurrences that are real enough to generate paperwork, strange enough to alarm local authorities, and politically inconvenient enough that nobody wants ownership.\n\nTwo names are attached.\n\n§HSenior Incident Officer Mara Voss§!: imaginative, difficult, and repeatedly correct in ways that make her colleagues uncomfortable.\n\n§HSenior Incident Officer Elias Renn§!: methodical, severe, and currently on record describing Officer Voss as an argument wearing a coat.\n\nTheir proposed office title is simple: §YThe Department of Strange Incidents§!."
 dsi.100.a:0 "Approve the department. Quietly."
 dsi.102.name:0 "Case File #0333"
 dsi.102.desc:0 "§HThe Vanishing Elevator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Administrative / Spatial\n\nResidents of an arcology tower reported an elevator that began stopping at floor 41-B, a level absent from every building plan. Passengers described a clean corridor, old signage, and a reception desk with no attendant. Security sealed the elevator bank for inspection; during the lockdown, the 41-B button vanished from the panel, and the car's route logs renumbered themselves as if the stop had never existed.\n\nOne maintenance worker left a tool bag in the corridor before the inspection. It was returned the next morning, neatly tagged with an obsolete department seal.\n\n§YOfficer Voss:§! It did not repeat. It invited people in, then pretended it had not.\n\n§YOfficer Renn:§! That is worse, and I would prefer you not sound pleased."
 dsi.103.name:0 "Case File #1370"
 dsi.103.desc:0 "§HThe Additional Apartment§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Infrastructure / Anomalous\n\nA municipal clerk found an extra apartment listed between units 8842 and 8844, complete with tax history, utility payments, and three noise complaints. The building inspector confirmed that no such unit exists on the tower's plans. When officers visited the address, however, the hallway contained a narrow door marked 8843. Inside were warm lights, a half-folded blanket, and a kettle still ticking as it cooled.\n\nThe door was gone when they returned with the building manager. The records office still receives rent receipts for the unit every month, always paid in exact change.\n\n§YOfficer Renn:§! A false record should not have a payment history.\n\n§YOfficer Voss:§! And an imaginary tenant should not complain about the neighbors."
 dsi.104.name:0 "Case File #1407"
 dsi.104.desc:0 "§HThe Empty Office§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Facility / Occupancy\n\nMaintenance staff repeatedly reported signs of regular use within an office assigned to no department and listed on no current floor plan. The desk remained organized, fresh beverages appeared each morning, and incoming documents were neatly sorted into trays overnight.\n\nDespite this, the room was always found empty.\n\nSecurity recordings showed employees occasionally stopping at the doorway to exchange brief conversations with someone inside. The footage consistently revealed an unoccupied room.\n\nWhen administrators sealed the office, paperwork from several departments began appearing beneath the locked door, correctly completed and bearing notes in handwriting that matched no known employee.\n\nThe room remains unassigned. Staff have informally resumed leaving work there.\n\n§YOfficer Renn:§! The office is either occupied by nobody or staffed by someone remarkably difficult to schedule a meeting with.\n\n§YOfficer Voss:§! Whatever works there appears deeply committed to administrative excellence. I recommend promotion."
 dsi.105.name:0 "Case File #1444"
 dsi.105.desc:0 "§HThe Night Clerk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Records / Identity\n\nStaff at Orbital Administration Annex began referring routine questions to the night clerk during overnight shifts. According to employee statements, the clerk was courteous, knowledgeable, and unusually efficient. Several workers recalled receiving directions, procedural advice, and corrected paperwork directly from them.\n\nThe difficulty arose when management attempted to identify the employee.\n\nNo hiring records, payroll entries, access credentials, or workstation assignments could be found. Security footage consistently showed staff approaching an unattended service desk, pausing briefly, and then departing as if a conversation had taken place.\n\nDespite the absence of any documented employee, work completed during night shifts showed a measurable reduction in clerical errors and processing delays.\n\nThe break room mug labeled \"Night Clerk\" remains in regular use. No witness has been able to identify who uses it.\n\n§YOfficer Renn:§! The annex operates more efficiently when nobody investigates the matter.\n\n§YOfficer Voss:§! If an employee can perform their duties without existing, administration may consider it a budgetary success."
 dsi.106.name:0 "Case File #1481"
 dsi.106.desc:0 "§HThe Closed Platform§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Security / Access\n\nPlatform Seventeen was permanently closed following a structural inspection and removed from all public transit schedules. Access doors were sealed, power disconnected, and warning barriers installed.\n\nSeveral months later, transit personnel began receiving passenger complaints regarding missed departures from the platform.\n\nNo departure information appeared on station displays. However, employees discovered that certain arrival notices could be seen reflected in nearby glass panels. The reflected text consistently announced services departing from Platform Seventeen.\n\nSecurity recordings show occasional individuals waiting outside the sealed access doors. Most leave after several minutes. A small number are observed entering when the doors open briefly despite having no power source.\n\nNo footage has ever captured anyone leaving.\n\n§YOfficer Voss:§! People continue arriving for trains that do not officially exist. The troubling part is that some appear to know the schedule.\n\n§YOfficer Renn:§! A closed platform is a maintenance issue. A platform that disagrees is somebody else's department."
 dsi.107.name:0 "Case File #1518"
 dsi.107.desc:0 "§HThe Visitor Badge§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Security / Access\n\nA visitor badge was recovered during a routine security audit after appearing repeatedly in access logs across multiple government facilities. Records showed the badge entering offices, archives, maintenance corridors, and restricted service areas over a period of several months.\n\nThe problem is that no physical scan of the badge has ever succeeded.\n\nElectronic systems consistently recognize the badge as valid and associate it with an authorized visitor. Physical scanners, however, register only an unencoded piece of plastic containing no data whatsoever.\n\nAttempts to revoke the badge have been unsuccessful. The access permissions disappear from one system and reappear in another within several days.\n\nNo individual claiming ownership has been identified.\n\n§YOfficer Renn:§! The badge behaves less like forged credentials and more like an administrative assumption.\n\n§YOfficer Voss:§! Somewhere, something has discovered that appearing on the correct form is often enough."
 dsi.108.name:0 "Case File #1555"
 dsi.108.desc:0 "§HThe Door That Opened Inward§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Structural / Spatial\n\nResidents reported a door appearing at the end of a service corridor where no doorway existed on any building plans. Witnesses described furnished rooms beyond it despite the wall containing no interior space.\n\nMaintenance arrived the following day to find only a blank wall and a welcome mat positioned neatly against the baseboard.\n\nThe door has not reappeared.\n\n§YOfficer Voss:§! Whatever was on the other side seemed quite comfortable.\n\n§YOfficer Renn:§! Then it can remain wherever it went."
 dsi.109.name:0 "Case File #1592"
 dsi.109.desc:0 "§HThe Window on Floor Twelve§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Observation / Unexplained\n\nStaff reported a window appearing on Floor Twelve overlooking a cityscape. The station possesses neither a Floor Twelve nor an exterior view capable of producing the scene.\n\nThe window remained visible for three days before vanishing. Several employees insist the lights in the distant buildings changed in response to being watched.\n\n§YOfficer Voss:§! The unsettling part is that somebody appeared to be looking back.\n\n§YOfficer Renn:§! I dislike being observed by architecture."
 dsi.110.name:0 "Case File #1629"
 dsi.110.desc:0 "§HThe Maintenance Request§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Maintenance / Structural\n\nA routine maintenance request was submitted regarding a damaged corridor wall in Port Authority Terminal. The request included photographs, repair notes, and approval signatures from three departments.\n\nNo such corridor exists.\n\nInvestigators confirmed that the listed location has never appeared on any station plans. Despite this, additional maintenance requests concerning the same corridor continue to arrive at regular intervals.\n\n§YOfficer Renn:§! Someone is attempting to maintain a place that does not exist.\n\n§YOfficer Voss:§! Given the persistence, I suspect the place disagrees."
 dsi.111.name:0 "Case File #1666"
 dsi.111.desc:0 "§HThe Commuter§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Civilian Report / Low Risk\n\nTransit schedules periodically list a commuter service that does not exist. The route includes berth assignments, departure times, and delay notices from an operator absent from all employment records.\n\nSeveral citizens have reported waiting for the service. None can recall boarding it, though some insist they arrived at destinations they do not remember traveling to.\n\n§YOfficer Renn:§! A transit service should be easier to verify than this.\n\n§YOfficer Voss:§! Apparently not if it keeps arriving on schedule."
 dsi.112.name:0 "Case File #1703"
 dsi.112.desc:0 "§HThe Quiet Ward§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Medical / Witness Reliability\n\nResidents repeatedly reported a medical ward operating in an unused section of a housing complex. Witnesses described staff, patients, and ongoing treatment, but every inspection found the area empty.\n\nSeveral individuals later claimed to remember receiving care there despite no record of admission.\n\n§YOfficer Renn:§! An undocumented clinic is concerning. An undocumented clinic with former patients is worse.\n\n§YOfficer Voss:§! Whatever is running it appears committed to public service."
 dsi.113.name:0 "Case File #1740"
 dsi.113.desc:0 "§HThe Duplicate Keycard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Logistics / Manifest\n\nThe report from District infrastructure office concerns the duplicate keycard, not the paperwork around it. The duplicate keycard passed every reader in District infrastructure office despite containing no readable data. It opened one restricted door, waited eleven seconds in the access log, and then signed itself out through a different exit.\n\n§YOfficer Renn:§! Permission remains a system state, not a motive.\n\n§YOfficer Voss:§! A lock does not get embarrassed unless something taught it how."
 dsi.114.name:0 "Case File #1777"
 dsi.114.desc:0 "§HThe Unlisted Corridor§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Scientific Review / Inconclusive\n\nOrderlies at the medical intake center began using a short side corridor between triage and records. It saved forty-seven steps, smelled faintly of antiseptic, and contained a wall directory for wards the facility does not have. The corridor appears on no floor plan, but staff insist it has always been there.\n\nWhen Voss and Renn arrived, the corridor was gone. The wall was solid, though a directional sign still pointed toward §YRecovery Annex C§!.\n\n§YOfficer Renn:§! There is no Recovery Annex C.\n\n§YOfficer Voss:§! Then it is recovering somewhere very discreet."
 dsi.115.name:0 "Case File #1814"
 dsi.115.desc:0 "§HThe Late Train§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Public Safety / Contained\n\nDSI opened the file when the late train stopped being a complaint and became a thing people could point to. Maintenance found wear marks, warm railings, and fresh dust patterns where the late train should have been impossible to board. No vehicle arrived, but several people remember getting off.\n\n§YOfficer Voss:§! It did not go nowhere. It went somewhere that refused to stay mapped.\n\n§YOfficer Renn:§! A destination is not established by witness anxiety."
 dsi.116.name:0 "Case File #1851"
 dsi.116.desc:0 "§HThe Missing Tenant§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Residential / Occupancy\n\nResidents of a commercial housing block regularly refer to a tenant in Unit 314. Neighbors report conversations in the hallway, noise complaints, and occasional deliveries left outside the door.\n\nThe difficulty is that Unit 314 has been vacant for six years.\n\nMaintenance records show normal utility consumption. Packages addressed to the occupant disappear overnight. No witness has been able to provide a name.\n\n§YOfficer Renn:§! A tenant should be easier to locate than the apartment.\n\n§YOfficer Voss:§! Whatever lives there has mastered the art of keeping to itself."
 dsi.117.name:0 "Case File #1888"
 dsi.117.desc:0 "§HThe After-Hours Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Communications / Administrative\n\nStation personnel received an after-hours call on an internal support line outside scheduled operating periods. The caller identified a developing equipment fault, provided corrective instructions, and disconnected.\n\nThe recommended repairs prevented a malfunction reported at the start of the following shift.\n\nThe voice used proper station procedures and referenced current maintenance records. No source for the call has been identified.\n\n§YOfficer Voss:§! Helpful, informed, and impossible to return. Someone is setting unrealistic standards.\n\n§YOfficer Renn:§! The problem with future warnings is that they eventually become current events."
 dsi.118.name:0 "Case File #1925"
 dsi.118.desc:0 "§HThe Fourth Signature§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Administrative / Authorization\n\nMaintenance work orders within the Subsurface Service Network require three approval signatures before execution. Several recently completed projects were found to contain a fourth signature entered after final authorization.\n\nThe additional signature does not match any employee, contractor, or automated system currently in service.\n\nProjects bearing the mark consistently pass inspection and often include minor corrections not present in the original plans.\n\n§YOfficer Renn:§! Unauthorized approval remains unauthorized approval.\n\n§YOfficer Voss:§! Then perhaps we should determine why it keeps improving the paperwork."
 dsi.119.name:0 "Case File #1962"
 dsi.119.desc:0 "§HThe Basement Stairwell§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Transit / Spatial\n\nStudents and maintenance staff reported a stairwell in the basement of a school building that does not appear on any architectural plans. The entrance is usually found near utility rooms and storage areas, though its exact location varies between reports.\n\nWitnesses describe the stairwell as ordinary except for its length. No one agrees on how many floors it contains.\n\nThe stairwell has not been located during any scheduled inspection.\n\n§YOfficer Voss:§! An undocumented stairwell is concerning. One that relocates is showing initiative.\n\n§YOfficer Renn:§! Buildings should not have exploratory behavior."
 dsi.120.name:0 "Case File #1999"
 dsi.120.desc:0 "§HThe Archived Complaint§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Records / Administrative\n\nMuseum staff discovered a decades-old complaint concerning an exhibit that was never acquired, displayed, or proposed by the institution.\n\nThe complaint contains valid dates, signatures, reference numbers, and review notes from multiple departments. Each investigation concludes the exhibit never existed.\n\nAttempts to remove the file from the archive result in a newly cataloged copy appearing elsewhere in the collection.\n\n§YOfficer Renn:§! We are preserving objections to something nobody can find.\n\n§YOfficer Voss:§! Which suggests the complaint may outlast the exhibit."
 dsi.121.name:0 "Case File #2036"
 dsi.121.desc:0 "§HThe Survey Marker§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Navigation / Cartographic\n\nSeveral survey vessels reported encountering an identical navigation marker during routine mapping operations. The marker broadcasts a valid identification code and appears on scanners as a standard survey beacon.\n\nThe difficulty is that each vessel recorded it in a different star system.\n\nAttempts to revisit the reported locations have been unsuccessful. The marker is always found somewhere else.\n\n§YOfficer Voss:§! It appears determined to be discovered.\n\n§YOfficer Renn:§! Then it should choose a location and remain there."
 dsi.122.name:0 "Case File #2073"
 dsi.122.desc:0 "§HThe Name in the Ledger§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Residential / Records\n\nResidents repeatedly referenced an individual whose name appears in the occupancy ledger of an urban arcology block. The entry is correctly formatted, properly filed, and accepted by all administrative systems.\n\nThe difficulty is that no apartment, employment record, or census entry can be found for the listed resident.\n\nInvestigators observed that surrounding ledger entries shift subtly between inspections, preserving space for the name regardless of where it appears.\n\n§YOfficer Renn:§! It has a place in the records and nowhere else.\n\n§YOfficer Voss:§! Which is more residency than some tenants manage."
 dsi.123.name:0 "Case File #2110"
 dsi.123.desc:0 "§HThe Patient Who Checked Out§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Medical / Records\n\nA routine records audit identified a patient who formally checked out of municipal care and departed the facility without incident.\n\nNo record of the patient remains.\n\nAdmission logs, treatment notes, billing records, and discharge paperwork are complete except where the patient's name should appear. In each case, the space contains the same handwritten sentence:\n\n*\"Sorry for the inconvenience.\"*\n\n§YOfficer Renn:§! Patients are not permitted to remove themselves from documentation.\n\n§YOfficer Voss:§! In fairness, they appear to have left a note."
 dsi.124.name:0 "Case File #2147"
 dsi.124.desc:0 "§HThe Office Light§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Observation / Unexplained\n\nStaff repeatedly reported activity in an unused office identified only by a light visible beneath the door after operating hours. Witnesses describe conversations, movement, and the impression that someone is working inside.\n\nSecurity recordings capture the illuminated office exactly as reported.\n\nNo recording has ever shown the activity witnesses insist accompanied it.\n\n§YOfficer Voss:§! The light is real. The question is what everyone remembers seeing around it.\n\n§YOfficer Renn:§! If the evidence and the witnesses disagree, I prefer the evidence. Slightly."
 dsi.125.name:0 "Case File #2184"
 dsi.125.desc:0 "§HThe Returned Package§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Logistics / Delivery\n\nA package marked \"Return to Sender\" arrived at Orbital Administration Annex despite no record of the original shipment.\n\nThe manifest lists routine office supplies intended for departments that had already been dissolved at the time of delivery. Shipping labels, routing stamps, and customs records are complete and internally consistent.\n\nNo origin point has been identified.\n\n§YOfficer Renn:§! A returned package generally requires an initial delivery.\n\n§YOfficer Voss:§! Perhaps it became lost on the outbound trip and found on the way back."
 dsi.126.name:0 "Case File #2221"
 dsi.126.desc:0 "§HThe Witness on Camera§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Observation / Identity\n\nSecurity footage attached to several unrelated incident reports contains the same unidentified individual standing in the background. The person is never involved in the recorded event and is often positioned too far away for identification.\n\nNo witness recalls seeing them at the time.\n\nThe figure appears in recordings spanning six years despite showing no visible signs of aging.\n\n§YOfficer Renn:§! Being present is not a crime.\n\n§YOfficer Voss:§! No, but being present everywhere suggests a hobby."
 dsi.127.name:0 "Case File #2258"
 dsi.127.desc:0 "§HThe Locked Conference Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Facility / Occupancy\n\nA locked conference room appears in cleaning schedules, catering requests, and maintenance routes throughout Civil Security Precinct. Staff assigned to service the room consistently report completing their work without incident.\n\nThe difficulty is that no conference room matching the designation exists on any floor plan.\n\nPersonnel remember entering the room but become reluctant to discuss what they saw there. No witness has provided a description of the interior.\n\n§YOfficer Voss:§! A room that accepts deliveries is making a persuasive argument for existence.\n\n§YOfficer Renn:§! The argument would be stronger if anyone could find it."
 dsi.128.name:0 "Case File #2295"
 dsi.128.desc:0 "§HThe Address That Moved§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Residential / Location\n\nResidents began reporting delivery errors involving Apartment 407. The apartment exists, but not in the same place twice.\n\nMaintenance records, utility maps, and emergency plans all agree the unit is part of the building. Unfortunately, they disagree on which floor it occupies.\n\nSeveral tenants claim to have visited the apartment. None agree where they found it.\n\n§YOfficer Renn:§! Addresses are intended to narrow things down.\n\n§YOfficer Voss:§! This one appears to regard location as a suggestion."
 dsi.129.name:0 "Case File #2332"
 dsi.129.desc:0 "§HThe Unscheduled Inspection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Administrative / Oversight\n\nSeveral departments received inspection reports identifying minor safety violations and procedural errors. Follow-up reviews confirmed the findings were accurate.\n\nNo record exists of the inspection itself.\n\nSecurity logs show no visitors, no authorization requests, and no inspector assigned to the station during the relevant period.\n\n§YOfficer Renn:§! An inspection requires an inspector.\n\n§YOfficer Voss:§! Then someone should inform the inspection."
 dsi.130.name:0 "Case File #2369"
 dsi.130.desc:0 "§HThe Clean Desk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Workplace / Unexplained\n\nEmployees repeatedly reported finding a particular administrative desk completely cleared of paperwork each morning. Files left on the surface overnight are returned to their proper departments, correctly sorted and stamped.\n\nNo employee claims responsibility.\n\nSecurity footage shows documents accumulating throughout the day and disappearing between frames during overnight recording cycles.\n\n§YOfficer Renn:§! Someone is performing clerical work without authorization.\n\n§YOfficer Voss:§! Then someone is achieving a level of efficiency management can only dream about."
 dsi.131.name:0 "Case File #2406"
 dsi.131.desc:0 "§HThe Evacuation Notice§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Emergency Management / Unverified\n\nArchivists discovered an evacuation notice filed among historical emergency records. The document contains valid authorization codes, distribution lists, and approval signatures.\n\nThe notice orders the immediate evacuation of District Seven.\n\nNo record of District Seven has been found.\n\nMunicipal maps, census records, and planning documents contain no reference to the district, though several residents insist they remember hearing the name.\n\n§YOfficer Voss:§! An evacuation implies someone left in a hurry.\n\n§YOfficer Renn:§! First we should determine whether there was anywhere to leave."
 dsi.132.name:0 "Case File #2443"
 dsi.132.desc:0 "§HThe Last Passenger§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Transit / Identity\n\nTransit records briefly listed a final passenger on a routine shuttle service after boarding had closed. The passenger's name appeared on manifests, tickets were issued, and the fare was successfully processed.\n\nFour minutes later, all records of the passenger vanished.\n\nThe only remaining evidence is a series of automatic refunds issued to an individual who cannot be identified.\n\n§YOfficer Voss:§! Systems rarely create passengers without expecting someone to travel.\n\n§YOfficer Renn:§! Then the passenger should have left more than accounting records behind."
 dsi.133.name:0 "Case File #2480"
 dsi.133.desc:0 "§HThe Floor Plan Revision§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Infrastructure / Records\n\nA routine update to municipal building plans introduced several small revisions to existing structures. Most were unremarkable.\n\nThe difficulty is that the revised layouts accurately depict corridors, storage rooms, and utility spaces that do not appear on any previous plans.\n\nInspection teams subsequently located the newly documented areas exactly where the revision indicated they would be.\n\nNo department has claimed responsibility for the changes.\n\n§YOfficer Voss:§! The plans appear to have updated reality ahead of schedule.\n\n§YOfficer Renn:§! Buildings are not supposed to receive feature updates."
 dsi.134.name:0 "Case File #2517"
 dsi.134.desc:0 "§HThe Reception Bell§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Medical / Communications\n\nStaff at a medical intake center reported that the reception bell occasionally rings when no visitors are present. The sound is indistinguishable from a normal service request.\n\nIn several documented cases, personnel responding to the bell discovered patients requiring immediate assistance moments before those patients would otherwise have been noticed.\n\nNo mechanism fault has been identified.\n\n§YOfficer Voss:§! It appears committed to customer service.\n\n§YOfficer Renn:§! Then it can begin by explaining who is ringing it."
 dsi.135.name:0 "Case File #2554"
 dsi.135.desc:0 "§HThe Internal Mail Cart§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Records / Identity\n\nDSI opened the file when the internal mail cart stopped being a complaint and became a thing people could point to. Handlers describe the internal mail cart as heavier when ignored and lighter when accused of being impossible. Scanners insist it is empty.\n\n§YOfficer Renn:§! Delivery on time is not suspicious by itself.\n\n§YOfficer Voss:§! There is intent in that much postage."
 dsi.136.name:0 "Case File #2591"
 dsi.136.desc:0 "§HThe Discontinued Route§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Transit / Operations\n\nA transit route discontinued twelve years ago periodically reappears on public schedules throughout the Commercial Concourse. The listings include accurate departure times, berth assignments, and service notices.\n\nThe route's former stations still exist. Its recorded destination does not.\n\nSeveral passengers have attempted to purchase tickets. All transactions are automatically refunded before departure.\n\n§YOfficer Voss:§! Something keeps updating a route that should have stayed retired.\n\n§YOfficer Renn:§! Then it can submit the proper paperwork and reapply for service."
 dsi.137.name:0 "Case File #2628"
 dsi.137.desc:0 "§HThe Old Security Code§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Security / Access\n\nA decommissioned security code from an obsolete access system remains active within portions of Terraforming Oversight Station. The credential predates current infrastructure and should no longer exist in any database.\n\nAttempts to revoke the code receive the same automated response:\n\n*\"Credential currently in use.\"*\n\nNo authorized user has been identified. During the most recent revocation attempt, a secured maintenance door registered a single knock from the opposite side.\n\n§YOfficer Renn:§! Access credentials are not supposed to outlive the systems that issued them.\n\n§YOfficer Voss:§! Whatever is using it appears remarkably committed to compliance."
 dsi.138.name:0 "Case File #2665"
 dsi.138.desc:0 "§HThe Anonymous Desk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Facility / Observation\n\nMaintenance personnel reported an unattended administrative desk located within the Subsurface Service Network. The desk appears fully furnished and stocked with current forms despite no department claiming ownership.\n\nThe desk is visible only from a single service corridor. Approaching from any other direction reveals a blank wall, storage shelving, or ordinary maintenance equipment occupying the same space.\n\nNo witness has successfully reached the desk.\n\n§YOfficer Voss:§! It appears willing to be seen, provided nobody becomes ambitious.\n\n§YOfficer Renn:§! A desk that cannot be approached is not accepting visitors."
 dsi.139.name:0 "Case File #2702"
 dsi.139.desc:0 "§HThe Service Elevator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Transit / Spatial\n\nStudents and maintenance staff reported a service elevator that occasionally appears on directory panels despite not existing on any building plans.\n\nWitnesses describe entering the elevator normally and arriving at expected destinations. The difficulty is that travel times recorded during these trips are consistently shorter than physically possible.\n\nThe elevator has never been located during inspection.\n\n§YOfficer Voss:§! It appears committed to efficiency.\n\n§YOfficer Renn:§! Efficiency is not a substitute for location."
 dsi.140.name:0 "Case File #2739"
 dsi.140.desc:0 "§HThe Wrong Reflection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Observation / Reflective\n\nStaff in the Museum Storage Wing reported seeing incorrect reflections in a wall-mounted inspection mirror. The reflected room appears normal except for minor details that do not match reality.\n\nThe discrepancy changes each day.\n\nSeveral witnesses later discovered that details visible in the reflection matched mistakes in their original statements. Subsequent interviews consistently contained corrected descriptions.\n\n§YOfficer Voss:§! It appears determined to improve the record.\n\n§YOfficer Renn:§! Witness testimony is not a collaborative editing process."
 dsi.141.name:0 "Case File #2776"
 dsi.141.desc:0 "§HThe Supply Closet§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Facility / Inventory\n\nStaff assigned to the Survey Vessel Records Room regularly obtain office supplies from a small storage closet located near the archive entrance. The closet appears on no floor plan and has never been assigned an inventory number.\n\nRequests placed inside are often fulfilled by the following morning.\n\nPeriodic inspections consistently find the closet empty.\n\n§YOfficer Voss:§! It is remarkably responsive for a room with no documented contents.\n\n§YOfficer Renn:§! An empty closet cannot issue supplies.\n\n§YOfficer Voss:§! And yet here we are."
 dsi.142.name:0 "Case File #2813"
 dsi.142.desc:0 "§HThe Unclaimed Coat§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Personal Property / Unclaimed\n\nAn overcoat appeared in the lost-and-found of an Urban Arcology Block and remained unclaimed despite repeated notices to residents.\n\nStaff attempting to dispose of the item consistently discovered it returned to the same coat rack by the following day.\n\nSeveral employees reported altering their routines to avoid passing near it. None could explain why.\n\n§YOfficer Renn:§! An abandoned coat is not, by itself, remarkable.\n\n§YOfficer Voss:§! Then perhaps we should determine why nobody wishes to stand next to it."
 dsi.143.name:0 "Case File #2850"
 dsi.143.desc:0 "§HThe Parking Level§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Infrastructure / Spatial\n\nSeveral witnesses reported an underground parking level accessible through service elevators in a municipal administration complex. The level was described as fully lit, occupied by parked vehicles, and marked with current maintenance signage.\n\nThe building possesses no underground parking facilities.\n\nInspection teams located the entrance on three occasions. Each visit ended with the elevator opening onto a blank utility corridor.\n\n§YOfficer Voss:§! A parking level implies drivers, destinations, and a reason to return.\n\n§YOfficer Renn:§! It would help if we could first establish the parking level."
 dsi.144.name:0 "Case File #2887"
 dsi.144.desc:0 "§HThe Cafeteria Receipt§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Records / Correlation\n\nMultiple copies of a cafeteria receipt were recovered from different departments within Frontier Transit Hub. The receipts appear ordinary except that each contains a unique clerical error.\n\nThe errors vary between copies but consistently reference the same archive shelf through inventory numbers, routing codes, or filing annotations.\n\nThe shelf in question is locked and officially empty.\n\n§YOfficer Renn:§! Receipts are not generally considered navigational aids.\n\n§YOfficer Voss:§! Then it is fortunate this one appears willing to improvise."
 dsi.145.name:0 "Case File #2924"
 dsi.145.desc:0 "§HThe Room With Two Numbers§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Facility / Identification\n\nMaintenance staff repeatedly reported confusion regarding a room labeled both 314 and 315. The numbering changes depending on which corridor is used to approach it.\n\nOccupancy records for both rooms are valid and current. The difficulty is that each record describes the same physical space.\n\nAttempts to resolve the discrepancy resulted in both room numbers being reassigned to the location simultaneously.\n\n§YOfficer Renn:§! Rooms are generally expected to choose a number and remain with it.\n\n§YOfficer Voss:§! This one appears unwilling to limit its options."
 dsi.146.name:0 "Case File #2961"
 dsi.146.desc:0 "§HThe Missing Minute§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Temporal / Unexplained\n\nEmployees at Colony Maintenance Bureau began reporting brief discrepancies between personal recollections and security logs. Investigation revealed a recurring one-minute gap occurring at irregular intervals throughout the facility.\n\nClocks continue to advance normally. Recordings remain uninterrupted.\n\nNo witness can account for the missing minute, though several insist routine tasks are often completed during the interval.\n\n§YOfficer Renn:§! Losing a minute is inconvenient. Repeatedly losing the same minute is concerning.\n\n§YOfficer Voss:§! At least it appears committed to returning the time afterward."
 dsi.147.name:0 "Case File #2998"
 dsi.147.desc:0 "§HThe Morning Announcement§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Communications / Administrative\n\nA routine morning announcement distributed through Civil Security Precinct appears to contain no audio. Playback systems register the recording as completely silent.\n\nWhen subtitles are enabled, however, the message becomes visible.\n\nThe text addresses viewers by their current job title and politely reminds them to complete an unspecified form. No two employees report receiving exactly the same message.\n\n§YOfficer Renn:§! A silent announcement should not require follow-up action.\n\n§YOfficer Voss:§! Yet it consistently achieves better compliance than management."
 dsi.148.name:0 "Case File #3035"
 dsi.148.desc:0 "§HThe Second Janitor§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Maintenance / Occupancy\n\nMaintenance logs for a habitation tower regularly credit routine cleaning tasks to a second janitor assigned to the night shift. Floors are polished, repairs are completed, and supply inventories remain accurate.\n\nThe building employs only one janitor.\n\nStaff report occasionally seeing cleaning equipment left in use-ready condition, but no witness has observed the second worker directly.\n\n§YOfficer Voss:§! Whoever they are, they appear deeply committed to professional standards.\n\n§YOfficer Renn:§! If they are receiving a salary, I would like to meet them."
 dsi.149.name:0 "Case File #3072"
 dsi.149.desc:0 "§HThe Sealed File§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Records / Temporal\n\nA sealed administrative file was discovered in the archives of the Research Station Logistics Wing. The document concerns a routine review scheduled for the following week.\n\nAnalysis of the ink indicates the file has not yet been written.\n\nThe paper stock was discontinued before the station opened, and the approval stamp does not correspond to any known employee.\n\nThe review described in the file has not yet occurred.\n\n§YOfficer Voss:§! It appears eager to be archived before becoming relevant.\n\n§YOfficer Renn:§! Future paperwork remains paperwork. Unfortunately."
 dsi.150.name:0 "Case File #3109"
 dsi.150.desc:0 "§HThe Cold Waiting Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Facility / Occupancy\n\nPassengers occasionally report a waiting room located near inactive boarding gates within Port Authority Terminal. The room is described as unusually cold but otherwise unremarkable.\n\nSeveral witnesses recall spending hours there.\n\nInspection teams have been unable to locate the room, and terminal records show no waiting area matching the descriptions provided.\n\n§YOfficer Renn:§! Waiting rooms are expected to remain in one place.\n\n§YOfficer Voss:§! Perhaps that is why this one is so difficult to find."
 dsi.151.name:0 "Case File #3146"
 dsi.151.desc:0 "§HThe Shipyard Locker§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Security / Access\n\nArchive staff repeatedly referenced a shipyard locker listed in several access records despite no corresponding locker appearing on facility maps.\n\nA blank access credential was later recovered from an unrelated evidence box. When brought near secured storage, the card briefly displays a locker number and the name of the person holding it.\n\nThe indicated locker has never been located.\n\n§YOfficer Renn:§! A locker should be easier to find than its key.\n\n§YOfficer Voss:§! Perhaps it is waiting for the correct owner to arrive."
 dsi.152.name:0 "Case File #3183"
 dsi.152.desc:0 "§HThe Surveyor's Note§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Infrastructure / Survey\n\nA handwritten note was discovered attached to a routine housing survey report. The message warned inspectors to avoid a stairwell scheduled for demolition due to an unrecorded structural hazard.\n\nThe warning proved accurate.\n\nThe difficulty is that the note was signed by a surveyor who retired nine years earlier, and the referenced hazard was not identified until several weeks after the report was filed.\n\nNo original author has been identified.\n\n§YOfficer Renn:§! Retired personnel should not be submitting safety advisories.\n\n§YOfficer Voss:§! Given the outcome, I am inclined to overlook the paperwork violation."
 dsi.153.name:0 "Case File #3220"
 dsi.153.desc:0 "§HThe Spare Office§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Facility / Occupancy\n\nEmployees occasionally report being directed to a spare office during periods of overcrowding, temporary renovations, or scheduling conflicts. The room is described as fully furnished and ready for use.\n\nThe difficulty is that no department claims ownership of the office, and no floor plan includes it.\n\nBy the time investigators arrive, the room has invariably become a storage closet, utility alcove, or ordinary section of corridor.\n\n§YOfficer Renn:§! Temporary workspace is not a recognized architectural feature.\n\n§YOfficer Voss:§! It appears wherever administration runs out of room. Admirable, really."
 dsi.154.name:0 "Case File #3257"
 dsi.154.desc:0 "§HThe Backup Recording§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Communications / Records\n\nA routine backup archive at a Medical Intake Center contained a recording of a staff meeting. The discussion referenced policy changes, attendance decisions, and equipment requests in ordinary detail.\n\nThe meeting never occurred.\n\nNo room reservation, calendar entry, or attendance record exists. Several employees identified in the recording deny participating despite recognizing their own voices.\n\n§YOfficer Renn:§! A recording generally requires something to record.\n\n§YOfficer Voss:§! Then perhaps we should determine why the archive prepared for the meeting before anyone else did."
 dsi.155.name:0 "Case File #3294"
 dsi.155.desc:0 "§HThe Witness Statement§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Testimony / Records\n\nA witness statement submitted to Customs Checkpoint describes an unusual incident in complete detail, including dates, locations, and observations.\n\nThe identity of the witness cannot be determined.\n\nEvery copy of the statement remains intact except for the signature line, where a short handwritten note appears instead:\n\n*\"I would prefer not to be involved.\"*\n\nNo employee recalls receiving the document.\n\n§YOfficer Renn:§! Anonymous testimony is of limited value.\n\n§YOfficer Voss:§! Then it is fortunate the statement appears determined to testify anyway."
 dsi.156.name:0 "Case File #3331"
 dsi.156.desc:0 "§HThe Lobby Clock§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Timekeeping / Unexplained\n\nStaff and visitors periodically report the lobby clock displaying a time several minutes ahead of every other synchronized system in the concourse. The discrepancy lasts only briefly before correcting itself.\n\nReview of security footage suggests that individuals who act according to the clock's advanced time consistently avoid minor accidents, delays, and scheduling conflicts that occur shortly afterward.\n\nNo fault has been identified in the mechanism.\n\n§YOfficer Renn:§! A clock is not responsible for decision-making.\n\n§YOfficer Voss:§! This one appears willing to help anyway."
 dsi.157.name:0 "Case File #3368"
 dsi.157.desc:0 "§HThe Visitor Log§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Security / Records\n\nA routine audit of visitor records identified a single entry that appeared entirely ordinary. The visitor signed in, listed a valid purpose, remained on site for three hours, and signed out correctly.\n\nNo such visitor can be identified.\n\nThe listed name does not appear in any population registry, employment database, or transit manifest. Every other detail in the entry has been independently verified.\n\n§YOfficer Voss:§! One impossible fact surrounded by impeccable paperwork. That feels intentional.\n\n§YOfficer Renn:§! A visitor log is supposed to answer questions, not create them."
 dsi.158.name:0 "Case File #3405"
 dsi.158.desc:0 "§HThe Old Map§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Cartographic / Infrastructure\n\nA maintenance crew recovered an outdated map of the Subsurface Service Network from an abandoned storage cabinet. Several tunnels and service corridors shown on the document do not appear on any current plans.\n\nThe difficulty is that inspectors later located portions of the missing routes exactly where the map indicated.\n\nNo record exists of the revisions that removed them.\n\n§YOfficer Voss:§! Most old maps tell you where things were.\n\n§YOfficer Renn:§! This one appears determined to explain where they still are."
 dsi.159.name:0 "Case File #3442"
 dsi.159.desc:0 "§HThe Freight Manifest§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Logistics / Records\n\nA freight manifest was discovered among routine supply deliveries to the Education District. The document lists shipment weights, routing codes, inspection approvals, and delivery confirmations.\n\nNo cargo is associated with it.\n\nWarehouse records confirm the shipment was received, unloaded, inspected, and distributed. None of the listed facilities can identify what was delivered.\n\n§YOfficer Voss:§! An entire shipment appears to have arrived without bothering to be a shipment.\n\n§YOfficer Renn:§! Then accounting can explain where the inventory went."
 dsi.160.name:0 "Case File #3479"
 dsi.160.desc:0 "§HThe Emergency Drill§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Public Safety / Preparedness\n\nStaff at the Museum Storage Wing conducted an unscheduled emergency evacuation after hearing an alarm that was later determined never to have sounded.\n\nWitnesses followed the correct procedures, assembled at designated points, and secured sensitive collections without instruction.\n\nSeveral hours later, a minor electrical fire occurred in the exact area that had been evacuated.\n\n§YOfficer Renn:§! Preparedness is generally considered a positive outcome.\n\n§YOfficer Voss:§! Agreed. I remain curious who scheduled the drill."
 dsi.161.name:0 "Case File #3516"
 dsi.161.desc:0 "§HThe Fault Report§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Technical / Records\n\nA fault report recovered from archived survey records describes a critical malfunction aboard a long-range survey vessel. The report includes diagnostics, repair recommendations, and crew comments in standard format.\n\nNo vessel matching the designation has ever existed.\n\nDespite this, engineering staff reviewing the document identified several legitimate design flaws later discovered in active survey craft.\n\n§YOfficer Renn:§! It is difficult to repair a ship that was never built.\n\n§YOfficer Voss:§! Then it is fortunate the report appears interested in preventive maintenance."
 dsi.162.name:0 "Case File #3553"
 dsi.162.desc:0 "§HThe Lost Courier§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Logistics / Personnel\n\nDelivery records throughout an Urban Arcology Block reference the same courier across multiple departments. Packages assigned to the courier consistently arrive on time and with proper documentation.\n\nNo employee, contractor, or resident matching the courier's identity can be located.\n\nAttempts to remove the courier from routing systems result in new deliveries being assigned to them within days.\n\n§YOfficer Voss:§! Someone is completing an impressive amount of work for a person nobody has met.\n\n§YOfficer Renn:§! Then someone should begin with obtaining a forwarding address."
 dsi.163.name:0 "Case File #3590"
 dsi.163.desc:0 "§HThe Quiet Terminal§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Information Systems / Unexplained\n\nStaff at the Municipal Records Office occasionally discover a powered terminal connected to no known network. The device appears ordinary and displays no unusual activity.\n\nIt never produces output unless addressed directly.\n\nEmployees who ask the terminal routine administrative questions report receiving accurate answers concerning records they have not yet opened or requests not yet submitted.\n\nThe terminal is never present during scheduled inspections.\n\n§YOfficer Renn:§! Unverified information sources should not be trusted.\n\n§YOfficer Voss:§! Then it is unfortunate that it keeps being correct."
 dsi.164.name:0 "Case File #3627"
 dsi.164.desc:0 "§HThe Wrong Sunrise§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Observation / Astronomical\n\nTransit personnel reported an unusual sunrise visible through the observation windows of Frontier Transit Hub. Witnesses consistently described the event as familiar but incorrect in ways they struggled to explain afterward.\n\nSensor recordings show a normal sunrise.\n\nSeveral observers nevertheless insist that, for a brief moment, the light appeared to originate from the wrong direction. Others describe the impression that something beyond the horizon was observing the station in return.\n\n§YOfficer Renn:§! Instrument readings remain more reliable than impressions.\n\n§YOfficer Voss:§! Then I would like to know why the impressions agree so closely."
 dsi.165.name:0 "Case File #3664"
 dsi.165.desc:0 "§HThe Locked Drawer§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Records / Storage\n\nEmployees at Orbital Administration Annex periodically report a locked drawer appearing in otherwise ordinary filing cabinets. The drawer is always found closed and bears no visible lock mechanism.\n\nAttempts to force it open have been unsuccessful.\n\nSeveral witnesses claim the drawer contains exactly the document they were searching for at the time. No witness has successfully opened it to confirm.\n\nThe drawer is never present during follow-up inspections.\n\n§YOfficer Renn:§! A storage compartment should not require speculation.\n\n§YOfficer Voss:§! Then perhaps it should stop making promises."
 dsi.166.name:0 "Case File #3701"
 dsi.166.desc:0 "§HThe Blue Folder§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Records / Administrative\n\nA blue folder began circulating through the Colony Maintenance Bureau without a known point of origin. The contents describe a routine meeting, complete with minutes, attendance records, and follow-up actions.\n\nThe meeting never occurred.\n\nSeveral employees identified in the documents deny attending, despite recognizing details that were never publicly discussed.\n\nThe folder is consistently found in the inbox of whoever is currently responsible for investigating it.\n\n§YOfficer Renn:§! I would prefer evidence that remains where it is filed.\n\n§YOfficer Voss:§! Then it would hardly qualify as a mystery."
 dsi.167.name:0 "Case File #3738"
 dsi.167.desc:0 "§HThe Noise Complaint§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Residential / Disturbance\n\nCivil Security Precinct received repeated noise complaints concerning loud activity within an occupied residential block. Witnesses described footsteps, conversations, furniture being moved, and occasional music during overnight hours.\n\nThe apartment named in every complaint has been vacant for eleven years.\n\nInspection teams consistently find the unit clean, furnished, and silent.\n\n§YOfficer Renn:§! Vacant residences are not generally expected to generate neighbors.\n\n§YOfficer Voss:§! Then perhaps someone should inform the neighbors."
 dsi.168.name:0 "Case File #3775"
 dsi.168.desc:0 "§HThe Patient Bracelet§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Medical / Identification\n\nA patient identification bracelet was recovered from a Habitation Tower maintenance corridor during a routine inspection. The bracelet appears genuine and carries a valid patient number.\n\nThe associated patient cannot be identified.\n\nMedical records recognize the number as active, but every attempt to retrieve the corresponding file returns an empty record.\n\nThe bracelet periodically reappears after being placed into evidence storage.\n\n§YOfficer Renn:§! Identification systems are intended to identify people.\n\n§YOfficer Voss:§! This one seems content identifying the absence instead."
 dsi.169.name:0 "Case File #3812"
 dsi.169.desc:0 "§HThe Long Hallway§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Spatial / Infrastructure\n\nPersonnel within the Research Station Logistics Wing occasionally report encountering a service hallway substantially longer than the station's dimensions permit. Witnesses describe the corridor as well-lit, maintained, and entirely ordinary aside from its length.\n\nSeveral employees claim to have spent over twenty minutes walking its length before reaching destinations normally less than a minute apart.\n\nInspection teams have been unable to locate the hallway on demand.\n\n§YOfficer Voss:§! It appears to take distance very personally.\n\n§YOfficer Renn:§! Corridors are not entitled to opinions on geometry."
 dsi.170.name:0 "Case File #3849"
 dsi.170.desc:0 "§HThe Archive Lamp§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Archive / Observation\n\nStaff working in the Port Authority archives reported a desk lamp that is occasionally found illuminated despite being disconnected from all power sources.\n\nThe lamp appears ordinary and produces no unusual readings.\n\nEmployees who work beneath its light later discover minor errors in archived records that had previously gone unnoticed. The corrections are consistently accurate.\n\nThe lamp is never found switched on during inspections.\n\n§YOfficer Renn:§! A maintenance issue would be considerably easier to explain.\n\n§YOfficer Voss:§! Then it is fortunate the lamp appears uninterested in being helpful."
 dsi.171.name:0 "Case File #3886"
 dsi.171.desc:0 "§HThe Reserved Seat§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Public Space / Occupancy\n\nA single seat in the reading hall of the Planetary Archive is consistently marked as reserved despite no reservation system existing for the facility.\n\nStaff occasionally remove the marker. It invariably returns by the following morning.\n\nWitnesses report a strong reluctance to sit in the chair, though no one can provide a specific reason.\n\nNo individual has ever claimed the reservation.\n\n§YOfficer Renn:§! Empty seating is not generally a public safety concern.\n\n§YOfficer Voss:§! Then perhaps we should determine why nobody is willing to test that assumption."
 dsi.172.name:0 "Case File #3923"
 dsi.172.desc:0 "§HThe Stairwell Landing§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Transit / Spatial\n\nResidents occasionally report reaching a stairwell landing that does not correspond to any floor in the building. The landing appears clean, well-lit, and entirely ordinary.\n\nWitnesses describe resting there briefly before continuing on their way.\n\nSubsequent attempts to locate the same landing have been unsuccessful. Building plans account for every floor and contain no unexplained intermediate levels.\n\n§YOfficer Renn:§! Stairwells are intended to connect known locations.\n\n§YOfficer Voss:§! This one appears to have added an extra stop."
 dsi.173.name:0 "Case File #3960"
 dsi.173.desc:0 "§HThe Incident Without a Date§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Records / Temporal\n\nDistrict Infrastructure Office forwarded a completed incident report concerning a minor utility failure. The report includes witness statements, repair logs, photographs, and a signed resolution.\n\nEvery date field is blank.\n\nAttempts to determine when the incident occurred have been unsuccessful. Witnesses remember the event clearly but disagree on the year.\n\n§YOfficer Renn:§! Incidents are generally expected to occur at a specific time.\n\n§YOfficer Voss:§! This one appears to have misplaced that part."
 dsi.174.name:0 "Case File #3997"
 dsi.174.desc:0 "§HThe Returned Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Communications / Temporal\n\nStaff at a Medical Intake Center occasionally receive return calls after attempting to contact disconnected departments, obsolete extensions, or numbers no longer in service.\n\nThe calls are polite, professional, and briefly address the original inquiry.\n\nIn several documented cases, the information provided proved accurate despite referencing issues that had not yet been reported.\n\n§YOfficer Renn:§! Disconnected lines are not expected to maintain customer support.\n\n§YOfficer Voss:§! Then someone has invested impressive effort into exceeding expectations."
 dsi.175.name:0 "Case File #4034"
 dsi.175.desc:0 "§HThe Transit Token§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Transit / Access\n\nA transit token recovered during a routine customs inspection appears valid across multiple transportation networks despite matching no known issuer.\n\nWhen inserted into ticketing systems, the token is briefly accepted and generates travel options unavailable to ordinary passengers.\n\nThe destinations disappear within minutes, leaving only cancelled transactions and automatic fare refunds.\n\n§YOfficer Renn:§! Transit credentials are expected to identify where someone may travel.\n\n§YOfficer Voss:§! This one seems more interested in where they could have gone."
 dsi.176.name:0 "Case File #4071"
 dsi.176.desc:0 "§HThe Elevator Music§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Audio / Behavioral\n\nVisitors to the Commercial Concourse occasionally report hearing elevator music in areas where no elevators are present. Witnesses consistently describe the same melody despite no recording matching their accounts.\n\nSeveral individuals claim the music included boarding instructions, destination information, or polite travel advisories.\n\nSecurity footage shows the subjects standing motionless during the reported events. Audio recordings contain only silence.\n\n§YOfficer Renn:§! Silence remains a poor medium for public transportation announcements.\n\n§YOfficer Voss:§! Then something is putting an impressive amount of effort into being unheard."
 dsi.177.name:0 "Case File #4108"
 dsi.177.desc:0 "§HThe Closed Kiosk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Information Services / Unexplained\n\nA customer service kiosk at Terraforming Oversight Station has remained officially closed for over eight years. The terminal is disconnected, unpowered, and marked out of service.\n\nEmployees nevertheless report receiving printed responses from it.\n\nThe messages answer questions that have not yet been submitted and occasionally reference projects still under review. No paper source has been identified.\n\n§YOfficer Renn:§! A closed kiosk should not be providing customer support.\n\n§YOfficer Voss:§! Then someone appears to be volunteering."
 dsi.178.name:0 "Case File #4145"
 dsi.178.desc:0 "§HThe Weather Report§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Communications / Forecasting\n\nPersonnel within the Subsurface Service Network occasionally encounter weather reports displayed on inactive monitors, maintenance terminals, and archived information screens.\n\nThe forecasts are detailed, professionally formatted, and entirely accurate.\n\nThe difficulty is that they describe weather conditions for locations that do not exist on any chart, survey, or administrative record.\n\nNo source for the reports has been identified.\n\n§YOfficer Renn:§! Forecasting is considerably easier when the destination exists.\n\n§YOfficer Voss:§! Then perhaps the forecast is ahead of the paperwork."
 dsi.179.name:0 "Case File #4182"
 dsi.179.desc:0 "§HThe Missing Shift§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Employment / Temporal\n\nPayroll records within the Education District periodically contain completed work shifts assigned to no employee. The entries include hours worked, assigned duties, and supervisor approval.\n\nThe work itself was performed.\n\nClassrooms were cleaned, maintenance requests were completed, and administrative tasks were finished during the recorded period. No witness can identify who carried out the shift.\n\n§YOfficer Renn:§! Labor records are intended to identify the labor.\n\n§YOfficer Voss:§! Then someone appears to have submitted the work without the worker."
 dsi.180.name:0 "Case File #4219"
 dsi.180.desc:0 "§HThe Duplicate Resident§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Records / Identity\n\nA routine records audit identified two residents sharing the same name, identification number, employment history, and residential address.\n\nBoth individuals exist.\n\nWitness interviews, security records, and administrative documents consistently describe them as separate people. Neither resident appears aware of the duplication, and both insist the other is entirely ordinary.\n\n§YOfficer Renn:§! Identity records are expected to distinguish between individuals.\n\n§YOfficer Voss:§! This appears to be one resident making an impressive effort to be two."
 dsi.181.name:0 "Case File #4256"
 dsi.181.desc:0 "§HThe Wrong Doorbell§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Access / Location\n\nStaff reported that a service doorbell near the Survey Vessel Records Room occasionally responds to visitors despite no office or workspace existing beyond the wall.\n\nIndividuals who ring the bell are sometimes directed to enter.\n\nWitnesses consistently describe finding an ordinary room occupied by a courteous employee. The room provides directions, answers questions, and occasionally accepts paperwork.\n\nNo two witnesses agree on the room's location afterward.\n\n§YOfficer Renn:§! Doorbells are intended to announce visitors, not create destinations.\n\n§YOfficer Voss:§! Then someone on the other side appears to be improvising."
 dsi.182.name:0 "Case File #4293"
 dsi.182.desc:0 "§HThe Office Plant§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Workplace / Unexplained\n\nAn ornamental plant located in a shared office space within an Urban Arcology Block has become the subject of repeated maintenance requests despite no department claiming ownership.\n\nEmployees routinely report finding lost items placed neatly in the potting soil.\n\nThe plant shows no signs of growth, decay, or water consumption. It has nevertheless outlasted three renovations and two complete furniture replacements.\n\n§YOfficer Renn:§! Plants are not an approved storage solution.\n\n§YOfficer Voss:§! Then someone should explain that to the plant."
 dsi.183.name:0 "Case File #4330"
 dsi.183.desc:0 "§HThe Unoccupied Desk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Workplace / Administrative\n\nEmployees at the Municipal Records Office occasionally receive completed forms bearing routing stamps from a desk assigned to no employee.\n\nThe workstation exists and can be inspected at any time.\n\nThe chair remains empty, the terminal is powered down, and the desk shows no signs of recent use. Nevertheless, paperwork continues to originate from it during periods when the office is closed.\n\n§YOfficer Renn:§! An unattended workstation should not be processing documents.\n\n§YOfficer Voss:§! Then someone is demonstrating admirable efficiency from a seated position they never occupy."
 dsi.184.name:0 "Case File #4367"
 dsi.184.desc:0 "§HThe Broken Intercom§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Communications / Systems\n\nA malfunctioning intercom unit was removed from service following repeated hardware failures. The device was disconnected, logged, and scheduled for disposal.\n\nSeveral days later, maintenance staff discovered new voicemail messages attributed to the intercom.\n\nThe messages are brief, professionally recorded, and concern routine operational issues. Each arrives already marked as listened to, complete with the initials of an employee who denies hearing it.\n\n§YOfficer Renn:§! Disconnected equipment should not be leaving messages.\n\n§YOfficer Voss:§! Especially not after someone has already listened to them."
 dsi.185.name:0 "Case File #4404"
 dsi.185.desc:0 "§HThe Cold Cup§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Workplace / Unexplained\n\nA disposable beverage cup has remained on the same table in the Orbital Administration Annex break room for at least three years.\n\nThe contents remain cold.\n\nCleaning staff routinely discard the cup during scheduled maintenance. It is invariably found in its usual location the following morning.\n\nNo employee claims ownership.\n\n§YOfficer Renn:§! Someone is failing to clean the break room in a remarkably consistent manner.\n\n§YOfficer Voss:§! Then perhaps someone should explain why the coffee has not aged."
 dsi.186.name:0 "Case File #4441"
 dsi.186.desc:0 "§HThe Registry Error§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Records / Identity\n\nA routine audit of maintenance personnel records identified a single registry error. The entry lists an employee with a valid identification number, work history, payroll record, and performance reviews.\n\nThe employee was never hired.\n\nNo department claims responsibility for the record, yet every associated document appears authentic and internally consistent.\n\n§YOfficer Renn:§! Administrative mistakes are common. This one appears unusually committed.\n\n§YOfficer Voss:§! One impossible fact surrounded by impeccable paperwork. That feels deliberate."
 dsi.187.name:0 "Case File #4478"
 dsi.187.desc:0 "§HThe Empty Apartment§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Residential / Occupancy\n\nResidents regularly refer to an apartment within a Civil Security Precinct housing block. Utility records show normal consumption, deliveries arrive weekly, and neighboring tenants submit occasional noise complaints.\n\nThe apartment does not appear on any architectural plans.\n\nInspection teams have confirmed the unit's existence on multiple occasions. Follow-up reviews consistently find only a blank section of wall where the entrance was reported.\n\n§YOfficer Renn:§! Apartments are expected to remain attached to buildings.\n\n§YOfficer Voss:§! This one appears attached only when convenient."
 dsi.188.name:0 "Case File #4515"
 dsi.188.desc:0 "§HThe Night Bus§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Transit / Witness Reports\n\nResidents of a Habitation Tower periodically gather at an unused service entrance shortly before dawn. Witnesses describe waiting for a bus that does not appear on any transit schedule.\n\nNo vehicle has ever been observed arriving.\n\nSecurity footage nevertheless records individuals stepping aside, queuing, and eventually dispersing. Several later report reaching destinations they do not remember traveling to.\n\nMaintenance inspections have documented fresh tire marks and unusual wear patterns near the pickup location.\n\n§YOfficer Renn:§! Public transportation is expected to involve a vehicle.\n\n§YOfficer Voss:§! Then perhaps we have been focusing on the least important part of the journey."
 dsi.189.name:0 "Case File #4552"
 dsi.189.desc:0 "§HThe Sealed Window§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Observation / Witness Reliability\n\nA permanently sealed observation window within the Research Station Logistics Wing has become the subject of repeated reports from staff.\n\nWitnesses consistently describe seeing activity beyond the glass, including movement, lights, and occupied workspaces.\n\nSecurity recordings show only an ordinary sealed window facing a blank service wall.\n\nAll witnesses insist the recordings are missing the important part.\n\n§YOfficer Renn:§! If the evidence and the witnesses disagree, one of them is mistaken.\n\n§YOfficer Voss:§! The troubling part is that the witnesses all disagree in exactly the same way."
 dsi.190.name:0 "Case File #4589"
 dsi.190.desc:0 "§HThe Public Notice§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Public Information / Temporal\n\nA public notice appeared on information boards throughout Port Authority Terminal announcing a temporary closure of Concourse C due to maintenance work.\n\nThe closure occurred three days later.\n\nSecurity records confirm the notices were posted before the maintenance issue was discovered. Archived copies contain valid approval signatures from personnel who had not yet been assigned to the project.\n\n§YOfficer Renn:§! Advance notice is generally considered good administration.\n\n§YOfficer Voss:§! Then someone appears to be taking preparedness unusually seriously."
 dsi.191.name:0 "Case File #4626"
 dsi.191.desc:0 "§HThe Old Broadcast§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Communications / Source Unknown\n\nArchive personnel periodically receive a routine internal broadcast concerning staffing levels, maintenance schedules, and other administrative matters. The transmission quality suggests equipment several generations out of date.\n\nAttempts to trace the signal have produced inconsistent results.\n\nOperators have followed the source to active consoles, disconnected wall panels, and a room designation that does not appear on any facility map.\n\nThe message itself remains entirely ordinary.\n\n§YOfficer Renn:§! Boring communications are usually the easiest to explain.\n\n§YOfficer Voss:§! This one appears to be using that assumption as camouflage."
 dsi.192.name:0 "Case File #4663"
 dsi.192.desc:0 "§HThe Unexpected Passenger§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Transit / Identity\n\nA routine shuttle arriving at a Public Housing Agency transit stop was recorded carrying one additional passenger beyond its documented capacity.\n\nTicket records, boarding logs, and security footage all confirm the individual's presence.\n\nNo record exists of the passenger boarding.\n\nThe individual exited normally, disappeared into the surrounding crowd, and has not been identified despite repeated review of the footage.\n\n§YOfficer Renn:§! Passengers are generally expected to begin their journey somewhere.\n\n§YOfficer Voss:§! This one appears to have joined the trip midway through reality."
 dsi.193.name:0 "Case File #4700"
 dsi.193.desc:0 "§HThe Quiet Classroom§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Educational Facility / Occupancy\n\nA classroom appears in cleaning schedules, supply deliveries, and maintenance requests throughout the District Infrastructure Office complex. The room receives desks, writing materials, and periodic servicing despite not appearing on any floor plan.\n\nPersonnel assigned to the room consistently report completing their duties.\n\nNone will describe what they saw beyond the door.\n\nSeveral employees insist they can occasionally hear a lesson in progress from an otherwise empty corridor.\n\n§YOfficer Renn:§! Educational facilities are expected to contain students.\n\n§YOfficer Voss:§! Then perhaps someone is being taught something."
 dsi.194.name:0 "Case File #4737"
 dsi.194.desc:0 "§HThe Returned Survey Probe§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Exploration / Temporal\n\nA survey probe was delivered to the Medical Intake Center loading dock despite no department having launched one.\n\nThe probe carries valid identification markings and a complete survey record.\n\nThe recorded mission ends twelve years in the future.\n\nEngineering analysis confirms the probe is genuine and manufactured to current specifications. No destination listed in the survey data has been identified.\n\n§YOfficer Renn:§! Equipment should not be returning before deployment.\n\n§YOfficer Voss:§! On the positive side, it appears the mission was a success."
 dsi.195.name:0 "Case File #4774"
 dsi.195.desc:0 "§HThe Sleeping Guard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Security / Personnel\n\nCustoms Checkpoint personnel occasionally refer to a sleeping guard assigned to an observation post near the night entrance. Witnesses describe the guard as unremarkable aside from being consistently asleep while on duty.\n\nThe position does not exist.\n\nTwo supervisors approved leave requests for the guard before later denying any knowledge of the assignment. Payroll records continue to list the post as vacant.\n\n§YOfficer Renn:§! Security personnel are generally expected to remain awake.\n\n§YOfficer Voss:§! Then perhaps sleeping is not the guard's primary responsibility."
 dsi.196.name:0 "Case File #4811"
 dsi.196.desc:0 "§HThe Maintenance Hatch§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Infrastructure / Access\n\nMaintenance staff reported a service hatch appearing intermittently within the Commercial Concourse. The hatch is marked with current safety labels, inspection dates, and asset numbers.\n\nNone of them are valid.\n\nEmployees who open the hatch consistently describe an ordinary maintenance corridor beyond. The corridor has never been located from any other entrance.\n\nThe hatch is rarely found in the same location twice.\n\n§YOfficer Renn:§! Access points are expected to connect to existing infrastructure.\n\n§YOfficer Voss:§! This one appears committed to keeping its options open."
 dsi.197.name:0 "Case File #4848"
 dsi.197.desc:0 "§HThe Undelivered Letter§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Communications / Delivery\n\nAn undelivered letter has circulated through internal mail systems at Terraforming Oversight Station for over six years. The address is complete, legible, and conforms to all current routing standards.\n\nNo such recipient exists.\n\nAttempts to return the letter to sender have been unsuccessful. The sender's information resolves to the same nonexistent recipient listed on the envelope.\n\nThe letter remains sealed.\n\n§YOfficer Renn:§! At some point, an undeliverable item should stop traveling.\n\n§YOfficer Voss:§! Perhaps it is still looking for someone who has not arrived yet."
 dsi.198.name:0 "Case File #4885"
 dsi.198.desc:0 "§HThe Reopened Storefront§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Commercial / Occupancy\n\nWorkers within the Subsurface Service Network periodically report a small storefront operating along disused service corridors. The business appears open, stocked, and actively maintained.\n\nThe storefront closed twenty-three years ago.\n\nSeveral witnesses claim to have made purchases there. Receipts recovered during the investigation bear the original company logo and valid pricing from the period before closure.\n\nThe shop has never been located twice.\n\n§YOfficer Renn:§! Closed businesses are not expected to resume operations.\n\n§YOfficer Voss:§! Then someone has demonstrated remarkable dedication to customer service."
 dsi.199.name:0 "Case File #4922"
 dsi.199.desc:0 "§HThe False Exit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Transit / Spatial\n\nStudents and staff occasionally report using an emergency exit that does not appear on any building plan. The door is marked correctly, passes inspection, and functions normally.\n\nThe difficulty is that it does not lead outside.\n\nWitnesses describe emerging into unrelated sections of the campus, service corridors, or buildings several blocks away. The exit has never been located during follow-up inspections.\n\n§YOfficer Renn:§! Emergency exits are intended to simplify navigation.\n\n§YOfficer Voss:§! This one appears committed to broadening horizons."
 dsi.200.name:0 "Case File #4959"
 dsi.200.desc:0 "§HThe Second Elevator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Transit / Infrastructure\n\nMuseum staff occasionally refer to a second freight elevator serving the storage wing. Witnesses describe it as older than the building but otherwise unremarkable.\n\nMaintenance records show routine inspections, repairs, and safety certifications for the elevator.\n\nThe facility contains only one freight elevator.\n\nEmployees who claim to have used the second elevator disagree on where it stops but consistently insist it is useful.\n\n§YOfficer Renn:§! An elevator is generally expected to occupy physical space.\n\n§YOfficer Voss:§! Then perhaps we should determine where this one keeps it."
 dsi.201.name:0 "Case File #4996"
 dsi.201.desc:0 "§HThe Locked Clinic§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Medical / Facility\n\nPersonnel assigned to the Survey Vessel Records Room occasionally report a small medical clinic located behind a permanently locked door. Witnesses describe treatment rooms, medical equipment, and active staff.\n\nThe clinic does not appear on any facility plan.\n\nSeveral employees claim to have received treatment there for minor injuries. No corresponding medical records have been located.\n\nThe door has never been found unlocked during inspection.\n\n§YOfficer Renn:§! Medical facilities are expected to maintain patient records.\n\n§YOfficer Voss:§! Then perhaps someone is prioritizing patient privacy to an unreasonable degree."
 dsi.202.name:0 "Case File #5033"
 dsi.202.desc:0 "§HThe Old Password§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Security / Access\n\nAn obsolete access password from a decommissioned security system continues to appear in authentication logs throughout an Urban Arcology Block.\n\nThe credential contains no valid data and should not be recognized by any current system.\n\nDespite this, the password is occasionally accepted by restricted terminals and secured doors. Each recorded use lasts only a few seconds before the session closes normally.\n\nNo user has been identified.\n\n§YOfficer Renn:§! Retired credentials are expected to remain retired.\n\n§YOfficer Voss:§! This one appears unwilling to update its status."
 dsi.203.name:0 "Case File #5070"
 dsi.203.desc:0 "§HThe Replacement Clerk§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Personnel / Administrative\n\nMunicipal Records Office staffing documents include a replacement clerk assigned to cover an extended vacancy. Timesheets, leave approvals, and performance reviews all indicate the position is active.\n\nThe original clerk cannot be identified.\n\nPersonnel records confirm that a replacement was requested, approved, and assigned. No document explains who required replacement in the first place.\n\nThe vacancy remains officially open.\n\n§YOfficer Renn:§! Replacements generally require something to replace.\n\n§YOfficer Voss:§! Then perhaps the replacement is the original and the paperwork lost confidence."
 dsi.204.name:0 "Case File #5107"
 dsi.204.desc:0 "§HThe Construction Permit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Infrastructure / Records\n\nA valid construction permit was discovered in the archives of Frontier Transit Hub. The document authorizes the construction of a maintenance annex, complete with approvals, inspections, and completion certificates.\n\nThe annex does not exist.\n\nInvestigators confirmed that no structure matching the permit was ever built. Several maintenance maps, however, continue to reference the facility as though it were in active use.\n\n§YOfficer Renn:§! Completion certificates are generally expected to follow construction.\n\n§YOfficer Voss:§! Then perhaps the building was completed somewhere else."
 dsi.205.name:0 "Case File #5144"
 dsi.205.desc:0 "§HThe Forgotten Basement§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Infrastructure / Occupancy\n\nEmployees at the Orbital Administration Annex occasionally refer to a basement level used for storage, records retention, and routine maintenance.\n\nThe building has no basement.\n\nAccess logs, inventory reports, and work orders nevertheless reference the level regularly. Personnel who claim to have visited it provide consistent descriptions but are unable to explain how they reached it.\n\n§YOfficer Renn:§! Buildings are generally expected to know how many floors they contain.\n\n§YOfficer Voss:§! Then this one appears to have misplaced one."
 dsi.206.name:0 "Case File #5181"
 dsi.206.desc:0 "§HThe Interior Courtyard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Spatial / Architectural\n\nMaintenance schedules, landscaping requests, and delivery records regularly reference an interior courtyard within the Colony Maintenance Bureau complex.\n\nNo such courtyard appears on any floor plan.\n\nPersonnel assigned to service the area report trimmed vegetation, outdoor seating, and open sky above. All witnesses describe the location similarly but are unable to explain how they reached it.\n\nThe courtyard has never been located during inspection.\n\n§YOfficer Renn:§! Courtyards generally require space.\n\n§YOfficer Voss:§! Then someone appears to have found some."
 dsi.207.name:0 "Case File #5218"
 dsi.207.desc:0 "§HThe Office Nobody Rents§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Commercial / Occupancy\n\nProperty records for Civil Security Precinct include a small office suite listed as available for lease. The space has remained vacant for as long as records exist.\n\nSeveral businesses have nevertheless used the address.\n\nMail is delivered, utilities are consumed, and service requests are occasionally submitted from the office. Every attempt to identify a tenant has been unsuccessful.\n\nSite inspections consistently find the suite empty and unfurnished.\n\n§YOfficer Renn:§! Occupancy is generally easier to verify than this.\n\n§YOfficer Voss:§! Then perhaps the office prefers clients to tenants."
 dsi.208.name:0 "Case File #5255"
 dsi.208.desc:0 "§HThe Missing Hall§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Infrastructure / Spatial\n\nResidents of a Habitation Tower occasionally report a hallway disappearing between one day and the next. Apartments normally reached through the corridor remain accessible by alternate routes during these periods.\n\nThe hallway always returns.\n\nMaintenance records confirm repeated reports spanning several years. Building plans remain unchanged and show no evidence that the corridor was ever absent.\n\n§YOfficer Renn:§! Corridors are expected to maintain continuity.\n\n§YOfficer Voss:§! This one appears to take occasional leave."
 dsi.209.name:0 "Case File #5292"
 dsi.209.desc:0 "§HThe Cargo Pallet§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Logistics / Delivery\n\nA cargo pallet periodically arrives at the Research Station Logistics Wing with complete shipping documentation and routine office supplies.\n\nThe listed recipients no longer exist.\n\nDepartments named on the manifest were dissolved, relocated, or closed years before the recorded shipment date. Despite this, inventory records indicate the deliveries were accepted and processed normally.\n\nNo origin facility has been identified.\n\n§YOfficer Renn:§! Deliveries generally require both a sender and a recipient.\n\n§YOfficer Voss:§! This one appears satisfied with only half the arrangement."
 dsi.210.name:0 "Case File #5329"
 dsi.210.desc:0 "§HThe Late Departure§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Transit / Scheduling\n\nPort Authority Terminal records periodically display a departure delayed by exactly seventeen minutes. The service appears on public schedules, operational logs, and platform displays.\n\nNo corresponding vessel exists.\n\nThe departure is never cancelled, never boards passengers, and never arrives. After seventeen minutes, it quietly disappears from all systems until the next occurrence.\n\n§YOfficer Renn:§! Delays generally imply the existence of something being delayed.\n\n§YOfficer Voss:§! Then perhaps the departure is still trying to leave."
 dsi.211.name:0 "Case File #5366"
 dsi.211.desc:0 "§HThe Light Under the Door§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Observation / Occupancy\n\nEmployees working late in the Planetary Archive occasionally report light visible beneath the door of a locked records room.\n\nThe room is unused and disconnected from the building power grid.\n\nInspection teams consistently find the space dark and empty. Security recordings capture the light exactly as reported but reveal no source.\n\nSeveral witnesses insist the unsettling part was not the light itself, but the impression that someone on the other side noticed them.\n\n§YOfficer Renn:§! Impressions are not evidence.\n\n§YOfficer Voss:§! Then I would like to know why the evidence keeps creating them."
 dsi.212.name:0 "Case File #5403"
 dsi.212.desc:0 "§HThe Reappearing Bench§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Public Space / Unexplained\n\nA wooden bench located within a Public Housing Agency complex is routinely removed during maintenance, renovation, and landscaping projects.\n\nIt always returns.\n\nThe bench reappears in the same location within several days regardless of where it was stored, discarded, or relocated. Residents insist it has occupied the spot for decades despite records showing multiple replacement attempts.\n\nNo identifying marks or manufacturer information have been found.\n\n§YOfficer Renn:§! Benches are not generally expected to exhibit persistence.\n\n§YOfficer Voss:§! Then perhaps someone is very attached to the view."
 dsi.213.name:0 "Case File #5440"
 dsi.213.desc:0 "§HThe Silent Receptionist§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Personnel / Witness Reliability\n\nEmployees at the District Infrastructure Office occasionally seek assistance from a receptionist assigned to the main lobby.\n\nNo such position exists.\n\nWitnesses describe the receptionist as courteous, helpful, and difficult to recall in detail afterward. Security footage consistently shows employees stopping at an empty desk, listening attentively, and leaving with forms, directions, or completed paperwork.\n\nSeveral requests processed through the receptionist were resolved correctly.\n\n§YOfficer Renn:§! Helpful service is not proof of existence.\n\n§YOfficer Voss:§! It is also not proof against it."
 dsi.214.name:0 "Case File #5477"
 dsi.214.desc:0 "§HThe Account With No Owner§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Records / Identity\n\nA routine audit of administrative systems at the Medical Intake Center identified an active account with no associated owner.\n\nThe account has existed for at least nine years.\n\nIt receives updates, accesses records within its authorization level, and occasionally submits routine maintenance requests. All activity appears legitimate and complies with established procedure.\n\nNo employee, patient, contractor, or automated process has been linked to the account.\n\n§YOfficer Renn:§! Unattributed access is a security concern.\n\n§YOfficer Voss:§! Then it is fortunate the account appears more responsible than most users."
 dsi.215.name:0 "Case File #5514"
 dsi.215.desc:0 "§HThe Wrong Emergency Signal§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Emergency Systems / Misidentification\n\nCustoms Checkpoint personnel reported several instances of emergency alarms activating without a corresponding incident. Each signal was determined to be incorrect and was dismissed as a technical fault.\n\nThe alarms nevertheless prompted the appropriate response.\n\nDuring one event, a fire alarm preceded a security breach. During another, a decompression warning occurred shortly before a power failure. The signals were wrong in detail but consistently correct in urgency.\n\nNo source of the alerts has been identified.\n\n§YOfficer Renn:§! Emergency systems are expected to identify the correct emergency.\n\n§YOfficer Voss:§! This one appears satisfied with being approximately helpful."
 dsi.216.name:0 "Case File #5551"
 dsi.216.desc:0 "§HThe Staff Photograph§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Records / Identity\n\nA framed staff photograph displayed in the Commercial Concourse appears entirely ordinary at first glance. The image depicts a routine group portrait of employees taken during the facility's opening year.\n\nThe difficulty is that the number of people in the photograph varies.\n\nWitnesses reviewing the image independently report different headcounts. Several insist there is always one individual they recognize but cannot identify afterward.\n\nDigital scans produce the same disagreement.\n\n§YOfficer Renn:§! Photographs are expected to preserve information.\n\n§YOfficer Voss:§! This one appears to be negotiating the terms."
 dsi.217.name:0 "Case File #5588"
 dsi.217.desc:0 "§HThe Decommissioned Lift§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Transit / Infrastructure\n\nA freight lift decommissioned during a station expansion continues to appear in maintenance reports, access logs, and occasional witness statements.\n\nThe lift was removed twelve years ago.\n\nEmployees who claim to have used it describe reaching their destination unusually quickly. Several insist the lift still serves levels that no longer exist on current station plans.\n\nInspection teams have confirmed the shaft is empty.\n\n§YOfficer Renn:§! Removed infrastructure is expected to remain removed.\n\n§YOfficer Voss:§! Then perhaps the lift has not received the update."
 dsi.218.name:0 "Case File #5625"
 dsi.218.desc:0 "§HThe Misprinted Directory§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Navigation / Records\n\nA printed facility directory distributed throughout the Subsurface Service Network contains a recurring typographical error. The mistake differs between editions but always identifies a location that does not appear on any official plan.\n\nEmployees occasionally attempt to visit the listed destination.\n\nSeveral report finding it.\n\nThe descriptions vary, but all agree the location is ordinary, occupied, and absent from every subsequent copy of the directory.\n\n§YOfficer Renn:§! Directories are expected to reduce confusion.\n\n§YOfficer Voss:§! This one appears to be conducting field research."
 dsi.219.name:0 "Case File #5662"
 dsi.219.desc:0 "§HThe Waiting List§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Administrative / Enrollment\n\nA waiting list maintained by the Education District contains the names of students awaiting placement in specialized programs.\n\nSeveral listed students have not applied.\n\nIn multiple cases, individuals appeared on the waiting list weeks before submitting any paperwork. A small number later withdrew applications they had not yet filed.\n\nThe list itself remains accurate.\n\n§YOfficer Renn:§! Administrative records are expected to follow decisions, not anticipate them.\n\n§YOfficer Voss:§! Then someone appears to be handling admissions in the wrong order."
 dsi.220.name:0 "Case File #5699"
 dsi.220.desc:0 "§HThe Line That Would Not End§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Public Behavior / Contained\n\nMuseum Storage Wing personnel reported a queue forming outside a locked service counter that had been out of operation for several years.\n\nThe line continued to grow throughout the day.\n\nWitnesses joined willingly despite being unable to explain what was being distributed. Individuals who reached the front of the queue left satisfied and declined to discuss the experience.\n\nThe service counter remained locked throughout the incident.\n\n§YOfficer Renn:§! Queues generally require a purpose.\n\n§YOfficer Voss:§! Then it is concerning that this one functioned without one."
 dsi.221.name:0 "Case File #5736"
 dsi.221.desc:0 "§HThe Return Address§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Postal / Location\n\nA routine shipment received by the Survey Vessel Records Room carried a valid return address. Efforts to identify the sender began after staff discovered the address did not correspond to any registered location.\n\nThe address nevertheless exists.\n\nTracking systems have briefly placed it in orbit, inside a warehouse, and on the desk of the clerk reviewing the case. Each result was confirmed before disappearing from subsequent records.\n\nNo physical site has been located.\n\n§YOfficer Renn:§! Addresses are intended to identify places.\n\n§YOfficer Voss:§! This one appears content identifying possibilities."
 dsi.222.name:0 "Case File #5773"
 dsi.222.desc:0 "§HThe Power Meter§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Utilities / Monitoring\n\nA power meter within an Urban Arcology Block reports consistent electrical consumption from a unit that does not exist on any utility map, floor plan, or occupancy record.\n\nThe readings are stable and unremarkable.\n\nThe unidentified account has paid every bill on time for at least fourteen years. Consumption patterns suggest normal residential use, including predictable peaks during evenings and local holidays.\n\nNo corresponding location has been identified.\n\n§YOfficer Renn:§! Utility service generally requires a customer.\n\n§YOfficer Voss:§! Then someone has been living responsibly in a place we cannot find."
 dsi.223.name:0 "Case File #5810"
 dsi.223.desc:0 "§HThe Train Announcement§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Communications / Source Unknown\n\nEmployees at the Municipal Records Office periodically hear a public transit announcement over internal audio systems. The message provides platform information, arrival times, and routine travel advisories.\n\nThere are no trains within the facility.\n\nAudio analysis identified background sounds matching the Records Office itself, including footsteps, ventilation noise, and pages being turned near a microphone that does not exist.\n\nNo source for the transmission has been located.\n\n§YOfficer Renn:§! Transportation announcements are expected to correspond to transportation.\n\n§YOfficer Voss:§! Then perhaps the station is lost and trying to ask for directions."
 dsi.224.name:0 "Case File #5847"
 dsi.224.desc:0 "§HThe Child's Drawing§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Artifact / Predictive\n\nA child's drawing was recovered from a lost-property box at Frontier Transit Hub. The image depicts ordinary station activity rendered in colored marker.\n\nSeveral details are not ordinary.\n\nThe drawing consistently matches minor changes to the facility before they occur, including temporary kiosks, maintenance barriers, and seasonal decorations. Updated copies have appeared despite the original remaining secured in evidence storage.\n\nNo artist has been identified.\n\n§YOfficer Renn:§! Crayon is not a recognized forecasting method.\n\n§YOfficer Voss:§! Then someone is achieving remarkable results with inadequate tools."
 dsi.225.name:0 "Case File #5884"
 dsi.225.desc:0 "§HThe Expired Pass§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Security / Access\n\nAn identification pass expired twenty-one years ago continues to appear in access logs throughout the Orbital Administration Annex. The credential belonged to an employee whose records indicate they left the facility before the current security system was installed.\n\nThe pass is never presented on camera.\n\nDoors register valid authentication, open normally, and record the credential number before the event disappears from subsequent audit reviews.\n\nThe original pass remains secured in evidence storage.\n\n§YOfficer Renn:§! Expired credentials are not expected to improve with age.\n\n§YOfficer Voss:§! Then perhaps it is no longer using the expiration date."
 dsi.226.name:0 "Case File #5921"
 dsi.226.desc:0 "§HThe Second Inspection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Compliance / Records\n\nA routine maintenance inspection at the Colony Maintenance Bureau was completed, signed, and archived without incident.\n\nThree days later, a second inspection report appeared.\n\nThe document used the correct forms, referenced conditions that had existed during the original inspection, and identified several minor issues that were subsequently confirmed. No inspector was assigned to the follow-up review.\n\nThe first inspection remains valid.\n\n§YOfficer Renn:§! One inspection is generally sufficient.\n\n§YOfficer Voss:§! Then someone appears committed to quality assurance."
 dsi.227.name:0 "Case File #5958"
 dsi.227.desc:0 "§HThe Unopened Crate§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Logistics / Delivery\n\nAn unopened shipping crate has circulated through the Civil Security Precinct for over four years. The container carries valid routing information, inspection seals, and delivery documentation.\n\nNo recipient exists.\n\nAttempts to return the crate result in it re-entering the delivery queue several days later with updated paperwork and a new delivery date. The crate has never been opened.\n\nNo shipping origin has been identified.\n\n§YOfficer Renn:§! Undeliverable freight is expected to stop traveling eventually.\n\n§YOfficer Voss:§! Then perhaps it has mistaken movement for progress."
 dsi.228.name:0 "Case File #5995"
 dsi.228.desc:0 "§HThe Corridor Camera§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Surveillance / Observation\n\nResidents of a Habitation Tower occasionally report a security camera mounted above a service corridor. The device appears in maintenance requests, incident reports, and archived photographs.\n\nNo such camera exists.\n\nBuilding inspections have confirmed the mounting location is empty. Nevertheless, footage attributed to the camera continues to appear in security archives during routine investigations.\n\nThe recordings are consistently useful.\n\n§YOfficer Renn:§! Surveillance equipment is expected to be physically present.\n\n§YOfficer Voss:§! Then someone is providing a service without the inconvenience of hardware."
 dsi.229.name:0 "Case File #6032"
 dsi.229.desc:0 "§HThe Old Complaint Number§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Records / Administrative\n\nA complaint number retired during a records migration continues to appear in new submissions at the Research Station Logistics Wing.\n\nThe original case was closed forty-two years ago.\n\nEvery report assigned the number concerns a different issue, filed by different personnel, and from unrelated departments. Despite this, administrative systems consistently link the reports to the obsolete record.\n\nNo fault has been identified in the tracking software.\n\n§YOfficer Renn:§! Closed cases are expected to remain closed.\n\n§YOfficer Voss:§! Then perhaps the number still has unresolved concerns."
 dsi.230.name:0 "Case File #6069"
 dsi.230.desc:0 "§HThe Cancelled Meeting§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Administrative / Records\n\nA routine planning meeting at Port Authority Terminal was cancelled after several attendees reported scheduling conflicts. The room reservation was removed and cancellation notices were distributed.\n\nThe following morning, meeting minutes appeared in the department archive.\n\nThe document records a complete discussion, attendance list, and several approved maintenance actions. Every listed participant agrees the meeting never took place.\n\nThe approved actions were later carried out.\n\n§YOfficer Renn:§! Cancellation is generally expected to prevent a meeting.\n\n§YOfficer Voss:§! Apparently only the attendees were absent."
 dsi.231.name:0 "Case File #6106"
 dsi.231.desc:0 "§HThe Empty Terminal§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Transit / Occupancy\n\nArchive staff discovered repeated references to an empty terminal in maintenance records, cleaning schedules, and transit advisories. The terminal does not appear on any current map.\n\nWitnesses describe an ordinary passenger concourse with benches, information displays, and no travelers.\n\nDespite being consistently unoccupied, service logs record daily cleaning, periodic repairs, and several complaints regarding crowding.\n\n§YOfficer Renn:§! Crowds are generally expected to contain people.\n\n§YOfficer Voss:§! Then perhaps the complaints are being filed by the terminal itself."
 dsi.232.name:0 "Case File #6143"
 dsi.232.desc:0 "§HThe Locked Museum Case§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Artifact / Access\n\nA display case recovered during a property transfer to the Public Housing Agency has remained locked for at least seventeen years. No key, access code, or opening mechanism has been identified.\n\nThe contents change.\n\nWitnesses describe documents, personal effects, historical artifacts, and once a half-finished lunch. No two inventories match, though all observers agree the case was locked at the time.\n\nThe exterior remains unchanged.\n\n§YOfficer Renn:§! Exhibits are expected to remain inside the display.\n\n§YOfficer Voss:§! To be fair, they do. Just not the same exhibits."
 dsi.233.name:0 "Case File #6180"
 dsi.233.desc:0 "§HThe Unscheduled Ferry§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Transit / Operations\n\nPort operations software occasionally records the arrival and departure of a ferry not listed on any schedule. The vessel receives a berth assignment, generates maintenance requests, and consumes fuel allocations.\n\nNo crew reports seeing it.\n\nThe ferry leaves behind docking fees, inspection records, and passenger counts before disappearing from the system several hours later.\n\nNo registration matching the vessel has been identified.\n\n§YOfficer Renn:§! Transportation assets are generally expected to exist.\n\n§YOfficer Voss:§! Then someone has found a remarkably efficient way to avoid inspection."
 dsi.234.name:0 "Case File #6217"
 dsi.234.desc:0 "§HThe Missing Stair§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Infrastructure / Safety\n\nStaff at the Medical Intake Center submitted repeated maintenance requests concerning a missing stair on a secondary staircase.\n\nThe stair is not always missing.\n\nWitnesses report encountering a gap where a step should be, forcing them to skip it. Inspection teams consistently find the staircase intact. Several maintenance workers later reported tripping on the absent step despite knowing exactly where it was supposed to be.\n\n§YOfficer Renn:§! Staircases are expected to maintain a stable number of stairs.\n\n§YOfficer Voss:§! This one appears to be experimenting with subtraction."
 dsi.235.name:0 "Case File #6254"
 dsi.235.desc:0 "§HThe Office Renovation§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Facilities / Records\n\nEmployees at Customs Checkpoint arrived one morning to find a small office fully renovated. New furniture, updated lighting, and fresh wall finishes matched current facility standards.\n\nNo renovation was authorized.\n\nProcurement records show no purchases, maintenance logs show no work orders, and security footage records no construction activity. Staff generally agree the room looks better than before.\n\nSeveral have requested similar renovations.\n\n§YOfficer Renn:§! Improvements are still expected to leave paperwork.\n\n§YOfficer Voss:§! Then someone has solved construction and chosen not to share."
 dsi.236.name:0 "Case File #6291"
 dsi.236.desc:0 "§HThe Reassigned Cubicle§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Workplace / Personnel\n\nA cubicle within the Commercial Concourse administrative offices has been reassigned twenty-seven times in six years.\n\nNone of the assigned employees remember working there.\n\nPersonnel records consistently place staff at the workstation for periods ranging from several days to several months. Timesheets, access logs, and internal correspondence support the assignments.\n\nThe cubicle remains empty.\n\n§YOfficer Renn:§! Workstations are generally assigned to people.\n\n§YOfficer Voss:§! This one appears content collecting them instead."
 dsi.237.name:0 "Case File #6328"
 dsi.237.desc:0 "§HThe Transit Map§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Navigation / Transit\n\nA transit map displayed within Terraforming Oversight Station occasionally includes one additional route not present on any official schedule.\n\nThe route changes location between occurrences.\n\nPassengers who attempt to follow it report reaching valid destinations by entirely ordinary means. The difficulty is that none can later explain the path they took.\n\nThe extra route is absent from all archived copies of the map.\n\n§YOfficer Renn:§! Maps are expected to describe existing routes.\n\n§YOfficer Voss:§! This one appears to be making suggestions."
 dsi.238.name:0 "Case File #6365"
 dsi.238.desc:0 "§HThe Night Supervisor§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Personnel / Administrative\n\nPersonnel within the Subsurface Service Network reported to a night supervisor for several weeks before anyone attempted to verify the position.\n\nNo such position exists.\n\nEmployees received schedules, approvals, and routine guidance through normal channels. The supervisor's instructions were consistently correct, unremarkable, and submitted on time.\n\nNo hiring record, assignment order, or payroll entry has been located.\n\n§YOfficer Renn:§! Supervisors are generally expected to appear somewhere in the organizational chart.\n\n§YOfficer Voss:§! This one appears to have skipped directly to management."
 dsi.239.name:0 "Case File #6402"
 dsi.239.desc:0 "§HThe Inventory Discrepancy§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Inventory / Records\n\nA routine inventory audit within the Education District identified a persistent discrepancy involving twelve folding chairs.\n\nThe chairs have been counted, tagged, photographed, and physically inspected. Every inventory system insists there should be eleven.\n\nAttempts to correct the records cause a different chair to become the twelfth.\n\n§YOfficer Renn:§! Inventory is not supposed to negotiate.\n\n§YOfficer Voss:§! One chair appears unusually determined."
 dsi.240.name:0 "Case File #6439"
 dsi.240.desc:0 "§HThe Pale Window§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Observation / Witness Reliability\n\nEmployees working late in the Museum Storage Wing occasionally report a pale window at the end of a service corridor.\n\nNo window exists there.\n\nWitnesses describe dim daylight beyond the glass regardless of local time. Inspection teams consistently find a blank wall. Several employees later altered floor maps to include the window without remembering doing so.\n\n§YOfficer Renn:§! Walls are not generally transparent.\n\n§YOfficer Voss:§! Neither are records, yet here we are."
 dsi.241.name:0 "Case File #6476"
 dsi.241.desc:0 "§HThe Warm Handrail§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Infrastructure / Observation\n\nA handrail on a secondary stairwell within the Survey Vessel Records Room remains slightly warm to the touch.\n\nThe staircase is rarely used.\n\nTemperature readings confirm the warmth, which follows no identifiable pattern. Staff routinely report the sensation that someone has just passed by, though security footage consistently shows an empty corridor.\n\n§YOfficer Renn:§! Residual heat is not evidence of a person.\n\n§YOfficer Voss:§! Then it is being remarkably specific by accident."
 dsi.242.name:0 "Case File #6513"
 dsi.242.desc:0 "§HThe Copy Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Facilities / Occupancy\n\nEmployees occasionally report using a copy room that does not appear on any floor plan of the Urban Arcology Block.\n\nThe room can only be reached from a single corridor.\n\nDocuments reproduced there are accurate, properly formatted, and stamped with approval marks from departments that do not exist. Attempts to relocate the room have been unsuccessful.\n\n§YOfficer Renn:§! Copy machines are not authorized to create departments.\n\n§YOfficer Voss:§! Then someone should inform the paperwork."
 dsi.243.name:0 "Case File #6550"
 dsi.243.desc:0 "§HThe Unfinished Report§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Records / Administrative\n\nA report within the Municipal Records Office has remained marked *Draft* for eleven years.\n\nThe final section is blank.\n\nDespite this, the document has been cited in audits, referenced by policy reviews, and approved by multiple departments. Staff consulting the report consistently describe it as complete until asked which section contains the conclusion.\n\n§YOfficer Renn:§! Drafts are expected to become finished eventually.\n\n§YOfficer Voss:§! This one appears to have delegated the responsibility."
 dsi.244.name:0 "Case File #6587"
 dsi.244.desc:0 "§HThe Emergency Stair Door§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Infrastructure / Access\n\nAn emergency stair door at Frontier Transit Hub occasionally appears on inspection reports despite not existing on any building plan.\n\nThe door is always found unlocked.\n\nWitnesses describe a normal stairwell beyond. Follow-up inspections consistently locate only a painted wall. Safety audits nevertheless continue to record the door as compliant and in regular use.\n\n§YOfficer Renn:§! Emergency exits are expected to remain locatable.\n\n§YOfficer Voss:§! This one appears committed to flexibility."
 dsi.245.name:0 "Case File #6624"
 dsi.245.desc:0 "§HThe Forgotten Visitor§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Personnel / Identity\n\nSecurity records confirm a visitor entered the Orbital Administration Annex, signed in, attended two meetings, and departed normally.\n\nNo one remembers them.\n\nThe visitor appears in logs, schedules, and access records. Witnesses reviewing the evidence agree someone was present but cannot recall a name, description, or conversation.\n\n§YOfficer Renn:§! Attendance is not identity.\n\n§YOfficer Voss:§! Apparently it was enough for the visitor."
 dsi.246.name:0 "Case File #6661"
 dsi.246.desc:0 "§HThe Notice Board§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Communications / Public Information\n\nA notice board in the Colony Maintenance Bureau occasionally displays announcements before they are written.\n\nThe postings are mundane: room changes, maintenance closures, staff reminders, and meeting notices.\n\nThe information is consistently accurate. The documents themselves do not exist until several hours later.\n\n§YOfficer Renn:§! Bulletin boards are not forecasting equipment.\n\n§YOfficer Voss:§! Then someone is posting with admirable enthusiasm."
 dsi.247.name:0 "Case File #6698"
 dsi.247.desc:0 "§HThe Old Chair§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Workplace / Behavior\n\nAn old office chair stored in a corner of the Civil Security Precinct has not been assigned to any employee for at least nine years.\n\nNobody sits in it.\n\nStaff routinely move around the chair, leave space for it during office reorganizations, and object when it is removed. Most are unable to explain why.\n\nThe chair has no unusual physical properties.\n\n§YOfficer Renn:§! Furniture is not entitled to professional courtesy.\n\n§YOfficer Voss:§! Then someone should probably tell the staff."
 dsi.248.name:0 "Case File #6735"
 dsi.248.desc:0 "§HThe Quiet Generator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Utilities / Infrastructure\n\nA backup generator in a Habitation Tower has remained operational despite producing no measurable sound.\n\nThe unit supplies power normally.\n\nMaintenance inspections have confirmed fuel consumption, heat output, and electrical generation consistent with active operation. Audio equipment placed beside the housing records only ambient background noise.\n\n§YOfficer Renn:§! Generators are expected to generate noise.\n\n§YOfficer Voss:§! This one appears unusually considerate."
 dsi.249.name:0 "Case File #6772"
 dsi.249.desc:0 "§HThe Wrong Applicant§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Personnel / Records\n\nA position at the Research Station Logistics Wing was filled by an applicant whose qualifications, references, and employment history were verified without issue.\n\nThe applicant does not appear in the submitted application.\n\nPersonnel records confirm someone was hired. The application file describes a different individual who has never been identified.\n\n§YOfficer Renn:§! Hiring decisions are expected to involve the correct applicant.\n\n§YOfficer Voss:§! Apparently someone skipped a step and improved the process."
 dsi.250.name:0 "Case File #6809"
 dsi.250.desc:0 "§HThe Shared Dream Report§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Public Safety / Contained\n\nPort Authority staff submitted separate fatigue reports describing the same waiting room, the same locked departure gate, and the same announcement asking passengers to remain seated.\n\nThe reports were filed independently.\n\nSeveral included identical sketches of a gate number not used anywhere in the terminal. The dreams ceased after the reports were bundled into a single case file.\n\nThe file remains noticeably warm after midnight.\n\n§YOfficer Renn:§! Shared stress can produce common imagery.\n\n§YOfficer Voss:§! Can shared stress draw the same gate number seventeen times?"
 dsi.251.name:0 "Case File #6846"
 dsi.251.desc:0 "§HThe Missing Floor Button§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Transit / Infrastructure\n\nEmployees occasionally report a floor-selection button inside a service elevator that does not appear on maintenance diagrams.\n\nThe button is absent during inspection.\n\nWitnesses who press it describe an ordinary elevator ride and arrive at legitimate destinations. The difficulty is that none can later explain which floor they selected.\n\n§YOfficer Renn:§! Elevators are expected to travel to numbered floors.\n\n§YOfficer Voss:§! Then perhaps this one prefers descriptions."
 dsi.252.name:0 "Case File #6883"
 dsi.252.desc:0 "§HThe Morning Fog§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Environmental / Observation\n\nResidents of a Public Housing Agency complex occasionally report morning fog visible through windows, security cameras, and exterior photographs.\n\nThe fog is not present outside.\n\nWeather sensors record clear conditions during every occurrence. Witnesses who step outdoors consistently report normal visibility despite continuing to see the fog in nearby reflections and recordings.\n\n§YOfficer Renn:§! Atmospheric conditions are expected to occupy the atmosphere.\n\n§YOfficer Voss:§! Then perhaps this one prefers observation to participation."
 dsi.253.name:0 "Case File #6920"
 dsi.253.desc:0 "§HThe Sealed Apartment§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Residential / Occupancy\n\nA residential unit within a District Infrastructure Office housing block has remained sealed for at least eighteen years.\n\nUtility usage indicates continuous occupancy.\n\nPower, water, and network consumption follow normal residential patterns. Maintenance requests are occasionally submitted from the unit and resolved remotely.\n\nThe apartment has never been opened.\n\n§YOfficer Renn:§! Occupancy generally requires access.\n\n§YOfficer Voss:§! Then someone appears to be managing without it."
 dsi.254.name:0 "Case File #6957"
 dsi.254.desc:0 "§HThe Late Maintenance Crew§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Facilities / Personnel\n\nMaintenance issues at the Medical Intake Center are occasionally resolved before any work crew arrives.\n\nSeveral hours later, a maintenance crew signs in, reviews the completed repair, and files the appropriate paperwork.\n\nNo employment records exist for the crew. The submitted reports are accurate, properly formatted, and always late.\n\n§YOfficer Renn:§! Repairs are expected to follow maintenance work.\n\n§YOfficer Voss:§! This crew appears to specialize in documentation."
 dsi.255.name:0 "Case File #6994"
 dsi.255.desc:0 "§HThe Storage Receipt§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Records / Inventory\n\nA storage receipt recovered at Customs Checkpoint documents the placement of a container into Warehouse Bay 12.\n\nNo such container can be found.\n\nThe receipt includes a location, inventory number, and accumulated storage fees. Audits confirm the fees have been paid regularly for eleven years.\n\nThe listed storage space remains occupied.\n\n§YOfficer Renn:§! Storage records are expected to correspond to stored items.\n\n§YOfficer Voss:§! Then someone is paying to keep a very low profile."
 dsi.256.name:0 "Case File #7031"
 dsi.256.desc:0 "§HThe Twice-Signed Form§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Records / Authorization\n\nA standard authorization form submitted within the Commercial Concourse has been recorded with two distinct signatures from the same approver.\n\nBoth signatures are valid, timestamped, and verified against official records.\n\nThe approver insists they signed the document only once. Audit logs show no reprocessing or duplication events.\n\nThe form remains on file as originally submitted.\n\n§YOfficer Renn:§! Authorization requires a single point of approval.\n\n§YOfficer Voss:§! This one appears to have developed an opinion and reinforced it."
 dsi.257.name:0 "Case File #7068"
 dsi.257.desc:0 "§HThe Power Outage§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Utilities / Infrastructure\n\nA localized power outage occurred within a residential sector of the Terraforming Oversight Station.\n\nPower was restored automatically within six minutes.\n\nDuring the outage, no systems recorded failure conditions. Lighting, heating, and life support continued to function normally according to internal logs, despite residents reporting total darkness.\n\nAfter restoration, all affected systems confirmed uninterrupted operation.\n\n§YOfficer Renn:§! Power outages are expected to involve a loss of power.\n\n§YOfficer Voss:§! Then something else appears to have gone dark instead."
 dsi.258.name:0 "Case File #7105"
 dsi.258.desc:0 "§HThe Room Service Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Communications / Hospitality\n\nA room service request was received through internal Subsurface Service Network channels for an unassigned maintenance room.\n\nThe order was fulfilled within standard time.\n\nNo request exists in the system logs prior to fulfillment, and no originating terminal has been identified. The delivered item—a standard maintenance kit—matched a scheduled requirement generated the following day.\n\n§YOfficer Renn:§! Requests are expected to precede delivery.\n\n§YOfficer Voss:§! Then someone appears to be working slightly ahead of schedule."
 dsi.259.name:0 "Case File #7142"
 dsi.259.desc:0 "§HThe Unclaimed Luggage§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Logistics / Property\n\nA piece of luggage remains unclaimed in Education District storage despite matching multiple active claims in the system.\n\nEach claimant identifies the luggage as theirs without contradiction, but none can successfully remove it from custody.\n\nWhen released for collection, the luggage is always found already returned to storage with updated identification tags.\n\n§YOfficer Renn:§! Property claims require exclusive ownership.\n\n§YOfficer Voss:§! Then this one appears to prefer shared custody."
 dsi.260.name:0 "Case File #7179"
 dsi.260.desc:0 "§HThe Sublevel Directory§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Navigation / Records\n\nA printed directory of museum sublevels lists three additional floors beyond the official building structure.\n\nThe listed levels are not present on any architectural plan.\n\nMaintenance teams occasionally report accessing them via service elevators. The sublevels are described consistently, though each report places them in different vertical positions relative to known floors.\n\nThe directory updates itself after each inspection.\n\n§YOfficer Renn:§! Building levels are expected to remain fixed.\n\n§YOfficer Voss:§! This one appears to be rearranging itself for clarity."
 dsi.261.name:0 "Case File #7216"
 dsi.261.desc:0 "§HThe Incident Review§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Records / Audit\n\nAn incident review was discovered already filed within the Survey Vessel Records Room archive.\n\nThe incident it describes has no corresponding entry in any operational logs.\n\nAttempts to locate the original event consistently produce blank records for the same time period. The review itself remains complete, properly formatted, and fully approved.\n\n§YOfficer Renn:§! Reviews are expected to follow incidents.\n\n§YOfficer Voss:§! This one appears to have filed the incident retroactively."
 dsi.262.name:0 "Case File #7253"
 dsi.262.desc:0 "§HThe Off-Duty Patrol§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Security / Operations\n\nSecurity systems within the Urban Arcology Block periodically register patrol routes being completed outside scheduled shifts.\n\nNo corresponding patrol units are recorded as active.\n\nDespite this, incident response times during these periods improve, minor violations are resolved, and reports are correctly filed before staff submit them.\n\n§YOfficer Renn:§! Patrols are expected to be scheduled.\n\n§YOfficer Voss:§! Then someone is volunteering off the record."
 dsi.263.name:0 "Case File #7290"
 dsi.263.desc:0 "§HThe Old Call Sign§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Communications / Records\n\nAn obsolete internal call sign continues to appear in routing tables within the Municipal Records Office communications system.\n\nThe call sign is no longer assigned.\n\nDespite this, transmissions occasionally resolve to it, correctly routing messages to active departments and generating accurate delivery confirmations.\n\nNo current allocation exists for the identifier.\n\n§YOfficer Renn:§! Retired identifiers are expected to remain inactive.\n\n§YOfficer Voss:§! This one appears to still be answering."
 dsi.264.name:0 "Case File #7327"
 dsi.264.desc:0 "§HThe Silent Dock§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Infrastructure / Transit\n\nA docking platform at the Frontier Transit Hub operates without issuing arrival or departure signals.\n\nVessels consistently berth at the location during scheduled traffic windows, complete standard unloading procedures, and depart without incident.\n\nNo operational audio, signal chatter, or platform announcements are recorded during these events.\n\n§YOfficer Renn:§! Docking procedures are expected to generate communication noise.\n\n§YOfficer Voss:§! This one appears to prefer quiet professionalism."
 dsi.265.name:0 "Case File #7364"
 dsi.265.desc:0 "§HThe Office Radio§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Communications / Equipment\n\nA standard office radio installed in the Orbital Administration Annex periodically receives transmissions despite being disconnected from all known communication networks.\n\nThe device is not powered during these events.\n\nRecorded audio consists of routine administrative chatter, maintenance updates, and shift handovers matching real internal activity from the following day.\n\nNo transmission source has been identified.\n\n§YOfficer Renn:§! Unpowered devices are not expected to receive broadcasts.\n\n§YOfficer Voss:§! Then someone is transmitting without requiring permission from physics."
 dsi.266.name:0 "Case File #7401"
 dsi.266.desc:0 "§HThe Turned Photograph§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Records / Visual\n\nA framed staff photograph displayed in the Colony Maintenance Bureau is periodically found rotated 180 degrees within its mount without signs of disturbance.\n\nSecurity seals remain intact during each occurrence.\n\nThe image content does not change, but faces within the photograph are consistently oriented toward the viewer, regardless of the frame’s position.\n\nNo recorded interaction accounts for the movement.\n\n§YOfficer Renn:§! Framed materials are expected to remain fixed.\n\n§YOfficer Voss:§! This one appears to be adjusting its perspective."
 dsi.267.name:0 "Case File #7438"
 dsi.267.desc:0 "§HThe Door With No Handle§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Infrastructure / Access\n\nA maintenance door within the Civil Security Precinct cannot be opened through any known mechanical or electronic means.\n\nThe door has no handle, keyway, or control interface.\n\nDespite this, it is routinely found in a slightly different orientation within its frame after standard inspections, as though it has been opened and closed from the opposite side.\n\nNo access events are recorded.\n\n§YOfficer Renn:§! Doors are expected to provide directional access.\n\n§YOfficer Voss:§! This one appears to disagree about direction entirely."
 dsi.268.name:0 "Case File #7475"
 dsi.268.desc:0 "§HThe Recovered Badge§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Security / Access\n\nA personnel badge recovered from lost property storage continues to grant access permissions despite being marked as deactivated in all security systems.\n\nThe badge contains no readable identifiers.\n\nWhen presented at restricted doors, access is consistently granted for approximately eleven seconds before standard logout procedures complete without error.\n\nNo active assignment exists for the credential.\n\n§YOfficer Renn:§! Deactivated credentials are expected to remain inactive.\n\n§YOfficer Voss:§! Then this one appears to have not received the notice."
 dsi.269.name:0 "Case File #7512"
 dsi.269.desc:0 "§HThe Misnumbered Street§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Infrastructure / Records\n\nA residential street adjacent to the Research Station Logistics Wing is inconsistently numbered across official maps, postal systems, and emergency response databases.\n\nAll numbering schemes are internally valid but mutually incompatible.\n\nMail, deliveries, and emergency services consistently arrive without error despite referencing different street numbers for the same physical location.\n\n§YOfficer Renn:§! Addresses are expected to identify a single location.\n\n§YOfficer Voss:§! This one appears to be successfully multitasking."
 dsi.270.name:0 "Case File #7549"
 dsi.270.desc:0 "§HThe Spare Nameplate§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Infrastructure / Identity\n\nA spare metal nameplate has been repeatedly discovered in maintenance storage at the Port Authority Terminal bearing names not assigned to any current or former staff.\n\nThe engraving does not match any approved production records.\n\nWhen installed on doors or desks, personnel report consistent but untraceable familiarity with the associated name, despite no corresponding employment history.\n\n§YOfficer Renn:§! Nameplates are expected to reflect assigned personnel.\n\n§YOfficer Voss:§! This one appears to be assigning them instead."
 dsi.271.name:0 "Case File #7586"
 dsi.271.desc:0 "§HThe Light in the Annex§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Environmental / Infrastructure\n\nA sealed archival annex within the Planetary Archive emits a steady light despite having no installed power source or active illumination systems.\n\nThe room remains locked during all recorded occurrences.\n\nInspection teams confirm the interior is empty, yet the light persists at a constant intensity and temperature. Power monitoring systems show no measurable draw.\n\n§YOfficer Renn:§! Illumination requires a source.\n\n§YOfficer Voss:§! Then this one appears to disagree about requirements."
 dsi.272.name:0 "Case File #7623"
 dsi.272.desc:0 "§HThe Closed Hotel Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Accommodation / Records\n\nA hotel room within a long-decommissioned accommodation block continues to appear as permanently closed in booking systems while simultaneously accumulating occupancy records.\n\nGuest logs confirm repeated check-ins under valid reservations.\n\nCleaning staff report servicing the room on schedule. Maintenance records confirm ongoing utility usage.\n\nThe room remains sealed to inspection requests.\n\n§YOfficer Renn:§! Closed accommodations are not expected to receive guests.\n\n§YOfficer Voss:§! Then someone appears to have reserved it anyway."
 dsi.273.name:0 "Case File #7660"
 dsi.273.desc:0 "§HThe Wrong Calendar§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Timekeeping / Records\n\nA standard administrative calendar distributed within the District Infrastructure Office displays dates that do not align with any recognized temporal cycle.\n\nScheduled events occur on the correct local day despite the calendar showing different dates.\n\nWhen replaced or corrected, the calendar reverts to its original state within one operational cycle.\n\n§YOfficer Renn:§! Calendars are expected to reflect time accurately.\n\n§YOfficer Voss:§! This one appears to be keeping its own schedule."
 dsi.274.name:0 "Case File #7697"
 dsi.274.desc:0 "§HThe Returning Footsteps§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Infrastructure / Audio\n\nAutomated corridor microphones within the Medical Intake Center repeatedly detect a set of footsteps traversing the same hallway segment in reverse direction at regular intervals.\n\nNo corresponding personnel movement is recorded.\n\nThe acoustic pattern remains identical across all recordings and is unaffected by time of day or corridor usage.\n\nMaintenance checks confirm no mechanical source within the flooring or ceiling.\n\n§YOfficer Renn:§! Audio systems are expected to record existing movement.\n\n§YOfficer Voss:§! Then something is walking on the recording itself."
 dsi.275.name:0 "Case File #7734"
 dsi.275.desc:0 "§HThe Empty Cradle§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Containment / Storage\n\nA secured containment cradle at Customs Checkpoint continues to register internal occupancy despite being physically empty during inspection.\n\nSensors detect consistent mass displacement matching a small contained object.\n\nLocking mechanisms engage normally, but containment integrity logs show intermittent confirmation of “secured contents” with no corresponding visual confirmation.\n\nNo item has been recovered.\n\n§YOfficer Renn:§! Containment systems require a contained object.\n\n§YOfficer Voss:§! Then something appears to be convincing the system it is there."
 dsi.276.name:0 "Case File #7771"
 dsi.276.desc:0 "§HThe Service Window§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Infrastructure / Public Interface\n\nA staffed service window at the Commercial Concourse continues to operate outside posted hours without assigned personnel.\n\nRequests submitted during these periods are processed normally, but the outcomes do not match the original request forms.\n\nRefunds, corrections, and follow-up services are issued automatically within hours.\n\nNo staff member claims responsibility for the transactions.\n\n§YOfficer Renn:§! Service systems are expected to preserve intent.\n\n§YOfficer Voss:§! Then someone is improving the requests."
 dsi.277.name:0 "Case File #7808"
 dsi.277.desc:0 "§HThe Dry Fountain§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Infrastructure / Utilities\n\nA public fountain within the Terraforming Oversight Station remains completely dry despite continuous water supply confirmed at the source.\n\nThe supply line functions normally, and pressure readings remain within expected parameters.\n\nHowever, water does not discharge at the fountain outlet under any recorded condition. No blockage, diversion, or mechanical failure has been identified.\n\n§YOfficer Renn:§! Fountains are expected to produce water.\n\n§YOfficer Voss:§! Then something appears to be drinking it before it arrives."
 dsi.278.name:0 "Case File #7845"
 dsi.278.desc:0 "§HThe Overnight Audit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Logistics / Compliance\n\nA routine overnight audit of Subsurface Service Network assets returned a complete and fully reconciled inventory report despite several storage units being physically inaccessible during the audit window.\n\nSecurity logs confirm no access events occurred.\n\nThe reported corrections match missing or unverified items with exact resolution codes.\n\n§YOfficer Renn:§! Audits require verifiable inspection.\n\n§YOfficer Voss:§! Then someone completed it without opening the boxes."
 dsi.279.name:0 "Case File #7882"
 dsi.279.desc:0 "§HThe Mail Slot§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Communications / Infrastructure\n\nA standard mail slot within the Education District continues to accept outgoing correspondence despite being permanently sealed on the interior side.\n\nDocuments placed at the slot are processed and delivered normally through internal postal routes.\n\nHowever, no physical opening exists on either side of the wall, and inspection confirms continuous masonry where the slot should be.\n\n§YOfficer Renn:§! Mail systems require an accessible input point.\n\n§YOfficer Voss:§! Then something is filing paperwork through absence."
 dsi.280.name:0 "Case File #7919"
 dsi.280.desc:0 "§HThe Supply Requisition§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Logistics / Procurement\n\nA standard supply requisition submitted from Museum Storage Wing was fulfilled despite listing items not held in any known inventory.\n\nAll requested materials arrived in correct quantities and specifications within standard delivery time.\n\nProcurement systems show no source warehouse, vendor, or dispatch record for the shipment.\n\n§YOfficer Renn:§! Supply requires a supply chain.\n\n§YOfficer Voss:§! Then someone is skipping the middle."
 dsi.281.name:0 "Case File #7956"
 dsi.281.desc:0 "§HThe Unauthorized Meeting§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Compliance / Records\n\nA meeting was recorded within Survey Vessel administrative logs without authorization, scheduling, or assigned attendees.\n\nDespite this, minutes were produced, approved, and archived through standard workflow channels.\n\nAll listed participants deny attending, yet the document includes task assignments that were later completed.\n\n§YOfficer Renn:§! Meetings require authorization to exist.\n\n§YOfficer Voss:§! This one appears to have submitted its paperwork first."
 dsi.282.name:0 "Case File #7993"
 dsi.282.desc:0 "§HThe Quiet House§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Urban arcology block\n§YClassification:§! Residential / Occupancy\n\nA residential unit within an Urban Arcology Block remains consistently unoccupied according to all access logs and utility records.\n\nDespite this, cleaning services are routinely completed, waste disposal is processed, and maintenance requests are submitted from inside the unit.\n\nNo authorized resident is registered.\n\n§YOfficer Renn:§! Occupancy requires a registered occupant.\n\n§YOfficer Voss:§! Then someone is maintaining excellent domestic discipline without paperwork."
 dsi.283.name:0 "Case File #8030"
 dsi.283.desc:0 "§HThe Missing Page§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Municipal records office\n§YClassification:§! Records / Archival\n\nA standard archival document within the Municipal Records Office consistently lacks page seven across all printed, digital, and certified copies.\n\nPage numbering remains continuous in indexes and references, and the missing content is never identical when reconstructed from citations.\n\nNo original version containing page seven has been recovered.\n\n§YOfficer Renn:§! Archival documents are expected to remain complete.\n\n§YOfficer Voss:§! Then something is removing the same idea in different ways."
 dsi.284.name:0 "Case File #8067"
 dsi.284.desc:0 "§HThe Late Elevator Operator§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Frontier transit hub\n§YClassification:§! Infrastructure / Operations\n\nElevator service logs at the Frontier Transit Hub record completed journeys initiated outside of scheduled operation hours.\n\nThe elevator car is confirmed to be idle during these periods.\n\nDespite this, doors open on correct floors, passengers disembark normally, and maintenance systems register no mechanical activation events.\n\n§YOfficer Renn:§! Elevators require active control input.\n\n§YOfficer Voss:§! Then something is operating it after hours."
 dsi.285.name:0 "Case File #8104"
 dsi.285.desc:0 "§HThe Old Ticket Booth§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Orbital administration annex\n§YClassification:§! Infrastructure / Operations\n\nA decommissioned ticket booth within the Orbital Administration Annex continues to issue valid transit tickets despite lacking power, staffing, or an active ticketing system.\n\nTickets generated from the booth correspond to real departures and correctly assigned seating.\n\nNo mechanical or electronic activation is recorded during issuance.\n\n§YOfficer Renn:§! Ticketing requires an operational system.\n\n§YOfficer Voss:§! Then something is still working behind the glass."
 dsi.286.name:0 "Case File #8141"
 dsi.286.desc:0 "§HThe Negative Space§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Colony maintenance bureau\n§YClassification:§! Security / Access\n\nA secured access corridor within the Colony Maintenance Bureau only permits entry when no physical object is detected within the threshold zone.\n\nMotion sensors and imaging systems register intermittent false occupancy, preventing access until cleared.\n\nWhen entry is granted, no personnel report encountering obstacles or individuals within the corridor.\n\n§YOfficer Renn:§! Access control requires a defined subject.\n\n§YOfficer Voss:§! Then something is being defined by its absence."
 dsi.287.name:0 "Case File #8178"
 dsi.287.desc:0 "§HThe Witness Who Apologized§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Civil security precinct\n§YClassification:§! Behavioral / Administrative\n\nMultiple incident reports within Civil Security Precinct conclude with an unsolicited apology appended to the official record.\n\nThe apologies appear in identical wording across unrelated cases, authored without attribution.\n\nReviewing officers consistently report accepting the apology as sufficient closure and declining further investigation.\n\nNo individual responsible for the appended statements has been identified.\n\n§YOfficer Renn:§! Apologies are not evidence of resolution.\n\n§YOfficer Voss:§! Then something is closing files politely."
 dsi.288.name:0 "Case File #8215"
 dsi.288.desc:0 "§HThe Room Behind the Room§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Habitation tower\n§YClassification:§! Infrastructure / Records\n\nBuilding schematics for the Habitation Tower consistently include an additional interior unit not present in architectural surveys or physical inspections.\n\nThe unit is referenced in maintenance logs and utility billing systems, which show normal residential usage patterns.\n\nNo access point to the unit has ever been located.\n\n§YOfficer Renn:§! Buildings are expected to match their plans.\n\n§YOfficer Voss:§! Then something is living in the revision layer."
 dsi.289.name:0 "Case File #8252"
 dsi.289.desc:0 "§HThe Weathered Plaque§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Research station logistics wing\n§YClassification:§! Records / Artifact\n\nA commemorative plaque located within the Research Station Logistics Wing contains engraved text referencing events that did not occur at the station.\n\nThe material composition and weathering patterns match local environmental exposure.\n\nHistorical archives contain no record of the named event or individuals listed.\n\nAttempts to correct or replace the plaque result in identical reproductions with the same inscription.\n\n§YOfficer Renn:§! Plaques are expected to commemorate real events.\n\n§YOfficer Voss:§! Then something is very confident about the past."
 dsi.290.name:0 "Case File #8289"
 dsi.290.desc:0 "§HThe Incomplete Census§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Port authority terminal\n§YClassification:§! Demographics / Records\n\nA population census conducted within the Port Authority Terminal jurisdiction consistently reports missing population entries across all demographic categories.\n\nHousehold records, employment logs, and transit usage data account for all individuals present, yet census totals remain incomplete by a fixed margin.\n\nNo missing individuals can be identified.\n\n§YOfficer Renn:§! Census data is expected to reconcile with known populations.\n\n§YOfficer Voss:§! Then something is present without agreeing to be counted."
 dsi.291.name:0 "Case File #8326"
 dsi.291.desc:0 "§HThe Last Light On§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Planetary archive\n§YClassification:§! Infrastructure / Environmental\n\nA single emergency light within a secured archival corridor remains illuminated during all recorded power shutdowns.\n\nThe light activates and deactivates independently of the facility’s electrical state.\n\nPower monitoring systems confirm no energy draw during activation periods, and no manual or automated control input has been identified.\n\n§YOfficer Renn:§! Emergency lighting requires power continuity.\n\n§YOfficer Voss:§! Then something is keeping it on without being connected."
 dsi.292.name:0 "Case File #8363"
 dsi.292.desc:0 "§HThe Long-Distance Call§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Public housing agency\n§YClassification:§! Communications / Telephony\n\nA recorded long-distance call is periodically logged within the Public Housing Agency system despite no outbound dialing activity being registered.\n\nThe call connects to internal extensions rather than external numbers.\n\nRecipients report only standard line noise and automated connection tones. Call logs consistently attribute the connection to external origins that do not exist in any registry.\n\n§YOfficer Renn:§! Long-distance calls require external routing.\n\n§YOfficer Voss:§! Then something is calling from inside the system."
 dsi.293.name:0 "Case File #8400"
 dsi.293.desc:0 "§HThe Office That Answered§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! District infrastructure office\n§YClassification:§! Communications / Operations\n\nInternal requests submitted to District Infrastructure Office occasionally receive direct, context-aware responses without routing through any assigned department.\n\nResponses are accurate, procedural, and formatted according to internal standards.\n\nNo originating office, extension, or responsible unit can be identified in system directories.\n\n§YOfficer Renn:§! Requests require a defined receiving department.\n\n§YOfficer Voss:§! Then something is answering without being listed."
 dsi.294.name:0 "Case File #8437"
 dsi.294.desc:0 "§HThe Closed File§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Medical intake center\n§YClassification:§! Records / Access\n\nA classified file within the Medical Intake Center archive cannot be permanently closed within any records system.\n\nWhen marked as closed, it reopens with no audit trigger or access event.\n\nThe contents remain unchanged, and no modification history is recorded between states.\n\nNo user or process is listed as reopening the file.\n\n§YOfficer Renn:§! Closed files are expected to remain closed.\n\n§YOfficer Voss:§! Then something is refusing to acknowledge closure."
 dsi.295.name:0 "Case File #8474"
 dsi.295.desc:0 "§HThe Key That Fit§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Customs checkpoint\n§YClassification:§! Security / Access\n\nA standard security key recovered at Customs Checkpoint operates correctly in multiple locked systems for which it was not issued.\n\nEach lock accepts the key on first insertion without resistance or override.\n\nSecurity logs confirm no matching authorization exists for any of the accessed systems.\n\nThe key is not duplicated and shows no modification.\n\n§YOfficer Renn:§! Keys are expected to correspond to a single lock profile.\n\n§YOfficer Voss:§! Then something is accepting it everywhere it goes."
 dsi.296.name:0 "Case File #8511"
 dsi.296.desc:0 "§HThe Timecard§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Commercial concourse\n§YClassification:§! Records / Timekeeping\n\nA standard employee timecard submitted within the Commercial Concourse records hours worked during a period in which the employee was not assigned, scheduled, or physically present at the facility.\n\nPayroll systems processed the entry without error.\n\nThe employee confirms the recorded shift did not occur.\n\n§YOfficer Renn:§! Timecards are expected to reflect actual work periods.\n\n§YOfficer Voss:§! Then something is paying for absence."
 dsi.297.name:0 "Case File #8548"
 dsi.297.desc:0 "§HThe Apartment With Music§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Terraforming oversight station\n§YClassification:§! Environmental / Infrastructure\n\nA residential unit within the Terraforming Oversight Station consistently produces audible music despite having no installed audio equipment or recorded media sources.\n\nThe sound is confined to the apartment interior and does not transmit through walls or monitoring devices.\n\nPower usage remains within normal residential parameters.\n\n§YOfficer Renn:§! Audio output requires an identifiable source.\n\n§YOfficer Voss:§! Then something is playing it without asking permission."
 dsi.298.name:0 "Case File #8585"
 dsi.298.desc:0 "§HThe Unknown Extension§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Subsurface service network\n§YClassification:§! Communications / Routing\n\nA non-existent internal extension within the Subsurface Service Network continues to receive and redirect calls despite being absent from all directory systems.\n\nConnections routed through the extension are completed successfully to appropriate departments.\n\nNo outgoing or incoming source can be assigned to the identifier.\n\n§YOfficer Renn:§! Routing requires a defined endpoint.\n\n§YOfficer Voss:§! Then something is routing without being listed."
 dsi.299.name:0 "Case File #8622"
 dsi.299.desc:0 "§HThe Silent Alarm§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Education district\n§YClassification:§! Security / Alert Systems\n\nA silent alarm within the Education District intermittently triggers full security responses without producing any audible, visual, or system-level alert signals.\n\nDoors lock, lights shift to standby mode, and security routing protocols activate as if an emergency broadcast had occurred.\n\nNo trigger event or signal is recorded.\n\n§YOfficer Renn:§! Alarms are expected to produce alerts.\n\n§YOfficer Voss:§! Then something is responding without announcing itself."
 dsi.300.name:0 "Case File #8659"
 dsi.300.desc:0 "§HThe Third Reflection§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Museum storage wing\n§YClassification:§! Visual / Infrastructure\n\nA mirror installation within the Museum Storage Wing consistently produces three distinct and stable reflections of the same room.\n\nAll three reflections remain identical in composition but show slight temporal offsets in object placement.\n\nThe effect persists under all lighting conditions and viewing angles.\n\nNo additional reflective surfaces are present in the installation.\n\n§YOfficer Renn:§! Reflections are expected to correspond to a single viewpoint.\n\n§YOfficer Voss:§! Then something is looking back in sequence."
 dsi.301.name:0 "Case File #8696"
 dsi.301.desc:0 "§HThe Inspection Stamp§!\n\n§YFiled by:§! Officers Voss and Renn\n§YOrigin:§! Survey vessel records room\n§YClassification:§! Security / Authorization\n\nAn official inspection stamp within the Survey Vessel Records system continues to validate documents that have not passed any recorded inspection process.\n\nStamped approvals are accepted across multiple departments without triggering verification protocols.\n\nThe stamp impression remains identical across all applications.\n\nNo issuing authority exists in current personnel records.\n\n§YOfficer Renn:§! Stamps are expected to confirm prior inspection.\n\n§YOfficer Voss:§! Then something is approving things after the fact."

