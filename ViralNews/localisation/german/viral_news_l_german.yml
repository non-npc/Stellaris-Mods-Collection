l_german:
 tech_viral_news_network:0 "Virale Nachrichtennetzwerke"
 tech_viral_news_network_desc:0 "Fortschritte in der interstellaren zivilen Kommunikation ermöglichen es Nachrichtenkonzernen, sozialen Plattformen, Unterhaltungssyndikaten und öffentlichen Diskussionsnetzwerken, in nahezu Echtzeit über unsere Kolonien hinweg zu operieren."
 tech_viral_news_network_effect:0 "Schaltet das reichsunikale Gebäude £building£ §YHyperNet-Medien-Nexus§! frei und ermöglicht periodische §YVirale Nachrichten§!-Ereignisse."
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§HSchaltet Gebäude frei:§! HyperNet-Medien-Nexus"
 vn_requires_no_existing_hypernet_media_nexus:0 "§REs darf nur ein §YHyperNet-Medien-Nexus§! im Reich gebaut werden.§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "Der §YHyperNet-Medien-Nexus§! ist ein reichsunikales Gebäude, das nach seiner Errichtung periodische zivile §YVirale Nachrichten§!-Medienereignisse auslöst."
 building_vn_hypernet_media_nexus:0 "HyperNet-Medien-Nexus"
 building_vn_hypernet_media_nexus_desc:0 "Ein zentraler ziviler Knotenpunkt für Rundfunk, Klatsch, Unterhaltung und soziale Medien. Nach der Inbetriebnahme verbindet er die Kolonien des Reichs mit einem gemeinsamen zivilen Nachrichten-Ökosystem."
 vn_arkship_hypernet_media_nexus:0 "HyperNet-Medien-Nexus"
 vn_arkship_hypernet_media_nexus_desc:0 "Ein auf einem Arche-Schiff installierter ziviler Medienknotenpunkt, der die Kolonien und Arche-Schiffe des Reichs mit einem gemeinsamen Nachrichten-Ökosystem verbindet."
 vn_viral_buzz:0 "Viraler Medienrausch"
 vn_viral_buzz_desc:0 "Diese Kolonie erfreut sich eines plötzlichen Aufmerksamkeitsschubs im HyperNet."
 vn_public_panic:0 "Öffentliche Panik"
 vn_public_panic_desc:0 "Eine beunruhigende lokale Geschichte hat sich schneller verbreitet, als die Behörden sie eindämmen können."
 vn_tourism_spike:0 "Tourismus-Boom"
 vn_tourism_spike_desc:0 "Die jüngste mediale Aufmerksamkeit hat Reisen, Neugier und Ausgaben angekurbelt."
 vn_human_interest:0 "Menschlicher Interessens-Schub"
 vn_human_interest_desc:0 "Eine herzerwärmende zivile Geschichte hat die lokale Stimmung verbessert."
 vn.ok:0 "Weiter senden."
 vn.900.name:0 "Virale Nachrichten"
 vn.900.desc:0 "§HVirale Nachrichten: Das Reich geht online§!\n\nDer HyperNet-Medien-Nexus ist nun betriebsbereit. In unseren Kolonien beginnen zivile Sender, soziale Medien, Promi-Kanäle, Verschwörungsfeeds, Unterhaltungsstreams und öffentliche Nachrichtennetzwerke, zu einem riesigen Informations-Ökosystem zu verschmelzen.\n\nOb zum Guten oder Schlechten: Das Volk hat nun eine Stimme."
 vn.900.a:0 "Das Netzwerk starten."
 vn.100.name:0 "Eilmeldung"
 vn.100.desc:0 "§HEilmeldung: Shuttle-Absturz auf [event_target:vn_news_planet.GetName]§!\n\nBerichten zufolge ist der Kinder-Holo-Star Vox NoggBurg mit einem privaten Raumschiff abgestürzt, während er über [event_target:vn_news_planet.GetName] eine ungenehmigte atmosphärische Stunt-Manöver vorführte.\n\nDie lokalen Behörden bestehen darauf, dass die Darstellerin am Leben ist, während Millionen Bürger weiterhin dramatische Aufnahmen im HyperNet teilen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.101.name:0 "Lokales Rätsel"
 vn.101.desc:0 "§HLokales Rätsel: Big Foot auf [event_target:vn_news_planet.GetName] gesichtet§!\n\nBewohner von [event_target:vn_news_planet.GetName] berichten von Sichtungen einer massiven behaarten Kreatur mit ungewöhnlich großen Füßen, die in der lokalen Wildnis umherstreift.\n\nKlatschblätter haben die Kreatur „Big Foot“ getauft, während Beamte behaupten, die Berichte seien wahrscheinlich übertrieben, erfunden oder äußerst unbequem.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.102.name:0 "Promi-News"
 vn.102.desc:0 "§HPromi-Ankunft löst Frenesie aus§!\n\nDie berühmte Holo-Drama-Darstellerin Lyra Venn ist zur Premiere einer neuen interstellaren Serie auf [event_target:vn_news_planet.GetName] eingetroffen. Tourismusplattformen melden bereits einen Anstieg bei Buchungen, Fan-Treffen und fragwürdigem Merchandise.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.103.name:0 "Viraler Trend"
 vn.103.desc:0 "§HViraler Trend: Null-G-Schlaf-Challenge§!\n\nBürger auf [event_target:vn_news_planet.GetName] haben die „Null-G-Schlaf-Challenge“ popularisiert, bei der Teilnehmer versuchen zu schlafen, während sie in schlecht gesicherten Erholungskammern treiben. Medizinische Behörden beschreiben den Trend als „größtenteils harmlos, außer wenn er es nicht ist“.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.104.name:0 "Eilmeldung"
 vn.104.desc:0 "§HEilmeldung: Transit-Chor verzögert Pendler§!\n\nEin spontaner ziviler Chor an Bord eines großen Transitknotens auf [event_target:vn_news_planet.GetName] verursachte stundenlange Verzögerungen, nachdem sich Pendler eher mitmachten als Beschwerden einzureichen. Die Aufführung ist zu einer der meistwiederholten Sendungen des Jahres geworden."
 vn.105.name:0 "Lokales Rätsel"
 vn.105.desc:0 "§HSeltsame Lichter über [event_target:vn_news_planet.GetName]§!\n\nBewohner von [event_target:vn_news_planet.GetName] berichten von synchronisierten Lichtern, die sich in der oberen Atmosphäre bewegen, bevor sie im Wolkenmeer verschwinden. Beamte führen routinemäßige Wetterphänomene an. Unabhängige Kommentatoren führen Außerirdische, Geister oder Haushaltskürzungen an.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.106.name:0 "Social-Media-Hype"
 vn.106.desc:0 "§HSocial-Media-Hype: Plasma-Eimer-Challenge§!\n\nEin rücksichtsloser neuer HyperNet-Trend mit industriellen Plasmawerkzeugen hat sich über [event_target:vn_news_planet.GetName] verbreitet. Sicherheitsbehörden haben Warnungen ausgegeben. Influencer haben Rabattcodes herausgegeben.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.107.name:0 "Bürgerbericht"
 vn.107.desc:0 "§HBürgerbericht: Verlorene Drohne wird lokaler Held§!\n\nEine seit sechs Monaten vermisste Wartungsdrohne ist auf [event_target:vn_news_planet.GetName] wieder in Dienst gegangen, nachdem sie angeblich Stürme, Wildtiere und mindestens einen Kult überstanden hat. Bürger nennen sie „die kleine Einheit, die es geschafft hat“.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.108.name:0 "Verschwörungskanal"
 vn.108.desc:0 "§HVerschwörungskanal: Der Mond beobachtet uns§!\n\nEin beliebter Verschwörungskanal mit Sitz auf [event_target:vn_news_planet.GetName] behauptet, ein naher Mond verändere subtil seine Position, wenn niemand hinsieht. Astronomen haben die Behauptung zurückgewiesen, doch die Abonnentenzahl des Kanals hat sich verdreifacht.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.109.name:0 "Unterhaltung"
 vn.109.desc:0 "§HUnterhaltung: Gravball-Finale dominiert lokale Sendungen§!\n\nDas interstellare Gravball-Finale hat die öffentlichen Bildschirme auf [event_target:vn_news_planet.GetName] eingenommen. Produktivitätsbeschwerden nehmen zu, aber auch Snack-Verkäufe, Tourismuseinnahmen und Streitigkeiten über Schiedsrichterentscheidungen."
 vn.110.name:0 "Modetrend"
 vn.110.desc:0 "§HModetrend: Leuchtende Antennen§!\n\nBürger auf [event_target:vn_news_planet.GetName] tragen als Teil einer Modewelle leuchtende kybernetische Antennen. Biologen sind beleidigt. Händler sind entzückt.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.111.name:0 "Menschliches Interesse"
 vn.111.desc:0 "§HMenschliches Interesse: Koloniekoch gewinnt galaktisches Publikum§!\n\nEine kleine Kochsendung aus [event_target:vn_news_planet.GetName] ist unerwartet im gesamten Reich populär geworden. Zuschauer loben die Wärme der Moderatorin, ihre fragwürdigen Maße und ihre wiederholte Behauptung, „das Gewürz sagt Euch, wann Schluss ist“.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.112.name:0 "HyperNet-Debatte"
 vn.112.desc:0 "§HHyperNet-Debatte: Sind Sterne lebendig?§!\n\nEin studentischer Debattenstream aus [event_target:vn_news_planet.GetName] entfachte versehentlich einen viralen Streit darüber, ob Sterne Emotionen besitzen. Wissenschaftler versuchten, die Diskussion zu korrigieren, was sie nur verschlimmerte.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.113.name:0 "Eilmeldung"
 vn.113.desc:0 "§HMysteriöses Signal unterbricht lokale Sendungen§!\n\nSendungen auf [event_target:vn_news_planet.GetName] wurden kurz von einem sich wiederholenden Ton und einer einzigen unübersetzten Phrase unterbrochen. Beamte ermitteln. Amateur-Entschlüsseler verkaufen bereits Merchandise.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.114.name:0 "Promi-Skandal"
 vn.114.desc:0 "§HPromi-Skandal: Klon-Gerüchte verbreiten sich§!\n\nFans auf [event_target:vn_news_planet.GetName] debattieren, ob der beliebte Darsteller Seral Korr heimlich eine Kette austauschbarer Klone ist. Der Pressesprecher des Darstellers bestreitet alles, einschließlich mehrerer Dinge, nach denen niemand gefragt hat."
 vn.115.name:0 "Eilmeldung"
 vn.115.desc:0 "§HEilmeldung: Toaster-Kult wird untersucht§!\n\nBehörden auf [event_target:vn_news_planet.GetName] untersuchen eine wachsende zivile Bewegung, die der „Heiligen Wärme der Toaster“ gewidmet ist. Beamte beschreiben die Gruppe als harmlos, wenn auch ungewöhnlich gut gefrühstückt.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.116.name:0 "Lokaler Held"
 vn.116.desc:0 "§HLokaler Held: Rettungsteam-Sendung geht viral§!\n\nEin Rettungsteam auf [event_target:vn_news_planet.GetName] rettete Dutzende Zivilisten bei einem schweren Infrastrukturunfall. Die Aufnahmen haben sich weit verbreitet und Spenden, Lob und mehrere dramatische Nachstellungen inspiriert.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.117.name:0 "Urbane Legende"
 vn.117.desc:0 "§HUrbane Legende: Die Station unter dem See§!\n\nBewohner von [event_target:vn_news_planet.GetName] behaupten, unter einem abgelegenen See liege eine verlassene Sendestation, die noch alte Programme an niemanden sendet. Vermesser bestreiten, etwas gefunden zu haben, was natürlich alle überzeugt hat.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.118.name:0 "Bürgerwarnung"
 vn.118.desc:0 "§HBürgerwarnung: Schmuggler-Tagebuch versehentlich gesendet§!\n\nEin mutmaßlicher Schmuggler auf [event_target:vn_news_planet.GetName] sendete versehentlich vierzehn Stunden private Tagebucheinträge über öffentliche Kanäle. Die Behörden erhielten Beweise. Die Öffentlichkeit erhielt Schlagworte.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.119.name:0 "Unterhaltung"
 vn.119.desc:0 "§HKonzert-Stream überlastet lokales Netzwerk§!\n\nEine Live-Aufführung von DJ Nebula verursachte schwere Datenüberlastung auf [event_target:vn_news_planet.GetName]. Das Konzert wird als kultureller Meilenstein gefeiert und als Netzwerkplanungs-Katastrophe verurteilt."
 vn.120.name:0 "Eilmeldung"
 vn.120.desc:0 "§HEilmeldung: Influencer fällt in Brunnen§!\n\nDie beliebte Lifestyle-Senderin Miri Sol versuchte einen dramatischen Live-Auftritt auf [event_target:vn_news_planet.GetName] und fiel stattdessen in einen städtischen Brunnen. Der Clip wurde zu patriotischen Märschen, Kinderliedern und einer überraschend bewegenden Oper remixt.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.121.name:0 "Lokales Rätsel"
 vn.121.desc:0 "§HLokales Rätsel: Fußspuren in den Glasfeldern§!\n\nVermesser auf [event_target:vn_news_planet.GetName] entdeckten riesige Fußabdrücke in einem Feld aus geschmolzenem Glas. Beamte geben Mineralausdehnung die Schuld. Lokale Foren geben Riesen, geheime Armeen und sehr entschlossenen Touristen die Schuld.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.122.name:0 "Bürgerbericht"
 vn.122.desc:0 "§HBürgerbericht: Antikes Radio empfängt Wetter von morgen§!\n\nEin pensionierter Techniker auf [event_target:vn_news_planet.GetName] behauptet, ein antikes Radio empfange Wetterberichte von morgen. Meteorologen bestreiten jede Beteiligung, doch mehrere Bürger tragen jetzt Regenschirme mit verdächtigem Selbstvertrauen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.123.name:0 "Viraler Trend"
 vn.123.desc:0 "§HViraler Trend: Tag des formellen Helms§!\n\nBürger auf [event_target:vn_news_planet.GetName] tragen formelle Helme zu Hochzeiten, Geschäftstreffen und Abendessens-Sendungen. Niemand erinnert sich, wer den Trend gestartet hat, doch Hersteller nennen es einen Triumph der bürgerlichen Vorsorge.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.124.name:0 "Unterhaltung"
 vn.124.desc:0 "§HUnterhaltung: Seifenoper löst Politikdebatte aus§!\n\nDie Erfolgsserie „Liebe unter dem Reaktor“ hat auf [event_target:vn_news_planet.GetName] heftige Debatten ausgelöst, nachdem ein fiktiver Bürgermeister die Romantik besteuerte. Ökonomen ärgert es, dass die Öffentlichkeit nun ernsthafte Fragen stellt."
 vn.125.name:0 "Eilmeldung"
 vn.125.desc:0 "§HEilmeldung: Entflohener Haustier-Schleim blockiert Verkehr§!\n\nEin geliebtes Haustier-Schleimwesen entkam seinem Gehege auf [event_target:vn_news_planet.GetName] und breitete sich über drei Spuren des Pendlerverkehrs aus. Der Besitzer besteht darauf, es sei freundlich. Verkehrsbeamte bestehen darauf, es sei überall.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.126.name:0 "HyperNet-Umfrage"
 vn.126.desc:0 "§HHyperNet-Umfrage: Kolonie benennt Lieblingsfelsen§!\n\nEine öffentliche Umfrage auf [event_target:vn_news_planet.GetName] hat einen verwitterten Felsen am Straßenrand zum beliebtesten Wahrzeichen der Kolonie erklärt. Tourismus-Teams haben bereits Beleuchtung, Geländer und einen Souvenirstand installiert.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.127.name:0 "Verschwörungskanal"
 vn.127.desc:0 "§HVerschwörungskanal: Gouverneur durch Hologramm ersetzt?§!\n\nEin beliebter Kommentator auf [event_target:vn_news_planet.GetName] behauptet, ein hoher Beamter sei durch ein niedrig aufgelöstes Hologramm ersetzt worden. Die Behauptung gewann an Schwung, nachdem der Beamte in einem unpopulären Moment blinzelte.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.128.name:0 "Promi-News"
 vn.128.desc:0 "§HPromi-News: Sängerin hebt Schwerkraft auf§!\n\nDie avantgardistische Sängerin Kexa Dawn verblüffte das Publikum auf [event_target:vn_news_planet.GetName], indem sie ein ganzes Konzert in kontrollierter Mikrogravitation gab. Kritiker nannten es transzendent. Reinigungsteams nannten es vorhersehbar.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.129.name:0 "Lokales Rätsel"
 vn.129.desc:0 "§HLokales Rätsel: Die Tür, die gestern noch nicht da war§!\n\nBewohner von [event_target:vn_news_planet.GetName] fanden eine versiegelte Tür in einer alten Transitwand, obwohl Archive leeren Beton zeigen. Beamte sagen, es sei ein Abstellraum. Niemand hat den Schlüssel gefunden."
 vn.130.name:0 "Social-Media-Hype"
 vn.130.desc:0 "§HSocial-Media-Hype: Flüster-Rezensionen§!\n\nEin neuer Bewertungstrend auf [event_target:vn_news_planet.GetName] besteht darin, Produktbeschwerden direkt in öffentliche Mikrofone zu flüstern. Händler hassen es. Zuschauer finden es entspannend.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.131.name:0 "Bürgerbericht"
 vn.131.desc:0 "§HBürgerbericht: Kinder wählen Klassenzimmer-Kaiser§!\n\nEine Klassenzimmer-Wahl auf [event_target:vn_news_planet.GetName] brachte versehentlich einen selbsternannten Klassenzimmer-Kaiser hervor, dessen Zustimmungswerte höher sind als die der meisten Erwachsenen. Die Lehrerin berichtet, dass die Steuerpolitik ungelöst bleibt.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.132.name:0 "Eilmeldung"
 vn.132.desc:0 "§HEilmeldung: Museumsfossil verschwindet§!\n\nEin Fossil-Hauptstück verschwand während eines Livestreams aus einem Museum auf [event_target:vn_news_planet.GetName]. Der Feed zeigt nichts außer einem Schatten, einem Husten und einer sehr schuldbewussten Reinigungsdrohne.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.133.name:0 "Unterhaltung"
 vn.133.desc:0 "§HUnterhaltung: Kochshow aus Küchen verbannt§!\n\nEine beliebte Kochshow, die auf [event_target:vn_news_planet.GetName] gedreht wurde, wurde aus mehreren öffentlichen Küchen verbannt, nachdem Zuschauer versuchten, „Vulkansuppe“ nachzukochen. Die Moderatorin bestreitet jede Verantwortung und verkauft Schürzen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.134.name:0 "Lokales Rätsel"
 vn.134.desc:0 "§HLokales Rätsel: Gesang aus den Minen§!\n\nArbeiter unter [event_target:vn_news_planet.GetName] berichten von leisem Gesang aus versiegelten Bergbaustollen. Akustikexperten geben Druckechos die Schuld. Musiker beantragen bereits Kooperationsrechte."
 vn.135.name:0 "HyperNet-Debatte"
 vn.135.desc:0 "§HHyperNet-Debatte: Sind Aufzüge empfindungsfähig?§!\n\nEin defekter Aufzug auf [event_target:vn_news_planet.GetName] entschuldigte sich bei Passagieren und entfachte eine virale Debatte über Maschinenhöflichkeit und künstliche Personenrechte. Wartungsteams bestehen darauf, es sei nur eine beschädigte Begrüßungsdatei gewesen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.136.name:0 "Promi-Skandal"
