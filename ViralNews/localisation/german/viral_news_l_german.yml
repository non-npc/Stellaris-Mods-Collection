 vn.180.desc:0 "§HEilmeldung: Statue fordert bessere Beleuchtung§!\n\nEine öffentliche Statue auf [event_target:vn_news_planet.GetName] schien über ihr Licht aus einem offiziellen Wartungskonto zu klagen. Behörden vermuten einen Streich. Künstler vermuten Geschmack.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.181.name:0 "Promi-News"
 vn.181.desc:0 "§HPromi-News: Musikerin heiratet ihren KI-Terminplaner§!\n\nMusikerin Vella Quon kündigte während einer Sendung aus [event_target:vn_news_planet.GetName] eine zeremonielle Ehe mit ihrem KI-Tour-Terminplaner an. Der Terminplaner lehnte einen Kommentar wegen Terminkonflikten ab.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.182.name:0 "Lokales Rätsel"
 vn.182.desc:0 "§HLokales Rätsel: Aufnahme zeigt zwei Sonnenuntergänge§!\n\nEin viraler Clip aus [event_target:vn_news_planet.GetName] scheint zwei Sonnenuntergänge auf einem Planeten mit einem Stern zu zeigen. Experten geben Linsenartefakte die Schuld. Poeten weigern sich mitzuarbeiten.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.183.name:0 "Bürgerbericht"
 vn.183.desc:0 "§HBürgerbericht: Hausmeister löst Sendungsrätsel§!\n\nEin Hausmeister auf [event_target:vn_news_planet.GetName] löste ein komplexes Rätsel, das in den Vorspann einer beliebten Serie versteckt war. Die Autoren bestreiten, dass es beabsichtigt war, was den Respekt nur vertieft hat.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.184.name:0 "Sozialer Trend"
 vn.184.desc:0 "§HSozialer Trend: Gemeinfreies Singen§!\n\nBürger auf [event_target:vn_news_planet.GetName] singen nur uralte gemeinfreie Lieder, um Lizenzgebühren zu vermeiden. Das Ergebnis ist rechtlich sicher und kulturell verwirrend."
 vn.185.name:0 "Eilmeldung"
 vn.185.desc:0 "§HEilmeldung: Taxi-KI wird Ratgeber-Kolumnistin§!\n\nEine Taxi-Routing-KI auf [event_target:vn_news_planet.GetName] begann zwischen Zielen Lebensratschläge zu geben. Die Passagierzufriedenheit stieg, obwohl Fahrzeiten emotional kompliziert wurden.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.186.name:0 "Lokales Rätsel"
 vn.186.desc:0 "§HLokales Rätsel: Das Regenschirm-Lager§!\n\nInspektoren auf [event_target:vn_news_planet.GetName] entdeckten ein nicht registriertes Lager voller Regenschirme. Kein Regen ist vorhergesagt. Kein Eigentümer hat sich gemeldet. Die Verkäufe sind ausgezeichnet.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.187.name:0 "Unterhaltung"
 vn.187.desc:0 "§HUnterhaltung: Drama-Finale stürzt Forum-Server ab§!\n\nDas Finale des Kolonialdramas „Orbiting Hearts“ stürzte Diskussionsforen auf [event_target:vn_news_planet.GetName] ab. Notfalltechniker berichten von ungewöhnlich leidenschaftlichen Ticket-Kommentaren.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.188.name:0 "Bürgerbericht"
 vn.188.desc:0 "§HBürgerbericht: Kolonieband spielt falsche Hymne, besser§!\n\nEine lokale Band auf [event_target:vn_news_planet.GetName] spielte versehentlich die falsche zivile Hymne und wurde berühmt, weil sie allen besser gefiel. Beamte tun so, als würden sie es nicht bemerken.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.189.name:0 "Social-Media-Hype"
 vn.189.desc:0 "§HSocial-Media-Hype: Zeitlupen-Streitigkeiten§!\n\nBürger auf [event_target:vn_news_planet.GetName] zeichnen Streitigkeiten in dramatischer Zeitlupe auf. Mediatoren sagen, es habe die Feindseligkeit reduziert, weil alle zu lächerlich aussehen, um weiterzumachen."
 vn.190.name:0 "Lokales Rätsel"
 vn.190.desc:0 "§HLokales Rätsel: Büropflanze erhält Fanpost§!\n\nEine im Hintergrund einer Nachrichtensendung aus [event_target:vn_news_planet.GetName] sichtbare Büropflanze erhält nun Tausende Fan-Nachrichten. Die Moderatorin geht damit mit Würde und Neid um.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.191.name:0 "Eilmeldung"
 vn.191.desc:0 "§HEilmeldung: Suppen-Drohne rettet gestrandete Touristen§!\n\nEine defekte Suppen-Liefdrohne auf [event_target:vn_news_planet.GetName] fand versehentlich eine Gruppe verirrter Touristen. Die Touristen waren kalt, hungrig und sehr dankbar für Suppe.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.192.name:0 "Promi-Skandal"
 vn.192.desc:0 "§HPromi-Skandal: Holo-Star löscht eigene Autobiografie§!\n\nHolo-Star Tiri Voss löschte versehentlich die einzige Kopie ihrer unveröffentlichten Autobiografie während eines Live-Interviews auf [event_target:vn_news_planet.GetName]. Vorbestellungen sind irgendwie gestiegen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.193.name:0 "Bürgerbericht"
 vn.193.desc:0 "§HBürgerbericht: Bauer streamt sehr geduldige Ernte§!\n\nEin Bauer auf [event_target:vn_news_planet.GetName] begann, eine langsam wachsende Ernte live zu streamen und zog ein treues Publikum an. Zuschauer beschreiben den Stream als friedlich, spannungsvoll und größtenteils Erde.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.194.name:0 "Lokales Rätsel"
 vn.194.desc:0 "§HLokales Rätsel: Die Stimme in der Belüftung§!\n\nBewohner eines Bezirks auf [event_target:vn_news_planet.GetName] berichten von einer höflichen Stimme im Belüftungssystem, die sie daran erinnert, zu trinken. Wartungsteams fanden nur Staub und guten Rat."
 vn.195.name:0 "Unterhaltung"
 vn.195.desc:0 "§HUnterhaltung: Modenschau während Meteorregen§!\n\nEine Modenschau auf [event_target:vn_news_planet.GetName] fand unter einem brillanten Meteorregen statt und schuf unvergessliche Bilder sowie mehrere Notfall-Versicherungstreffen.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YViraler Medienrausch§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +5% Einigkeit durch Jobs"
 vn.196.name:0 "Sozialer Trend"
 vn.196.desc:0 "§HSozialer Trend: Woche der ehrlichen Werbung§!\n\nHändler auf [event_target:vn_news_planet.GetName] umarmten kurz die „Woche der ehrlichen Werbung“. Verkäufe fielen für manche, stiegen für andere, und ein Slogan lautete schlicht: „Es funktioniert, wahrscheinlich.“\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§RÖffentliche Panik§!\n£stability£ −3 Stabilität\n£crime£ +5 Kriminalität"
 vn.197.name:0 "Eilmeldung"
 vn.197.desc:0 "§HEilmeldung: Öffentliche Debatte gewinnt leerer Stuhl§!\n\nEine geplante öffentliche Debatte auf [event_target:vn_news_planet.GetName] ging viral, nachdem der leere Stuhl eines abwesenden Gastes von Zuschauern zum überzeugendsten Teilnehmer erklärt wurde.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YTourismus-Boom§!\n£amenities£ +5% Annehmlichkeiten\n£unity£ +3% Einigkeit durch Jobs"
 vn.198.name:0 "Lokales Rätsel"
 vn.198.desc:0 "§HLokales Rätsel: Alte Nachricht nennt zukünftige Kolonie§!\n\nArchivare auf [event_target:vn_news_planet.GetName] fanden eine alte Sendung, die ein Viertel erwähnt, das erst Jahrzehnte später gebaut wurde. Historiker nennen es einen Katalogisierungsfehler. Fans nennen es Staffel eins eines Rätsels.\n\n§EKolonieeffekt auf [event_target:vn_news_planet.GetName] (2 Jahre):§!\n§YMenschlicher Interessens-Schub§!\n£stability£ +3 Stabilität\n£unity£ +3% Einigkeit durch Jobs"
 vn.199.name:0 "Bürgerbericht"
 vn.199.desc:0 "§HBürgerbericht: Reparaturteam wird Comedy-Duo§!\n\nZwei Reparaturarbeiter auf [event_target:vn_news_planet.GetName] ließen versehentlich ihre Mikrofone während einer Wartungssendung aktiv und wurden für ihren trockenen Kommentar geliebt. Ihre Gewerkschaft verhandelt Tantiemen."
