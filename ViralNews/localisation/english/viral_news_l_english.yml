l_english:
 tech_viral_news_network:0 "Viral News Networks"
 tech_viral_news_network_desc:0 "Advances in interstellar civilian communications allow news corporations, social platforms, entertainment syndicates, and public discussion networks to operate across our colonies in near real-time."
 tech_viral_news_network_effect:0 "Unlocks the empire-unique £building£ §YHyperNet Media Nexus§!, enabling periodic §YViral News§! events."
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§HUnlocks Building:§! HyperNet Media Nexus"
 vn_requires_no_existing_hypernet_media_nexus:0 "§ROnly one §YHyperNet Media Nexus§! may be built in the empire.§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "The §YHyperNet Media Nexus§! is an empire-unique building that activates periodic §YViral News§! civilian media events after construction."
 building_vn_hypernet_media_nexus:0 "HyperNet Media Nexus"
 building_vn_hypernet_media_nexus_desc:0 "A centralized civilian broadcast, gossip, entertainment, and social media infrastructure hub. Once operational, it connects the empire's colonies to a shared civilian news ecosystem."
 vn_arkship_hypernet_media_nexus:0 "HyperNet Media Nexus"
 vn_arkship_hypernet_media_nexus_desc:0 "An Arkship-mounted civilian broadcast, gossip, entertainment, and social media infrastructure hub. Once operational, it connects the empire's colonies and Arkships to a shared civilian news ecosystem."
 vn_viral_buzz:0 "Viral Media Buzz"
 vn_viral_buzz_desc:0 "This colony is enjoying a burst of attention across the HyperNet."
 vn_public_panic:0 "Public Panic"
 vn_public_panic_desc:0 "A disturbing local story has spread faster than officials can contain it."
 vn_tourism_spike:0 "Tourism Spike"
 vn_tourism_spike_desc:0 "Recent media attention has boosted travel, curiosity, and spending."
 vn_human_interest:0 "Human Interest Uplift"
 vn_human_interest_desc:0 "A wholesome civilian story has improved the local mood."
 vn.ok:0 "Keep broadcasting."
 vn.900.name:0 "Viral News"
 vn.900.desc:0 "§HViral News: The Empire Goes Online§!\n\nThe HyperNet Media Nexus is now operational. Across our colonies, civilian broadcasters, social media platforms, celebrity channels, conspiracy feeds, entertainment streams, and public news networks are beginning to merge into one vast information ecosystem.\n\nFor better or worse, the people now have a voice."
 vn.900.a:0 "Launch the network."
 vn.100.name:0 "Breaking News"
 vn.100.desc:0 "§HBreaking News: Shuttle Crash on [event_target:vn_news_planet.GetName]§!\n\nChild holo-star Vox NoggBurg has reportedly crashed a private starship while performing an unauthorized atmospheric stunt above [event_target:vn_news_planet.GetName].\n\nLocal authorities insist the performer is alive, while millions of citizens continue sharing dramatic footage across the HyperNet.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.101.name:0 "Local Mystery"
 vn.101.desc:0 "§HLocal Mystery: Big Foot Sighted on [event_target:vn_news_planet.GetName]§!\n\nDenizens of [event_target:vn_news_planet.GetName] report sightings of a massive hairy creature with unusually large feet stalking the local wilderness.\n\nTabloid feeds have named the creature 'Big Foot,' while officials claim the reports are likely exaggerated, fabricated, or extremely inconvenient.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.102.name:0 "Celebrity News"
 vn.102.desc:0 "§HCelebrity Arrival Causes Frenzy§!\n\nFamous holo-drama actor Lyra Venn has arrived on [event_target:vn_news_planet.GetName] for the premiere of a new interstellar serial. Tourism platforms are already reporting a surge in bookings, fan gatherings, and questionable merchandise.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.103.name:0 "Viral Trend"
 vn.103.desc:0 "§HViral Trend: Zero-G Sleep Challenge§!\n\nCitizens on [event_target:vn_news_planet.GetName] have popularized the 'Zero-G Sleep Challenge,' in which participants attempt to sleep while drifting inside poorly secured recreation chambers. Medical authorities describe the trend as 'mostly harmless, except when it is not.'\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.104.name:0 "Breaking News"
 vn.104.desc:0 "§HBreaking News: Transit Choir Delays Commuters§!\n\nA spontaneous civilian choir aboard a major transit hub on [event_target:vn_news_planet.GetName] caused hours of delays after commuters joined in rather than filing complaints. The performance has become one of the most replayed broadcasts of the year."
 vn.105.name:0 "Local Mystery"
 vn.105.desc:0 "§HStrange Lights Over [event_target:vn_news_planet.GetName]§!\n\nResidents of [event_target:vn_news_planet.GetName] report synchronized lights moving across the upper atmosphere before vanishing into cloud cover. Officials cite routine weather phenomena. Independent commentators cite aliens, ghosts, or budget cuts.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.106.name:0 "Social Media Frenzy"
 vn.106.desc:0 "§HSocial Media Frenzy: Plasma Bucket Challenge§!\n\nA reckless new HyperNet trend involving industrial plasma tools has spread across [event_target:vn_news_planet.GetName]. Safety regulators have issued warnings. Influencers have issued discount codes.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.107.name:0 "Civilian Report"
 vn.107.desc:0 "§HCivilian Report: Lost Drone Becomes Local Hero§!\n\nA maintenance drone missing for six months has returned to service on [event_target:vn_news_planet.GetName] after allegedly surviving storms, wildlife, and at least one cult. Citizens are calling it 'the little unit that could.'\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.108.name:0 "Conspiracy Feed"
 vn.108.desc:0 "§HConspiracy Feed: The Moon Is Watching§!\n\nA popular conspiracy channel based on [event_target:vn_news_planet.GetName] claims a nearby moon subtly changes position when no one is looking. Astronomers have rejected the allegation, though the channel's subscriber count has tripled.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.109.name:0 "Entertainment"
 vn.109.desc:0 "§HEntertainment: Gravball Finals Dominate Local Broadcasts§!\n\nThe Interstellar Gravball Finals have taken over public screens on [event_target:vn_news_planet.GetName]. Productivity complaints are rising, but so are snack sales, tourism receipts, and arguments about refereeing standards."
 vn.110.name:0 "Fashion Trend"
 vn.110.desc:0 "§HFashion Trend: Glowing Antennae§!\n\nCitizens on [event_target:vn_news_planet.GetName] have begun wearing glowing cybernetic antennae as part of a fashion craze. Biologists are offended. Retailers are delighted.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.111.name:0 "Human Interest"
 vn.111.desc:0 "§HHuman Interest: Colony Cook Wins Galactic Audience§!\n\nA small cooking broadcast from [event_target:vn_news_planet.GetName] has become unexpectedly popular across the empire. Viewers praise the host's warmth, questionable measurements, and repeated insistence that 'the spice tells you when to stop.'\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.112.name:0 "HyperNet Debate"
 vn.112.desc:0 "§HHyperNet Debate: Are Stars Alive?§!\n\nA student debate stream from [event_target:vn_news_planet.GetName] accidentally ignited a viral argument over whether stars possess emotions. Scientists have attempted to correct the discussion, which only made it worse.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.113.name:0 "Breaking News"
 vn.113.desc:0 "§HMysterious Signal Interrupts Local Broadcasts§!\n\nBroadcasts on [event_target:vn_news_planet.GetName] were briefly interrupted by a repeating tone and a single untranslated phrase. Officials are investigating. Amateur decoders are already selling merchandise.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.114.name:0 "Celebrity Scandal"
 vn.114.desc:0 "§HCelebrity Scandal: Clone Rumors Spread§!\n\nFans on [event_target:vn_news_planet.GetName] are debating whether beloved performer Seral Korr is secretly a chain of replaceable clones. The performer's publicist denies everything, including several things no one asked about."
 vn.115.name:0 "Breaking News"
 vn.115.desc:0 "§HBreaking News: Toaster Cult Investigated§!\n\nAuthorities on [event_target:vn_news_planet.GetName] are investigating a growing civilian movement devoted to 'The Sacred Warmth of Toasters.' Officials describe the group as harmless, though unusually well-breakfasted.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.116.name:0 "Local Hero"
 vn.116.desc:0 "§HLocal Hero: Rescue Team Broadcast Goes Viral§!\n\nA rescue team on [event_target:vn_news_planet.GetName] saved dozens of civilians during a severe infrastructure accident. The footage has spread widely, inspiring donations, praise, and several dramatic reenactments.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.117.name:0 "Urban Legend"
 vn.117.desc:0 "§HUrban Legend: The Station Under the Lake§!\n\nResidents of [event_target:vn_news_planet.GetName] claim an abandoned broadcast station lies beneath a remote lake, still transmitting old programs to no one. Surveyors deny finding anything, which naturally convinced everyone.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.118.name:0 "Civilian Alert"
 vn.118.desc:0 "§HCivilian Alert: Smuggler Diary Accidentally Broadcast§!\n\nA suspected smuggler on [event_target:vn_news_planet.GetName] accidentally broadcast fourteen hours of private diary entries across public channels. Authorities gained evidence. The public gained catchphrases.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.119.name:0 "Entertainment"
 vn.119.desc:0 "§HConcert Stream Overloads Local Network§!\n\nA live performance by DJ Nebula caused major data congestion across [event_target:vn_news_planet.GetName]. The concert is being hailed as a cultural milestone and condemned as a network planning disaster."
 vn.120.name:0 "Breaking News"
 vn.120.desc:0 "§HBreaking News: Influencer Falls Into Fountain§!\n\nPopular lifestyle broadcaster Miri Sol attempted a dramatic live entrance on [event_target:vn_news_planet.GetName] and fell into a municipal fountain instead. The clip has been remixed into patriotic marches, children's songs, and one surprisingly moving opera.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.121.name:0 "Local Mystery"
 vn.121.desc:0 "§HLocal Mystery: Footprints in the Glass Fields§!\n\nSurveyors on [event_target:vn_news_planet.GetName] discovered enormous footprints pressed into a field of fused glass. Officials blame mineral expansion. Local forums blame giants, secret armies, and very determined tourists.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.122.name:0 "Civilian Report"
 vn.122.desc:0 "§HCivilian Report: Antique Radio Receives Future Weather§!\n\nA retired technician on [event_target:vn_news_planet.GetName] claims an antique radio has begun receiving tomorrow's weather reports. Meteorologists deny involvement, but several citizens are now carrying umbrellas with suspicious confidence.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.123.name:0 "Viral Trend"
 vn.123.desc:0 "§HViral Trend: Formal Helmet Day§!\n\nCitizens on [event_target:vn_news_planet.GetName] are wearing formal helmets to weddings, business meetings, and dinner broadcasts. No one remembers who started the trend, but manufacturers are calling it a triumph of civic preparedness.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.124.name:0 "Entertainment"
 vn.124.desc:0 "§HEntertainment: Soap Opera Sparks Policy Debate§!\n\nThe hit drama 'Love Beneath the Reactor' has caused fierce arguments on [event_target:vn_news_planet.GetName] after a fictional mayor taxed romance. Economists are annoyed that the public is now asking serious questions."
 vn.125.name:0 "Breaking News"
 vn.125.desc:0 "§HBreaking News: Escaped Pet Slime Blocks Traffic§!\n\nA beloved pet slime escaped its enclosure on [event_target:vn_news_planet.GetName] and expanded across three lanes of commuter traffic. The owner insists it is friendly. Transport officials insist it is everywhere.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.126.name:0 "HyperNet Poll"
 vn.126.desc:0 "§HHyperNet Poll: Colony Names Its Favorite Rock§!\n\nA public poll on [event_target:vn_news_planet.GetName] has declared a weathered roadside boulder the colony's most beloved landmark. Tourism crews have already installed lighting, railings, and a gift stand.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.127.name:0 "Conspiracy Feed"
 vn.127.desc:0 "§HConspiracy Feed: Governor Replaced by Hologram?§!\n\nA popular commentator on [event_target:vn_news_planet.GetName] claims a senior official has been replaced by a low-resolution hologram. The allegation gained momentum after the official blinked at an unpopular moment.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.128.name:0 "Celebrity News"
 vn.128.desc:0 "§HCelebrity News: Singer Cancels Gravity§!\n\nAvant-garde vocalist Kexa Dawn stunned audiences on [event_target:vn_news_planet.GetName] by performing an entire concert in controlled microgravity. Critics called it transcendent. Cleanup crews called it predictable.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.129.name:0 "Local Mystery"
 vn.129.desc:0 "§HLocal Mystery: The Door That Was Not There Yesterday§!\n\nResidents of [event_target:vn_news_planet.GetName] found a sealed door embedded in an old transit wall, despite archived plans showing empty concrete. Officials say it is a storage closet. No one has found the key."
 vn.130.name:0 "Social Media Frenzy"
 vn.130.desc:0 "§HSocial Media Frenzy: Whisper Reviews§!\n\nA new review trend on [event_target:vn_news_planet.GetName] involves whispering product complaints directly into public microphones. Merchants hate it. Viewers find it relaxing.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.131.name:0 "Civilian Report"
 vn.131.desc:0 "§HCivilian Report: Children Elect Classroom Emperor§!\n\nA classroom election on [event_target:vn_news_planet.GetName] accidentally produced a self-declared classroom emperor with approval ratings higher than most adults. The teacher reports that tax policy remains unresolved.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.132.name:0 "Breaking News"
 vn.132.desc:0 "§HBreaking News: Museum Fossil Goes Missing§!\n\nA fossil centerpiece vanished from a museum on [event_target:vn_news_planet.GetName] during a livestream. The feed shows nothing except a shadow, a cough, and one very guilty janitorial drone.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.133.name:0 "Entertainment"
 vn.133.desc:0 "§HEntertainment: Cooking Show Banned from Kitchens§!\n\nA popular cooking show filmed on [event_target:vn_news_planet.GetName] has been banned from several public kitchens after viewers attempted to recreate 'volcano soup.' The host denies responsibility while selling aprons.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.134.name:0 "Local Mystery"
 vn.134.desc:0 "§HLocal Mystery: Singing From the Mines§!\n\nWorkers beneath [event_target:vn_news_planet.GetName] report faint singing from sealed mining tunnels. Acoustic experts blame pressure echoes. Musicians are already requesting collaboration rights."
 vn.135.name:0 "HyperNet Debate"
 vn.135.desc:0 "§HHyperNet Debate: Are Elevators Sentient?§!\n\nA malfunctioning elevator on [event_target:vn_news_planet.GetName] apologized to passengers, sparking a viral debate over machine courtesy and artificial personhood. Maintenance teams insist it was only a corrupted greeting file.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.136.name:0 "Celebrity Scandal"
 vn.136.desc:0 "§HCelebrity Scandal: Actor Forgets Which Planet They Are On§!\n\nDuring a promotional interview on [event_target:vn_news_planet.GetName], star Ral Vek thanked the wrong colony, wrong species, and possibly wrong dimension. Fans have described the mistake as 'boldly relatable.'\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.137.name:0 "Breaking News"
 vn.137.desc:0 "§HBreaking News: Parade Float Achieves Orbit§!\n\nA civic parade float on [event_target:vn_news_planet.GetName] accidentally activated surplus lift engines and briefly entered low orbit. Children cheered. Insurance agents did not.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.138.name:0 "Civilian Report"
 vn.138.desc:0 "§HCivilian Report: Local Librarian Defeats Algorithm§!\n\nA librarian on [event_target:vn_news_planet.GetName] has become famous after consistently recommending better entertainment than the colony's predictive media algorithm. The algorithm has requested a rematch.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.139.name:0 "Local Mystery"
 vn.139.desc:0 "§HLocal Mystery: The Smiling Broadcast§!\n\nSeveral citizens on [event_target:vn_news_planet.GetName] received a blank broadcast containing only static and a faint smile-shaped symbol. Officials call it a compression artifact. Viewers call it merchandise."
 vn.140.name:0 "Social Trend"
 vn.140.desc:0 "§HSocial Trend: Reverse Walking Week§!\n\nA fitness movement on [event_target:vn_news_planet.GetName] encourages citizens to walk backward for improved mindfulness. Hospitals report minor injuries and excellent posture.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.141.name:0 "Breaking News"
 vn.141.desc:0 "§HBreaking News: Restaurant Menu Becomes Legal Document§!\n\nA restaurant on [event_target:vn_news_planet.GetName] accidentally published its daily specials in the format of a binding civic decree. Legal scholars are now debating the enforceability of soup.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.142.name:0 "Celebrity News"
 vn.142.desc:0 "§HCelebrity News: Gravball Star Opens Meditation Dome§!\n\nRetired gravball champion Tovo Rinn has opened a meditation dome on [event_target:vn_news_planet.GetName]. Sports fans are confused but attending in large numbers.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.143.name:0 "Local Mystery"
 vn.143.desc:0 "§HLocal Mystery: Rain Falls Upward§!\n\nFor seventeen minutes, rain appeared to fall upward in one district of [event_target:vn_news_planet.GetName]. Meteorologists blame unusual thermal inversion. Conspiracy channels blame the moon again.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.144.name:0 "Civilian Report"
 vn.144.desc:0 "§HCivilian Report: Postal Drone Refuses Retirement§!\n\nAn aging postal drone on [event_target:vn_news_planet.GetName] continues delivering messages despite three official retirement ceremonies. Citizens now leave thank-you notes in charging stations."
 vn.145.name:0 "Entertainment"
 vn.145.desc:0 "§HEntertainment: Documentary About Dust Becomes Hit§!\n\nA slow, six-hour documentary about industrial dust on [event_target:vn_news_planet.GetName] has become an unexpected empire-wide hit. Critics praise its patience. Viewers praise falling asleep to it.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.146.name:0 "HyperNet Panic"
 vn.146.desc:0 "§HHyperNet Panic: Fake Meteor Warning§!\n\nA prank warning about an incoming meteor spread across [event_target:vn_news_planet.GetName] before authorities corrected it. Emergency shelters filled, then immediately became snack markets.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.147.name:0 "Local Mystery"
 vn.147.desc:0 "§HLocal Mystery: No One Claims the Statue§!\n\nA polished statue appeared overnight in a plaza on [event_target:vn_news_planet.GetName]. No artist has claimed it, no cameras recorded it, and everyone agrees it has excellent posture.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
 vn.148.name:0 "Social Trend"
 vn.148.desc:0 "§HSocial Trend: Tiny Hat Movement§!\n\nCitizens on [event_target:vn_news_planet.GetName] have embraced tiny formal hats worn on helmets, horns, antennae, and drones. Political commentators are pretending this means something.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YHuman Interest Uplift§!\n£stability£ +3 Stability\n£unity£ +3% Unity from Jobs"
 vn.149.name:0 "Breaking News"
 vn.149.desc:0 "§HBreaking News: Celebrity Yacht Parks Badly§!\n\nA luxury orbital yacht owned by socialite Vara Lux parked across three docking lanes above [event_target:vn_news_planet.GetName]. Dockworkers described the incident using language unsuitable for broadcast."
 vn.150.name:0 "Civilian Report"
 vn.150.desc:0 "§HCivilian Report: Garden Wins Debate§!\n\nA botanical garden on [event_target:vn_news_planet.GetName] became famous after viewers claimed its plant arrangement clearly won a televised policy debate. The opposing pundit has demanded a rematch.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YViral Media Buzz§!\n£amenities£ +5% Amenities\n£unity£ +5% Unity from Jobs"
 vn.151.name:0 "Local Mystery"
 vn.151.desc:0 "§HLocal Mystery: The Midnight Applause§!\n\nResidents of [event_target:vn_news_planet.GetName] report hearing applause every night at precisely midnight from an empty theater. Ticket sales for the empty performances are now sold out.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§RPublic Panic§!\n£stability£ −3 Stability\n£crime£ +5 Crime"
 vn.152.name:0 "Entertainment"
 vn.152.desc:0 "§HEntertainment: Children's Puppet Becomes Political Icon§!\n\nA cheerful puppet from [event_target:vn_news_planet.GetName] has become a symbol in several unrelated public debates. The studio asks citizens to remember it was designed to teach counting.\n\n§EColony Effect on [event_target:vn_news_planet.GetName] (2 years):§!\n§YTourism Spike§!\n£amenities£ +5% Amenities\n£unity£ +3% Unity from Jobs"
