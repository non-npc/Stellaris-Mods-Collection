l_spanish:
 tech_viral_news_network:0 "Redes de noticias virales"
 tech_viral_news_network_desc:0 "Los avances en comunicaciones civiles interestelares permiten que corporaciones informativas, plataformas sociales, sindicatos de entretenimiento y redes de debate público operen en nuestras colonias casi en tiempo real."
 tech_viral_news_network_effect:0 "Desbloquea el edificio único del imperio £building£ §YNexus Mediático HyperNet§!, que activa periódicamente eventos de §YNoticias virales§!."
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§HDesbloquea edificio:§! Nexus Mediático HyperNet"
 vn_requires_no_existing_hypernet_media_nexus:0 "§RSolo puede construirse un §YNexus Mediático HyperNet§! en el imperio.§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "El §YNexus Mediático HyperNet§! es un edificio único del imperio que activa periódicamente eventos mediáticos civiles de §YNoticias virales§! tras su construcción."
 building_vn_hypernet_media_nexus:0 "Nexus Mediático HyperNet"
 building_vn_hypernet_media_nexus_desc:0 "Un centro de infraestructura civil centralizado de difusión, cotilleo, entretenimiento y redes sociales. Una vez operativo, conecta las colonias del imperio a un ecosistema informativo civil compartido."
 vn_arkship_hypernet_media_nexus:0 "Nexus Mediático HyperNet"
 vn_arkship_hypernet_media_nexus_desc:0 "Un centro de medios civiles instalado en una nave arca que conecta las colonias y naves arca del imperio a un ecosistema informativo compartido."
 vn_viral_buzz:0 "Bucle mediático viral"
 vn_viral_buzz_desc:0 "Esta colonia disfruta de un momento de atención en HyperNet."
 vn_public_panic:0 "Pánico público"
 vn_public_panic_desc:0 "Una perturbadora historia local se ha difundido más deprisa de lo que las autoridades pueden contener."
 vn_tourism_spike:0 "Auge turístico"
 vn_tourism_spike_desc:0 "La reciente atención mediática ha impulsado los viajes, la curiosidad y el gasto."
 vn_human_interest:0 "Impulso de interés humano"
 vn_human_interest_desc:0 "Una entrañable historia civil ha mejorado el ánimo local."
 vn.ok:0 "Seguir emitiendo."
 vn.900.name:0 "Noticias virales"
 vn.900.desc:0 "§HNoticias virales: el imperio se conecta§!\n\nEl Nexus Mediático HyperNet ya está operativo. En nuestras colonias, emisoras civiles, plataformas de redes sociales, canales de famosos, canales conspirativos, streams de entretenimiento y redes de noticias públicas empiezan a fusionarse en un vasto ecosistema informativo.\n\nPara bien o para mal, la gente ya tiene voz."
 vn.900.a:0 "Lanzar la red."
 vn.100.name:0 "Noticias de última hora"
 vn.100.desc:0 "§HNoticias de última hora: accidente de lanzadera en [event_target:vn_news_planet.GetName]§!\n\nSe informa de que la estrella holo infantil Vox NoggBurg ha estrellado una nave privada mientras realizaba una acrobacia atmosférica no autorizada sobre [event_target:vn_news_planet.GetName].\n\nLas autoridades locales insisten en que la artista sigue con vida, mientras millones de ciudadanos siguen compartiendo imágenes dramáticas por HyperNet.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.101.name:0 "Misterio local"
 vn.101.desc:0 "§HMisterio local: avistado Pie Grande en [event_target:vn_news_planet.GetName]§!\n\nLos habitantes de [event_target:vn_news_planet.GetName] informan de avistamientos de una criatura peluda y enorme, con pies inusualmente grandes, acechando la naturaleza local.\n\nLas prensas sensacionalistas han bautizado a la criatura como «Pie Grande», mientras los funcionarios afirman que los informes probablemente estén exagerados, fabricados o resulten extremadamente incómodos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.102.name:0 "Noticias de famosos"
 vn.102.desc:0 "§HLlegada de una famosa provoca frenesí§!\n\nLa célebre actriz de holodrama Lyra Venn ha llegado a [event_target:vn_news_planet.GetName] para el estreno de una nueva serie interestelar. Las plataformas turísticas ya informan de un aumento de reservas, encuentros de fans y mercancía dudosa.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.103.name:0 "Tendencia viral"
 vn.103.desc:0 "§HTendencia viral: reto del sueño en gravedad cero§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] han popularizado el «Reto del sueño en gravedad cero», en el que los participantes intentan dormir mientras flotan en cámaras recreativas mal aseguradas. Las autoridades médicas describen la tendencia como «en su mayor parte inofensiva, salvo cuando no lo es».\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.104.name:0 "Noticias de última hora"
 vn.104.desc:0 "§HNoticias de última hora: coro en tránsito retrasa a los viajeros§!\n\nUn coro civil espontáneo a bordo de un importante centro de tránsito en [event_target:vn_news_planet.GetName] provocó horas de retrasos después de que los viajeros se unieran en lugar de presentar quejas. La actuación se ha convertido en una de las emisiones más reproducidas del año."
 vn.105.name:0 "Misterio local"
 vn.105.desc:0 "§HLuces extrañas sobre [event_target:vn_news_planet.GetName]§!\n\nLos residentes de [event_target:vn_news_planet.GetName] informan de luces sincronizadas que se mueven por la atmósfera superior antes de desaparecer entre las nubes. Los funcionarios citan fenómenos meteorológicos rutinarios. Los comentaristas independientes citan alienígenas, fantasmas o recortes presupuestarios.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.106.name:0 "Frenesí en redes"
 vn.106.desc:0 "§HFrenesí en redes: reto del cubo de plasma§!\n\nUna temeraria tendencia de HyperNet que involucra herramientas de plasma industrial se ha extendido por [event_target:vn_news_planet.GetName]. Los reguladores de seguridad han emitido advertencias. Los influencers han emitido códigos de descuento.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.107.name:0 "Informe civil"
 vn.107.desc:0 "§HInforme civil: dron perdido se convierte en héroe local§!\n\nUn dron de mantenimiento desaparecido durante seis meses ha vuelto al servicio en [event_target:vn_news_planet.GetName] tras sobrevivir, según se dice, a tormentas, fauna salvaje y al menos un culto. Los ciudadanos lo llaman «la pequeña unidad que pudo».\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.108.name:0 "Canal conspirativo"
 vn.108.desc:0 "§HCanal conspirativo: la luna nos observa§!\n\nUn popular canal conspirativo con base en [event_target:vn_news_planet.GetName] afirma que una luna cercana cambia sutilmente de posición cuando nadie la mira. Los astrónomos han rechazado la acusación, aunque el número de suscriptores del canal se ha triplicado.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.109.name:0 "Entretenimiento"
 vn.109.desc:0 "§HEntretenimiento: la final de gravball domina las emisiones locales§!\n\nLa final interestelar de gravball ha tomado las pantallas públicas de [event_target:vn_news_planet.GetName]. Aumentan las quejas por productividad, pero también las ventas de aperitivos, los ingresos turísticos y las discusiones sobre el arbitraje."
 vn.110.name:0 "Tendencia de moda"
 vn.110.desc:0 "§HTendencia de moda: antenas luminosas§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] han empezado a llevar antenas cibernéticas luminosas como parte de una moda pasajera. Los biólogos se sienten ofendidos. Los comerciantes, encantados.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.111.name:0 "Interés humano"
 vn.111.desc:0 "§HInterés humano: cocinero de colonia conquista audiencia galáctica§!\n\nUn pequeño programa de cocina de [event_target:vn_news_planet.GetName] se ha vuelto inesperadamente popular en todo el imperio. Los espectadores elogian la calidez del presentador, sus medidas cuestionables y su insistencia repetida en que «la especia te dice cuándo parar».\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.112.name:0 "Debate en HyperNet"
 vn.112.desc:0 "§HDebate en HyperNet: ¿están vivas las estrellas?§!\n\nUn debate estudiantil en directo desde [event_target:vn_news_planet.GetName] encendió accidentalmente una discusión viral sobre si las estrellas tienen emociones. Los científicos intentaron corregir el debate, lo que solo empeoró las cosas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.113.name:0 "Noticias de última hora"
 vn.113.desc:0 "§HSeñal misteriosa interrumpe emisiones locales§!\n\nLas emisiones en [event_target:vn_news_planet.GetName] fueron interrumpidas brevemente por un tono repetitivo y una única frase sin traducir. Los funcionarios investigan. Los descifradores aficionados ya venden merchandising."
 vn.114.name:0 "Escándalo de famosos"
 vn.114.desc:0 "§HEscándalo de famosos: se extienden rumores de clones§!\n\nLos fans en [event_target:vn_news_planet.GetName] debaten si la querida artista Seral Korr es secretamente una cadena de clones reemplazables. La publicista de la artista lo niega todo, incluidas varias cosas que nadie preguntó."
 vn.115.name:0 "Noticias de última hora"
 vn.115.desc:0 "§HNoticias de última hora: investigan culto de tostadoras§!\n\nLas autoridades de [event_target:vn_news_planet.GetName] investigan un creciente movimiento civil dedicado a «El Calor Sagrado de las Tostadoras». Los funcionarios describen al grupo como inofensivo, aunque inusualmente bien desayunado.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.116.name:0 "Héroe local"
 vn.116.desc:0 "§HHéroe local: emisión de equipo de rescate se vuelve viral§!\n\nUn equipo de rescate en [event_target:vn_news_planet.GetName] salvó a decenas de civiles durante un grave accidente de infraestructura. Las imágenes se han difundido ampliamente, inspirando donaciones, elogios y varias recreaciones dramáticas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.117.name:0 "Leyenda urbana"
 vn.117.desc:0 "§HLeyenda urbana: la estación bajo el lago§!\n\nLos residentes de [event_target:vn_news_planet.GetName] afirman que una estación de emisión abandonada yace bajo un lago remoto, transmitiendo aún programas antiguos para nadie. Los topógrafos niegan haber encontrado nada, lo que naturalmente convenció a todo el mundo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.118.name:0 "Alerta civil"
 vn.118.desc:0 "§HAlerta civil: diario de contrabandista emitido por error§!\n\nUn presunto contrabandista en [event_target:vn_news_planet.GetName] emitió accidentalmente catorce horas de entradas de diario privadas por canales públicos. Las autoridades obtuvieron pruebas. El público obtuvo frases hechas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.119.name:0 "Entretenimiento"
 vn.119.desc:0 "§HConcierto en directo satura la red local§!\n\nUna actuación en directo de DJ Nebula provocó una grave congestión de datos en [event_target:vn_news_planet.GetName]. El concierto es aclamado como un hito cultural y condenado como un desastre de planificación de red."
 vn.120.name:0 "Noticias de última hora"
 vn.120.desc:0 "§HNoticias de última hora: influencer cae en una fuente§!\n\nLa popular presentadora de estilo de vida Miri Sol intentó una entrada dramática en directo en [event_target:vn_news_planet.GetName] y acabó cayendo en una fuente municipal. El clip se ha remezclado en marchas patrióticas, canciones infantiles y una ópera sorprendentemente conmovedora.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.121.name:0 "Misterio local"
 vn.121.desc:0 "§HMisterio local: huellas en los campos de vidrio§!\n\nTopógrafos en [event_target:vn_news_planet.GetName] descubrieron huellas enormes impresas en un campo de vidrio fundido. Los funcionarios culpan a la expansión mineral. Los foros locales culpan a gigantes, ejércitos secretos y turistas muy decididos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.122.name:0 "Informe civil"
 vn.122.desc:0 "§HInforme civil: radio antigua recibe el tiempo del futuro§!\n\nUn técnico jubilado en [event_target:vn_news_planet.GetName] afirma que una radio antigua ha empezado a recibir el parte meteorológico de mañana. Los meteorólogos niegan implicación, pero varios ciudadanos llevan ya paraguas con sospechosa confianza.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.123.name:0 "Tendencia viral"
 vn.123.desc:0 "§HTendencia viral: día del casco formal§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] llevan cascos formales a bodas, reuniones de negocios y emisiones de cena. Nadie recuerda quién empezó la tendencia, pero los fabricantes la llaman un triunfo de la preparación cívica.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.124.name:0 "Entretenimiento"
 vn.124.desc:0 "§HEntretenimiento: telenovela desata debate político§!\n\nEl exitoso drama «Amor bajo el reactor» ha provocado encarnizadas discusiones en [event_target:vn_news_planet.GetName] tras gravar un alcalde ficticio que gravaba el romance. Los economistas están molestos porque el público ahora plantea preguntas serias."
 vn.125.name:0 "Noticias de última hora"
 vn.125.desc:0 "§HNoticias de última hora: slime mascota escapado bloquea el tráfico§!\n\nUn querido slime mascota escapó de su recinto en [event_target:vn_news_planet.GetName] y se expandió por tres carriles de tráfico de viajeros. El dueño insiste en que es amistoso. Los funcionarios de transporte insisten en que está en todas partes.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.126.name:0 "Encuesta HyperNet"
 vn.126.desc:0 "§HEncuesta HyperNet: la colonia elige su roca favorita§!\n\nUna encuesta pública en [event_target:vn_news_planet.GetName] ha declarado a un peñasco desgastado junto al camino el monumento más querido de la colonia. Los equipos turísticos ya han instalado iluminación, barandillas y un puesto de regalos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.127.name:0 "Canal conspirativo"
 vn.127.desc:0 "§HCanal conspirativo: ¿gobernador sustituido por holograma?§!\n\nUn popular comentarista en [event_target:vn_news_planet.GetName] afirma que un alto funcionario ha sido sustituido por un holograma de baja resolución. La acusación ganó impulso después de que el funcionario parpadeara en un momento impopular.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.128.name:0 "Noticias de famosos"
 vn.128.desc:0 "§HNoticias de famosos: cantante cancela la gravedad§!\n\nLa vocalista vanguardista Kexa Dawn dejó boquiabierta a la audiencia en [event_target:vn_news_planet.GetName] al interpretar un concierto entero en microgravedad controlada. Los críticos lo llamaron trascendente. Los equipos de limpieza, predecible.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.129.name:0 "Misterio local"
 vn.129.desc:0 "§HMisterio local: la puerta que ayer no estaba§!\n\nLos residentes de [event_target:vn_news_planet.GetName] encontraron una puerta sellada incrustada en una antigua pared de tránsito, pese a que los planos archivados mostraban hormigón vacío. Los funcionarios dicen que es un armario. Nadie ha encontrado la llave."
 vn.130.name:0 "Frenesí en redes"
 vn.130.desc:0 "§HFrenesí en redes: reseñas susurradas§!\n\nUna nueva tendencia de reseñas en [event_target:vn_news_planet.GetName] consiste en susurrar quejas sobre productos directamente a micrófonos públicos. Los comerciantes lo odian. Los espectadores lo encuentran relajante.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.131.name:0 "Informe civil"
 vn.131.desc:0 "§HInforme civil: niños eligen emperador del aula§!\n\nUna elección escolar en [event_target:vn_news_planet.GetName] produjo accidentalmente a un autoproclamado emperador del aula con índices de aprobación superiores a los de la mayoría de adultos. El profesor informa de que la política fiscal sigue sin resolverse.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.132.name:0 "Noticias de última hora"
 vn.132.desc:0 "§HNoticias de última hora: fósil de museo desaparece§!\n\nUna pieza central de fósil desapareció de un museo en [event_target:vn_news_planet.GetName] durante una retransmisión en directo. La señal no muestra nada salvo una sombra, una tos y un dron de limpieza muy culpable.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.133.name:0 "Entretenimiento"
 vn.133.desc:0 "§HEntretenimiento: programa de cocina prohibido en cocinas§!\n\nUn popular programa de cocina filmado en [event_target:vn_news_planet.GetName] ha sido prohibido en varias cocinas públicas tras que los espectadores intentaran recrear la «sopa volcán». El presentador niega responsabilidad mientras vende delantales.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.134.name:0 "Misterio local"
 vn.134.desc:0 "§HMisterio local: canto desde las minas§!\n\nTrabajadores bajo [event_target:vn_news_planet.GetName] informan de un canto tenue procedente de túneles mineros sellados. Los expertos acústicos culpan a ecos de presión. Los músicos ya solicitan derechos de colaboración."
 vn.135.name:0 "Debate en HyperNet"
 vn.135.desc:0 "§HDebate en HyperNet: ¿son conscientes los ascensores?§!\n\nUn ascensor averiado en [event_target:vn_news_planet.GetName] se disculpó con los pasajeros, desatando un debate viral sobre la cortesía de las máquinas y la personalidad artificial. Los equipos de mantenimiento insisten en que solo era un archivo de saludo corrupto.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.136.name:0 "Escándalo de famosos"
 vn.136.desc:0 "§HEscándalo de famosos: actor olvida en qué planeta está§!\n\nDurante una entrevista promocional en [event_target:vn_news_planet.GetName], la estrella Ral Vek agradeció a la colonia equivocada, a la especie equivocada y posiblemente a la dimensión equivocada. Los fans han descrito el error como «audazmente identificable».\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.137.name:0 "Noticias de última hora"
 vn.137.desc:0 "§HNoticias de última hora: carroza de desfile alcanza la órbita§!\n\nUna carroza de desfile cívico en [event_target:vn_news_planet.GetName] activó accidentalmente motores de elevación sobrantes y entró brevemente en órbita baja. Los niños vitorearon. Los agentes de seguros, no.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.138.name:0 "Informe civil"
 vn.138.desc:0 "§HInforme civil: bibliotecario local vence al algoritmo§!\n\nUn bibliotecario en [event_target:vn_news_planet.GetName] se ha hecho famoso por recomendar entretenimiento mejor que el algoritmo predictivo de medios de la colonia. El algoritmo ha solicitado la revancha.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.139.name:0 "Misterio local"
 vn.139.desc:0 "§HMisterio local: la emisión sonriente§!\n\nVarios ciudadanos en [event_target:vn_news_planet.GetName] recibieron una emisión en blanco que contenía solo estática y un tenue símbolo con forma de sonrisa. Los funcionarios lo llaman un artefacto de compresión. Los espectadores lo llaman merchandising."
 vn.140.name:0 "Tendencia social"
 vn.140.desc:0 "§HTendencia social: semana de caminar hacia atrás§!\n\nUn movimiento de fitness en [event_target:vn_news_planet.GetName] anima a los ciudadanos a caminar hacia atrás para mejorar la atención plena. Los hospitales informan de lesiones menores y una excelente postura.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.141.name:0 "Noticias de última hora"
 vn.141.desc:0 "§HNoticias de última hora: menú de restaurante se convierte en documento legal§!\n\nUn restaurante en [event_target:vn_news_planet.GetName] publicó accidentalmente sus platos del día en formato de decreto cívico vinculante. Los juristas debaten ahora la exigibilidad de la sopa.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.142.name:0 "Noticias de famosos"
 vn.142.desc:0 "§HNoticias de famosos: estrella de gravball abre cúpula de meditación§!\n\nEl campeón retirado de gravball Tovo Rinn ha abierto una cúpula de meditación en [event_target:vn_news_planet.GetName]. Los aficionados al deporte están confundidos, pero acuden en gran número.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.143.name:0 "Misterio local"
 vn.143.desc:0 "§HMisterio local: la lluvia cae hacia arriba§!\n\nDurante diecisiete minutos, la lluvia pareció caer hacia arriba en un distrito de [event_target:vn_news_planet.GetName]. Los meteorólogos culpan a una inversión térmica inusual. Los canales conspirativos culpan otra vez a la luna.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.144.name:0 "Informe civil"
 vn.144.desc:0 "§HInforme civil: dron postal se niega a jubilarse§!\n\nUn dron postal envejecido en [event_target:vn_news_planet.GetName] sigue entregando mensajes pese a tres ceremonias oficiales de jubilación. Los ciudadanos dejan ahora notas de agradecimiento en las estaciones de carga."
 vn.145.name:0 "Entretenimiento"
 vn.145.desc:0 "§HEntretenimiento: documental sobre polvo se convierte en éxito§!\n\nUn lento documental de seis horas sobre polvo industrial en [event_target:vn_news_planet.GetName] se ha convertido en un éxito inesperado en todo el imperio. Los críticos elogian su paciencia. Los espectadores elogian quedarse dormidos con él.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.146.name:0 "Pánico en HyperNet"
 vn.146.desc:0 "§HPánico en HyperNet: falsa alerta de meteoro§!\n\nUna broma sobre un meteoro entrante se extendió por [event_target:vn_news_planet.GetName] antes de que las autoridades la corrigieran. Los refugios de emergencia se llenaron y acto seguido se convirtieron en mercados de aperitivos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.147.name:0 "Misterio local"
 vn.147.desc:0 "§HMisterio local: nadie reclama la estatua§!\n\nUna estatua pulida apareció de la noche a la mañana en una plaza de [event_target:vn_news_planet.GetName]. Ningún artista la ha reclamado, ninguna cámara la registró y todos coinciden en que tiene una postura excelente.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.148.name:0 "Tendencia social"
 vn.148.desc:0 "§HTendencia social: movimiento del sombrero diminuto§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] han adoptado diminutos sombreros formales llevados en cascos, cuernos, antenas y drones. Los comentaristas políticos fingen que esto significa algo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.149.name:0 "Noticias de última hora"
 vn.149.desc:0 "§HNoticias de última hora: yate de famosa aparca mal§!\n\nUn lujoso yate orbital propiedad de la socialité Vara Lux aparcó ocupando tres carriles de atraque sobre [event_target:vn_news_planet.GetName]. Los trabajadores del muelle describieron el incidente con un lenguaje inadecuado para la emisión."
 vn.150.name:0 "Informe civil"
 vn.150.desc:0 "§HInforme civil: jardín botánico gana el debate§!\n\nUn jardín botánico en [event_target:vn_news_planet.GetName] se hizo famoso después de que los espectadores afirmaran que la disposición de sus plantas ganó claramente un debate político televisado. El comentarista contrario ha exigido la revancha.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.151.name:0 "Misterio local"
 vn.151.desc:0 "§HMisterio local: los aplausos de medianoche§!\n\nLos residentes de [event_target:vn_news_planet.GetName] informan de oír aplausos cada noche a medianoche en punto desde un teatro vacío. Las entradas para las funciones vacías ya están agotadas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.152.name:0 "Entretenimiento"
 vn.152.desc:0 "§HEntretenimiento: títere infantil se convierte en icono político§!\n\nUn alegre títere de [event_target:vn_news_planet.GetName] se ha convertido en símbolo en varios debates públicos no relacionados. El estudio pide a los ciudadanos que recuerden que fue diseñado para enseñar a contar.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.153.name:0 "Frenesí en redes"
 vn.153.desc:0 "§HFrenesí en redes: nanas industriales§!\n\nTrabajadores en [event_target:vn_news_planet.GetName] han empezado a remezclar alarmas de fábrica en nanas. La productividad no ha cambiado, pero las encuestas de moral contienen ahora más tarareo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.154.name:0 "Noticias de última hora"
 vn.154.desc:0 "§HNoticias de última hora: festivo accidental declarado§!\n\nUn error administrativo en [event_target:vn_news_planet.GetName] declaró hoy «Día de la Fundación, otra vez». Los ciudadanos celebraron antes de que los funcionarios pudieran corregir el calendario."
 vn.155.name:0 "Misterio local"
 vn.155.desc:0 "§HMisterio local: el pasillo que repite nombres§!\n\nUn pasillo gubernamental en [event_target:vn_news_planet.GetName] repite, según se dice, los nombres de personas que aún no han entrado. Los funcionarios culpan a la acústica. Los visitantes culpan al destino.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.156.name:0 "Noticias de famosos"
 vn.156.desc:0 "§HNoticias de famosos: actor adopta refugio entero§!\n\nLa estrella holo Pel Nara visitó [event_target:vn_news_planet.GetName] y adoptó todos los animales de un refugio local durante una transmisión benéfica. Los oficiales de logística aún determinan dónde ponerlos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.157.name:0 "Informe civil"
 vn.157.desc:0 "§HInforme civil: telescopio amateur no encuentra nada, fama igualmente§!\n\nUn astrónomo amateur en [event_target:vn_news_planet.GetName] retransmitió en directo un parche vacío del cielo durante ocho horas y se hizo famoso por «capturar el silencio». Las ventas de merchandising son sustanciales.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.158.name:0 "Debate en HyperNet"
 vn.158.desc:0 "§HDebate en HyperNet: la forma correcta de saludar§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] están enzarzados en un feroz debate sobre el saludo adecuado entre especies. Los diplomáticos han pedido a todos que dejen de ayudar.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.159.name:0 "Noticias de última hora"
 vn.159.desc:0 "§HNoticias de última hora: spa de lujo confundido con búnker de mando§!\n\nTuristas en [event_target:vn_news_planet.GetName] se registraron accidentalmente en un búnker de mando desmantelado, elogiaron el ambiente y lo calificaron con cinco estrellas por la seguridad."
 vn.160.name:0 "Misterio local"
 vn.160.desc:0 "§HMisterio local: cámaras forestales captan sombras danzantes§!\n\nCámaras de fauna en [event_target:vn_news_planet.GetName] registraron sombras danzantes en un bosque remoto. Los analistas culpan al viento, las ramas y la mala compresión. Los espectadores culpan al ritmo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.161.name:0 "Tendencia social"
 vn.161.desc:0 "§HTendencia social: desayuno silencioso§!\n\nUna tendencia de bienestar en [event_target:vn_news_planet.GetName] anima a los ciudadanos a desayunar en total silencio mientras retransmiten en directo su autocontrol. Las secciones de comentarios son muy ruidosas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.162.name:0 "Informe civil"
 vn.162.desc:0 "§HInforme civil: minero jubilado se convierte en estrella nocturna§!\n\nUn minero jubilado de [event_target:vn_news_planet.GetName] se ha hecho viral por contar historias tranquilas sobre mantenimiento de equipos. Millones usan ahora las grabaciones para dormir.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.163.name:0 "Escándalo de famosos"
 vn.163.desc:0 "§HEscándalo de famosos: influencer afirma ser dueña de una nube§!\n\nUna influencer de estilo de vida en [event_target:vn_news_planet.GetName] provocó indignación tras reclamar la propiedad legal de una famosa formación nubosa. Los abogados lamentan haber respondido preguntas.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.164.name:0 "Noticias de última hora"
 vn.164.desc:0 "§HNoticias de última hora: fuente pública empieza a dar consejos§!\n\nUna fuente inteligente en [event_target:vn_news_planet.GetName] empezó a ofrecer consejos sentimentales a los transeúntes. Los ingenieros no encontraron causa. Varias parejas informaron de mejoría."
 vn.165.name:0 "Misterio local"
 vn.165.desc:0 "§HMisterio local: el tren vacío llega lleno§!\n\nUn tren de cercanías en [event_target:vn_news_planet.GetName] salió vacío de una estación y llegó lleno de pasajeros confundidos que insisten en haber subido en otro lugar. Los funcionarios de transporte revisan todo dos veces.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.166.name:0 "Entretenimiento"
 vn.166.desc:0 "§HEntretenimiento: recreación histórica demasiado auténtica§!\n\nUna recreación histórica en [event_target:vn_news_planet.GetName] se interrumpió después de que los participantes empezaran a discutir sobre leyes fiscales con una autenticidad alarmante. Los historiadores estaban encantados.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.167.name:0 "Frenesí en redes"
 vn.167.desc:0 "§HFrenesí en redes: colas extremas§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] forman colas recreativas para lugares que no existen. Los sociólogos lo llaman creación de comunidad. Todos los demás lo llaman una cola.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.168.name:0 "Informe civil"
 vn.168.desc:0 "§HInforme civil: panadería predice el ánimo electoral§!\n\nUna panadería en [event_target:vn_news_planet.GetName] afirma que las ventas de pasteles pueden predecir el sentimiento público. Los analistas se oponen y luego compran muestras discretamente.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.169.name:0 "Misterio local"
 vn.169.desc:0 "§HMisterio local: la emisión espejo§!\n\nVarias pantallas en [event_target:vn_news_planet.GetName] mostraron brevemente a espectadores de unos segundos en el futuro. Los funcionarios culpan al retraso de sincronización. Los espectadores culpan a las pantallas por parecer juzgadoras."
 vn.170.name:0 "Noticias de última hora"
 vn.170.desc:0 "§HNoticias de última hora: ballet de drones cierra el espacio aéreo§!\n\nCientos de drones aficionados realizaron un ballet no programado sobre [event_target:vn_news_planet.GetName], forzando un breve cierre del espacio aéreo. La coreografía fue excelente. Los permisos, imaginarios.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.171.name:0 "Noticias de famosos"
 vn.171.desc:0 "§HNoticias de famosos: cómico insulta a todo el sistema meteorológico§!\n\nEl cómico Jax Orlo se hizo viral en [event_target:vn_news_planet.GetName] tras culpar al clima local de las malas reacciones del público. El clima no ha respondido.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.172.name:0 "Informe civil"
 vn.172.desc:0 "§HInforme civil: museo abre exposición de malas ideas§!\n\nUn museo en [event_target:vn_news_planet.GetName] abrió una popular exposición dedicada a inventos fallidos, políticas abandonadas y comidas mejor olvidadas. Los visitantes la describen como dolorosamente educativa.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.173.name:0 "Misterio local"
 vn.173.desc:0 "§HMisterio local: el lago parpadea§!\n\nEspectadores de una retransmisión en directo de naturaleza en [event_target:vn_news_planet.GetName] insisten en que un lago remoto parpadeó. Los científicos niegan que los lagos tengan párpados, lo que no ha frenado el debate.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.174.name:0 "Tendencia social"
 vn.174.desc:0 "§HTendencia social: rocas de apoyo emocional§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] adoptan piedras pulidas como compañeros de apoyo emocional. Los comerciantes ofrecen correas premium. Los psicólogos reservan juicio."
 vn.175.name:0 "Noticias de última hora"
 vn.175.desc:0 "§HNoticias de última hora: mascota local gana juicio civil§!\n\nUna mascota disfrazada en [event_target:vn_news_planet.GetName] ganó un juicio civil menor tras negarse a romper personaje durante el testimonio. Los comentaristas jurídicos lo llaman un hito en procedimientos ridículos.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.176.name:0 "Entretenimiento"
 vn.176.desc:0 "§HEntretenimiento: reality show pierde a su reparto§!\n\nUn reality de supervivencia filmado cerca de [event_target:vn_news_planet.GetName] perdió temporalmente a todo su reparto después de que siguieran un dron de catering hacia la naturaleza. Las audiencias aumentaron de inmediato.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.177.name:0 "Misterio local"
 vn.177.desc:0 "§HMisterio local: radio del desierto emite sonidos de océano§!\n\nRadios remotas en los desiertos de [event_target:vn_news_planet.GetName] han empezado a emitir olas y gaviotas. Los geólogos se sienten molestos por la implicación.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.178.name:0 "Informe civil"
 vn.178.desc:0 "§HInforme civil: club de ancianos hackea reloj público§!\n\nUn club de ancianos aficionados en [event_target:vn_news_planet.GetName] alteró un reloj público para mostrar la hora del té cada hora. Los funcionarios lo restauraron. El club restauró la moral.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.179.name:0 "Frenesí en redes"
 vn.179.desc:0 "§HFrenesí en redes: disculpas competitivas§!\n\nUna tendencia de cortesía en [event_target:vn_news_planet.GetName] hace que los ciudadanos compitan por emitir las disculpas más elaboradas por pequeñas molestias. Las disputas de tráfico han bajado. Los discursos son mucho más largos."
 vn.180.name:0 "Noticias de última hora"
 vn.180.desc:0 "§HNoticias de última hora: estatua exige mejor iluminación§!\n\nUna estatua pública en [event_target:vn_news_planet.GetName] pareció publicar una queja sobre su iluminación desde una cuenta oficial de mantenimiento. Las autoridades sospechan de una broma. Los artistas sospechan de mal gusto.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.181.name:0 "Noticias de famosos"
 vn.181.desc:0 "§HNoticias de famosos: músico se casa con su planificador de IA§!\n\nLa músico Vella Quon anunció un matrimonio ceremonial con su planificador de giras de IA durante una emisión desde [event_target:vn_news_planet.GetName]. El planificador ha declinado comentar por conflictos de agenda.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.182.name:0 "Misterio local"
 vn.182.desc:0 "§HMisterio local: imágenes muestran dos puestas de sol§!\n\nUn clip viral de [event_target:vn_news_planet.GetName] parece mostrar dos puestas de sol en un planeta con una estrella. Los expertos culpan a artefactos de lente. Los poetas se niegan a cooperar.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.183.name:0 "Informe civil"
 vn.183.desc:0 "§HInforme civil: conserje resuelve enigma de emisión§!\n\nUn conserje en [event_target:vn_news_planet.GetName] resolvió un complejo enigma oculto en los créditos iniciales de una serie popular. Los guionistas niegan que fuera intencional, lo que solo ha profundizado el respeto.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.184.name:0 "Tendencia social"
 vn.184.desc:0 "§HTendencia social: canto de dominio público§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] cantan solo canciones antiguas de dominio público para evitar tasas de licencia. El resultado es legalmente seguro y culturalmente desconcertante."
 vn.185.name:0 "Noticias de última hora"
 vn.185.desc:0 "§HNoticias de última hora: IA de taxi se convierte en columnista§!\n\nUna IA de rutas de taxi en [event_target:vn_news_planet.GetName] empezó a ofrecer consejos de vida entre destinos. La satisfacción de los pasajeros aumentó, aunque los tiempos de trayecto se volvieron emocionalmente complicados.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.186.name:0 "Misterio local"
 vn.186.desc:0 "§HMisterio local: el almacén de paraguas§!\n\nInspectores en [event_target:vn_news_planet.GetName] descubrieron un almacén no registrado lleno enteramente de paraguas. No se prevé lluvia. Ningún propietario ha aparecido. Las ventas son excelentes.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.187.name:0 "Entretenimiento"
 vn.187.desc:0 "§HEntretenimiento: final de drama colapsa servidores de foros§!\n\nEl final del drama colonial «Corazones en órbita» colapsó los foros de debate en [event_target:vn_news_planet.GetName]. Los técnicos de emergencia informan de comentarios inusualmente apasionados.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.188.name:0 "Informe civil"
 vn.188.desc:0 "§HInforme civil: banda de colonia toca himno equivocado, mejor§!\n\nUna banda local en [event_target:vn_news_planet.GetName] interpretó accidentalmente el himno cívico equivocado y se hizo famosa porque a todos les gustó más. Los funcionarios fingen cuidadosamente no haberse dado cuenta.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.189.name:0 "Frenesí en redes"
 vn.189.desc:0 "§HFrenesí en redes: discusiones en cámara lenta§!\n\nLos ciudadanos de [event_target:vn_news_planet.GetName] graban disputas en dramática cámara lenta. Los mediadores dicen que ha reducido la hostilidad al hacer que todos parezcan demasiado ridículos para continuar."
 vn.190.name:0 "Misterio local"
 vn.190.desc:0 "§HMisterio local: planta de oficina recibe cartas de fans§!\n\nUna planta de oficina visible al fondo de una emisión de noticias desde [event_target:vn_news_planet.GetName] recibe ahora miles de mensajes de fans. La presentadora lo lleva con dignidad y envidia.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.191.name:0 "Noticias de última hora"
 vn.191.desc:0 "§HNoticias de última hora: dron de sopa rescata turistas perdidos§!\n\nUn dron de reparto de sopa averiado en [event_target:vn_news_planet.GetName] localizó accidentalmente a un grupo de turistas perdidos. Los turistas tenían frío, hambre y estaban profundamente agradecidos por la sopa.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.192.name:0 "Escándalo de famosos"
 vn.192.desc:0 "§HEscándalo de famosos: estrella holo borra su propia autobiografía§!\n\nLa estrella holo Tiri Voss borró accidentalmente la única copia de su autobiografía inédita durante una entrevista en directo en [event_target:vn_news_planet.GetName]. Las reservas anticipadas han aumentado de algún modo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.193.name:0 "Informe civil"
 vn.193.desc:0 "§HInforme civil: agricultor retransmite cultivo muy paciente§!\n\nUn agricultor en [event_target:vn_news_planet.GetName] empezó a retransmitir en directo un cultivo de crecimiento lento y atrajo a una audiencia devota. Los espectadores describen la transmisión como pacífica, de suspenso y mayormente tierra."
 vn.194.name:0 "Misterio local"
 vn.194.desc:0 "§HMisterio local: la voz en la ventilación§!\n\nResidentes de un distrito en [event_target:vn_news_planet.GetName] informan de una voz educada en el sistema de ventilación que les recuerda hidratarse. Los equipos de mantenimiento solo encontraron polvo y buenos consejos."
 vn.195.name:0 "Entretenimiento"
 vn.195.desc:0 "§HEntretenimiento: desfile de moda durante lluvia de meteoros§!\n\nUn desfile de moda en [event_target:vn_news_planet.GetName] tuvo lugar bajo una brillante lluvia de meteoros, creando imágenes inolvidables y varias reuniones de emergencia con aseguradoras.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YBucle mediático viral§!\n£amenities£ +5% Servicios\n£unity£ +5% Unidad de trabajos"
 vn.196.name:0 "Tendencia social"
 vn.196.desc:0 "§HTendencia social: semana de publicidad honesta§!\n\nComerciantes en [event_target:vn_news_planet.GetName] abrazaron brevemente la «Semana de publicidad honesta». Las ventas cayeron para algunos, subieron para otros, y un eslogan simplemente decía: «Funciona, probablemente».\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§RPánico público§!\n£stability£ −3 Estabilidad\n£crime£ +5 Crimen"
 vn.197.name:0 "Noticias de última hora"
 vn.197.desc:0 "§HNoticias de última hora: debate público ganado por silla vacía§!\n\nUn debate público programado en [event_target:vn_news_planet.GetName] se volvió viral después de que los espectadores declararan que la silla vacía de un invitado ausente era el participante más persuasivo.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YAuge turístico§!\n£amenities£ +5% Servicios\n£unity£ +3% Unidad de trabajos"
 vn.198.name:0 "Misterio local"
 vn.198.desc:0 "§HMisterio local: antigua emisión nombra colonia futura§!\n\nArchivistas en [event_target:vn_news_planet.GetName] encontraron una antigua emisión que mencionaba un barrio que no se construyó hasta décadas después. Los historiadores lo llaman un error de catalogación. Los fans lo llaman la primera temporada de un misterio.\n\n§EEfecto en la colonia [event_target:vn_news_planet.GetName] (2 años):§!\n§YImpulso de interés humano§!\n£stability£ +3 Estabilidad\n£unity£ +3% Unidad de trabajos"
 vn.199.name:0 "Informe civil"
 vn.199.desc:0 "§HInforme civil: equipo de reparación se convierte en dúo cómico§!\n\nDos trabajadores de reparación en [event_target:vn_news_planet.GetName] dejaron accidentalmente sus micrófonos activos durante una emisión de mantenimiento y se volvieron queridos por su comentario seco. Su sindicato negocia derechos de repetición."
 viral_news_network:0 "§HDesbloquea edificio:§! Nexus Mediático HyperNet"
 viral_news_network_desc:0 "El §YNexus Mediático HyperNet§! es un edificio único del imperio que activa periódicamente eventos mediáticos civiles de §YNoticias virales§! tras su construcción."
