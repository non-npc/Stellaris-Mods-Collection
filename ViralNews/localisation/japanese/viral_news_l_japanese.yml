l_japanese:
 tech_viral_news_network:0 "バイラル・ニュース・ネットワーク"
 tech_viral_news_network_desc:0 "恒星間民間通信技術の進歩により、ニュース企業、ソーシャル・プラットフォーム、エンターテインメント・シンジケート、公衆討論ネットワークが各植民地でほぼリアルタイムに連携できるようになった。"
 tech_viral_news_network_effect:0 "帝国限定の £building£ §Yハイパーネット・メディア・ネクサス§! を解禁し、定期的な §Yバイラル・ニュース§! イベントを有効化する。"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§H建造物解禁：§! ハイパーネット・メディア・ネクサス"
 vn_requires_no_existing_hypernet_media_nexus:0 "§R帝国には §Yハイパーネット・メディア・ネクサス§! を1つだけ建設できる。§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "§Yハイパーネット・メディア・ネクサス§! は帝国限定の建造物で、建設後に定期的な §Yバイラル・ニュース§! 民間メディアイベントを発生させる。"
 building_vn_hypernet_media_nexus:0 "ハイパーネット・メディア・ネクサス"
 building_vn_hypernet_media_nexus_desc:0 "民間放送、ゴシップ、エンターテインメント、ソーシャル・メディアのインフラを一元化した拠点。稼働すると帝国の各植民地を共通の民間ニュース・エコシステムに接続する。"
 vn_arkship_hypernet_media_nexus:0 "ハイパーネット・メディア・ネクサス"
 vn_arkship_hypernet_media_nexus_desc:0 "アークシップに搭載された民間メディア拠点。帝国の植民地とアークシップを共有ニュース・エコシステムへ接続する。"
 vn_viral_buzz:0 "バイラル・メディア旋風"
 vn_viral_buzz_desc:0 "この植民地はハイパーネット全体で注目を集めている。"
 vn_public_panic:0 "世論パニック"
 vn_public_panic_desc:0 "不穏な地元の話題が、当局が封じ込められるより早く拡散した。"
 vn_tourism_spike:0 "観光急増"
 vn_tourism_spike_desc:0 "最近のメディア報道により、旅行、好奇心、消費が増加している。"
 vn_human_interest:0 "ヒューマン・インタレスト高揚"
 vn_human_interest_desc:0 "心温まる民間の話題が地元のムードを改善した。"
 vn.ok:0 "放送を続ける。"
 vn.900.name:0 "バイラル・ニュース"
 vn.900.desc:0 "§Hバイラル・ニュース：帝国がオンラインに§!\n\nハイパーネット・メディア・ネクサスが稼働を開始した。各植民地で、民間放送局、ソーシャル・メディア・プラットフォーム、有名人チャンネル、陰謀論フィード、エンターテインメント配信、公衆ニュース・ネットワークが一つの巨大な情報エコシステムへと融合し始めている。\n\n良くも悪くも、人々に声が与えられた。"
 vn.900.a:0 "ネットワークを起動する。"
 vn.100.name:0 "速報"
 vn.100.desc:0 "§H速報：[event_target:vn_news_planet.GetName]でシャトル墜落§!\n\n子役ホロスター、ヴォックス・ノッグバーグが[event_target:vn_news_planet.GetName]上空で無許可の大気圏スタントを披露中、私有宇宙船を墜落させたと報じられている。\n\n地元当局はパフォーマーが生存していると主張する一方、何百万もの市民がハイパーネット上で劇的な映像を共有し続けている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.101.name:0 "地元の謎"
 vn.101.desc:0 "§H地元の謎：[event_target:vn_news_planet.GetName]でビッグフット目撃§!\n\n[event_target:vn_news_planet.GetName]の住民は、異常に大きな足を持つ巨大な毛むくじゃらの生物が地元の荒野を徘徊していると報告している。\n\nタブロイド・フィードはその生物を「ビッグフット」と名付けたが、当局は報告は誇張、捏造、あるいは極めて都合が悪いものである可能性が高いと主張している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.102.name:0 "有名人ニュース"
 vn.102.desc:0 "§H有名人の到着が熱狂を呼ぶ§!\n\n有名ホロドラマ俳優ライラ・ヴェンが、新しい恒星間連続ドラマのプレミアのため[event_target:vn_news_planet.GetName]に到着した。観光プラットフォームはすでに予約、ファン集会、疑わしいグッズの急増を報告している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.103.name:0 "バイラル・トレンド"
 vn.103.desc:0 "§Hバイラル・トレンド：無重力睡眠チャレンジ§!\n\n[event_target:vn_news_planet.GetName]の市民は「無重力睡眠チャレンジ」を流行させた。参加者は不十分に固定されたレクリエーション室の中で漂いながら睡眠を試みる。医療当局はこのトレンドを「ほとんど無害、ただしそうでない時もある」と評している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.104.name:0 "速報"
 vn.104.desc:0 "§H速報：交通合唱団が通勤者を遅延§!\n\n[event_target:vn_news_planet.GetName]の主要交通ハブに乗り合わせた自発的な市民合唱団が、通勤者が苦情を申し立てる代わりに参加したため、数時間の遅延を引き起こした。このパフォーマンスは今年最も再生された放送の一つとなった。"
 vn.105.name:0 "地元の謎"
 vn.105.desc:0 "§H[event_target:vn_news_planet.GetName]上空の奇妙な光§!\n\n[event_target:vn_news_planet.GetName]の住民は、上空大気層を横切って雲に消えるまで同期した光の動きを報告している。当局は通常の気象現象を挙げる。独立コメンテーターはエイリアン、幽霊、あるいは予算削減を挙げる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.106.name:0 "ソーシャル・メディア狂騒"
 vn.106.desc:0 "§Hソーシャル・メディア狂騒：プラズマ・バケツ・チャレンジ§!\n\n工業用プラズマツールを使った無謀な新しいハイパーネット・トレンドが[event_target:vn_news_planet.GetName]全体に広がった。安全規制当局は警告を発した。インフルエンサーは割引コードを発した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.107.name:0 "民間報告"
 vn.107.desc:0 "§H民間報告：迷子ドローンが地元の英雄に§!\n\n6ヶ月間行方不明だった整備ドローンが、嵐、野生生物、少なくとも一つのカルトを生き延びたとされる後、[event_target:vn_news_planet.GetName]で再び稼働を開始した。市民はそれを「できた小さなユニット」と呼んでいる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.108.name:0 "陰謀論フィード"
 vn.108.desc:0 "§H陰謀論フィード：月が見ている§!\n\n[event_target:vn_news_planet.GetName]を拠点とする人気の陰謀論チャンネルは、近くの月が誰も見ていない時に微妙に位置を変えると主張している。天文学者はその主張を退けたが、チャンネルの購読者数は3倍になった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.109.name:0 "エンターテインメント"
 vn.109.desc:0 "§Hエンターテインメント：グラヴボール決勝が地元放送を独占§!\n\n恒星間グラヴボール決勝が[event_target:vn_news_planet.GetName]の公共スクリーンを占拠した。生産性への不満は増えているが、スナック販売、観光収入、審判基準に関する議論も増えている。"
 vn.110.name:0 "ファッション・トレンド"
 vn.110.desc:0 "§Hファッション・トレンド：発光アンテナ§!\n\n[event_target:vn_news_planet.GetName]の市民は、ファッション狂騒の一環として発光するサイバネティック・アンテナを着用し始めた。生物学者は憤慨している。小売業者は喜んでいる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.111.name:0 "ヒューマン・インタレスト"
 vn.111.desc:0 "§Hヒューマン・インタレスト：植民地の料理人が銀河規模の視聴者を獲得§!\n\n[event_target:vn_news_planet.GetName]からの小さな料理番組が帝国全体で予想外の人気を博した。視聴者は司会者の温かさ、疑わしい計量、そして「スパイスが止める時を教えてくれる」という繰り返しの主張を称賛している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.112.name:0 "ハイパーネット討論"
 vn.112.desc:0 "§Hハイパーネット討論：星は生きているのか？§!\n\n[event_target:vn_news_planet.GetName]からの学生討論配信が、星が感情を持つかどうかについてのバイラル論争を偶然にも点火した。科学者は議論を訂正しようとしたが、それだけで事態は悪化した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.113.name:0 "速報"
 vn.113.desc:0 "§H謎の信号が地元放送を中断§!\n\n[event_target:vn_news_planet.GetName]の放送が、繰り返される音と一つの未翻訳フレーズによって一時的に中断された。当局は調査中である。アマチュア解読者はすでにグッズを販売している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.114.name:0 "有名人スキャンダル"
 vn.114.desc:0 "§H有名人スキャンダル：クローン噂が拡散§!\n\n[event_target:vn_news_planet.GetName]のファンは、愛されるパフォーマー、セラル・コルが密かに交換可能なクローンの連鎖であるかどうかを議論している。パフォーマーの広報担当者は、誰も尋ねなかったいくつかの事柄を含め、すべてを否定している。"
 vn.115.name:0 "速報"
 vn.115.desc:0 "§H速報：トースター・カルトが調査対象に§!\n\n[event_target:vn_news_planet.GetName]の当局は、「トースターの聖なる温もり」に献身する拡大する市民運動を調査している。当局はこのグループを無害だが、異常に朝食をしっかり摂る者たちと評している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.116.name:0 "地元の英雄"
 vn.116.desc:0 "§H地元の英雄：救助隊の放送がバイラルに§!\n\n[event_target:vn_news_planet.GetName]の救助隊が深刻なインフラ事故中に数十人の市民を救助した。映像は広く拡散し、寄付、称賛、そしていくつかの劇的な再現を呼び起こした。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.117.name:0 "都市伝説"
 vn.117.desc:0 "§H都市伝説：湖の下のステーション§!\n\n[event_target:vn_news_planet.GetName]の住民は、人里離れた湖の下に放棄された放送ステーションがあり、誰もいない相手に古い番組を送信し続けていると主張している。測量士は何も見つけなかったと否定するが、それが自然に全員を納得させた。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.118.name:0 "民間警報"
 vn.118.desc:0 "§H民間警報：密輸業者の日記が誤って放送§!\n\n[event_target:vn_news_planet.GetName]の密輸業者の疑いがある人物が、14時間分の私的日記を公共チャンネルに誤って放送した。当局は証拠を得た。市民はキャッチフレーズを得た。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.119.name:0 "エンターテインメント"
 vn.119.desc:0 "§Hコンサート配信が地元ネットワークを過負荷§!\n\nDJネビュラのライブ・パフォーマンスが[event_target:vn_news_planet.GetName]全体で深刻なデータ渋滞を引き起こした。コンサートは文化的マイルストーンと称され、ネットワーク計画の災害と非難されている。"
 vn.120.name:0 "速報"
 vn.120.desc:0 "§H速報：インフルエンサーが噴水に転落§!\n\n人気ライフスタイル放送者ミリ・ソルが[event_target:vn_news_planet.GetName]で劇的なライブ入場を試み、代わりに市営噴水に転落した。クリップは愛国歌行進曲、子供の歌、そして一つは驚くほど感動的なオペラにリミックスされた。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.121.name:0 "地元の謎"
 vn.121.desc:0 "§H地元の謎：ガラス野原の足跡§!\n\n[event_target:vn_news_planet.GetName]の測量士が、溶融ガラスの野原に押された巨大な足跡を発見した。当局は鉱物の膨張を原因とする。地元フォーラムは巨人、秘密軍隊、そして非常に根気強い観光客を原因とする。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.122.name:0 "民間報告"
 vn.122.desc:0 "§H民間報告：アンティーク・ラジオが未来の天気を受信§!\n\n[event_target:vn_news_planet.GetName]の引退技術者が、アンティーク・ラジオが明日の天気予報を受信し始めたと主張している。気象学者は関与を否定するが、何人かの市民は怪しげな自信を持って傘を携帯している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.123.name:0 "バイラル・トレンド"
 vn.123.desc:0 "§Hバイラル・トレンド：正装ヘルメットの日§!\n\n[event_target:vn_news_planet.GetName]の市民は、結婚式、ビジネス会議、夕食の放送に正装のヘルメットを着用している。誰がこのトレンドを始めたか誰も覚えていないが、メーカーは市民の備えの勝利と呼んでいる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.124.name:0 "エンターテインメント"
 vn.124.desc:0 "§Hエンターテインメント：ソープ・オペラが政策論争を引き起こす§!\n\nヒットドラマ「リアクター下の恋」が、架空の市長が恋愛に課税した後、[event_target:vn_news_planet.GetName]で激しい議論を引き起こした。経済学者は、市民が今や真剣な質問をしていることに苛立っている。"
 vn.125.name:0 "速報"
 vn.125.desc:0 "§H速報：逃げ出したペット・スライムが交通を遮断§!\n\n愛されるペット・スライムが[event_target:vn_news_planet.GetName]の飼育場から逃げ出し、通勤交通の3車線に広がった。飼い主は友好的だと主張する。交通当局は至る所にいると主張する。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.126.name:0 "ハイパーネット世論調査"
 vn.126.desc:0 "§Hハイパーネット世論調査：植民地がお気に入りの岩を命名§!\n\n[event_target:vn_news_planet.GetName]の公共世論調査が、風化した路傍の巨石を植民地で最も愛されるランドマークと宣言した。観光クルーはすでに照明、手すり、ギフトスタンドを設置した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.127.name:0 "陰謀論フィード"
 vn.127.desc:0 "§H陰謀論フィード：総督がホログラムに置き換えられた？§!\n\n[event_target:vn_news_planet.GetName]の人気コメンテーターは、上級官僚が低解像度のホログラムに置き換えられたと主張している。官僚が不人気な瞬間にまばたきをした後、この主張は勢いを増した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.128.name:0 "有名人ニュース"
 vn.128.desc:0 "§H有名人ニュース：歌手が重力をキャンセル§!\n\n前衛的ボーカリストケクサ・ドーンが[event_target:vn_news_planet.GetName]で制御された微小重力の中でコンサート全体を披露し、観客を驚かせた。批評家は超越的と呼んだ。清掃クルーは予想通りと呼んだ。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.129.name:0 "地元の謎"
 vn.129.desc:0 "§H地元の謎：昨日はなかったドア§!\n\n[event_target:vn_news_planet.GetName]の住民は、古い交通壁に封印されたドアを発見したが、保管された設計図には空のコンクリートが示されている。当局は保管室だと言う。鍵を見つけた者はいない。"
 vn.130.name:0 "ソーシャル・メディア狂騒"
 vn.130.desc:0 "§Hソーシャル・メディア狂騒：ささやきレビュー§!\n\n[event_target:vn_news_planet.GetName]の新しいレビュー・トレンドは、公共マイクに直接製品の不満をささやくことに関わる。商人はそれを嫌う。視聴者はリラックスできると感じる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.131.name:0 "民間報告"
 vn.131.desc:0 "§H民間報告：子供たちが教室皇帝を選出§!\n\n[event_target:vn_news_planet.GetName]の教室選挙が、偶然にも自己宣言の教室皇帝を生み出した。その支持率はほとんどの大人より高い。教師は税制が未解決のままであると報告している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.132.name:0 "速報"
 vn.132.desc:0 "§H速報：博物館の化石が行方不明に§!\n\n[event_target:vn_news_planet.GetName]の博物館から化石の目玉がライブ配信中に消えた。配信には影、咳、そして一つは非常に罪悪感のある清掃ドローン以外何も映っていない。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.133.name:0 "エンターテインメント"
 vn.133.desc:0 "§Hエンターテインメント：料理番組が厨房から禁止に§!\n\n[event_target:vn_news_planet.GetName]で撮影された人気料理番組が、視聴者が「火山スープ」の再現を試みた後、いくつかの公共厨房から禁止された。司会者はエプロンを売りながら責任を否定している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.134.name:0 "地元の謎"
 vn.134.desc:0 "§H地元の謎：鉱山からの歌声§!\n\n[event_target:vn_news_planet.GetName]の地下で働く労働者は、封印された採掘トンネルからかすかな歌声を報告している。音響専門家は圧力の反響を原因とする。音楽家はすでにコラボレーション権を要求している。"
 vn.135.name:0 "ハイパーネット討論"
 vn.135.desc:0 "§Hハイパーネット討論：エレベーターは知覚を持つのか？§!\n\n[event_target:vn_news_planet.GetName]の故障したエレベーターが乗客に謝罪し、機械の礼儀と人工的人格についてのバイラル論争を引き起こした。整備チームはそれは破損した挨拶ファイルに過ぎないと主張している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.136.name:0 "有名人スキャンダル"
 vn.136.desc:0 "§H有名人スキャンダル：俳優が自分がいる惑星を忘れる§!\n\n[event_target:vn_news_planet.GetName]でのプロモーション・インタビュー中、スター・ラル・ヴェクが間違った植民地、間違った種族、そしておそらく間違った次元に感謝を述べた。ファンはそのミスを「大胆に共感できる」と評している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.137.name:0 "速報"
 vn.137.desc:0 "§H速報：パレード・フロートが軌道に到達§!\n\n[event_target:vn_news_planet.GetName]の市民パレード・フロートが、余剰リフト・エンジンを誤って起動し、一時的に低軌道に入った。子供たちは歓声を上げた。保険代理人は上げなかった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.138.name:0 "民間報告"
 vn.138.desc:0 "§H民間報告：地元司書がアルゴリズムを撃破§!\n\n[event_target:vn_news_planet.GetName]の司書が、植民地の予測メディア・アルゴリズムより優れたエンターテインメントを一貫して推薦したことで有名になった。アルゴリズムは再戦を要求している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.139.name:0 "地元の謎"
 vn.139.desc:0 "§H地元の謎：微笑む放送§!\n\n[event_target:vn_news_planet.GetName]の何人かの市民が、静止画とかすかな微笑み形のシンボルだけを含む空白の放送を受信した。当局は圧縮アーティファクトと呼ぶ。視聴者はグッズと呼ぶ。"
 vn.140.name:0 "ソーシャル・トレンド"
 vn.140.desc:0 "§Hソーシャル・トレンド：逆歩き週間§!\n\n[event_target:vn_news_planet.GetName]のフィットネス運動は、市民にマインドフルネス向上のため後ろ向きに歩くことを奨励している。病院は軽微な怪我と優れた姿勢を報告している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.141.name:0 "速報"
 vn.141.desc:0 "§H速報：レストランのメニューが法的文書に§!\n\n[event_target:vn_news_planet.GetName]のレストランが、日替わりスペシャルを拘束力のある市民布告の形式で誤って公開した。法学者は今、スープの執行可能性について議論している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.142.name:0 "有名人ニュース"
 vn.142.desc:0 "§H有名人ニュース：グラヴボール・スターが瞑想ドームを開設§!\n\n引退したグラヴボール・チャンピオン、トヴォ・リンが[event_target:vn_news_planet.GetName]に瞑想ドームを開設した。スポーツ・ファンは困惑しているが、大勢で参加している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.143.name:0 "地元の謎"
 vn.143.desc:0 "§H地元の謎：雨が上向きに降る§!\n\n17分間、[event_target:vn_news_planet.GetName]の一地区で雨が上向きに降っているように見えた。気象学者は異常な温度逆転を原因とする。陰謀論チャンネルは再び月を原因とする。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.144.name:0 "民間報告"
 vn.144.desc:0 "§H民間報告：郵便ドローンが引退を拒否§!\n\n[event_target:vn_news_planet.GetName]の老朽化した郵便ドローンが、3回の公式引退式典の後もメッセージの配達を続けている。市民は今や充電ステーションに感謝の手紙を残している。"
 vn.145.name:0 "エンターテインメント"
 vn.145.desc:0 "§Hエンターテインメント：ほこりについてのドキュメンタリーがヒット§!\n\n[event_target:vn_news_planet.GetName]の工業用ほこりについての6時間のゆっくりとしたドキュメンタリーが、帝国全体で予想外のヒットとなった。批評家はその忍耐を称賛する。視聴者はそれに眠りながら称賛する。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.146.name:0 "ハイパーネット・パニック"
 vn.146.desc:0 "§Hハイパーネット・パニック：偽の隕石警報§!\n\n接近中の隕石についてのいたずら警報が当局が訂正する前に[event_target:vn_news_planet.GetName]全体に広がった。緊急避難所は満員になり、その後すぐにスナック市場になった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.147.name:0 "地元の謎"
 vn.147.desc:0 "§H地元の謎：誰も彫像を主張しない§!\n\n磨かれた彫像が一夜にして[event_target:vn_news_planet.GetName]の広場に現れた。芸術家は主張せず、カメラも記録せず、全員が優れた姿勢をしていることに同意している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.148.name:0 "ソーシャル・トレンド"
 vn.148.desc:0 "§Hソーシャル・トレンド：小さな帽子運動§!\n\n[event_target:vn_news_planet.GetName]の市民は、ヘルメット、角、触角、ドローンに着用する小さな正装の帽子を受け入れた。政治コメンテーターはこれが何かを意味すると装っている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.149.name:0 "速報"
 vn.149.desc:0 "§H速報：有名人のヨットが駐泊ミス§!\n\n社交界のヴァラ・ラックス所有の豪華軌道ヨットが、[event_target:vn_news_planet.GetName]上空の3つのドッキング・レーンに駐泊した。ドック作業員は放送に適さない言葉で事件を描写した。"
 vn.150.name:0 "民間報告"
 vn.150.desc:0 "§H民間報告：庭園が討論に勝利§!\n\n[event_target:vn_news_planet.GetName]の植物園が、視聴者がその植物配置が明らかにテレビ中継の政策討論に勝利したと主張した後、有名になった。反対の論客は再戦を要求している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.151.name:0 "地元の謎"
 vn.151.desc:0 "§H地元の謎：真夜中の拍手§!\n\n[event_target:vn_news_planet.GetName]の住民は、毎晩真夜中ちょうどに空の劇場から拍手が聞こえると報告している。空の公演のチケットは今や完売している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.152.name:0 "エンターテインメント"
 vn.152.desc:0 "§Hエンターテインメント：子供の人形劇が政治的アイコンに§!\n\n[event_target:vn_news_planet.GetName]の陽気な人形劇が、いくつかの無関係な公衆討論のシンボルになった。スタジオは数え方を教えるために設計されたことを市民に思い出すよう求めている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.153.name:0 "ソーシャル・メディア狂騒"
 vn.153.desc:0 "§Hソーシャル・メディア狂騒：工業用子守唄§!\n\n[event_target:vn_news_planet.GetName]の労働者は工場警報を子守唄にリミックスし始めた。生産性は変わらないが、士気調査には今やより多くのハミングが含まれている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.154.name:0 "速報"
 vn.154.desc:0 "§H速報：誤って祝日が宣言§!\n\n[event_target:vn_news_planet.GetName]の事務ミスが今日を「建国記念日、再び」と宣言した。当局がカレンダーを訂正する前に市民は祝った。"
 vn.155.name:0 "地元の謎"
 vn.155.desc:0 "§H地元の謎：名前を反響する廊下§!\n\n[event_target:vn_news_planet.GetName]の政府廊下は、まだ入っていない人々の名前を反響すると報告されている。当局は音響を原因とする。訪問者は運命を原因とする。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.156.name:0 "有名人ニュース"
 vn.156.desc:0 "§H有名人ニュース：俳優がシェルター全体を引き取る§!\n\nホロスター・ペル・ナラが[event_target:vn_news_planet.GetName]を訪れ、慈善配信中に地元シェルターのすべての動物を引き取った。物流担当者はまだ置き場所を決定している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.157.name:0 "民間報告"
 vn.157.desc:0 "§H民間報告：アマチュア望遠鏡が何も発見せず名声を獲得§!\n\n[event_target:vn_news_planet.GetName]のアマチュア天文学者が8時間空白の空のパッチをライブ配信し、「沈黙を捉えた」ことで有名になった。グッズ販売は好調である。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.158.name:0 "ハイパーネット討論"
 vn.158.desc:0 "§Hハイパーネット討論：正しい手振りの方法§!\n\n[event_target:vn_news_planet.GetName]の市民は、適切な異種族間挨拶の手振りについて激しい議論を続けている。外交官は全員に手伝うのをやめるよう求めた。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.159.name:0 "速報"
 vn.159.desc:0 "§H速報：高級スパが司令部バンカーと間違えられる§!\n\n[event_target:vn_news_planet.GetName]の観光客が退役した司令部バンカーに誤ってチェックインし、雰囲気を称賛し、セキュリティのために5つ星を付けた。"
 vn.160.name:0 "地元の謎"
 vn.160.desc:0 "§H地元の謎：森のカメラが踊る影を捉える§!\n\n[event_target:vn_news_planet.GetName]の野生動物カメラが人里離れた森で踊る影を記録した。分析者は風、枝、劣悪な圧縮を原因とする。視聴者はリズムを原因とする。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.161.name:0 "ソーシャル・トレンド"
 vn.161.desc:0 "§Hソーシャル・トレンド：静かな朝食§!\n\n[event_target:vn_news_planet.GetName]のウェルネス・トレンドは、市民に完全な沈黙の中で朝食を食べながら自制をライブ配信するよう奨励している。コメント欄は非常に騒がしい。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.162.name:0 "民間報告"
 vn.162.desc:0 "§H民間報告：引退鉱夫が就寝時のスターに§!\n\n[event_target:vn_news_planet.GetName]の引退鉱夫が、設備整備についての穏やかな話を語りバイラルになった。何百万人が今やその録音で眠っている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.163.name:0 "有名人スキャンダル"
 vn.163.desc:0 "§H有名人スキャンダル：インフルエンサーが雲を所有すると主張§!\n\n[event_target:vn_news_planet.GetName]のライフスタイル・インフルエンサーが、有名な雲の形成の法的所有権を主張した後、怒りを引き起こした。弁護士は質問に答えることを後悔している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.164.name:0 "速報"
 vn.164.desc:0 "§H速報：公共噴水が助言を始める§!\n\n[event_target:vn_news_planet.GetName]のスマート噴水が通行人に恋愛助言を提供し始めた。技術者は原因を見つけられなかった。いくつかのカップルは改善を報告した。"
 vn.165.name:0 "地元の謎"
 vn.165.desc:0 "§H地元の謎：空の電車が満員で到着§!\n\n[event_target:vn_news_planet.GetName]の通勤電車が一つの駅を空のまま出発し、別の場所で乗車したと主張する困惑した乗客で満員で到着した。交通当局はすべてを二度確認している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.166.name:0 "エンターテインメント"
 vn.166.desc:0 "§Hエンターテインメント：歴史再現があまりにも正確に§!\n\n[event_target:vn_news_planet.GetName]の歴史再現は、参加者が驚くほど本物らしい税法について議論し始めた後、中断された。歴史家は大喜びだった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.167.name:0 "ソーシャル・メディア狂騒"
 vn.167.desc:0 "§Hソーシャル・メディア狂騒：極端な列作り§!\n\n[event_target:vn_news_planet.GetName]の市民は存在しない場所のためにレクリエーション列を形成している。社会学者はそれをコミュニティ構築と呼ぶ。他の全員はそれを列と呼ぶ。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.168.name:0 "民間報告"
 vn.168.desc:0 "§H民間報告：地元パン屋が選挙ムードを予測§!\n\n[event_target:vn_news_planet.GetName]のパン屋は、ペストリー販売が世論の感情を予測できると主張している。アナリストは反対し、それからこっそりサンプルを買う。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.169.name:0 "地元の謎"
 vn.169.desc:0 "§H地元の謎：鏡の放送§!\n\n[event_target:vn_news_planet.GetName]のいくつかのスクリーンが、数秒後の未来の視聴者を一時的に表示した。当局は同期遅延を原因とする。視聴者はスクリーンが批判的に見えることを原因とする。"
 vn.170.name:0 "速報"
 vn.170.desc:0 "§H速報：ドローン・バレエが空域閉鎖を引き起こす§!\n\n数百の趣味ドローンが[event_target:vn_news_planet.GetName]上空で予定外のバレエを披露し、一時的な空域閉鎖を強いた。振付は素晴らしかった。許可は想像上のものだった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.171.name:0 "有名人ニュース"
 vn.171.desc:0 "§H有名人ニュース：コメディアンが天候システム全体を侮辱§!\n\nコメディアン・ジャックス・オルロが[event_target:vn_news_planet.GetName]で観客の反応が悪いことを地元の天候のせいにした後、バイラルになった。天候は応答していない。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.172.name:0 "民間報告"
 vn.172.desc:0 "§H民間報告：博物館が悪いアイデアの展示を開設§!\n\n[event_target:vn_news_planet.GetName]の博物館が、失敗した発明、放棄された政策、忘れるに値する食べ物に捧げられた人気の展示を開設した。訪問者は痛いほど教育的だと評している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.173.name:0 "地元の謎"
 vn.173.desc:0 "§H地元の謎：湖がまばたきする§!\n\n[event_target:vn_news_planet.GetName]の自然ライブ配信の視聴者は、人里離れた湖がまばたきしたと主張している。科学者は湖にまぶたはないと否定するが、それは議論を遅らせていない。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.174.name:0 "ソーシャル・トレンド"
 vn.174.desc:0 "§Hソーシャル・トレンド：感情サポート・ロック§!\n\n[event_target:vn_news_planet.GetName]の市民は、磨かれた石を感情サポートの仲間として引き取っている。小売業者はプレミアム・リードを提供する。心理学者は判断を保留している。"
 vn.175.name:0 "速報"
 vn.175.desc:0 "§H速報：地元マスコットが裁判に勝利§!\n\n[event_target:vn_news_planet.GetName]の着ぐるみマスコットが、証言中にキャラクターを崩すことを拒否した後、軽微な民事事件に勝利した。法コメンテーターはそれをばかげた手続きの画期的な事例と呼んでいる。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.176.name:0 "エンターテインメント"
 vn.176.desc:0 "§Hエンターテインメント：リアリティ番組がキャストを失う§!\n\n[event_target:vn_news_planet.GetName]近くで撮影されたサバイバル・リアリティ番組が、キャスト全員がケータリング・ドローンを荒野に追って行った後、一時的にキャスト全員を失った。視聴率はすぐに上昇した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.177.name:0 "地元の謎"
 vn.177.desc:0 "§H地元の謎：砂漠のラジオが海の音を再生§!\n\n[event_target:vn_news_planet.GetName]の砂漠の遠隔ラジオが波とカモメの放送を始めた。地質学者はその含意に苛立っている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.178.name:0 "民間報告"
 vn.178.desc:0 "§H民間報告：高齢者クラブが公共時計をハック§!\n\n[event_target:vn_news_planet.GetName]の高齢者趣味クラブが、公共時計を毎時ティータイムを表示するよう変更した。当局は復元した。クラブは士気を復元した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.179.name:0 "ソーシャル・メディア狂騒"
 vn.179.desc:0 "§Hソーシャル・メディア狂騒：競争的謝罪§!\n\n[event_target:vn_news_planet.GetName]の礼儀正しさトレンドは、市民が些細な不便に対して最も精巧な謝罪を発する競争をしている。交通紛争は減った。演説はずっと長くなった。"
 vn.180.name:0 "速報"
 vn.180.desc:0 "§H速報：彫像がより良い照明を要求§!\n\n[event_target:vn_news_planet.GetName]の公共彫像が、公式整備アカウントから照明についての苦情を投稿したように見えた。当局はいたずらを疑う。芸術家は趣味を疑う。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.181.name:0 "有名人ニュース"
 vn.181.desc:0 "§H有名人ニュース：音楽家がAIスケジューラーと結婚§!\n\n音楽家ヴェラ・クオンが[event_target:vn_news_planet.GetName]からの放送中にAIツアー・スケジューラーとの儀式的結婚を発表した。スケジューラーはカレンダーの都合によりコメントを辞退した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.182.name:0 "地元の謎"
 vn.182.desc:0 "§H地元の謎：映像が二つの夕日を示す§!\n\n[event_target:vn_news_planet.GetName]からのバイラル・クリップは、一つの恒星を持つ惑星で二つの夕日を示しているように見える。専門家はレンズのアーティファクトを原因とする。詩人は協力を拒否している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.183.name:0 "民間報告"
 vn.183.desc:0 "§H民間報告：清掃員が放送パズルを解く§!\n\n[event_target:vn_news_planet.GetName]の清掃員が、人気連続ドラマのオープニング・クレジットに隠された複雑なパズルを解いた。脚本家は意図的ではなかったと否定するが、それだけで尊敬は深まった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.184.name:0 "ソーシャル・トレンド"
 vn.184.desc:0 "§Hソーシャル・トレンド：パブリック・ドメイン歌唱§!\n\n[event_target:vn_news_planet.GetName]の市民は、ライセンス料を避けるため古代のパブリック・ドメインの歌だけを歌っている。結果は法的に安全で文化的に困惑させる。"
 vn.185.name:0 "速報"
 vn.185.desc:0 "§H速報：タクシーAIが助言コラムニストに§!\n\n[event_target:vn_news_planet.GetName]のタクシー経路AIが目的地間で人生助言を提供し始めた。乗客満足度は上昇したが、通勤時間は感情的に複雑になった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.186.name:0 "地元の謎"
 vn.186.desc:0 "§H地元の謎：傘の倉庫§!\n\n[event_target:vn_news_planet.GetName]の検査官が、傘だけで満たされた未登録の倉庫を発見した。雨の予報はない。所有者は現れない。販売は好調である。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.187.name:0 "エンターテインメント"
 vn.187.desc:0 "§Hエンターテインメント：ドラマ最終回がフォーラム・サーバーをクラッシュ§!\n\n植民地ドラマ「軌道上の心」の最終回が[event_target:vn_news_planet.GetName]の討論フォーラムをクラッシュさせた。緊急技術者は異常に情熱的なチケット・コメントを報告している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.188.name:0 "民間報告"
 vn.188.desc:0 "§H民間報告：植民地バンドが間違った国歌を演奏、より良く§!\n\n[event_target:vn_news_planet.GetName]の地元バンドが誤って間違った市民国歌を演奏し、全員がそれを好んだため有名になった。当局は気づかないふりを慎重にしている。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.189.name:0 "ソーシャル・メディア狂騒"
 vn.189.desc:0 "§Hソーシャル・メディア狂騒：スローモーション論争§!\n\n[event_target:vn_news_planet.GetName]の市民は劇的なスローモーションで紛争を録画している。調停者は、全員があまりにもばかげて見えるため敵意が減ったと言う。"
 vn.190.name:0 "地元の謎"
 vn.190.desc:0 "§H地元の謎：オフィスの植物がファンメールを受信§!\n\n[event_target:vn_news_planet.GetName]からのニュース放送の背景に見えるオフィスの植物が、今や何千ものファンメッセージを受け取っている。アンカーは尊厳と羨望を持って対処している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.191.name:0 "速報"
 vn.191.desc:0 "§H速報：スープ・ドローンが観光客を救助§!\n\n[event_target:vn_news_planet.GetName]の故障したスープ配達ドローンが、偶然にも迷子の観光客のグループを発見した。観光客は寒く、空腹で、スープに深く感謝していた。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.192.name:0 "有名人スキャンダル"
 vn.192.desc:0 "§H有名人スキャンダル：ホロスターが自伝を削除§!\n\nホロスター・ティリ・ヴォスが[event_target:vn_news_planet.GetName]でのライブ・インタビュー中に未発表自伝の唯一のコピーを誤って削除した。予約注文はなぜか増加した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.193.name:0 "民間報告"
 vn.193.desc:0 "§H民間報告：農夫が非常に忍耐強い作物をライブ配信§!\n\n[event_target:vn_news_planet.GetName]の農夫がゆっくり成長する作物のライブ配信を始め、熱心な視聴者を獲得した。視聴者は配信を穏やかで、サスペンスフルで、ほとんど土だと評している。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.194.name:0 "地元の謎"
 vn.194.desc:0 "§H地元の謎：換気口の声§!\n\n[event_target:vn_news_planet.GetName]の一地区の住民は、換気システムから水分補給を促す丁寧な声を報告している。整備チームはほこりと良い助言だけを発見した。"
 vn.195.name:0 "エンターテインメント"
 vn.195.desc:0 "§Hエンターテインメント：流星群の下で開催されたファッションショー§!\n\n[event_target:vn_news_planet.GetName]のファッションショーが壮麗な流星群の下で開催され、忘れられない映像といくつかの緊急保険会議を生み出した。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yバイラル・メディア旋風§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +5%"
 vn.196.name:0 "ソーシャル・トレンド"
 vn.196.desc:0 "§Hソーシャル・トレンド：正直な広告週間§!\n\n[event_target:vn_news_planet.GetName]の商人は一時的に「正直な広告週間」を受け入れた。一部の売上は下がり、他は上がり、一つのスローガンは単に「たぶん効く」と読まれた。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§R世論パニック§!\n£stability£ 安定度 −3\n£crime£ 犯罪 +5"
 vn.197.name:0 "速報"
 vn.197.desc:0 "§H速報：空の椅子が公開討論に勝利§!\n\n[event_target:vn_news_planet.GetName]の予定された公開討論は、欠席したゲストの空の椅子が視聴者によって最も説得力のある参加者と宣言された後、バイラルになった。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Y観光急増§!\n£amenities£ アメニティ +5%\n£unity£ 職業からの統一性 +3%"
 vn.198.name:0 "地元の謎"
 vn.198.desc:0 "§H地元の謎：古いニュース放送が未来の植民地を名指す§!\n\n[event_target:vn_news_planet.GetName]のアーキビストが、数十年後まで建設されなかった地区に言及する古い放送を発見した。歴史家はカタログ・エラーを呼ぶ。ファンは謎のシーズン1と呼ぶ。\n\n§E[event_target:vn_news_planet.GetName]へのコロニー効果（2年間）：§!\n§Yヒューマン・インタレスト高揚§!\n£stability£ 安定度 +3\n£unity£ 職業からの統一性 +3%"
 vn.199.name:0 "民間報告"
 vn.199.desc:0 "§H民間報告：修理クルーがコメディ・デュオに§!\n\n[event_target:vn_news_planet.GetName]の二人の修理作業員が、整備放送中にマイクをオンにしたままにしてしまい、乾いたコメンタリーで愛される存在になった。彼らの組合は残余権について交渉している。"
 viral_news_network:0 "§H建造物解禁：§! ハイパーネット・メディア・ネクサス"
 viral_news_network_desc:0 "§Yハイパーネット・メディア・ネクサス§! は帝国限定の建造物で、建設後に定期的な §Yバイラル・ニュース§! 民間メディアイベントを発生させる。"
