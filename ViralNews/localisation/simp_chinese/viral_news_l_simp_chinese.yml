l_simp_chinese:
 tech_viral_news_network:0 "病毒式新闻网络"
 tech_viral_news_network_desc:0 "星际民用通信技术的进步，使新闻集团、社交平台、娱乐联合体与公共讨论网络得以在殖民地间近乎实时地运作。"
 tech_viral_news_network_effect:0 "解锁帝国专属 £building£ §Y超网传媒枢纽§!，并启用周期性 §Y病毒式新闻§! 事件。"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§H解锁建筑：§! 超网传媒枢纽"
 vn_requires_no_existing_hypernet_media_nexus:0 "§R帝国境内只能建造一座 §Y超网传媒枢纽§!。§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "§Y超网传媒枢纽§! 是帝国专属建筑，建成后将触发周期性 §Y病毒式新闻§! 民用媒体事件。"
 building_vn_hypernet_media_nexus:0 "超网传媒枢纽"
 building_vn_hypernet_media_nexus_desc:0 "集民用广播、八卦、娱乐与社交媒体于一体的中央基础设施枢纽。一旦投入运行，便将帝国各殖民地接入共享的民用新闻生态。"
 vn_arkship_hypernet_media_nexus:0 "超网传媒枢纽"
 vn_arkship_hypernet_media_nexus_desc:0 "安装在方舟舰上的民用传媒枢纽，将帝国的殖民地和方舟舰接入共享的新闻生态。"
 vn_viral_buzz:0 "病毒式媒体热潮"
 vn_viral_buzz_desc:0 "该殖民地正享受超网上一阵突如其来的关注。"
 vn_public_panic:0 "公众恐慌"
 vn_public_panic_desc:0 "一则令人不安的本地消息，传播速度远超官方管控能力。"
 vn_tourism_spike:0 "旅游热潮"
 vn_tourism_spike_desc:0 "近期媒体关注带动了旅行、好奇与消费。"
 vn_human_interest:0 "人文关怀提振"
 vn_human_interest_desc:0 "一则暖心的民间故事改善了当地情绪。"
 vn.ok:0 "继续广播。"
 vn.900.name:0 "病毒式新闻"
 vn.900.desc:0 "§H病毒式新闻：帝国上线§!\n\n超网传媒枢纽现已投入运行。在我们各殖民地，民用广播机构、社交媒体平台、名人频道、阴谋论信息流、娱乐直播与公共新闻网络，正逐渐融合为一个庞大的信息生态。\n\n无论好坏，民众如今有了发声的渠道。"
 vn.900.a:0 "启动网络。"
 vn.100.name:0 "突发新闻"
 vn.100.desc:0 "§H突发新闻：[event_target:vn_news_planet.GetName] 穿梭机坠毁§!\n\n据报道，儿童全息明星沃克斯·诺格堡在 [event_target:vn_news_planet.GetName] 上空进行未经授权的大气层特技表演时，坠毁了一艘私人星舰。\n\n地方当局坚称表演者仍活着，而数百万公民仍在超网上分享戏剧性画面。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.101.name:0 "本地奇闻"
 vn.101.desc:0 "§H本地奇闻：[event_target:vn_news_planet.GetName] 目击大脚怪§!\n\n[event_target:vn_news_planet.GetName] 的居民报告称，一头脚特别大、毛发浓密的巨型生物正在当地荒野中游荡。\n\n小报信息流已将其命名为「大脚怪」，而官员声称这些报告很可能被夸大、捏造，或极其不便。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.102.name:0 "名人新闻"
 vn.102.desc:0 "§H名人到访引发狂热§!\n\n著名全息剧演员莱拉·文恩已抵达 [event_target:vn_news_planet.GetName]，参加一部新星际连续剧的首映。旅游平台已报告预订量、粉丝集会与 questionable 周边商品激增。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.103.name:0 "病毒式潮流"
 vn.103.desc:0 "§H病毒式潮流：零重力睡眠挑战§!\n\n[event_target:vn_news_planet.GetName] 的公民流行起了「零重力睡眠挑战」——参与者在 poorly secured 娱乐舱内漂浮时尝试入睡。医疗当局称这一潮流「大多无害，除非并非如此」。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.104.name:0 "突发新闻"
 vn.104.desc:0 "§H突发新闻：交通合唱延误通勤§!\n\n[event_target:vn_news_planet.GetName] 一座主要交通枢纽上，一支自发的民间合唱团导致通勤延误数小时——乘客们选择加入合唱，而非提交投诉。这场表演已成为年度重播次数最多的广播之一。"
 vn.105.name:0 "本地奇闻"
 vn.105.desc:0 "§H[event_target:vn_news_planet.GetName] 上空奇异光点§!\n\n[event_target:vn_news_planet.GetName] 的居民报告称，同步移动的光点掠过高层大气，随后消失在云层中。官员归因于常规气象现象。独立评论员则归因于外星人、幽灵或预算削减。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.106.name:0 "社交媒体狂热"
 vn.106.desc:0 "§H社交媒体狂热：等离子桶挑战§!\n\n一项涉及工业等离子工具的危险新超网潮流已在 [event_target:vn_news_planet.GetName] 蔓延。安全监管机构已发出警告。网红则发布了折扣码。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.107.name:0 "民间报道"
 vn.107.desc:0 "§H民间报道：失联无人机成为本地英雄§!\n\n一台失踪六个月的维护无人机在 [event_target:vn_news_planet.GetName] 重返岗位——据称它挺过了风暴、野生动物，以及至少一个邪教。公民们称它为「小小单位，大大能量」。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.108.name:0 "阴谋论频道"
 vn.108.desc:0 "§H阴谋论频道：月亮在监视§!\n\n[event_target:vn_news_planet.GetName] 上一档热门阴谋论频道声称，附近一颗卫星会在无人注视时 subtly 改变位置。天文学家已驳斥这一指控，但该频道订阅数已翻了三倍。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.109.name:0 "娱乐"
 vn.109.desc:0 "§H娱乐：重力球决赛霸占本地广播§!\n\n星际重力球决赛已占据 [event_target:vn_news_planet.GetName] 公共屏幕。关于生产力的抱怨在上升，但零食销量、旅游收入，以及关于裁判标准的争论也在上升。"
 vn.110.name:0 "时尚潮流"
 vn.110.desc:0 "§H时尚潮流：发光天线§!\n\n[event_target:vn_news_planet.GetName] 的公民开始佩戴发光赛博天线，掀起一股时尚热潮。生物学家感到冒犯。零售商喜出望外。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.111.name:0 "人文关怀"
 vn.111.desc:0 "§H人文关怀：殖民地厨师赢得银河观众§!\n\n[event_target:vn_news_planet.GetName] 一档小型烹饪节目意外走红，风靡全帝国。观众称赞主持人温暖亲切、计量 questionable，以及反复坚持「香料会告诉你何时停手」。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.112.name:0 "超网辩论"
 vn.112.desc:0 "§H超网辩论：恒星有生命吗？§!\n\n[event_target:vn_news_planet.GetName] 一场学生辩论直播意外引爆关于恒星是否拥有情感的病毒式争论。科学家试图纠正讨论，结果只会让情况更糟。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.113.name:0 "突发新闻"
 vn.113.desc:0 "§H神秘信号打断本地广播§!\n\n[event_target:vn_news_planet.GetName] 的广播曾被重复音调与一句未译短语短暂打断。官员正在调查。业余解码者已在售卖周边。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.114.name:0 "名人丑闻"
 vn.114.desc:0 "§H名人丑闻：克隆传闻蔓延§!\n\n[event_target:vn_news_planet.GetName] 的粉丝正在争论 beloved 表演者塞拉尔·科尔是否 secretly 是一串可替换的克隆体。表演者的公关否认一切——包括若干无人问及之事。"
 vn.115.name:0 "突发新闻"
 vn.115.desc:0 "§H突发新闻：烤面包机教派遭调查§!\n\n[event_target:vn_news_planet.GetName] 当局正在调查一个日益壮大的民间运动——该团体崇拜「烤面包机的神圣温暖」。官员称该组织 harmless，尽管 unusually 早餐充足。"
 vn.116.name:0 "本地英雄"
 vn.116.desc:0 "§H本地英雄：救援队广播走红§!\n\n[event_target:vn_news_planet.GetName] 一支救援队在严重基础设施事故中救下数十名平民。画面广泛传播，激发了捐款、赞誉与若干 dramatic 重演。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.117.name:0 "都市传说"
 vn.117.desc:0 "§H都市传说：湖底电台§!\n\n[event_target:vn_news_planet.GetName] 的居民声称，一座废弃广播站沉在偏远湖泊之下，仍在向无人播放旧节目。勘测人员否认发现任何痕迹——这自然说服了所有人。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.118.name:0 "民间警报"
 vn.118.desc:0 "§H民间警报：走私者日记意外直播§!\n\n[event_target:vn_news_planet.GetName] 一名疑似走私者意外将十四小时私人日记条目播送到公共频道。当局获得了证据。公众获得了 catchphrase。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.119.name:0 "娱乐"
 vn.119.desc:0 "§H音乐会直播挤爆本地网络§!\n\nDJ 星云在 [event_target:vn_news_planet.GetName] 的 live 演出导致重大数据拥堵。这场音乐会被 hailed 为文化里程碑，也被 condemned 为网络规划灾难。"
 vn.120.name:0 "突发新闻"
 vn.120.desc:0 "§H突发新闻：网红跌入喷泉§!\n\n知名生活方式主播米莉·索尔在 [event_target:vn_news_planet.GetName] 尝试 dramatic 直播入场，却跌入市政喷泉。这段 clip 已被 remix 成爱国进行曲、儿歌，以及一部 surprisingly 动人的歌剧。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.121.name:0 "本地奇闻"
 vn.121.desc:0 "§H本地奇闻：玻璃原野上的足迹§!\n\n[event_target:vn_news_planet.GetName] 的勘测人员在一处熔融玻璃原野发现巨大足迹。官员归咎于矿物膨胀。本地论坛归咎于巨人、秘密军队，以及 very determined 游客。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.122.name:0 "民间报道"
 vn.122.desc:0 "§H民间报道：古董收音机接收未来天气§!\n\n[event_target:vn_news_planet.GetName] 一名退休技师声称，一台古董收音机开始接收明天的天气预报。气象学家否认参与，但若干公民现已 suspicious confidence 地携带雨伞。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.123.name:0 "病毒式潮流"
 vn.123.desc:0 "§H病毒式潮流：正装头盔日§!\n\n[event_target:vn_news_planet.GetName] 的公民在婚礼、商务会议与晚餐直播中佩戴正装头盔。没人记得是谁发起的，但制造商称其为 civic preparedness 的胜利。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.124.name:0 "娱乐"
 vn.124.desc:0 "§H娱乐：肥皂剧引发政策辩论§!\n\n热门剧集《反应堆下的爱情》在 [event_target:vn_news_planet.GetName] 引发激烈争论——剧中虚构市长对 romance 征税。经济学家 annoyed 公众现在开始提出 serious 问题。"
 vn.125.name:0 "突发新闻"
 vn.125.desc:0 "§H突发新闻：逃逸宠物黏液堵塞交通§!\n\n[event_target:vn_news_planet.GetName] 一只 beloved 宠物黏液 escape 围栏，蔓延至三条通勤车道。主人坚称它 friendly。交通官员坚称它 everywhere。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.126.name:0 "超网民调"
 vn.126.desc:0 "§H超网民调：殖民地选出最爱岩石§!\n\n[event_target:vn_news_planet.GetName] 一场公众民调宣布，一块 roadside 风化的 boulder 成为殖民地最受喜爱的地标。旅游团队已安装照明、栏杆与礼品摊。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.127.name:0 "阴谋论频道"
 vn.127.desc:0 "§H阴谋论频道：总督被全息图替换？§!\n\n[event_target:vn_news_planet.GetName] 一名热门评论员声称，一名 senior 官员已被 low-resolution 全息图替换。该指控在官员于 unpopular 时刻 blink 后 momentum 大增。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
 vn.128.name:0 "名人新闻"
 vn.128.desc:0 "§H名人新闻：歌手取消重力§!\n\n前卫 vocalist 凯克萨· dawn 在 [event_target:vn_news_planet.GetName] 以 controlled microgravity 完成整场演唱会，令观众 stunned。评论家称其 transcendent。清理 crew 称其 predictable。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y人文关怀提振§!\n£stability£ +3 稳定度\n£unity£ +3% 岗位凝合力"
 vn.129.name:0 "本地奇闻"
 vn.129.desc:0 "§H本地奇闻：昨天还不存在的门§!\n\n[event_target:vn_news_planet.GetName] 的居民在一面旧交通墙中发现一扇 sealed 门，尽管 archived 平面图显示只是 empty concrete。官员称那是 storage closet。没人找到 key。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y病毒式媒体热潮§!\n£amenities£ +5% 舒适度\n£unity£ +5% 岗位凝合力"
 vn.130.name:0 "社交媒体狂热"
 vn.130.desc:0 "§H社交媒体狂热：耳语评测§!\n\n[event_target:vn_news_planet.GetName] 兴起一种新评测潮流——对着公共麦克风 whisper 产品投诉。商家 hate it。观众 find it relaxing。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§R公众恐慌§!\n£stability£ −3 稳定度\n£crime£ +5 犯罪度"
 vn.131.name:0 "民间报道"
 vn.131.desc:0 "§H民间报道：儿童选出课堂皇帝§!\n\n[event_target:vn_news_planet.GetName] 一场课堂选举意外产生一名 self-declared 课堂皇帝，支持率高于 most adults。老师报告 tax policy 仍未 resolved。\n\n§E[event_target:vn_news_planet.GetName] 殖民地效果（2年）：§!\n§Y旅游热潮§!\n£amenities£ +5% 舒适度\n£unity£ +3% 岗位凝合力"
