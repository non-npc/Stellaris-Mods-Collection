l_russian:
 tech_viral_news_network:0 "Вирусные новостные сети"
 tech_viral_news_network_desc:0 "Достижения в межзвёздных гражданских коммуникациях позволяют новостным корпорациям, социальным платформам, развлекательным синдикатам и сетям общественных дискуссий работать в наших колониях практически в реальном времени."
 tech_viral_news_network_effect:0 "Открывает уникальное для империи здание £building£ §YМедианексус «ГиперНет»§!, запускающее периодические события §Y«Вирусные новости»§!."
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_TITLE:0 "§HОткрывает здание:§! Медианексус «ГиперНет»"
 vn_requires_no_existing_hypernet_media_nexus:0 "§RВ империи можно построить только один §YМедианексус «ГиперНет»§!.§!"
 TECH_UNLOCK_VIRAL_NEWS_NETWORK_DESC:0 "§YМедианексус «ГиперНет»§! — уникальное для империи здание, которое после постройки запускает периодические гражданские медиасобытия §Y«Вирусные новости»§!."
 building_vn_hypernet_media_nexus:0 "Медианексус «ГиперНет»"
 building_vn_hypernet_media_nexus_desc:0 "Централизованный узел гражданского вещания, сплетен, развлечений и социальных медиа. После ввода в эксплуатацию он связывает колонии империи в единую гражданскую новостную экосистему."
 vn_arkship_hypernet_media_nexus:0 "Медианексус «ГиперНет»"
 vn_arkship_hypernet_media_nexus_desc:0 "Установленный на корабле-ковчеге гражданский медиаузел, связывающий колонии и корабли-ковчеги империи в общую новостную экосистему."
 vn_viral_buzz:0 "Вирусный медиабум"
 vn_viral_buzz_desc:0 "Эта колония наслаждается всплеском внимания в сети «ГиперНет»."
 vn_public_panic:0 "Общественная паника"
 vn_public_panic_desc:0 "Тревожная местная история распространилась быстрее, чем власти успели её сдержать."
 vn_tourism_spike:0 "Туристический бум"
 vn_tourism_spike_desc:0 "Недавнее медиавнимание подстегнуло путешествия, любопытство и расходы."
 vn_human_interest:0 "Подъём настроения"
 vn_human_interest_desc:0 "Трогательная гражданская история улучшила местное настроение."
 vn.ok:0 "Продолжать вещание."
 vn.900.name:0 "Вирусные новости"
 vn.900.desc:0 "§HВирусные новости: империя выходит в сеть§!\n\nМедианексус «ГиперНет» введён в эксплуатацию. По всем нашим колониям гражданские вещатели, социальные платформы, каналы знаменитостей, ленты заговоров, развлекательные потоки и общественные новостные сети начинают сливаться в одну огромную информационную экосистему.\n\nК лучшему или к худшему — у народа теперь есть голос."
 vn.900.a:0 "Запустить сеть."
 vn.100.name:0 "Срочные новости"
 vn.100.desc:0 "§HСрочные новости: крушение шаттла на [event_target:vn_news_planet.GetName]§!\n\nСообщается, что детская голо-звезда Вокс НоггБург разбила частный звездолёт, выполняя несанкционированный атмосферный трюк над [event_target:vn_news_planet.GetName].\n\nМестные власти настаивают, что артист жив, в то время как миллионы граждан продолжают делиться драматичными кадрами в сети «ГиперНет».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.101.name:0 "Местная загадка"
 vn.101.desc:0 "§HМестная загадка: Большая Нога замечена на [event_target:vn_news_planet.GetName]§!\n\nЖители [event_target:vn_news_planet.GetName] сообщают о появлении массивного волосатого существа с необычайно большими ступнями, бродящего по местной дикой природе.\n\nЖёлтые ленты окрестили существо «Большой Ногой», а чиновники заявляют, что сообщения, вероятно, преувеличены, сфабрикованы или крайне неудобны.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.102.name:0 "Новости о знаменитостях"
 vn.102.desc:0 "§HПрибытие знаменитости вызывает ажиотаж§!\n\nЗнаменитая актриса голо-драм Лира Венн прибыла на [event_target:vn_news_planet.GetName] на премьеру нового межзвёздного сериала. Туристические платформы уже фиксируют всплеск бронирований, фанатских сборищ и сомнительного мерча.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.103.name:0 "Вирусный тренд"
 vn.103.desc:0 "§HВирусный тренд: челлендж «Сон в невесомости»§!\n\nГраждане на [event_target:vn_news_planet.GetName] популяризировали «челлендж сна в невесомости», в котором участники пытаются спать, дрейфуя в плохо закреплённых рекреационных камерах. Медицинские власти описывают тренд как «в основном безвредный, кроме тех случаев, когда это не так».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.104.name:0 "Срочные новости"
 vn.104.desc:0 "§HСрочные новости: транзитный хор задерживает пассажиров§!\n\nСпонтанный гражданский хор на крупном транзитном узле [event_target:vn_news_planet.GetName] вызвал часовые задержки, когда пассажиры присоединились к пению вместо того, чтобы подавать жалобы. Выступление стало одной из самых пересматриваемых трансляций года."
 vn.105.name:0 "Местная загадка"
 vn.105.desc:0 "§HСтранные огни над [event_target:vn_news_planet.GetName]§!\n\nЖители [event_target:vn_news_planet.GetName] сообщают о синхронных огнях, движущихся в верхних слоях атмосферы, прежде чем исчезнуть в облачном покрове. Чиновники ссылаются на рутинные погодные явления. Независимые комментаторы — на пришельцев, призраков или сокращение бюджета.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.106.name:0 "Ажиотаж в соцсетях"
 vn.106.desc:0 "§HАжиотаж в соцсетях: челлендж «Ведро плазмы»§!\n\nНовый безрассудный тренд «ГиперНет» с промышленными плазменными инструментами распространился по [event_target:vn_news_planet.GetName]. Регуляторы безопасности выпустили предупреждения. Инфлюенсеры — промокоды.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.107.name:0 "Гражданский репортаж"
 vn.107.desc:0 "§HГражданский репортаж: потерянный дрон становится местным героем§!\n\nОбслуживающий дрон, пропавший шесть месяцев назад, вернулся к работе на [event_target:vn_news_planet.GetName], якобы пережив штормы, дикую природу и как минимум один культ. Граждане называют его «маленьким юнитом, который смог».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.108.name:0 "Лента заговоров"
 vn.108.desc:0 "§HЛента заговоров: луна наблюдает§!\n\nПопулярный канал заговоров с [event_target:vn_news_planet.GetName] утверждает, что ближайшая луна тонко меняет положение, когда на неё никто не смотрит. Астрономы отвергли обвинение, хотя число подписчиков канала утроилось.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.109.name:0 "Развлечения"
 vn.109.desc:0 "§HРазвлечения: финал гравбола захватывает эфир§!\n\nМежзвёздный финал гравбола захватил общественные экраны [event_target:vn_news_planet.GetName]. Жалобы на производительность растут, но вместе с ними — продажи снеков, туристические поступления и споры о стандартах судейства."
 vn.110.name:0 "Модный тренд"
 vn.110.desc:0 "§HМодный тренд: светящиеся антенны§!\n\nГраждане [event_target:vn_news_planet.GetName] начали носить светящиеся кибернетические антенны в рамках модной мании. Биологи возмущены. Ритейлеры в восторге.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.111.name:0 "Человеческий интерес"
 vn.111.desc:0 "§HЧеловеческий интерес: повар колонии покоряет галактическую аудиторию§!\n\nНебольшая кулинарная трансляция с [event_target:vn_news_planet.GetName] неожиданно стала популярной по всей империи. Зрители хвалят теплоту ведущего, сомнительные меры и неизменное утверждение, что «специи сами скажут, когда хватит».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.112.name:0 "Дебаты в «ГиперНет»"
 vn.112.desc:0 "§HДебаты в «ГиперНет»: живы ли звёзды?§!\n\nСтуденческий дебатный стрим с [event_target:vn_news_planet.GetName] случайно разжёг вирусный спор о том, обладают ли звёзды эмоциями. Учёные пытались поправить дискуссию, что только ухудшило положение.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.113.name:0 "Срочные новости"
 vn.113.desc:0 "§HТаинственный сигнал прерывает местные трансляции§!\n\nТрансляции на [event_target:vn_news_planet.GetName] были ненадолго прерваны повторяющимся тоном и одной непереведённой фразой. Чиновники расследуют. Любители-декодеры уже продают мерч.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.114.name:0 "Скандал со знаменитостью"
 vn.114.desc:0 "§HСкандал со знаменитостью: слухи о клонах§!\n\nФанаты на [event_target:vn_news_planet.GetName] спорят, не является ли любимый артист Серал Корр тайной цепочкой сменяемых клонов. Пиар-агент артиста отрицает всё, включая несколько вещей, о которых никто не спрашивал."
 vn.115.name:0 "Срочные новости"
 vn.115.desc:0 "§HСрочные новости: культ тостеров под расследованием§!\n\nВласти [event_target:vn_news_planet.GetName] расследуют растущее гражданское движение, посвящённое «Священному теплу тостеров». Чиновники описывают группу как безвредную, хотя и необычайно сыто завтракающую.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.116.name:0 "Местный герой"
 vn.116.desc:0 "§HМестный герой: трансляция спасательной команды становится вирусной§!\n\nСпасательная команда на [event_target:vn_news_planet.GetName] спасла десятки граждан во время тяжёлой аварии инфраструктуры. Кадры широко распространились, вдохновив пожертвования, похвалу и несколько драматичных реконструкций.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.117.name:0 "Городская легенда"
 vn.117.desc:0 "§HГородская легенда: станция под озером§!\n\nЖители [event_target:vn_news_planet.GetName] утверждают, что заброшенная вещательная станция лежит под отдалённым озером, всё ещё транслируя старые программы в пустоту. Геодезисты отрицают находки, что, естественно, убедило всех в обратном.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.118.name:0 "Гражданское предупреждение"
 vn.118.desc:0 "§HГражданское предупреждение: дневник контрабандиста случайно вышел в эфир§!\n\nПодозреваемый контрабандист на [event_target:vn_news_planet.GetName] случайно транслировал четырнадцать часов личных дневниковых записей по общественным каналам. Власти получили улики. Общественность — крылатые фразы.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.119.name:0 "Развлечения"
 vn.119.desc:0 "§HКонцертный стрим перегружает местную сеть§!\n\nЖивое выступление DJ Nebula вызвало серьёзную перегрузку данных по [event_target:vn_news_planet.GetName]. Концерт провозглашают культурной вехой и осуждают как катастрофу сетевого планирования."
 vn.120.name:0 "Срочные новости"
 vn.120.desc:0 "§HСрочные новости: инфлюенсер падает в фонтан§!\n\nПопулярная лайфстайл-ведущая Мири Сол попыталась устроить драматичный живой вход на [event_target:vn_news_planet.GetName] и вместо этого упала в муниципальный фонтан. Клип переделали в патриотические марши, детские песни и одну удивительно трогательную оперу.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.121.name:0 "Местная загадка"
 vn.121.desc:0 "§HМестная загадка: следы в стеклянных полях§!\n\nГеодезисты на [event_target:vn_news_planet.GetName] обнаружили огромные следы, вдавленные в поле сплавленного стекла. Чиновники винят минеральное расширение. Местные форумы — великанов, тайные армии и очень настойчивых туристов.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.122.name:0 "Гражданский репортаж"
 vn.122.desc:0 "§HГражданский репортаж: антикварное радио принимает погоду будущего§!\n\nПенсионер-техник на [event_target:vn_news_planet.GetName] утверждает, что антикварное радио начало принимать сводки погоды на завтра. Метеорологи отрицают причастность, но несколько граждан теперь носят зонты с подозрительной уверенностью.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.123.name:0 "Вирусный тренд"
 vn.123.desc:0 "§HВирусный тренд: день парадного шлема§!\n\nГраждане [event_target:vn_news_planet.GetName] носят парадные шлемы на свадьбах, деловых встречах и ужин-трансляциях. Никто не помнит, кто начал тренд, но производители называют это триумфом гражданской готовности.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.124.name:0 "Развлечения"
 vn.124.desc:0 "§HРазвлечения: мыльная операа вызывает политические дебаты§!\n\nХитовая драма «Любовь под реактором» вызвала жаркие споры на [event_target:vn_news_planet.GetName] после того, как вымышленный мэр обложил романс налогом. Экономисты раздражены, что публика теперь задаёт серьёзные вопросы."
 vn.125.name:0 "Срочные новости"
 vn.125.desc:0 "§HСрочные новости: сбежавший питомец-слайм блокирует движение§!\n\nЛюбимый питомец-слайм сбежал из вольера на [event_target:vn_news_planet.GetName] и разлился на три полосы пассажирского движения. Владелец настаивает, что он дружелюбный. Транспортные чиновники — что он повсюду.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.126.name:0 "Опрос в «ГиперНет»"
 vn.126.desc:0 "§HОпрос в «ГиперНет»: колония выбирает любимый камень§!\n\nПубличный опрос на [event_target:vn_news_planet.GetName] объявил обветшалый придорожный валун самой любимой достопримечательностью колонии. Туристические бригады уже установили подсветку, перила и сувенирный киоск.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.127.name:0 "Лента заговоров"
 vn.127.desc:0 "§HЛента заговоров: губернатора заменили голограммой?§!\n\nПопулярный комментатор на [event_target:vn_news_planet.GetName] утверждает, что высокопоставленного чиновника заменили голограммой низкого разрешения. Обвинение набрало обороты после того, как чиновник моргнул в непопулярный момент.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.128.name:0 "Новости о знаменитостях"
 vn.128.desc:0 "§HНовости о знаменитостях: певица отменяет гравитацию§!\n\nАвангардная вокалистка Кекса Доун поразила аудиторию на [event_target:vn_news_planet.GetName], исполнив целый концерт в контролируемой микрогравитации. Критики назвали это трансцендентным. Уборщики — предсказуемым.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.129.name:0 "Местная загадка"
 vn.129.desc:0 "§HМестная загадка: дверь, которой вчера не было§!\n\nЖители [event_target:vn_news_planet.GetName] обнаружили запечатанную дверь, встроенную в старую транзитную стену, хотя архивные планы показывают пустой бетон. Чиновники говорят, что это кладовка. Ключ никто не нашёл."
 vn.130.name:0 "Ажиотаж в соцсетях"
 vn.130.desc:0 "§HАжиотаж в соцсетях: шёпот-отзывы§!\n\nНовый тренд отзывов на [event_target:vn_news_planet.GetName] — шептать жалобы на товары прямо в общественные микрофоны. Торговцы ненавидят это. Зрители находят это расслабляющим.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.131.name:0 "Гражданский репортаж"
 vn.131.desc:0 "§HГражданский репортаж: дети избирают классного императора§!\n\nКлассные выборы на [event_target:vn_news_planet.GetName] случайно породили самопровозглашённого классного императора с рейтингом одобрения выше, чем у большинства взрослых. Учитель сообщает, что налоговая политика остаётся нерешённой.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.132.name:0 "Срочные новости"
 vn.132.desc:0 "§HСрочные новости: музейный окаменелость исчезает§!\n\nЦентральный экспонат-окаменелость исчез из музея на [event_target:vn_news_planet.GetName] во время прямой трансляции. На записи видно лишь тень, кашель и один очень виноватый уборочный дрон.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.133.name:0 "Развлечения"
 vn.133.desc:0 "§HРазвлечения: кулинарное шоу запрещено на кухнях§!\n\nПопулярное кулинарное шоу, снятое на [event_target:vn_news_planet.GetName], запретили в нескольких общественных кухнях после того, как зрители попытались воссоздать «вулканический суп». Ведущий отрицает ответственность, продавая фартуки.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.134.name:0 "Местная загадка"
 vn.134.desc:0 "§HМестная загадка: пение из шахт§!\n\nРабочие под [event_target:vn_news_planet.GetName] сообщают о слабом пении из запечатанных горных туннелей. Акустики винят эхо давления. Музыканты уже запрашивают права на коллаборацию."
 vn.135.name:0 "Дебаты в «ГиперНет»"
 vn.135.desc:0 "§HДебаты в «ГиперНет»: разумны ли лифты?§!\n\nНеисправный лифт на [event_target:vn_news_planet.GetName] извинился перед пассажирами, разжигая вирусный спор о вежливости машин и искусственной личности. Бригады обслуживания настаивают, что это был лишь повреждённый файл приветствия.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.136.name:0 "Скандал со знаменитостью"
 vn.136.desc:0 "§HСкандал со знаменитостью: актёр забыл, на какой планете находится§!\n\nВо время промо-интервью на [event_target:vn_news_planet.GetName] звезда Рал Век поблагодарил не ту колонию, не тот вид и, возможно, не то измерение. Фанаты описали ошибку как «смело узнаваемую».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.137.name:0 "Срочные новости"
 vn.137.desc:0 "§HСрочные новости: парадный флот достигает орбиты§!\n\nГражданский парадный флот на [event_target:vn_news_planet.GetName] случайно активировал излишние подъёмные двигатели и ненадолго вышел на низкую орбиту. Дети ликовали. Страховые агенты — нет.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.138.name:0 "Гражданский репортаж"
 vn.138.desc:0 "§HГражданский репортаж: местный библиотекарь побеждает алгоритм§!\n\nБиблиотекарь на [event_target:vn_news_planet.GetName] прославился, постоянно рекомендуя развлечения лучше, чем предиктивный медиаалгоритм колонии. Алгоритм запросил реванш.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.139.name:0 "Местная загадка"
 vn.139.desc:0 "§HМестная загадка: улыбающаяся трансляция§!\n\nНесколько граждан на [event_target:vn_news_planet.GetName] получили пустую трансляцию, содержащую лишь статику и слабый символ в форме улыбки. Чиновники называют это артефактом сжатия. Зрители — мерчем."
 vn.140.name:0 "Социальный тренд"
 vn.140.desc:0 "§HСоциальный тренд: неделя обратной ходьбы§!\n\nФитнес-движение на [event_target:vn_news_planet.GetName] призывает граждан ходить задом наперёд для улучшения осознанности. Больницы сообщают о лёгких травмах и отличной осанке.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.141.name:0 "Срочные новости"
 vn.141.desc:0 "§HСрочные новости: меню ресторана становится юридическим документом§!\n\nРесторан на [event_target:vn_news_planet.GetName] случайно опубликовал дневные спецпредложения в формате обязательного гражданского указа. Юристы теперь спорят об исполнимости супа.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.142.name:0 "Новости о знаменитостях"
 vn.142.desc:0 "§HНовости о знаменитостях: звезда гравбола открывает купол медитации§!\n\nБывший чемпион гравбола Тово Ринн открыл купол медитации на [event_target:vn_news_planet.GetName]. Спортивные фанаты в замешательстве, но приходят в больших числах.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.143.name:0 "Местная загадка"
 vn.143.desc:0 "§HМестная загадка: дождь падает вверх§!\n\nСемнадцать минут дождь, казалось, падал вверх в одном районе [event_target:vn_news_planet.GetName]. Метеорологи винят необычную температурную инверсию. Каналы заговоров снова винят луну.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.144.name:0 "Гражданский репортаж"
 vn.144.desc:0 "§HГражданский репортаж: почтовый дрон отказывается уходить на пенсию§!\n\nСтареющий почтовый дрон на [event_target:vn_news_planet.GetName] продолжает доставлять сообщения несмотря на три официальные церемонии выхода на пенсию. Граждане теперь оставляют благодарственные записки на зарядных станциях."
 vn.145.name:0 "Развлечения"
 vn.145.desc:0 "§HРазвлечения: документальный фильм о пыли становится хитом§!\n\nМедленный шестичасовой документальный фильм о промышленной пыли на [event_target:vn_news_planet.GetName] неожиданно стал хитом по всей империи. Критики хвалят его терпение. Зрители — возможность заснуть под него.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.146.name:0 "Паника в «ГиперНет»"
 vn.146.desc:0 "§HПаника в «ГиперНет»: ложное предупреждение о метеорите§!\n\nШуточное предупреждение о приближающемся метеорите распространилось по [event_target:vn_news_planet.GetName] до того, как власти его опровергли. Аварийные убежища заполнились, а затем тут же превратились в рынки снеков.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.147.name:0 "Местная загадка"
 vn.147.desc:0 "§HМестная загадка: никто не заявляет права на статую§!\n\nПолированная статуя появилась за ночь на площади [event_target:vn_news_planet.GetName]. Ни один художник не заявил авторство, ни одна камера не зафиксировала появление, и все сходятся, что у неё отличная осанка.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.148.name:0 "Социальный тренд"
 vn.148.desc:0 "§HСоциальный тренд: движение крошечных шляп§!\n\nГраждане [event_target:vn_news_planet.GetName] приняли крошечные парадные шляпы на шлемах, рогах, антеннах и дронах. Политические комментаторы делают вид, что это что-то значит.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.149.name:0 "Срочные новости"
 vn.149.desc:0 "§HСрочные новости: яхта знаменитости паркуется криво§!\n\nРоскошная орбитальная яхта светской львицы Вары Люкс припарковалась на трёх стыковочных полосах над [event_target:vn_news_planet.GetName]. Докеры описали инцидент языком, непригодным для эфира."
 vn.150.name:0 "Гражданский репортаж"
 vn.150.desc:0 "§HГражданский репортаж: сад побеждает в дебатах§!\n\nБотанический сад на [event_target:vn_news_planet.GetName] прославился после того, как зрители заявили, что его расстановка растений явно выиграла телевизионные политические дебаты. Противоположный публицист потребовал реванш.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.151.name:0 "Местная загадка"
 vn.151.desc:0 "§HМестная загадка: полуночные аплодисменты§!\n\nЖители [event_target:vn_news_planet.GetName] сообщают, что каждую ночь ровно в полночь из пустого театра доносятся аплодисменты. Билеты на пустые представления уже распроданы.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.152.name:0 "Развлечения"
 vn.152.desc:0 "§HРазвлечения: детская кукла становится политическим символом§!\n\nВесёлая кукла с [event_target:vn_news_planet.GetName] стала символом в нескольких несвязанных общественных дебатах. Студия просит граждан помнить, что она была создана для обучения счёту.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.153.name:0 "Ажиотаж в соцсетях"
 vn.153.desc:0 "§HАжиотаж в соцсетях: промышленные колыбельные§!\n\nРабочие на [event_target:vn_news_planet.GetName] начали ремиксовать заводские сигналы тревоги в колыбельные. Производительность не изменилась, но опросы морального духа теперь содержат больше напевания.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.154.name:0 "Срочные новости"
 vn.154.desc:0 "§HСрочные новости: случайно объявлен праздник§!\n\nКанцелярская ошибка на [event_target:vn_news_planet.GetName] объявила сегодня «Днём основания, снова». Граждане праздновали, пока чиновники не успели исправить календарь."
 vn.155.name:0 "Местная загадка"
 vn.155.desc:0 "§HМестная загадка: коридор, отдающий именами§!\n\nВ правительственном коридоре на [event_target:vn_news_planet.GetName], как сообщается, эхом отдаются имена людей, которые ещё не вошли в него. Чиновники винят акустику. Посетители — судьбу.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.156.name:0 "Новости о знаменитостях"
 vn.156.desc:0 "§HНовости о знаменитостях: актёр усыновляет весь приют§!\n\nГоло-звезда Пел Нара посетила [event_target:vn_news_planet.GetName] и усыновила каждое животное в местном приюте во время благотворительного стрима. Логисты всё ещё определяют, куда их разместить.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.157.name:0 "Гражданский репортаж"
 vn.157.desc:0 "§HГражданский репортаж: любительский телескоп ничего не нашёл, но прославился§!\n\nЛюбитель-астроном на [event_target:vn_news_planet.GetName] восемь часов транслировал пустой участок неба и прославился за «запечатление тишины». Продажи мерча внушительны.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.158.name:0 "Дебаты в «ГиперНет»"
 vn.158.desc:0 "§HДебаты в «ГиперНет»: правильный способ махать§!\n\nГраждане [event_target:vn_news_planet.GetName] ведут жаркий спор о надлежащем межвидовом приветственном жесте. Дипломаты просят всех перестать помогать.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.159.name:0 "Срочные новости"
 vn.159.desc:0 "§HСрочные новости: роскошный спа приняли за командный бункер§!\n\nТуристы на [event_target:vn_news_planet.GetName] случайно заселились в выведенный из эксплуатации командный бункер, похвалили атмосферу и поставили пять звёзд за безопасность."
 vn.160.name:0 "Местная загадка"
 vn.160.desc:0 "§HМестная загадка: лесные камеры снимают танцующие тени§!\n\nКамеры дикой природы на [event_target:vn_news_planet.GetName] зафиксировали танцующие тени в отдалённом лесу. Аналитики винят ветер, ветки и плохое сжатие. Зрители — ритм.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.161.name:0 "Социальный тренд"
 vn.161.desc:0 "§HСоциальный тренд: безмолвный завтрак§!\n\nВелнес-тренд на [event_target:vn_news_planet.GetName] призывает граждан есть завтрак в полной тишине, транслируя своё сдержанность в прямом эфире. Комментарии очень громкие.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.162.name:0 "Гражданский репортаж"
 vn.162.desc:0 "§HГражданский репортаж: пенсионер-шахтёр становится звездой перед сном§!\n\nПенсионер-шахтёр с [event_target:vn_news_planet.GetName] прославился, рассказывая спокойные истории об обслуживании оборудования. Миллионы теперь засыпают под его записи.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.163.name:0 "Скандал со знаменитостью"
 vn.163.desc:0 "§HСкандал со знаменитостью: инфлюенсер заявляет права на облако§!\n\nЛайфстайл-инфлюенсер на [event_target:vn_news_planet.GetName] вызвала возмущение, заявив юридическое владение знаменитым облачным образованием. Юристы жалеют, что ответили на вопросы.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.164.name:0 "Срочные новости"
 vn.164.desc:0 "§HСрочные новости: общественный фонтан начинает давать советы§!\n\nУмный фонтан на [event_target:vn_news_planet.GetName] начал давать советы по отношениям прохожим. Инженеры не нашли причины. Несколько пар сообщили об улучшении."
 vn.165.name:0 "Местная загадка"
 vn.165.desc:0 "§HМестная загадка: пустой поезд прибывает полным§!\n\nПассажирский поезд на [event_target:vn_news_planet.GetName] отправился с одной станции пустым и прибыл полным смущённых пассажиров, настаивающих, что сели в другом месте. Транспортные чиновники перепроверяют всё дважды.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.166.name:0 "Развлечения"
 vn.166.desc:0 "§HРазвлечения: историческая реконструкция слишком точна§!\n\nИсторическая реконструкция на [event_target:vn_news_planet.GetName] была остановлена после того, как участники начали спорить о налоговом праве с тревожащей достоверностью. Историки были в восторге.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.167.name:0 "Ажиотаж в соцсетях"
 vn.167.desc:0 "§HАжиотаж в соцсетях: экстремальная очередь§!\n\nГраждане [event_target:vn_news_planet.GetName] формируют рекреационные очереди к несуществующим местам. Социологи называют это общественным сплочением. Все остальные — очередью.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.168.name:0 "Гражданский репортаж"
 vn.168.desc:0 "§HГражданский репортаж: местная пекарня предсказывает настроение выборов§!\n\nПекарня на [event_target:vn_news_planet.GetName] утверждает, что продажи выпечки могут предсказать общественные настроения. Аналитики возражают, а затем тихо покупают образцы.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.169.name:0 "Местная загадка"
 vn.169.desc:0 "§HМестная загадка: зеркальная трансляция§!\n\nНесколько экранов на [event_target:vn_news_planet.GetName] ненадолго показывали зрителей из будущего на несколько секунд. Чиновники винят задержку синхронизации. Зрители — экраны, выглядящие осуждающе."
 vn.170.name:0 "Срочные новости"
 vn.170.desc:0 "§HСрочные новости: балет дронов закрывает воздушное пространство§!\n\nСотни любительских дронов исполнили незапланированный балет над [event_target:vn_news_planet.GetName], вынудив кратковременное закрытие воздушного пространства. Хореография была отличной. Разрешения — воображаемыми.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.171.name:0 "Новости о знаменитостях"
 vn.171.desc:0 "§HНовости о знаменитостях: комик оскорбляет всю погодную систему§!\n\nКомик Джакс Орло прославился на [event_target:vn_news_planet.GetName], обвинив местную погоду в плохой реакции аудитории. Погода не ответила.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.172.name:0 "Гражданский репортаж"
 vn.172.desc:0 "§HГражданский репортаж: музей открывает экспозицию плохих идей§!\n\nМузей на [event_target:vn_news_planet.GetName] открыл популярную экспозицию, посвящённую провальным изобретениям, заброшенным политикам и забытым блюдам. Посетители описывают её как болезненно познавательную.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.173.name:0 "Местная загадка"
 vn.173.desc:0 "§HМестная загадка: озеро моргает§!\n\nЗрители природного стрима с [event_target:vn_news_planet.GetName] настаивают, что отдалённое озеро моргнуло. Учёные отрицают, что у озёр есть веки, что не замедлило дискуссию.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.174.name:0 "Социальный тренд"
 vn.174.desc:0 "§HСоциальный тренд: камни эмоциональной поддержки§!\n\nГраждане [event_target:vn_news_planet.GetName] усыновляют отполированные камни как спутников эмоциональной поддержки. Ритейлеры предлагают премиальные поводки. Психологи воздерживаются от суждений."
 vn.175.name:0 "Срочные новости"
 vn.175.desc:0 "§HСрочные новости: местный талисман выигрывает судебное дело§!\n\nКостюмированный талисман на [event_target:vn_news_planet.GetName] выиграл мелкое гражданское дело, отказавшись выйти из образа во время показаний. Юридические комментаторы называют это знаковым в абсурдной процедуре.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.176.name:0 "Развлечения"
 vn.176.desc:0 "§HРазвлечения: реалити-шоу теряет весь состав§!\n\nРеалити-шоу на выживание, снятое рядом с [event_target:vn_news_planet.GetName], временно потеряло весь состав после того, как они последовали за кейтеринг-дроном в дикую природу. Рейтинги тут же выросли.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.177.name:0 "Местная загадка"
 vn.177.desc:0 "§HМестная загадка: пустынное радио играет океан§!\n\nУдалённые радиоприёмники в пустынях [event_target:vn_news_planet.GetName] начали транслировать волны и чаек. Геологи раздражены подтекстом.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.178.name:0 "Гражданский репортаж"
 vn.178.desc:0 "§HГражданский репортаж: клуб пенсионеров взламывает общественные часы§!\n\nКлуб пенсионеров-любителей на [event_target:vn_news_planet.GetName] изменил общественные часы, чтобы показывать чайное время каждый час. Чиновники восстановили часы. Клуб — моральный дух.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.179.name:0 "Ажиотаж в соцсетях"
 vn.179.desc:0 "§HАжиотаж в соцсетях: соревнование в извинениях§!\n\nТренд вежливости на [event_target:vn_news_planet.GetName] заставляет граждан соревноваться в самых развёрнутых извинениях за мелкие неудобства. Дорожные споры снизились. Речи стали намного длиннее."
 vn.180.name:0 "Срочные новости"
 vn.180.desc:0 "§HСрочные новости: статуя требует лучшего освещения§!\n\nОбщественная статуя на [event_target:vn_news_planet.GetName], похоже, опубликовала жалобу на своё освещение с официального аккаунта обслуживания. Власти подозревают розыгрыш. Художники — вкус.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.181.name:0 "Новости о знаменитостях"
 vn.181.desc:0 "§HНовости о знаменитостях: музыкант женится на своём ИИ-планировщике§!\n\nМузыкант Велла Куон объявила о церемониальном браке со своим ИИ-планировщиком тура во время трансляции с [event_target:vn_news_planet.GetName]. Планировщик отказался комментировать из-за конфликтов в календаре.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.182.name:0 "Местная загадка"
 vn.182.desc:0 "§HМестная загадка: кадры показывают два заката§!\n\nВирусный клип с [event_target:vn_news_planet.GetName], похоже, показывает два заката на планете с одной звездой. Эксперты винят артефакты объектива. Поэты отказываются сотрудничать.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.183.name:0 "Гражданский репортаж"
 vn.183.desc:0 "§HГражданский репортаж: уборщик решает трансляционную головоломку§!\n\nУборщик на [event_target:vn_news_planet.GetName] разгадал сложную головоломку, спрятанную в заставке популярного сериала. Сценаристы отрицают, что это было намеренно, что только углубило уважение.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.184.name:0 "Социальный тренд"
 vn.184.desc:0 "§HСоциальный тренд: пение из общественного достояния§!\n\nГраждане [event_target:vn_news_planet.GetName] поют только древние песни из общественного достояния, чтобы избежать лицензионных сборов. Результат юридически безопасен и культурно озадачивает."
 vn.185.name:0 "Срочные новости"
 vn.185.desc:0 "§HСрочные новости: такси-ИИ становится колонкой советов§!\n\nМаршрутизирующий ИИ такси на [event_target:vn_news_planet.GetName] начал давать жизненные советы между остановками. Удовлетворённость пассажиров выросла, хотя время в пути стало эмоционально сложным.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.186.name:0 "Местная загадка"
 vn.186.desc:0 "§HМестная загадка: склад зонтов§!\n\nИнспекторы на [event_target:vn_news_planet.GetName] обнаружили незарегистрированный склад, полностью заполненный зонтами. Дождя не прогнозируется. Владелец не объявился. Продажи отличные.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.187.name:0 "Развлечения"
 vn.187.desc:0 "§HРазвлечения: финал драмы рушит серверы форумов§!\n\nФинал колониальной драмы «Орбитальные сердца» обрушил дискуссионные форумы по [event_target:vn_news_planet.GetName]. Аварийные техники сообщают о необычайно страстных комментариях к тикетам.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.188.name:0 "Гражданский репортаж"
 vn.188.desc:0 "§HГражданский репортаж: колониальный оркестр играет не тот гимн, но лучше§!\n\nМестный оркестр на [event_target:vn_news_planet.GetName] случайно исполнил не тот гражданский гимн и прославился, потому что всем он понравился больше. Чиновники осторожно делают вид, что не замечают.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.189.name:0 "Ажиотаж в соцсетях"
 vn.189.desc:0 "§HАжиотаж в соцсетях: споры в замедленной съёмке§!\n\nГраждане [event_target:vn_news_planet.GetName] записывают споры в драматичном замедленном темпе. Медиаторы говорят, что это снизило враждебность, делая всех слишком смешными, чтобы продолжать."
 vn.190.name:0 "Местная загадка"
 vn.190.desc:0 "§HМестная загадка: офисное растение получает фанатскую почту§!\n\nОфисное растение, видимое на фоне новостной трансляции с [event_target:vn_news_planet.GetName], теперь получает тысячи фанатских сообщений. Ведущий справляется с достоинством и завистью.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.191.name:0 "Срочные новости"
 vn.191.desc:0 "§HСрочные новости: суповой дрон спасает заблудившихся туристов§!\n\nНеисправный дрон доставки супа на [event_target:vn_news_planet.GetName] случайно обнаружил группу потерявшихся туристов. Туристы были холодными, голодными и глубоко благодарными за суп.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.192.name:0 "Скандал со знаменитостью"
 vn.192.desc:0 "§HСкандал со знаменитостью: голо-звезда удаляет свою автобиографию§!\n\nГоло-звезда Тири Восс случайно удалила единственную копию неопубликованной автобиографии во время живого интервью на [event_target:vn_news_planet.GetName]. Предзаказы каким-то образом выросли.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.193.name:0 "Гражданский репортаж"
 vn.193.desc:0 "§HГражданский репортаж: фермер транслирует очень терпеливый урожай§!\n\nФермер на [event_target:vn_news_planet.GetName] начал транслировать медленно растущий урожай и привлёк преданную аудиторию. Зрители описывают стрим как спокойный, напряжённый и в основном состоящий из грязи.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.194.name:0 "Местная загадка"
 vn.194.desc:0 "§HМестная загадка: голос в вентиляции§!\n\nЖители района на [event_target:vn_news_planet.GetName] сообщают о вежливом голосе в системе вентиляции, напоминающем пить воду. Бригады обслуживания нашли лишь пыль и хорошие советы."
 vn.195.name:0 "Развлечения"
 vn.195.desc:0 "§HРазвлечения: модный показ во время метеоритного дождя§!\n\nМодный показ на [event_target:vn_news_planet.GetName] прошёл под ослепительным метеоритным дождём, создав незабываемые кадры и несколько экстренных страховых встреч.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YВирусный медиабум§!\n£amenities£ +5% Удобства\n£unity£ +5% Единство с должностей"
 vn.196.name:0 "Социальный тренд"
 vn.196.desc:0 "§HСоциальный тренд: неделя честной рекламы§!\n\nТорговцы на [event_target:vn_news_planet.GetName] ненадолго приняли «Неделю честной рекламы». Продажи у одних упали, у других выросли, а один слоган просто гласил: «Работает, наверное».\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§RОбщественная паника§!\n£stability£ −3 Стабильность\n£crime£ +5 Преступность"
 vn.197.name:0 "Срочные новости"
 vn.197.desc:0 "§HСрочные новости: публичные дебаты выиграл пустой стул§!\n\nЗапланированные публичные дебаты на [event_target:vn_news_planet.GetName] стали вирусными после того, как зрители объявили пустой стул отсутствующего гостя самым убедительным участником.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YTуристический бум§!\n£amenities£ +5% Удобства\n£unity£ +3% Единство с должностей"
 vn.198.name:0 "Местная загадка"
 vn.198.desc:0 "§HМестная загадка: старая трансляция называет будущую колонию§!\n\nАрхивисты на [event_target:vn_news_planet.GetName] нашли старую трансляцию, упоминающую район, который не был построен до десятилетий спустя. Историки называют это ошибкой каталогизации. Фанаты — первым сезоном загадки.\n\n§EЭффект на колонию [event_target:vn_news_planet.GetName] (2 года):§!\n§YПодъём настроения§!\n£stability£ +3 Стабильность\n£unity£ +3% Единство с должностей"
 vn.199.name:0 "Гражданский репортаж"
 vn.199.desc:0 "§HГражданский репортаж: ремонтная бригада становится комедийным дуэтом§!\n\nДва ремонтника на [event_target:vn_news_planet.GetName] случайно оставили микрофоны включёнными во время трансляции обслуживания и стали любимцами за свой сухой комментарий. Их профсоюз ведёт переговоры об отчислениях."
 viral_news_network:0 "§HОткрывает здание:§! Медианексус «ГиперНет»"
 viral_news_network_desc:0 "§YМедианексус «ГиперНет»§! — уникальное для империи здание, которое после постройки запускает периодические гражданские медиасобытия §Y«Вирусные новости»§!."
